body:
  text: 左傳事緯春秋類提要臣等謹案左傳事緯十二卷前集八卷國朝馬驌撰驌字驄御又字宛斯鄒平人順治己亥進士官淮安府推官終於靈璧縣知縣是書取左傳事類分為百有八篇篇加論斷首載晉杜預唐孔穎達序論及自作邱明小傳一卷辨例三卷圖表一卷覽左隨筆一卷名氏譜一卷左傳字奇一卷合事緯二十卷內地輿有說無圖蓋未成也王士禎池北偶談稱其博雅嗜古尤精春秋左氏學載所著諸書與此本並同惟無字奇及事緯豈士禎偶未見歟三傳之中左氏親觀國史事迹為真而褒貶則多參俗議公羊穀梁二家得自𫝊聞記載頗謬而義例則多有師承朱子語録謂左氏史學事詳而理差公穀經學理精而事謬蓋篤論也驌作是書必謂左氏義例在公穀之上是亦偏好之言然驌於左氏實能融㑹貫通故所論具有條理其圄表亦皆考證精詳可以知專門之學與涉獵者相去逺矣乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:96dfdb9212577d0d5925c132124918804347588d621ba71dec3322a291715b2a
