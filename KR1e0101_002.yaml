body:
  text: 左傳事緯卷二靈璧知縣馬驌撰齊桓霸業莊公十三年春會于北杏以平宋亂遂人不至夏齊人滅遂而戍之宋人背北杏之會十四年春諸侯伐宋齊請師于周夏單伯會之取成于宋而還冬會于鄄宋服故也十五年春復會焉齊始霸也秋諸侯為宋伐郳鄭人間之而侵宋十六年夏諸侯伐鄭宋故也冬同盟于幽鄭成也十七年春齊人執鄭詹鄭不朝也夏遂因氏領氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉二十七年夏同盟于幽陳鄭服也二十八年楚令尹子元欲蠱文夫人為館於其宮側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讐而於未亡人之側不亦異乎御人以告子元子元曰婦人不忘襲讐我反忘之秋子元以車六百乘伐鄭入于桔柣之門子元鬬御強鬭梧耿之不比為斾鬭班王孫遊王孫喜殿衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止二十九年夏鄭人侵許凡師有鐘鼓曰伐無曰侵輕曰襲三十年楚公子元歸自伐鄭而處王宮鬭射師諫則執而梏之秋申公鬭班殺子元鬭穀於菟為令尹自毁其家以紓楚國之難冬遇于魯濟謀山戎也以其病燕故也三十一年夏六月齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘三十二年春城小穀為管仲也齊侯為楚伐鄭之故請會于諸侯宋公請先見于齊侯夏遇于梁丘閔元年狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親昵不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢二年冬十二月狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰公與石祁子玦與寧莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽於二子渠孔御戎子伯為右黃夷前驅孔嬰齊殿及狄人戰于熒澤衛師敗績遂滅衛衛侯不去其旗是以甚敗狄人囚史華龍滑與禮孔以逐衛人二人曰我大史也實掌其祭不先國不可得也乃先之至則告守曰不可待也夜與國人出狄入衛遂從之又敗諸河初惠公之即位也少齊人使昭伯蒸於宣薑不可強之生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩僖之元年齊桓公遷邢于夷儀二年封衛于楚丘邢遷如歸衛國忘亡衛文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘僖元年諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之救患也凡侯伯救患分災討罪禮也秋楚人伐鄭鄭即齊故也盟于犖謀救鄭也二年春諸侯城楚丘而封衛焉不書所會後也秋盟于貫服江黃也冬楚人伐鄭鬭章囚鄭聃伯三年秋會于陽穀謀伐楚也齊侯為陽穀之會來尋盟冬公子友如齊涖盟楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄德不祥齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之四年春齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君大公曰五侯九伯女實征之以夾輔周室賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢包茅不入王祭不共無以縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濱師進次于陘夏楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰豈不穀是為先君之好是繼與不穀同好如何對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也齊侯説與之虎牢執轅濤塗秋伐陳討不忠也許穆公卒於師葬之以侯禮也凡諸侯薨于朝會加一等死王事加二等於是有以衮斂冬叔孫戴伯帥師會諸侯之師侵陳陳成歸轅濤塗五年會于首止會王大子鄭謀寧周也陳轅宣仲怨鄭申侯之反己於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂譛諸鄭伯曰美城其賜邑將以叛也申侯由是得罪秋諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜於王命而懼其不朝於齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親失親患必至病而乞盟所喪多矣君必悔之弗聽逃其師而歸六年夏諸侯伐鄭以其逃首止之盟故也圍新密鄭所以不時城也秋楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子於武城許男面縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而袚之焚其櫬禮而命之使復其所楚子從之七年春齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能強又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我對曰朝不及夕何以待君夏鄭殺申侯以説于齊且用陳轅濤塗之譛也初申侯申出也有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疵瑕也後之人將求多於女女必不免我死女必速行無適小國將不女容焉既葬出奔鄭又有寵于厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已秋盟于寧母謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷遠以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物鄭伯使大子華聽命於會言於齊侯曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之毋乃不可乎子父不姦之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也會而列姦何以示後嗣夫諸侯之會其德行禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為大子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭冬鄭伯使請盟于齊八年春盟于洮謀王室也鄭伯乞盟請服也九年夏會于葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好宰孔先歸遇晉侯曰可無會也齊侯不務德而勤遠略故北伐山戎南伐楚西為此會也東略之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還十三年夏會于鹹淮夷病杞故且謀王室也十四年春諸侯城緣陵而遷杞焉不書其人有闕也十五年春楚人伐徐徐即諸夏故也三月盟于牡丘尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之秋伐厲以救徐也冬宋人伐曹討舊怨也楚敗徐于婁林徐恃救也十六年夏齊伐厲不克救徐而還十二月會于淮謀鄫且東略也城鄫役人病有夜登丘而呼曰齊有亂不果城而還十七年春齊人為徐伐英氏以報婁林之役也霸之名何昉乎傳載展禽有共工氏霸九州之言然則霸之名不已舊乎或曰霸之名我未之前聞也其當周之末季齊桓晉文之事乎古者有伯而無霸蓋於四方諸侯各建一長謂之方伯如唐虞之四嶽周之二伯是也自周衰而二伯之職廢于是乎有霸之名焉是霸之興自衰周始也雖然昆吾氏不嘗霸于夏乎大彭豕韋不嘗霸于商乎三代皆有又焉在其自衰周始也國佐有言曰五伯之霸也勤而撫之以役王命白虎通亦曰三王之道衰而五霸存其政則霸之名不自周起明矣即今言春秋之五霸且有進吳王闔閭而黜宋襄者以為蔡侯無罪而羈楚吳憂中國是以進之然不擒二毛宋公亦嘗假仁義矣方之勾吳寧遂後乎總之春秋止有兩霸耳未可云五也秦穆受甘言以縱鄭國違黃髮而敗殽師誅賢臣百里奚而以子車氏為殉黃鳥之詩是以作刺宋襄不度德量力慕虛名而得實禍身死國辱以為天下笑楚莊僭號凌上憑威恃強觀兵而窺周鼎倚怒而殘宋郊易子析骸厥禍亦巨此三君者皆無翼戴天子之功豈能與桓公比烈哉考之昆吾大彭豕韋皆有羽翼夏殷之事則并桓文而為五此至確之論也齊桓公當東遷之後起自危難首起圖功可謂偉矣釁沐施于羈囚連帥畫之都鄙煮海通賈國用富強衣裳兵車之會大率尊天子而示信義使有聖王在上必且假以方伯之命使之長帥諸侯惜也王紀不立經營徒勞桓之為此亦極難爾故北杏肇績魯衛不至鄄幽繼盟宋鄭懷疑逮三國存而大義始昭江黃服而蠻方始懼至貫澤陽穀之會遠侯畢集矣桓公端委搢笏以朝之盛之至也而或謂包茅責貢以來不聞南下之師葵丘震矜九國以叛弦黃滅而中國不救功高志滿則盛極而漸衰焉無他管仲死也故桓公中主也得管子而名彰聖人所以不稱桓公而歸美管仲者為其持大體正名分兵力甲于天下必不敢教其君為鄭人繻葛之舉也至尊莫如王子定其位而覬覦絶於天下矣至親莫如哀薑誅其罪而淫亂絶於諸侯矣侵伐不勞大師盟會不煩小國功高來天王之寵猶凛天威而恐隕越何規模之宏遠乎其後惟晉文猶能繼之豈三君所敢望與慶父之亂莊公二十三年夏公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡守以大習之非是君不舉矣君舉必書書而不法後嗣何觀秋丹桓宮之楹二十四年春刻其桷皆非禮也御孫諫曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎秋哀薑至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告虔也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎二十五年春陳女叔來聘始結陳好也嘉之故不名二十七年秋公子友如陳葬原仲非禮也原仲季友之舊也三十二年初公築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般焉雩講于梁氏女公子觀之圉人犖自牆外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏使針季鴆之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏八月癸亥公薨於路寢子般即位次于黨氏冬十月己未共仲使圉人犖賊子般于黨氏成季奔陳立閔公閔公元年春不書即位亂故也夏六月葬莊公亂故是以緩秋八月公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之季子來歸嘉之也冬齊仲孫湫來省難書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顚而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間攜二覆昏亂霸王之器也二年夏吉禘于莊公速也初公傅奪卜齮田公不禁秋八月辛丑共仲使卜齮賊公于武闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊閔公哀薑之娣叔薑之子也故齊人立之共仲通于哀薑哀薑欲立之閔公之死也哀薑與知之故孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之成風聞成季之繇乃事之而屬僖公焉故成季立之僖公元年春不稱即位公出故也公出復入不書諱之也諱國惡禮也九月公敗邾師于偃虛丘之戍將歸者也冬莒人來求賂公子友敗諸酈獲莒子之弟拿非卿也嘉獲之也公賜季友汶陽之田及費夫人氏之喪至自齊君子以齊人之殺哀薑也為己甚矣女子從人者也八年秋禘而致哀薑焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也三十三年齊國莊子來聘自郊勞至于贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也冬公如齊朝且弔有狄師也反薨于小寢即安也葬僖公緩作主非禮也凡君薨卒哭而祔祔而作主特祀于主蒸嘗禘于廟文元年夏四月丁巳葬僖公穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也二年丁丑作僖公主書不時也秋八月丁卯有事于大廟躋僖公逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也仲尼曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虛器縱逆祀祀爰居三不知也四年冬成風薨五年春王使榮叔來含且賵召昭公來會葬禮也九年秦人來歸僖公成風之隧禮也諸侯相弔賀也雖不當事茍有禮焉書也以無忘舊好噫莊公竟忘讐乎思薑氏誰之女也齊襄之女也襄嘗殺桓公矣殺父者之女可娶乎納幣親迎行皆踰禮丹楹刻桷侈為美觀無非炫耀齊國致恭婦人是誠何心哉宜齊風之目為展我甥兮也文薑死而魯國方靖乃復娶其兄之女其淫亂不減於文薑不惟忘讐且以興亂彼莊公何如人乎知有母而不知有父知有妻而不知恥是鳥獸也慶父與叔牙同母者也季友與莊公同母者也慶父久窺君位叔牙助之俄而弒械成季子和藥而飲之為國滅親不示顯戮合於禮矣叔牙死而慶父失助似亦可以知懼乃哀薑宣淫必欲立之殺孟任之子般不恤也並殺其娣叔薑之子閔公亦不恤也內外交亂比嵗而弒二君周公之祀不絶如線矣叔牙若在又將何如也慶父不死魯難未已季友不入魯國不定齊桓公仗義而殺哀薑僖公之立天若啓之卒能佐霸成功為魯國之令主閟宮泮水之詩是以作頌遡其援立之功非季子誰與歸乎入春秋初魯稱多事桓公弒隱而不討齊人殺桓而不讐羽父驕逆列為世臣文薑蕩亂尊為國母咸謂宗國至此其將殄乎張公室而討逆賊自季氏始其世執政也有自來矣晉獻滅虞虢桓十年虢仲譖其大夫詹父於王詹父有辭以王師伐虢夏虢公出奔虞初虞叔有玉虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻之又求其寶劒叔曰是無厭也無厭將及我遂伐虞公故虞公出奔共池莊二十六年秋虢人侵晉冬虢人又侵晉二十七年晉人將伐虢士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也虢弗畜也亟戰將飢二十九年樊皮叛王三十年春王命虢公討樊皮夏四月丙辰虢公入樊執樊仲皮歸于京師三十二年秋七月有神降于莘惠王問諸內史過曰是何故也對曰國之將興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享焉其至之日亦其物也王從之內史過往聞虢請命反曰虢必亡矣虐而聽於神神居莘六月虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽於神神聰明正直而一者也依人而行虢多涼德其何土之能得閔公二年春虢公敗犬戎于渭汭舟之僑曰無德而祿殃也殃將至矣遂奔晉僖二年晉荀息請以屈産之乘與埀棘之璧假道於虞以伐虢公曰是吾寶也對曰若得道於虞猶外府也公曰宮之竒存焉對曰宮之竒之為人也懦而不能強諫且少長於君君昵之雖諫將不聽乃使荀息假道於虞曰冀為不道入自顚軨伐鄍三門冀之既病則亦唯君故今虢為不道保於逆旅以侵敝邑之南鄙敢請假道以請罪于虢虞公許之且請先伐虢宮之竒諫不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽先書虞賄故也虢公敗戎于桑田晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒而益其疾也必易晉而不撫其民矣不可以五稔五年晉侯復假道于虞以伐虢宮之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可玩一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰大伯虞仲大王之昭也大伯不從是以不嗣虢仲虢叔王季之穆也為文王卿士勳在王室藏於盟府將虢是滅何愛於虞且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不唯逼乎親以寵逼猶尚害之況以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依故周書曰皇天無親惟德是輔又曰黍稷非馨明德惟馨又曰民不易物惟德繄物如是則非德民不和神不享矣神所馮依將在德矣若晉取虞而明德以薦馨香神其吐之乎弗聽許晉使宮之竒以其族行曰虞不臘矣在此行也晉不更舉矣八月甲午晉侯圍上陽問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謠云丙之晨龍尾伏辰均服振振取虢之旗鶉之賁賁天策焞焞火中成軍虢公其奔其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十二月丙子朔晉滅虢虢公醜奔京師師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王故書曰晉人執虞公罪虞且言易也晉獻公之巧謀人國也一舉而兩國滅焉何其易也前此晉嘗伐驪戎伐臯落矣又嘗滅耿霍及魏矣經皆不書而獨書滅夏陽晉實始見經蓋重滅夏陽也夏陽滅而虢滅矣虢天子之大臣也虢公鄭伯同為王卿士而王實私虢定子頽之難虢賞特隆樊皮不臣虢公討罪凡周室之事虢必與焉晉滅虢晉無天子矣晉之為侯也虢公銜命以來既而同朝于王二國之初蓋式相好然而虞虢不舉晉無以圖南方之諸侯也虢復搆怨一嵗再侵晉虢之釁起而獻公私喜矣猶且深謀詳視按兵不舉數年之間虢日以驕于是丹朱降莘蓐收入夢妖祥見而童謠作天時人事昭然可見晉始寢而不寐不覺技癢之無從也虞公求寶劒於其弟貪人無厭晉所素知荀息揖入一謀而兩國已在掌中宮之竒強諫曾何足救逮虞公牽馬操璧而前晉之君臣相視莫逆夫固已熟籌之矣虢公奔于京師天子不能致討齊桓方會首止不敢過而問罪晉國之強天方授之虞虢又焉能支也哉楚滅諸小國莊六年楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬齊其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘弗從還年楚子伐鄧十六年楚復伐鄧滅之隱十一年鄭息有違言息侯伐鄭鄭伯與戰于竟息師大敗而還君子是以知息之將亡也不度德不量力不親親不徵辭不察有罪犯五不韙而以伐人其喪師也不亦宜乎桓十七年蔡桓侯卒蔡人召蔡季于陳秋蔡季自陳歸于蔡蔡人嘉之也莊十年蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救于蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸十四年蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡秋七月楚入蔡君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲滅者其如蔡哀侯乎僖五年楚鬭穀於菟滅弦弦子奔黃於是江黃道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡十一年黃人不歸楚貢冬楚人伐黃十二年黃人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黃二十六年夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉秋楚成得臣鬭宜申帥師滅夔以夔子歸文三年楚師圍江晉先僕伐楚以救江冬晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還四年楚人滅江秦伯為之降服出次不舉過數大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣五年六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉楚自武王以來日以強暴其滅人國也直取之爾文王嗣位始侵諸姬經猶書之曰荆至成王而書楚矣享年永久身厯二霸當齊桓公為貫之盟管仲曰江黃遠齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽卒與之盟管仲死而楚人伐江滅黃齊果不能救也霸主尚在楚猶不逞況其後乎城濮一創驕鋭稍折未幾而穆王弒立輒復薦食秦伯降服臧孫興嘆亦何能救楚始日有圖霸之志而北方之諸侯咸重足而莫敢側視矣入春秋來滅國之多無過于楚而滅國之易亦無過于楚幅圓廣則甲兵日盛中國之霸是以難也晉驪姬之亂莊二十八年晉獻公娶于賈無子蒸於齊薑生秦穆夫人及大子申生又娶二女于戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言于公曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆埸無主則啓戎心戎之生心民慢其政國之患也若使大子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎晉侯説之夏使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳二五卒與驪姬譛羣公子而立奚齊晉人謂之二五耦閔元年晉侯作二軍公將上軍大子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為大子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰大子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吳大伯不亦可乎猶有令名與其及也且諺曰心茍無瑕何恤乎無家天若祚大子其無晉乎卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯之比辛廖占之曰吉屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子孫必復其始二年晉侯使大子申生伐東山臯落氏里克諫曰大子奉冡祀社稷之粢盛以朝夕視君膳者也故曰冡子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非大子之事也師在制命而已稟命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見大子大子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修己而不責人則免於難大子帥師公衣之偏衣佩之金玦狐突御戎先友為右梁餘子養御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也子其勉之偏躬無慝兵要遠災親以無災又何患焉狐突嘆曰時事之徵也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣之尨服遠其躬也佩以金玦棄其衷也服以遠之時以閟之尨涼冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子養曰帥師者受命于廟受脤于社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎雖盡敵猶有內讒不如違之狐突欲行羊舌大夫曰不可違命不孝棄事不忠雖知其寒惡不可取子其死之大子將戰狐突諫曰不可昔辛伯諗周桓公云內寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也僖四年初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長且其繇曰専之渝攘公之羭一薰一蕕十年尚猶有臭必不可弗聽立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂大子曰君夢齊薑必速祭之大子祭于曲沃歸胙于公公田姬置諸宮六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由大子大子奔新城公殺其傅杜原欵或謂大子子辭君必辨焉大子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎大子曰君實不察其罪被此名也以出人誰納我十二月戊申縊于新城姬遂譛二公子曰皆知之重耳奔蒲夷吾奔屈五年晉侯使以殺大子申生之故來告初晉侯使士蒍為二公子築蒲與屈不愼置薪焉夷吾訴之公使讓之士蒍稽首而對曰臣聞之無喪而戚憂必讐焉無戎而城讐必保焉冦讐之保又何愼焉守官廢命不敬固讐之保不忠失忠與敬何以事君詩云懷德惟寧宗子惟城君其修德而固宗子何城如之三年將尋師焉焉用愼退而賦曰狐裘尨茸一國三公吾誰適從及難公使寺人披伐蒲重耳曰君父之命不挍乃徇曰挍者吾讐也踰垣而走披斬其袪遂出奔翟六年春晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁八年晉里克帥師梁由靡御虢射為右以敗狄于采桑梁由靡曰狄無恥從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣夏狄伐晉報采桑之役也復期月九年九月晉獻公卒里克丕鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人己乎冬十月里克殺奚齊于次書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉齊侯以諸侯之師伐晉及高梁而還討晉亂也令不及魯故不書晉郤芮使夷吾重賂秦以求入曰人實有國我何愛焉入而能民土於何有從之齊隰朋帥師會秦師納晉惠公秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讐夷吾弱不好弄能鬭不過長亦不改不識其他公謂公孫枝曰夷吾其定乎對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也又曰不僭不賊鮮不為則無好無惡不忌不克之謂也今其言多忌克難哉公曰忌則多怨又焉能克是吾利也十年夏四月周公忌父王子黨會齊隰朋立晉侯晉侯殺里克以説將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死于是平鄭聘于秦且謝緩賂故不及晉侯改葬共大子秋狐突適下國遇大子大子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝於韓平鄭之如秦也言于秦伯曰呂甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣冬秦伯使泠至報且召三子郤芮曰幣重而言甘誘我也遂殺平鄭祁舉及七輿大夫左行共華右行賈華叔堅騅歂纍虎特宮山祁皆里平之黨也平豹奔秦言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君十一年春晉侯使以丕鄭之亂來告天王使召武公內史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世十三年冬晉薦飢使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及絳相繼命之曰泛舟之役十四年秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國冬秦飢使乞糴于晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於冦不如勿與慶鄭曰背施幸災民所棄也近猶讐之況怨敵乎弗聽退曰君其悔是哉十五年晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸于賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉卜徒父筮之吉涉河侯車敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉侯謂慶鄭曰冦深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚御戎家僕徒為右乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張脈僨興外強中乾進退不可周旋不能君必悔之弗聽九月晉侯逆秦師使韓簡視師復曰師少于我鬭士倍我公曰何故對曰出因其資入用其寵飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命韓簡退曰吾幸而得囚壬戌戰于韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸晉大夫反首拔舍從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以大子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶曰不如殺之無聚慝焉子桑曰歸之而質其大子必得大成晉未可滅而殺其君祗以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使郤乞告瑕呂飴甥且召之子金教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也衆皆哭晉於是乎作爰田呂甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆説晉於是乎作州兵初晉獻公筮嫁伯姬于秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無衁也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車説其輹火焚其旗不利行師敗于宗丘歸妹睽孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虛及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益詩曰下民之孽匪降自天僔沓背憎職競由人十月晉隂飴甥會秦伯盟于王城秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讐寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉蛾析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸丁丑殺慶鄭而後入是嵗晉又飢秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹德焉以待能者於是秦始征晉河東置官司焉十六年秋狄侵晉取狐厨受鐸涉汾及昆都因晉敗也十七年夏晉大子圉為質於秦秦歸河東而妻之惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉二十二年晉大子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰子晉大子而辱於秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸二十三年九月晉惠公卒懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召冬懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質二乃辟也今臣之子名在重耳有年數矣若又召之教之二也父教子二何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之卜偃稱疾不出曰周書有之乃大明服已則不明而殺人以逞不亦難乎民不見德而唯戮是聞其何後之有唐風采苓之篇刺信讒也曰人之為言苟亦無信夫知為讒而猶信者寡矣父子之親其天性也捧負提攜畏其不壽而謂信讒以殺之有是理哉嗟乎讒人亦多術矣陽譽隂譛以深其謀歌笑流涕以堅其説久之而令父蹈不慈子蹈不孝始因亂而中取其利牀笫之間為效尤捷視彼驕人亶其可畏己哉晉獻公滅國開疆亦雄傑之主也而卒不能勝一驪姬之讒愛色授情齒牙交捽二五成耦三公子出申生一死為禍尤酷優施教以夜泣大臣要其中立銜骨有日毒胙忽發然後大子不敢辨公亦不及察也申生既縊羣子易除不煩多詞而止曰皆知重耳夷吾不敢寧居矣中大夫日比為謀三公子一旦盡黜驪姬至此羽翼已成亡人之徒越在他國三怨之伏非姬氏所知也惟獻公猶能知之荀息忠貞又復多謀獻公識其可托屬以奚齊非必與於廢嫡之謀也然而公疾方篤二子久亡奚齊雖庶聊主社稷舍其君而外求君寧云易乎既已頓首受命不得不奉先君之志以周旋里克痛念大子深惡女戎因國人之憤怒以申大義荀息至是雖心知其不勝顧白圭之義已不可爽矣重耳賢而且長以次當立其出亡也國士從之丕里之徒所欲援立者也乃惠公乘間許賂幸而得入二子之志終未愜也惠公固已先察之矣里克以弒君正罪丕鄭以聘秦獲辜兩害俱塗惠公之意先定之也獨是夷吾之所藉以有晉國者惟恃二臣與秦國耳徼幸得位輒復食言蒸賈君而閉公子背兩賂而忘泛舟秦晉交絶夷吾孤矣韓原被獲幸而得反身死而子為戮唐叔之祀幾何不絶固惠懷之無親亦天之有以啓霸主也初驪姬之為讒也曰自桓叔以來誰能愛親唯無親故能兼翼噫晉之無道其來舊矣婦人猶知借以行譖獻公殺桓莊之族以求安其國女戎自招諸子為戮殘敗之事胡可長也為申生者遭家多難進退罹法處偏鄙則動靜咸辜委強翟則勝敗交戾甘己罪而惡傷君之心稽首再拜不敢愛死謂之仁孝可也寧止共乎衛文滅邢僖公十二年春諸侯城衛楚丘之郛懼狄難也十八年冬邢人狄人伐衛圍菟圃衛侯以國讓父兄子弟及朝衆曰苟能治之燬請從焉衆不可而後師于訾婁狄師還十九年秋衛人伐邢以報菟圃之役于是衛大旱卜有事于山川不吉寧莊子曰昔周飢克殷而年豐今邢方無道諸侯無伯天其或者欲衛討邢乎從之師興而雨二十年秋齊狄盟于邢為邢謀衛難也於是衛方病邢二十四年衛人將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕二十五年春衛人伐邢二禮從國子巡城掖以赴外殺之正月丙午衛侯燬滅邢同姓也故名禮至為銘曰余掖殺國子莫余敢止方狄之病邢衛也齊桓公遷邢夷儀封衛楚丘二國之相依猶脣齒也衛在邢東狄在邢西狄之病衛必由于邢齊之急于救邢實以固衛邢衛之相救豈相為賜哉勢使然爾乃齊桓甫死衛旋伐齊方昧𢎞恩豈知同病兩國之釁衛人招之邢人始之而狄人因以乘之也邢固無道甘助狄國衛利同姓詎稱天伐讓國衆聽興師降雨史氏之詞不無侈美二禮委質濟其狡謀張儀事楚事魏之智實權輿焉邢為姬姓周公第四子之所封也衛之視邢則為同姓魯之視邢則為同宗滅同姓春秋惡之滅同宗魯之春秋惡之故生而書名春秋僅見未若虞滅下陽雖曰同姓其與宗國尚未相關也且衛自惠懿以來文公則誠賢君也定之方中詩人専美秉心塞淵不稱為令主乎況布衣帛冠國用富強素絲良馬賢人樂聚培養餘力正堪報狄奈何計不處此張其奮怒終纍令德亦思控大邦而嘆誰極衛難方殷邢實同之忘同患以長寇讐生名之義所由貶也宋襄圖霸僖二年齊寺人貂始漏師于多魚八年宋公疾大子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退九年春宋桓公卒未葬而襄公會諸侯故曰子凡在喪王曰小童公侯曰子宋襄公即位以公子目夷為仁使為左師以聽政於是宋治故魚氏世為左師十六年春隕石于宋五隕星也六鷁退飛過宋都風也周內史叔興聘于宋宋襄公問焉曰是何祥也吉凶焉在對曰今兹魯多大喪明年齊有亂君將得諸侯而不終退而告人曰君失問是隂陽之事非吉凶所生也吉凶由人吾不敢逆君故也十七年齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好內多內寵內嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為大子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯十八年春宋襄公以諸侯伐齊三月齊人殺無虧鄭伯始朝于楚楚子賜之金既而悔之與之盟曰無以鑄兵故以鑄三鐘齊人將立孝公不勝四公子之徒遂與宋人戰夏五月宋敗齊師于甗立孝公而還秋八月葬齊桓公十九年宋人執滕宣公夏宋公使邾文公用鄫子于次雎之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄德今一會而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸宋人圍曹討不服也子魚言於宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動陳穆公請修好於諸侯以無忘齊桓之德冬盟于齊修桓公之好也二十年宋襄公欲合諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟二十一年春宋人為鹿上之盟以求諸侯于楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗秋諸侯會宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋冬會于薄以釋之子魚曰禍猶未也未足以懲君二十二年三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商久矣君將興之弗可赦也已弗聽冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛明恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也丙子晨鄭文夫人芈氏薑氏勞楚子於柯澤楚子使師縉示之俘馘君子曰非禮也婦人送迎不出門見兄弟不踰閾戎事不邇女器丁丑楚子入享于鄭九獻庭實旅百加籩豆六品享畢夜出文芈送于軍取鄭二姬以歸叔詹曰楚王其不沒乎為禮卒于無别無别不可謂禮將何以沒諸侯是以知其不遂霸也二十三年春齊侯伐宋圍緡以討其不與盟于齊也夏五月宋襄公卒傷於泓故也秋楚成得臣帥師伐陳討其二於宋也遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾二十四年宋及楚平宋成公如楚還入於鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有喪拜焉豐厚可也鄭伯從之享宋公有加禮也在昔宋桓公之立也適當北杏之會齊桓為霸首重得宋自兩鄄以來每會先從三十餘年武勇不黷兵甲不頓宋國號稱無事焉襄公乘數十年培養之餘復際齊桓謝霸之初奮志有為首定齊亂正考父美之為述祖德用作商頌當日之內外未嘗不大有望於襄公也而卒之兵敗身死以為戮笑不惟無桓文之烈且無鄭莊齊僖之強此其故何歟抑有説焉蓋以力假仁謂之霸宋國之力自固有餘服人不足襄公未見齊霸之盛而正值其衰鹹淮牡丘非不身從然救徐不克謀鄫不成襄公心竊輕之以為取而代之未為難也其視霸也易故其志遂驕於是執滕用鄫伐曹圍曹一嵗之中三國俱病既而為鹿上之盟以求諸侯於楚嗟乎宋亦愚矣中國之所日患者止一楚耳齊桓公經營二十餘載召陵一盟僅獲責貢蕞爾宋國輒欲主盟楚成王佯許以誘之秋執冬釋宋之無君也三閲月矣乃猶不悟而伐鄭敗泓國辱身死楚頵不逞輒敢肆然窺中國者宋襄實啓之也叩鼻衈社小國是忍重傷二毛強敵猶恤師敗自解豈能要名文王之師豈其然也初公之立也以子魚為左師自是以來每舉必諫倘用其一言猶堪救禍襄公知其仁而不能聽其謀剛愎自用莫此為甚方於君偃見雀􅞖之祥欲為霸主反成桀宋何其先後之相侔也列之於五霸不亦幸乎王子帶之亂莊十八年虢公晉侯鄭伯使原莊公逆王后于陳陳媯歸于京師實惠后僖七年閏月惠王崩襄王惡大叔帶之難懼不立不發喪而告難于齊八年襄王定位而後發喪冬王人來告喪難故也是以緩十一年夏揚拒泉臯伊雒之戎同伐京師入王城焚東門王子帶召之也秦晉伐戎以救周秋晉侯平戎于王十二年王以戎難故討王子帶秋王子帶奔齊冬齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管氏之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣十三年春齊侯使仲孫湫聘于周且言王子帶事畢不與王言歸復命曰未可王怒未怠其十年乎不十年王弗召也秋為戎難故諸侯戍周齊仲孫湫致之十六年王以戎難告于齊齊徵諸侯而戍周二十年滑人叛鄭而服於衛夏鄭公子士泄堵冦帥師入滑二十二年富辰言於王曰請召大叔詩曰協比其鄰昏姻孔云吾兄弟之不協焉能怨諸侯之不睦王説王子帶自齊復歸于京師王召之也二十四年鄭之入滑也滑人聽命師還又即衛鄭公子士泄堵俞彌帥師伐滑王使伯服遊孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衛滑也故不聽王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之大上以德撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原豐郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之胤也召穆公思周德之不類故糾合宗族于成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于墻外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勳親親昵近尊賢德之大者也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也鄭有平惠之勳又有厲宣之親棄嬖寵而用三良於諸姬為近四德具矣耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聽使頽叔桃子出狄師夏狄伐鄭取櫟王德狄人將以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪婪王又啓之女德無極婦怨無終狄必為患王又弗聽初甘昭公有寵於惠后惠后將立之未及而卒昭公奔齊王復之又通於隗氏王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之秋頺叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰王出適鄭處于汜大叔以隗氏居于溫冬王使來告難曰不穀不德得罪于母弟之寵子帶鄙在鄭地汜敢告叔父臧文仲對曰天子蒙塵于外敢不奔問官守王使簡師父告于晉使左鄢父告于秦天子無出書曰天王出居于鄭辟母弟之難也天子凶服降名禮也鄭伯與孔將鉏石申父侯宣多省視官具于汜而後聽其私政禮也二十五年秦伯師于河上將納王狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣于諸侯今為可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之筮之遇大有之睽曰吉遇公用享於天子之卦戰克而王享吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也晉侯辭秦師而下三月甲辰次于陽樊右師圍溫左師逆王夏四月丁巳王入于王城取大叔于溫殺之于隰城戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊溫原攢茅之田晉於是始啓南陽陽樊不服圍之倉葛呼曰德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯貫于冀趙衰為原大夫狐溱為溫大夫晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食故使處原讀惠襄之春秋而知霸主之關于王朝如是乎綦重也叔帶以惠后之寵幾奪大子齊桓公為之會于首止以謀王室既而襄王告亂復盟于洮以定其位奪嫡之患所以息也齊桓既沒婦怨復起狄人助亂天子蒙塵晉文公於是首起圖霸狐偃決策莫先勤王取大叔而殺之王室始靖叔帶之為亂也多厯年矣經兩霸主大難方弭桓公之圖之也弭之于未亂之先文公之圖之也戡之于既亂之後兩霸之功均大有造于王室者也然叔帶為襄王母弟以惠后之寵是以逼嫡召戎伐周亂形已見幸而逃亡庶幾難止齊桓公執而歸諸京師亦云宜也乃受而無討且為之請試思葵丘之會初命曰無易樹子意何為也王復濡忍召帶反國避鄭伯克段之名又蹈子頽姦位之禍諸侯震悼晉用納王於是請隧受田無何而有河陽之召雖功烈攸隆而天子凌遲極矣所以定哀之世傷天下之無霸而隱桓之世傷天下之無王無王而後有霸非得已也讀曹檜之卒章可勝歎息哉左傳事緯卷二
