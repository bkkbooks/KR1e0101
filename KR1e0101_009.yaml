body:
  text: 左傳事緯卷九靈璧知縣馬驌撰叔孫豎牛之亂襄二十四年齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路昭四年初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助余乃勝之且而皆召其徒無之且曰志之及宣伯奔齊饋之宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之久矣魯人召之不告而歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎有寵長使為政公孫明知叔孫於齊歸未逆國薑子明取之故怒其子長而後使逆之田於丘蕕遂遇疾焉豎牛欲亂其室而有之強與孟盟不可叔孫為孟鐘曰爾未際饗大夫以落之既具使豎牛請日入弗謁出命之日及賔至聞鐘聲牛曰孟有北婦人之客怒將往牛止之賔出使拘而殺諸外牛又強與仲盟不可仲與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜泄見告之飢渴授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使置饋于個而退牛弗進則置虛命徹十二月癸丑叔孫不食乙卯卒牛立昭子而相之公使杜泄葬叔孫豎牛賂叔仲昭子與南遺使惡杜泄於季孫而去之杜泄將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冡卿無路介卿以葬不亦左乎季孫曰然使杜泄舍路不可曰夫子受命於朝而聘于王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勳今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之五年春王正月舍中軍卑公室也毁中軍于施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公以書使杜泄告於殯曰子固欲毁中軍既毁之矣故告杜泄曰夫子惟不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之叔仲子謂季孫曰帶受命於子叔孫曰葬鮮者自西門季孫命杜泄杜泄曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行仲至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宫射之中目而死豎牛取東鄙三十邑以與南遺昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首于寧風之棘上仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之初穆子之生也莊叔以周易筮之遇明夷之謙以示卜楚丘曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王已下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗于人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終叔孫氏一治一亂自莊叔敗狄立功而僑如宣淫穆叔能賢克世其家而豎牛作難叔牙之後不幾傳而大亂有二焉其不殄厥世者幸耳方穆叔之為亞卿也詛三軍於國而公室以強相襄公於楚任莒難於晉而國君不辱迹其行事亦三桓氏之僅見者也季宿雖專猶知所忌逮穆叔甫卒而輒毁中軍然則穆叔生而存中軍終不得而舍若是乎穆叔之有力於國矣昔也三軍作而公室無政今也中軍舍而公室無民君而無民不可謂君季孫久蓄其志而至是始發者憚穆叔之不從也天未贊魯豎牛發難叔氏薄則季氏厚因亂桀黠變易軍制而南遺之流復助逆以滋禍無非欲搆彼叔氏而總其權耳昭子賢而未定其位亦莫如之何也夫豎牛深目豭喙殆亦鬭椒羊舌虎流梟獍反噬似可豫卜而穆叔號稱賢者卒昵庚宗之寵幾至覆亡之禍豈其謀國則臧謀家則昧乎抑亦蓍告其凶夢兆其符禍亂之來固非賢者所能弭也衛靈之立昭七年衛襄公夫人薑氏無子嬖人婤姶生孟縶孔成子夢康叔謂已立元余使羈之孫圉與史茍相之史朝亦夢康叔謂已余將命而子茍與孔蒸鉏之曽孫圉相元史朝見成子告之夢夢協晉韓宣子為政聘于諸侯之嵗婤姶生子名之曰元孟縶之足不良弱行孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從會朝又焉得居各以所利不亦可乎故孔成子立靈公十二月癸亥葬衛襄公二十年衛公孟縶狎齊豹奪之司冦與鄄有役則反之無則取之公孟惡北宫喜禇師圃欲去之公子朝通于襄夫人宣薑懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂初齊豹見宗魯於公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾遠也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也子行事乎吾將死之以周事子而歸死於公孟其可也丙辰衛侯在平壽公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉使祝蛙置戈於車薪以當門使一乘從公孟以出使華齊御公孟宗魯驂乘及閎中齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入慶比御公公南楚驂乘使華寅乘二車及公宫鴻駵魋駟乘于公公載寶以出禇師子申遇公于馬路之衢遂從過齊氏使華寅肉袒執蓋以當其闕齊氏射公中南楚之背公遂出寅閉郭門踰而從公公如死鳥析朱鉏宵從竇出徒行從公齊侯使公孫青聘于衛既出聞衛亂使請所聘公曰猶在竟內則衛君也乃將事焉遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賔曰寡君命下臣於朝曰阿下執事臣不敢二主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在乃止衛侯固請見之不獲命以其良馬見為未致使故也衛侯以為乘馬賔將掫主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賔曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也臣懼不免於戾請以除死親執鐸終夕與於燎齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宫喜盟于彭水之上秋七月戊午朔遂盟國人八月辛亥公子朝禇師圃子玉霄子高魴出奔晉閏月戊辰殺宣薑衛侯賜北宫喜諡曰負子賜析朱鉏諡曰成子而以齊氏之墓豫之衛侯告寧于齊且言子石齊侯將飲酒遍賜大夫曰二三子之教也苑何忌辭曰與於青之賞必及於其罰在康誥曰父子兄弟罪不相及況在羣臣臣敢貪君賜以干先王琴張聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不蓋不義不犯非禮靈公生於魯昭公之二年至是僅六嵗耳襄公無祿長子惡疾元也以羣臣之推齠齔嗣位此亦衛國危疑之秋也夫孟縶弱行弗列于宗孔成史朝之流既以宗社之故黜長而立少矣夢協於筮義當擁立雖然善事伯兄措以安全靈公事也乃衛之君臣知廢孟而不知所以處孟知奉元而不知所以成元盜賊忽發公幾罹禍則衛無政矣齊豹之徒比而為亂宗魯在側知而不聞紛然而與縶為難者布在朝端近在驂乘比比是也即孟縶不悟衛之君臣曽無知者乎禍亂既興靈公委社稷而逃亡載寶僅出幸而獲免乃宣薑被殺而子朝實奔北宫反正遂獲美賜是衛國之亂盜自起之盜自止之也宣薑公嫡母也南子公夫人也國母而通于公子元妃而淫于宋朝婦姑鶉鵲禮義消亡然則靈公之於人倫忘之久矣雖有母兄豈能獨愛且昔者襄公即世大國歸田必將謂嗣君之能賢焉胡俎豆不知而軍旅是問靈之無道實所共知又安在其為元亨也齊陳氏之大莊公二十二年春陳人殺其大子禦寇陳公子完與顓孫奔齊顓孫自齊來奔齊侯使敬仲為卿辭曰羈旅之臣幸若獲宥及於寬政赦其不間於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告詩云翹翹車乘招我以弓豈不欲往畏我友朋使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也初懿氏卜妻敬仲其妻占之曰吉是謂鳳皇于飛和鳴鏘鏘有媯之後將育子薑五世其昌並于正卿八世之後莫之與京陳厲公蔡出也故蔡人殺五父而立之生敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光遠而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賔于王庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王猶有觀焉故曰其在後乎風行而著於土故曰其在異國乎若在異國必薑姓也薑大嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大於齊其後亡也成子得政襄二十九年齊高子容與宋司徒見知伯女齊相禮賔出司馬侯言於知伯曰二子皆將不免子容專司徒侈皆亡家之主也知伯曰何如對曰專則速及侈將以其力斃專則人實斃之將及矣秋九月齊公孫蠆公孫竈放其大夫高止於北燕乙未出書曰出奔罪髙止也高止好以事自為功且專故難及之為髙氏之難故髙豎以盧叛十月庚寅閭丘嬰帥師圍盧髙豎曰茍使髙氏有後請致邑齊人立敬仲之曽孫酀良敬仲也十一月乙卯髙豎致盧而出奔晉晉人城綿而置旃三十一年齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故夏五月子尾殺閭丘嬰以説于我師工僂灑渻竈孔虺賈寅出奔莒出羣公子昭三年齊公孫竈卒司馬竈見晏子曰又喪子雅矣晏子曰惜也子旗不免殆哉薑族弱矣而媯將始昌二惠競爽猶可又弱一個焉薑其危哉八年七月甲戌齊子尾卒子旗欲治其室丁丑殺梁嬰八月庚戌逐子成子工子車皆來奔而立子良氏之宰其臣曰孺子長矣而相吾室欲兼我也授甲將攻之陳桓子善於子尾亦授甲將助之或告子旗子旗不信則數人告將往又數人告於道遂如陳氏桓子將出矣聞之而還遊服而逆之請命對曰聞強氏授甲將攻子子聞諸曰弗聞子盍亦授甲無宇請從子旗曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之其若先人何子盍謂之周書曰惠不惠茂不茂康叔所以服𢎞大也桓子稽顙曰頃靈福子吾猶有望遂和之如初十年齊惠欒高氏皆耆酒信內多怨強於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁遂見文子則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏子良曰先得公陳鮑焉往遂伐虎門晏平仲端委立于虎門之外四族召之無所往其徒曰助陳鮑乎曰何善焉助欒髙乎曰庸愈乎然則歸乎曰君伐焉歸公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之五月庚辰戰于稷欒高敗又敗諸莊國人追之又敗諸鹿門欒施高強來奔陳鮑分其室晏子謂桓子必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可強思義為愈義利之本也薀利生孽姑使無薀乎可以滋長桓子盡致諸公而請老于莒桓子召子山私具幄幕器用從者之衣屨而反棘焉子商亦如之而反其邑子周亦如之而與之夫于反子城子公公孫捷而皆益其祿凡公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟曰詩云陳錫載周能施也桓公是以霸公與桓子莒之旁邑辭穆孟姬為之請髙唐陳氏始大昭子至自晉大夫皆見高強見而退昭子語諸大夫曰為人子不可不慎也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫輦而歸君親推之其子不能任是以在此忠為令德其子弗能任罪猶及之難不慎也喪夫人之力棄德曠宗以及其身不亦害乎詩曰不自我先不自我後其是之謂乎二十年齊侯疥遂痁期而不瘳諸侯之賔問疾者多在梁丘據與裔款言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔公説告晏子晏子曰日宋之盟屈建問范會之德於趙武趙武曰夫子之家事治言于晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與款謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者為信君使也其言忠信于鬼神其適遇淫君外內頗邪上下怨疾動作辟違從欲厭私高臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫從肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不享其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私承嗣大夫強易其賄布常無藝徵斂無度宫室日更淫樂不違內寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史修德而後可公説使有司寬政毁關去禁薄斂已責十二月齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之齊侯至自田晏子侍於遄臺子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羹焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羹既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大長短疾徐哀樂剛柔遲速高下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後大公因之古者無死爽鳩氏之樂非君所願也二十六年齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不諂不二其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德回亂民將流亡祝史之為無能補也公説乃止齊侯與晏子坐于路寢公歎曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區金鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰唯禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不淹大夫不收公利公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上之昔者田完之奔齊也是時桓公圖霸任賢共國功業方隆而篡奪之端已伏矣禍福而可測哉完厲公之子也厲公因亂而死以故完不得立厯事莊宣二君而以禦寇之難奔齊傳稚孟湣孟微而不顯逮文子遭莊公之弒去齊後歸於是自晏子而下能卓然不汚於崔慶者唯文子耳慶氏之敗陳氏有功桓子為政而陳氏漸強矣高國上大夫也自靈莊以來國佐殺矣高厚殺矣至是而高止又復逐矣天子之命卿微且不振凡以為田氏驅除也吳札來聘識齊政之有歸韓起來盟知欒高之必敗二惠之子弗克保世而鮑子復黨于陳氏其與薑氏為偶者誰乎考之景公當日所稱齊國之顯君也即曰陳氏得民而權之所在似難驟得然而齊人之無政久矣景公繼亂為君始而挾于崔慶繼而制于陳鮑而迹其所為又皆田獵臺榭之是尚疾作則責效於祝彗見則乞靈於禳晏嬰進戒聽而不行而陳氏者方且驟施於民要譽於國遠徼箕伯虞遂之靈近用豆區釡鍾之智即齊無事猶將得志而況乎其君繁刑其臣耆酒也晉滅肥鼓陸渾附昭元年晉中行穆子敗無終及羣狄于大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之十二年晉荀吳偽會齊師者假道於鮮虞遂入昔陽秋八月壬午滅肥以肥子綿臯歸晉伐鮮虞因肥之役也十三年鮮虞人聞晉師之悉起也而不警邊且不修備晉荀吳自著雍以上軍侵鮮虞及中人驅衝競大獲而歸十五年晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子鳶鞮歸二十一年公如晉及河鼓叛晉晉將伐鮮虞故辭公二十二年晉之取鼓也既獻而反鼓子焉又叛於鮮虞六月荀吳略東陽使師偽糴者負甲以息于昔陽之門外遂襲鼓滅之以鼓子鳶鞮歸使涉他守之僖二十二年初平王之東遷也辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎于伊川昭十七年晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦于楚必是故也君其備之乃警戎備九月丁卯晉荀吳帥師涉自棘津使祭史先用師于雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘于文宫春秋之世與戎狄相終始齊晉之伯也先制戎狄而後為盟主然陸渾吾離散處四方而狄尤稱盛入春秋來所病者八國而僖文之際則尤其不逞之會也自晉襄敗狄于箕而晉國之狄禍稍息然齊宋魯衛日受狄患史不絶書狄固未嘗深挫也殆宣公之世狄勢始分赤狄白狄並見於經而中國之制者不一書矣赤狄之種則有潞甲留吁白狄之種則有肥鼓鮮虞赤狄盛而晉用白狄赤狄滅而晉難白狄狄以晉用而分分而即滅漢有兩單于而胸奴亂唐有兩可汗而突厥亡率由此也白狄見赤狄之滅知為晉紿故同秦伐晉交剛一敗狄用惕息而大鹵再戰狄創益深毁車為行兵不厭詐攘狄之效晉若獨操其勝焉晉之界狄其來已久當狄之強也長驅至箕一敗之後狄去漸遠而厲平兩勝以來狄之要害在晉度內祝鮀所謂疆以戎索籍談所謂戎狄與鄰者至此其地多晉有矣昔也滅赤狄而及牆咎今也敗白狄而及鮮虞務行斬艾勿使滋蔓而肥鼓與國先就殄滅益所以弱鮮虞也晉之謀狄可謂力哉然滅鼓之後四伐鮮虞有敗無勝豈一邑之小能亢霸國乎晉業日衰權臣擅命中行趙氏貪以自封故中山用兵以來遠人離二是以義弗能克也善哉李琪之論霸也齊桓縱狄而伯盛晉人治狄而伯衰亦有警于晉之末造諸夏盡失而師老鮮虞平昭頃定之業所由日蹶而不復振也宋華向之亂襄十七年宋華閲卒華臣弱臯比之室使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後左師懼曰老父無罪賊曰臯比私有討于吳遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之左師為已短䇿茍過華臣之門必騁十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳二十六年初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉大子痤美而很合左師畏而惡之寺人惠牆伊戾為大子內師而無寵秋楚客聘於晉過宋大子知之請野享之公使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢遠好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則欿用牲加書徵之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃烹伊戾左師見夫人之步馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之昭六年宋寺人栁有寵大子佐惡之華合比曰我殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣公使視之有焉遂逐華合比合比奔衛于是華亥欲代右師乃與寺人栁比從為之徵曰聞之久矣公使代之見於左師左師曰女夫也必亡女喪而宗室於人何有人亦於女何有詩曰宗子維城毋俾城壞毋獨斯畏女其畏哉十年冬十二月宋平公卒初元公惡寺人栁欲殺之及喪栁熾炭于位將至則去之比葬又有寵十一年春王二月叔弓如宋葬平公也十二年夏宋華定來聘通嗣君也享之為賦蓼蕭弗知又不答賦昭子曰必亡宴語之不懷寵光之不宣令德之不知同福之不受將何以在二十年春王二月己丑日南至梓慎望氛曰今兹宋有亂國幾亡三年而後弭蔡有大喪叔孫昭子曰然則戴桓也汰侈無禮已甚亂所生也宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸華亥偽有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廪公如華氏請焉弗許遂劫之癸卯取大子欒與母弟辰公子地以為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質宋華向之亂公子城公孫忌樂舍司馬強向宜向鄭楚建郳申出奔鄭其徒與華氏戰于鬼閻敗子城子城適晉華亥與其妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸華亥患之欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司寇牼以歸曰子之齒長矣不能事人以三公子為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復而所二十一年宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譖諸公曰貙將納亡人亟言之公曰司馬以吾故亡其良子死亡有命吾不可以再亡之對曰君若愛司馬則如亡死如可逃何遠之有公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬司馬歎曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐尤之曰必有故使子皮承宜僚以劒而訊之宜僚盡以告張丐欲殺多僚子皮曰司馬老矣登之謂甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩殺多僚劫司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛六月庚午宋城舊鄘及桑林之門而守之冬十月華登以吳師救華氏齊烏枝鳴戍宋厨人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅齊師宋師敗吳師于鴻口獲其二帥公子苦雂偃州員華登帥其餘以敗宋師公欲出厨人濮曰吾小人可藉死而不能送亡君請待之乃徇曰揚徽者公徒也衆從之公自楊門見之下而巡之曰國亡君死二三子之恥也豈專孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劒從之華氏北復即之厨人濮以裳裹首而荷以走曰得華登矣遂敗華氏于新里翟僂新居于新里既戰説甲于公而歸華妵居于公里亦如之十一月癸未公子城以晉師至曹翰胡會晉荀吳齊苑何忌衛公子朝救宋丙戌與華氏戰于赭丘鄭翩願為鸛其御願為鵝子祿御公子城莊堇為右干犫御吕封人華豹張丐為右相遇城還華豹曰城也城怒而反之將注豹則關矣曰平公之靈尚輔相余豹射出其間將注則又關矣曰不狎鄙抽矢城射之殪張丐抽殳而下射之折股扶伏而擊之折軫又射之死干犫請一矢城曰余言女於君對曰不死伍乘軍之大刑也干刑而從子君焉用之子速諸乃射之殪大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我廷不幸而後亡使華登如楚乞師華貙以車十五乘徒七十人犯師而出食於睢上哭而送之乃復入楚薳越帥師將逆華氏大宰犯諌曰諸侯唯宋事其君今又爭國釋君而臣是助無乃不可乎王曰而告我也後既許之矣二十二年楚薳越使告於宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若惠保敝邑無亢不衷以奬亂人孤之望也唯君圖之楚人患之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚宋公使公孫忌為大司馬邊卭為大司徒樂祁為司城仲幾為左師樂大心為右師樂挽為大司寇以靖國人華氏向氏為宋強族華元執政向戌為左師厯年已久咸稱宋國之良也自華元既沒而華氏出奔三見於平公之世君子憂其君臣之不睦至元公之時而華向之徒乃復羣然興亂甚且殺而質質而奔奔而入入而出借援蠻夷君臣日戰春秋以來亂賊多矣未有如華向之甚者也向寧戍之子華定華亥元之孫也元比襄夫人而昭公弒戍諂君夫人而大子死權傾一國寵逼人君及其子孫保無敗乎元公無信多私去之無術忿一時之詬而激三嵗之憂南里之入分國而處非若魚石之僅據彭城也華登以吳師至敗而求援于楚諸侯聞之而讓成楚功若將恐後緩追逸賊宋與列國皆有憾焉是以康侯之論以不能執叛戮賊責楚以不能竭力內討責宋以不能協心外救責諸侯至使披國叛君之賊獲保首領誠為春秋一大痛也雖然縱亂者諸國而生亂者宋之君臣也平公殺大子痤其讒也以寺人伊戾而向戌成之逐華合比其讒也以寺人栁而華亥成之小人之戕國本比於左右刑人以行其私而平公不悟而左右刑人復以事平公者事元公而元公又不悟也易重王明有以夫王子朝之亂昭十五年六月乙丑王大子壽卒秋八月戊寅王穆后崩十二月晉荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也文伯揖籍談對曰諸侯之封也皆受明器於王室以鎮撫其社稷故能薦彝器於王晉居深山戎狄之與鄰而遠於王室王靈不及拜戎不暇其何以獻器王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大搜也闕鞏之甲武所以克商也唐叔受之以處參虛匡有戎狄其後襄之二路鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勳而不廢有績而載奉之以土田撫之以彝器旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而高祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉於是乎有董史女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一嵗而有三年之喪二焉於是乎以喪賔宴又求彝器樂憂甚矣且非禮也彝器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將焉用之十八年春王二月乙卯周毛得殺毛伯過而代之萇𢎞曰毛得必亡是昆吾稔之日也侈故之以而毛得以濟侈於王都不亡何待三月曹平公卒秋葬曹平公往者見周原伯魯焉與之語不説學歸以語閔子馬閔子馬曰周其亂乎夫必多有是説而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則茍而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎二十一年春天王將鑄無射泠州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也而鐘音之器也天子省風以作樂器以鍾之輿以行之小者不窕大者不槬則和於物物和則嘉成故和聲入於耳而藏於心心億則樂窕則不咸槬則不容心是以感感實生疾今鍾槬矣王心弗堪其能久乎二十二年王子朝賔起有寵于景王王與賔孟説之欲立之劉獻公之庶子伯蚠事單穆公惡賔孟之為人也願殺之又惡王子朝之言以為亂願去之賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害王弗應夏四月王田北山使公卿皆從將殺單子劉子王有心疾乙丑崩于榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王遂攻賔起殺之盟羣王子于單氏丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂帥郊要餞之甲以逐劉子壬戌劉子奔揚單子逆悼王于莊宫以歸王子還夜取王以如莊宫癸亥單子出王子還與召莊公謀曰不殺單旗不捷與之重盟必來背盟而克者多矣從之樊頃子曰非言也必不克遂奉王以追單子及領大盟而復殺摯荒以説劉子如劉單子亡乙丑奔于平畤羣王子追之單子殺還姑發弱鬷延定稠子朝奔京丙寅伐之京人奔山劉子入于王城辛未鞏簡公敗績于京乙亥甘平公亦敗焉叔鞅至自京師言王室之亂也閔馬父曰子朝必不克其所與者天所廢也單子欲告急于晉秋七月戊寅以王如平畤遂如圃車次于皇劉子如劉單子使王子處守于王城盟百工于平宫辛卯鄩肸伐皇大敗獲鄩肸壬辰焚諸王城之市八月辛酉司徒醜以王師敗績于前城百工叛己巳伐單氏之宫敗焉庚午反伐之辛未伐東圉冬十月丁巳晉籍談荀躒帥九州之戎及焦瑕溫原之師以納王于王城庚申單子劉蚠以王師敗績于郊前城人敗陸渾于社十一月乙酉王子猛卒不成喪也己丑敬王即位館于子旅氏十二月庚戌晉籍談荀躒賈辛司馬督帥師軍于陰于侯氏于溪泉次于社王師軍于汜于解次于任人閏月晉箕遺樂徵右行詭濟師取前城軍其東南王師軍于京楚辛丑伐京毁其西南二十三年春王正月壬寅朔二師圍郊癸卯郊鄩潰丁未晉師在平陰王師在澤邑王使告間庚戌還夏四月乙酉單子取訾劉子取墻人直人六月壬午王子朝入于尹癸未尹圉誘劉他殺之丙戌單子從阪道劉子從尹道伐尹單子先至而敗劉子還己丑召伯奐南宫極以成周人戍尹庚寅單子劉子樊齊以王如劉甲午王子朝入于王城次于左巷秋七月戊申鄩羅納諸莊宫尹辛敗劉師于唐丙辰又敗諸鄩甲子尹辛取西闈丙寅攻蒯蒯潰八月丁酉南宫極震萇𢎞謂劉文公曰君其勉之先君之力可濟也周之亡也其三川震今西王之大臣亦震天棄之矣東王必大克二十四年春王正月辛丑召簡公南宫嚚以甘桓公見王子朝劉子謂萇𢎞曰甘氏又往矣對曰何害同德度義大誓曰紂有億兆夷人亦有離德余有亂臣十人同心同德此周所以興也君其務德無患無人戊午王子朝入于塢三月庚戌晉侯使士景伯涖問周故士伯立于乾祭而問於介衆晉人乃辭王子朝不納其使六月壬申王子朝之師攻瑕及杏皆潰鄭伯如晉子大叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯而憂宗周之隕為將及焉今王室實蠢蠢焉吾小國懼矣然大國之憂也吾儕何知焉吾子其早圖之詩曰瓶之罄矣惟罍之恥王室之不寧晉之恥也獻子懼而與宣子圖之乃徵會於諸侯期以明年冬十月癸酉王子朝用成周之寶圭于河甲戌津人得諸河上陰不佞以溫人南侵拘得玉者取其玉將賣之則為石王定而獻之與之東訾二十五年夏會于黃父謀王室也趙簡子令諸侯之大夫輸王粟具戍人曰明年將納王子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦外內以經二物為父子兄弟姑姊甥舅昏媾姻亞以象天明為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮為溫慈惠和以效天之生殖長育民有好惡喜怒哀樂生于六氣是故審則宜類以制六志哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協于天地之性是以長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎簡子曰鞅也請終身守此言也宋樂大心曰我不輸粟我於周為客若之何使客晉士伯曰自踐土以來宋何役之不會而何盟之不同曰同恤王室子焉得辟之子奉君命以會大事而宋背盟無乃不可乎右師不敢對受牒而退士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉壬申尹文公涉于鞏焚東訾弗克二十六年四月單子如晉告急五月戊午劉人敗王城之師于尸氏戊辰王城人劉人戰于施谷劉師敗績七月己巳劉子以王出庚午次于渠王城人焚劉丙子王宿于褚氏丁丑王次于雀谷庚辰王入于胥靡辛巳王次于滑晉知躒趙鞅帥師納王使女寬守闕塞冬十月丙申王起師于滑辛丑在郊遂次于尸十一月辛酉晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚陰忌奔莒以叛召伯逆王于尸及劉子單子盟遂軍圉澤次于隄上癸酉王入于成周甲戌盟于襄宫晉師使成公般戍周而還十二月癸未王入于莊宫王子朝使告于諸侯曰昔武王克殷成王靖四方康王息民並建母弟以藩屏周亦曰吾無專享文武之功且為後人之迷敗傾覆而溺入于難則振救之至于夷王王愆于厥身諸侯莫不並走其望以祈王身至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官至于幽王天不弔周王昏不若用愆厥位攜王姦命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力於王室也至于惠王天不靖周生頽禍心施于叔帶惠襄辟難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至于靈王生而有頿王甚神聖無惡於諸侯靈王景王克終其世今王室亂單旗劉狄剝亂天下一行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂于王室侵欲無厭規求無度貫瀆鬼神慢棄刑法倍姦齊盟傲很威儀矯誣先王晉為不道是攝是贊思肆其罔極兹不榖震蕩播越竄在荆蠻未有攸底若我一二兄弟甥舅奬順天法無助狡猾以從先王之命毋速天罰赦圖不榖則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及大子壽早夭即世單劉贊私立少以間先王亦唯伯仲叔季圖之閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命遠晉之大以專其志無禮甚矣文辭何為二十七年十二月晉籍秦致諸侯之戍于周魯人辭以難二十九年三月己卯京師殺召伯盈尹氏固及原伯魯之子尹固之復也有婦人遇之周郊尤之曰處則勸人為禍行則數日而反是夫也其過三嵗乎夏五月庚寅王子趙車入于鄻以叛陰不佞敗之三十二年秋八月王使富辛與石張如晉請城成周天子曰天降禍于周俾我兄弟並有亂心以為伯父憂我一二親昵甥舅不皇啓處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望嵗懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈于成王修成周之城俾戍人無勤諸侯用寧蝥賊遠屏晉之力也其委諸伯父使伯父實重圖之俾我一人無徵怨于百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戍周不如城之天子實云雖有後事晉弗與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告于諸侯遲速衰序於是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面衛彪傒曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅況敢干位以作大事乎己丑士彌牟營成周計丈數揣高卑度厚薄仞溝洫物土方議遠邇量事期計徒庸慮財用書餱糧以令役於諸侯屬役賦文書以授帥而效諸劉子韓簡子臨之以為成命定公元年春王正月辛巳晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政衛彪傒曰將建天子而易位以令非義也大事姦義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原壽過而田於大陸焚焉還卒於寧范獻子去其柏椁以其未復命而田也孟懿子會城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徵於人宋徵於鬼宋罪大矣且已無辭而抑我以神誣我也啓寵納侮其此之謂矣必以仲幾為戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍齊高張後不從諸侯晉女叔寬曰周萇𢎞齊高張皆將不免萇叔違天高子違人天之所壞不可支也衆之所為不可姦也五年春王人殺子朝于楚六年周儋翩率王子朝之徒因鄭人將以作亂于周鄭於是乎伐馮滑胥靡負黍狐人闕外六月晉閻沒戍周且城胥靡冬十二月天王處于姑蕕辟儋翩之亂也七年春二月周儋翩入于儀栗以叛夏四月單武公劉桓公敗尹氏于窮谷冬十一月戊午單子劉子逆王于慶氏晉籍秦送王己巳王入于王城館于公族黨氏而後朝于莊宫八年二月己丑單子伐穀城劉子伐儀栗辛卯單子伐簡城劉子伐盂以定王室讀春秋至昭公之世經大書曰王室亂劉子單子以王猛居于皇明年又書曰天王居于狄泉尹氏立王子朝為之廢書而歎也寵逼之為禍如是哉景王初立殺弟佞夫問何以故則儋括欲立之佞夫弗知也禍亂未彰急加翦除王之自為謀也審矣顧圖厥後者乃弗克臧王子壽早夭儲位未定王以暮年昏倦無社稷之良圖鑄大錢作無射乃心侈矣殺下門子謀除單劉亂端形矣王猛以次當立子朝庶孽有寵凡百王臣各思擁立於是附子猛者則劉蚠單旗樊齊諸人也附子朝者則尹固毛得召盈原伯魯諸人也稱兵交戰斬艾孔多晉人納猛亂庶遄己乃王猛忽卒母弟敬王嗣立益子朝所未甘心也於是大臣奉王出奔子朝復入時則東西二王分峙其國南北列侯各疑其君雖南宫震死而甘氏又往子朝之勢正未嘗衰息焉衆之所直晉亦直之黃父一會而十國之衆力戰納王既入成周又復城之夫敬王之立也一年而即出出四年而入入五年而城成周流離數邑龍戰五載究其亂階何莫非景王之所貽也春秋於此痛而詳書而首則志之曰王室亂在天下則目之為京師在國中則目之為王室過寵庶子匹嫡生戾亂自內作故不書京師而書王室直若一家之辭也且王猛之居與入也則書劉子單子以之子朝之立也則書尹氏立之其奔楚也則書尹氏召伯毛伯以之爭實在下上何能為惟劉單奉王無二勳在盟府其子桓公武公克平儋翩繼有成勞而甘氏則父忠而子叛召盈則事朝而逆王尹固則奔楚而旋復反覆詐佞又毛原之不若也子帶之亂前有齊桓一盟而世子定後有晉文踰年而王室安敬王之難數嵗不靖者時無霸也然晉頃晉定繼世勤王孰非霸之餘烈哉叛臣誅于京師子朝就戮于楚除惡庶盡乎既而姑蕕播遷亦越時日傳固已詳載之終敬之世亦何嘗寧耶春秋自定簡以來王室多故經不勝書故書一王札子殺召伯毛伯而周大夫之相殺者不盡書書一周公出奔晉而周大夫之出奔者不盡書書一天王居于狄泉而敬王之出居者亦不盡書也豈唯不勝書誠亦不欲盡書哉季孫意如逐君襄三十一年公作楚宫穆叔曰大誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月辛巳公薨于楚宫叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪立胡女敬歸之子子野次于季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子公子裯穆叔不欲曰大子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰袵如故衰於是昭公十九年矣猶有童心君子是以知其不能終也癸酉葬襄公昭五年公如晉自郊勞至于贈賄無失禮晉侯謂女叔齊曰魯侯不亦善于禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也姦大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦遠乎君子謂叔侯於是乎知禮十一年五月齊歸薨大搜于比蒲非禮也九月葬齊歸公不戚晉士之送葬者歸以語史趙史趙曰必為魯郊侍者曰何故曰歸姓也不思親祖不歸也叔向曰魯公室其卑乎君有大喪國不廢搜有三年之喪而無一日之戚國不恤喪不忌君也君無戚容不顧親也國不忌君君不顧親能無卑乎殆其失國二十五年春叔孫婼聘于宋桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡宋公享昭子賦新宫昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之公若從謂曹氏勿與魯將逐之曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣魯君喪政四公矣無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣魯君失民矣焉得逞其志靖以待命猶可動必憂有鸜鵒來巢書所無也師已曰異哉吾聞文武之世童謡有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢遠哉遙遙裯父喪勞宋父以驕鸜鵒鸜鵒往歌來哭童謡有是今鸜鵒來巢其將及乎初季公鳥娶妻於齊鮑文子生申公鳥死季公亥與公思展與公鳥之臣申夜姑相其室及季姒與饔人檀通而懼乃使其妾抶已以示秦遄之妻曰公若欲使余余不可而抶余又訴於公甫曰展與夜姑將要余秦姬以告公之公之與公甫告平子平子拘展於卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使豎勿內日中不得請有司逆命公之使速殺之故公若怨平子季郈之雞鬭季氏介其雞郈氏為之金距平子怒益宫於郈氏且讓之故郈昭伯亦怨平子臧昭伯之從弟會為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老將禘於襄公萬者二人其衆萬於季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓於公為且與之出射於外而謀去季氏公為告公果公賁公果公賁使侍人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若泄臣不獲死乃館於公叔孫昭子如闞公居於長府九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治將薀薀蓄民將生心生心同求將合君必悔之弗聽郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾言於其衆曰若之何莫對又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入公徒釋甲執冰而踞遂逐之孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之于南門之西遂伐公徒子家子曰諸臣偽劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行己亥公孫于齊次于陽州齊侯將唁公于平陰公先至于野井齊侯曰寡人之罪也使有司待于平陰為近故也書曰公孫于齊次于陽州齊侯唁公于野井禮也將求於人則先下之禮之善物也齊侯曰自莒疆以西請致千社以待君命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也公喜子家子曰天祿不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無繾綣從公無通外內以公命示子家子子家子曰如此吾不可以盟羈也不佞不能與二三子同心而以為皆有罪或欲通內外且欲去君二三子好亡而惡定焉可同也陷君於難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰茍使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之公與昭子言於幄內曰將安衆而納公公徒將殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒左師展將以公乘馬而歸公徒執之十一月宋元公將為公故如晉夢大子欒即位於朝已與平公服而相之且召六卿公曰寡人不佞不能事父兄以為二三子憂寡人之罪也若以羣子之靈獲保首領以殁唯是楄柎所以藉幹者請無及先君仲幾對曰君若以社稷之故私降昵宴羣臣弗敢知若夫宋國之法死生之度先君有命矣羣臣以死守之弗敢失隊臣之失職常刑不赦臣不忍其死君命祗辱宋公遂行己亥卒于曲棘十二月庚辰齊侯圍鄆初臧昭伯如晉臧會竊其寶龜僂句以卜為信與僭僭吉臧氏老將如晉問會請往昭伯問家故盡對及內子與母弟叔孫則不對再三問不對歸及郊會逆問又如初至次于外而察之皆無之執而戮之逸奔郈郈魴假使為賈正焉計於季氏臧氏使五人以戈楯伏諸桐汝之閭會出逐之反奔執諸季氏中門之外平子怒曰何故以兵入吾門拘臧氏老季臧有惡及昭伯從公平子立臧會會曰僂句不余欺也二十六年春王正月庚申齊侯取鄆葬宋元公如先君禮也三月公至自齊處于鄆言魯地也夏齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縛一如瑱適齊師謂子猶之人高齮能貨子猶為高氏後粟五千庾高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰羣臣不盡力于魯君者非不能事君也然據有異焉宋元公為魯君如晉卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑魯君有罪于鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公成大夫公孫朝謂平子曰有都以衛國也請我受師許之請納質弗許曰信女足矣告于齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩于齊齊師圍成成人伐齊師之飲馬于淄者曰將以厭衆魯成備而後告曰不勝衆師及齊師戰于炊鼻齊子淵捷從泄聲子射之中楯瓦繇胊汏輈七入者三寸聲子射其馬斬鞅殪改駕人以為鬷戾也而助之子車曰齊人也將擊子車子車射之殪其御曰又之子車曰衆可懼也而不可怒也子囊帶從野泄叱之泄曰軍無私怒報乃私也將亢子又叱之亦叱之冉豎射陳武子中手失弓而罵以告平子曰有君子白晳鬒鬚眉甚口平子曰必子強也毋乃亢諸對曰謂之君子何敢亢之林雍羞為顔鳴右下苑何忌取其耳顔鳴去之苑子之御曰視下顧苑子刜林雍斷其足鑋而乘於他車以歸顔鳴三入齊師呼曰林雍乘秋盟于鄟陵謀納公也二十七年春公如齊公至自齊處于鄆言在外也秋會于扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨於季孫謂司城子梁與北宫負子曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而説甲執冰以遊叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復孟懿子陽虎伐鄆鄆人將戰子家子曰天命不慆久矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知冬公如齊齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出二十八年春公如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聽使請逆於晉晉人曰天禍魯國君淹洫在外君亦不使一個辱在寡人而即安於甥舅其亦使逆君使公復于竟而後逆之二十九年春公至自乾侯處于鄆齊侯使髙張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯平子每嵗賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬衛侯來獻其乘馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以帷裹之公賜公衍羔裘使獻龍輔於齊侯遂入羔裘齊侯喜與之陽穀公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄公私喜於陽穀而思於魯曰務人為此禍也且後生而為兄其誣也久矣乃黜之而以公衍為大子三十年春王正月公在乾侯不先書鄆與乾侯非公且徵過也三十一年春王正月公在乾侯言不能外內也晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如會晉荀躒于適厯荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心夏四月季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人己所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸三十二年春王正月公在乾侯言不能外內又不能用其人也十二月公疾遍賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜己未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪二故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有二也天生季氏以二魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰高岸為谷深谷為陵三后之姓於今為庶主所知也在易卦雷乘乾曰大壯天之道也昔成季友桓之季也文薑之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功於魯受費以為上卿至於文子武子世增其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人定元年夏叔孫成子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也寇而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位季孫使役如闞公氏將溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問於榮駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃止秋七月癸巳葬昭公於墓道南孔子之為司寇也溝而合諸墓昭公出故季平子禱于煬公九月立煬宫哀十二年夏五月昭夫人孟子卒昭公娶于吳故不書姓死不赴故不稱夫人不反哭故不言葬小君孔子與弔適季氏季氏不絻放絰而拜二十三年春宋景曹卒季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人曰以肥之得備彌甥也有不腆先人之産馬使求薦諸夫人之宰其可以稱旌繁乎異乎亡國之君不可與圖存也子家羈於公之伐季氏也曰季氏得民衆久矣君無多辱於公徒之敗也曰諸臣偽劫君者而公止於公之孫也曰齊君無信不如早之晉而公皆不聽居鄆五年莫之能返及其在乾侯也荀躒以意如來羈曰君與之歸又曰君以一乘入于魯師公欲從之而脅於從者遂至客死臨事無謀畏難無斷其真天下之庸主哉季氏無道僭于公室自成襄之君側目重足咸莫敢問至昭公一旦而謀去之再雩聚衆長府授甲其謀出于倉卒非有遠慮即公亦原無去之心皆左右讒人從而啓之一敗出孫寄迹于鄆雖曰公室失民驟難反正借令善撫鄆衆安知非少康一旅哉處彈九之邑役民無度鄆則何堪乃無何而鄆潰矣春秋之書法民逃其上曰潰左氏曰非公且徵過也穀梁曰昭公出奔民如釋重負然則民之所棄用一邑而猶不足矧以魯國之衆而當權臣之得政耶在外八年內外棄之春秋急欲存公故每於嵗首公在必書而魯人則無公久矣宋元邡公卒于曲棘叔婼叔倪無病而死季氏即詭于衆曰天將棄公非我罪也齊晉受賄借口緩師而孟叔之徒藉季自庇莫敢發難況以陰陽休咎之説煽惑震動外結鞅據之權嬖內離成鄆之民心公既孤立反集衆尤而歸國又復奚望哉且公自即位以來季氏驕恣于斯為甚是以取鄆取郠公弗能知牟夷來奔公弗能郤子憖奔齊公弗能反舍中軍以弱公室大搜以強私黨凡其所為皆肆志無忌而羣臣莫敢斥也一旦圖之其孰從焉公在外野噭然而哭誰則非君宜皆攘臂以行誅討而乃緩賊以長權惡彼季氏者又何憚而不逐其君耶且意如於公之伐也則登臺而請察罪於叔孫之歸也則稽顙而求改事於乾侯則賈馬歸衣於適厯則跣行伏對哀色巽辭謬為恭順即大國亦將信之公復奮怒誓河罔知悔禍是臣愈姦而君愈庸臣愈黠而君愈疏其始猶惴焉而懷可去之罪終則汰然而成不可去之形矣外交日固誰聽公而除之哉夫公以齊歸之子在戚而有嘉容嗣位之初穆叔已知為患而季孫卒立之終不免乾侯之敗然則昭公不立魯可無亂乎吾謂三世之專四公之弱又未可專責之一人也晉祁氏羊舌氏之亡昭二十八年晉祁勝與塢臧通室祁盈將執之訪於司馬叔遊叔遊曰鄭書有之惡直醜正實蕃有徒無道立矣子懼不免詩曰民之多辟無自立辟姑己若何盈曰祁氏私有討國何有焉遂執之祁勝賂荀躒荀躒為之言於晉侯晉侯執祁盈祁盈之臣曰鈞將皆死憖使吾君聞勝與臧之死也以為快乃殺之夏六月晉殺祁盈及楊食我食我祁盈之黨也而助亂故殺之遂滅祁氏羊舌氏初叔向欲娶於申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是大有敗也昔有仍氏生女黰黑而甚美光可以鑑名曰玄妻樂正后夔取之生伯封實有豕心貪婪無饜忿纇無期謂之封豕有窮后羿滅之夔是以不祀且三代之亡共子之廢皆是物也女何以為哉夫有尤物足以移人茍非德義則必有禍叔向懼不敢取平公強使取之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視秋晉韓宣子卒魏獻子為政分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為塢大夫賈辛為祁大夫司馬烏為平陵大夫魏戊為梗陽大夫知徐吾為塗水大夫韓固為馬首大夫孟丙為盂大夫樂霄為銅鞮大夫趙朝為平陽大夫僚安為楊氏大夫謂賈辛司馬烏為有力於王室故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也其四人者皆受縣而後見於魏子以賢舉也魏子謂成鱄吾與戊也縣人其以我為黨乎對曰何也戊之為人也遠不忘君近不逼同居利思義在約思純有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他唯善所在親疏一也詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王其德靡悔既受帝祉施于孫子心能制義曰度德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文九德不愆作事無悔故襲天祿子孫賴之主之舉也近文德矣所及其遠哉賈辛將適其縣見於魏子魏子曰辛來昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不揚子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力於王室吾是以舉女行乎敬之哉毋墮乃力仲尼聞魏子之舉也以為義曰近不失親遠不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎冬梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之魏戊謂閻沒女寬曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比置三歎既食使生魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人祁氏晉獻侯之後羊舌氏晉武公之後皆公族也叔向祁奚皆賢大夫惜哉流澤不永旋就夷滅傳曰公族公室之枝葉也國之將亡枝葉先落吾於祁羊舌氏而識晉祚之不長也有以夫左傳事緯卷九
