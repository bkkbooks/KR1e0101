body:
  text: 左傳事緯前集卷二靈璧知縣馬驌撰左氏辨例上年月例隱公元年春王正月傳曰元年春王周正月魯公之始年周王之正月也按隱公元年即平王之四十九年作春秋者胡不書曰平王四十九年而言隱公元年乎春秋魯史非周書也以一國之史記天下之事故詳內而略外書信而闕疑用年時月日以相統繫則史官舊文非義例之所加也首時書王明此厯為王者所班夏正建寅矣商正建丑矣而周正則建子三代之正月不同故冠月以王言是時王之正月也春隨月移春非王所改故不言王春而言王正月其或廢法亂常失不班厯者則經不書王桓公十有八年而不書王者十四知非盡為闕文必是王不班厯矣靈景之際天子卑微諸侯遙禀正朔故子朝之亂經仍書王不責以所不能也四時具而後為年是以時雖無事必舉首月以明時過桓九年夏四月隱九年秋七月桓元年冬十月此類是也若時有事則隨事而繫之月其未詳月者直繫之時春秋不遺時爾非不遺月也何必定舉首月哉若春之三月皆亡不得於春下空懸一王字故悉不書王非不班厯之說也公羊曰隱無正月穀梁曰隱無正桓無王鑿矣史之所記年時月日皆應具文而春秋文多不具桓四年七年皆無秋冬定十四年無冬昭十年有十二月而無冬莊二十二年特稱夏五月又有日無月者十四其不可知者或史策先闕而仲尼不改其可知者或仲尼備文而後人脫誤至其有時無月有月無日史官立文原有詳略仲尼因史成文不得不仍其舊而書之陳侯鮑卒再赴而書二日衛侯晉卒重書丙戌慎疑因舊不得不然寧皆義例之所在耶春秋不以日月為例唯日食須甲乙而明卿卒為股肱之痛二者書日以見義隱元年冬十有二月公子益師卒傳曰公不與小斂故不書日桓十七年冬十月朔日有食之傳曰不書日官失之也左氏發傳唯此二事知二者之外非例明矣公穀於日月多生異義舉一經之文悉以日月繩之於公如則曰往時至月危至也往月至時危往也往月至月惡之也於來朝則曰時正也月惡之也於卒葬則曰諸侯日卒正也時葬正也不及時而日渴葬也不日慢葬也過時而日隱之也不日謂之不能葬也當時而不日正也日危不得葬也於滅國則曰中國謹日卑國月夷狄時於螽螟則曰甚則月不甚則時而又有桓盟不日外盟不日前定之盟不日卑之盟不日侵伐不日取邑不日詐戰不日微國不日夷狄不日諸說違其例者非曰謹之則曰惡之必曲說以求通而或此曰危之彼曰美之即二家亦若矛盾之不相入也皆非聖人之本意也按經朝聘侵伐土功執殺之屬未嘗書日而要盟戰敗崩薨卒葬之屬則多書日量事為文本有同異况時有逺近詳略各别是以文公以上書日二百四十有九宣公以下書日四百三十有二年數同而後則倍之知久逺遺落不可盡舉為例矣即位例即位八不書即位四桓公元年春王正月公即位此史策正法也人君繼立踰年改元朝廟告朔因即人君之位故史官書之於策曰公即位傳曰隱公不書即位攝也莊公不稱即位文姜出故也閔公不書即位亂故也僖公不稱即位公出故也四君之於即位或讓而不為或痛而不忍或亂而不得本無可書非孔子刪之也桓文宣成襄昭定哀八君本自即位非孔子增之也公羊曰君弒子不言即位臣子一例穀梁曰繼正即位繼弒不言即位而桓宣之即位則公羊曰如其意穀梁曰與聞乎弒無恩於先君於隱公之不即位既曰成其意而桓宣即位又曰如其意是美意亦成惡意亦如沒其實而止存其意有是理哉隱莊閔僖舊史既無即位之文仲尼修經因而不增是即聖人之新意故傳以不書不稱發之四君雖不即位然亦改元告朔朝廟與人更始故史猶書春王正月以見此月本宜即位而實不即位皆有故也桓公弒兄嗣立似於隱之死日即合即位當如晉人弒厲公而立悼公即位改元不待踰年者然桓方歸罪寪氏詐言不與賊謀自同於遭喪之禮猶待踰年而後行之史臣據實以書爾定公元年不書正月蓋正月公尚未立歲首未得朝正正月無事可見是以不書逮六月而後即位既非即位之常月記事之宜又須詳而日之故書戊辰即位而後改元未改之前必承前君之年而史官載策又不得一歲兩年故於是歲八年即稱元史法然也漢魏以來雖秋冬改元者史必冠之於歲首遵此意哉告朔例不告月一不視朔一文六年閏月不告月猶朝於廟傳曰非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民此緣文公之失以明告朔之禮也天子班厯於諸侯諸侯受而藏之祖廟每月之朔以特羊告廟受而施行之遂以聽治此月之政謂之視朔以其告廟故亦曰告朔此日又以禮祭於宗廟謂之朝廟其在歲首則謂之朝正襄二十九年傳稱釋不朝正於廟是也視朔朝廟其禮有二皆於月朔為之也夫聽政必於朔者人君設官分職委任臣下總成敗以效能否執八柄以明賞誅使非躬親其事則忠惰不分亂言移聽朝政日紊國家之敗端必由此聖人知其然是以簡其節敬其事制為視朔之法因月朔告廟遂以臨朝聽政考往議來顯衆以斷之由是上下交泰官治民安也文以閏非常月因而闕其禮故經書之以章其失怠政棄禮雖朝於廟則如勿朝故曰猶猶者可已之辭也經稱告月傳言告朔告月必於朔也十六年夏五月公四不視朔傳曰疾也文自六年不視閏朔蓋其後是禮浸廢諸公多有不行者定哀之世餼羊徒存子貢感而欲去是其證也既已一書顯禮明譏是後不復更載乃文於十六年則以疾故自二月至五月四不視朔雖曰廢禮實非怠惰故經復明其事按諸公以疾廢朔者不一特於此一表之則餘從可知且是春公以疾辭齊㑹又因明其非詐也視朔朝廟國之常事常事不書而唯書其失失亦不可勝書存一二以示法而已丘明作傳窮覽載籍雖經所不載又廣記而備言之也僖五年傳曰春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也禮天子有靈臺諸侯有觀臺觀臺臺上構屋可以逺觀於歲春秋二分夏冬二至立春立夏為啓立秋立冬為閉用此八節之日登臺以望書其所見雲物氣色若有變異妖祥必有後驗書之所以為備豫也視朔者月朔之禮登臺者日至之禮兹則朔至同日故僖公兩行之左氏善公得禮因記其事復發凡以明周公之典傳中凡例五十唯此一凡經無其事然亦國家大典傳是以顯舉之也春秋編年之體值朔書朔值晦書晦值閏書閏原無義例事之所記舊有詳略或闕焉弗備亦非褒譏之說也唯日食假朔日以明僖十五年夏五月日有食之傳曰不書朔與日官失之也是其例矣穀梁曰言日不言朔食晦日朔日並不言食晦夜朔日並言食正朔言朔不言日食既朔此則未聞厯術而徒穿鑿其說僖五年九月己卯晦成十六年六月甲午晦公羊曰晦𡨕也記異也此復指日為異其舛謬尤甚矣聖人敬天作厯用授民時分四時以正寒燠置餘閏以節盈虛所以重民事也故傳中每譏置閏之失文元年傳曰於是閏三月非禮也先王之正時也履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖襄二十七年十一月傳曰辰在申司厯過也再失閏矣哀十二年十二月螽傳稱仲尼曰今火猶西流司厯過也詳釋諸傳知閏月之為重文公不告閏月猶朝於廟聖人明書示譏公羊曰天無是月也猶者通可已也穀梁曰天子不以告朔而喪事不數也是何其言之悖乎杜氏簡二傳而去異端殆莫此之為甚與王臣例錫命三來聘七來求三歸脤一來含賵二來㑹葬二來一周王稱天王者二十五稱王者八稱天子者一傳無異說非例也三者天子之通稱也天子至尊不可貶責故春秋無貶王之例而失禮亂紀之舉或貶王使以示義焉隱元年天王使宰咺來歸惠公仲子之賵傳曰緩且子氏未薨故名咺不應名而名貶咺也貶咺所以責王也王臣下交必本王命故曰天王使某隱元年祭伯來傳曰非王命也此釋其私交也三年武氏子來求賻傳曰王未葬也平王之喪在殯新王未得行其爵命聽於冢宰故稱父族又不稱使也文九年毛伯來求金傳曰不書王命未葬也雖踰年而未葬亦不稱王使若是者皆實録也若祭公之逆王后則昏禮不稱主人又非此例矣天子無求有求則譏桓十五年天王使家父來求車傳曰非禮也諸侯不貢車服天子不私求財推此而言求賻求金皆非禮矣天子錫命未聞其詳諸侯或即位而見錫或厯年而加錫或已薨而追錫文元年天王使毛伯來錫公命此即位之錫也蓋賜以命圭合瑞為信若傳稱賜晉侯命是其比也晉侯受玉惰知錫命之有玉也莊元年王使榮叔來錫桓公命此已薨之錫也蓋追命而褒稱其德若傳稱追命衛襄公是其比也成八年天子使召伯來賜公命此厯年乃錫不知何故傳言賜齊侯命及策命晉侯皆命為侯伯成公又非其比或者仍是合瑞之禮而緩用之苟以得之為榮故不復譏其緩爾齊晉衛之錫命不書不告也王臣之稱傳雖不發凡言例而尋繹經傳可得而知也王之公卿書爵祭伯凡伯是也大夫稱字南季榮叔是也元士中士稱名劉夏石尚是也下士稱人公㑹王人於洮是也其或稱祭公稱宰舉官而言之此正例也所以知其然者宰咺歸賵以緩而名桓四年天王使宰渠伯糾來聘傳曰父在故名攝父職以出聘則為非禮是以貶之周禮大宰卿一人小宰中大夫二人宰夫下大夫四人此宰未知何宰但貶而稱名則法當書字是大夫稱字之例矣然春秋之世王之卿士有無爵者如王叔陳生伯輿之屬未知書經其稱云何滕侯之先為周卜正齊侯呂伋為虎賁氏周制大夫固多有爵者又何以稱也然則卿而無爵或亦書字但不可越字而稱名大夫有爵或亦書爵復不可舍爵而書字襄十五年劉夏逆王后於齊𫝊曰卿不行非禮也劉夏非卿而名對言之則卿亦有書字之理王臣之見經者衆矣祭伯凡伯毛伯召伯單伯尹子劉子單子其間未必無大夫南季榮叔家父王季子其間未必無卿第無明證故依例言之桓五年天王使仍叔之子來聘傳曰弱也譏使童子出聘本父稱子然而書其父字其父大夫也莊六年王人子突救衛官微而授大事褒而字之然猶冠以王人王人下士也褒貶既别以生義而例必存於經春秋之法其嚴如此侯爵例五等之爵公侯伯子男以王命為諸侯者也其例稱爵下此為附庸附庸未命無爵不得謂之諸侯其例稱名春秋朝聘㑹盟之國宋為公魯晉齊衛陳蔡邢紀鄧為侯秦鄭曹薛杞穀滑北燕為伯楚莒吳越邾小邾滕徐郜郯鄫沈胡頓為子許宿為男是三十四國於經最顯云二邾初為附庸其後稱子滕薛把初稱為侯其後滕降稱子薛把降稱伯或曰時王之所進黜也魯為本國在內不可自稱魯侯故書曰公從臣子之辭五等皆稱公死則諡曰某公是以傳文於列國皆稱公經於葬皆舉諡稱公禮之常也蔡葬或書爵史氏異辭爾夷狄雖大爵不過子吳楚稱王僭而不典是以不葬若葬則宜書某王為是絶而不葬也所以知附庸例稱名者莊五年郳犂來來朝傳曰名未王命也但釋稱名之故而無貶責之說是例之當名矣五等之爵不生名其或生名則為貶之桓七年穀伯綏來朝鄧侯吾離來朝傳曰名賤之也僖二十五年衛侯燬滅邢傳曰同姓也故名貶而名是例不當名也諸侯之朝㑹征伐例皆不名至於奔執歸入則或名或不名者經不一法傳無明例蓋從告辭以書之爾公羊曰失地之君名穀梁曰名失國也其說雖本曲禮而難通於左氏且於經復多違謬姑無取焉春秋嘉而書字君臣同例隱元年公及邾儀父盟於蔑傳曰未王命故不書爵曰儀父貴之也此附庸之褒也桓十七年蔡季自陳歸於蔡傳曰蔡人嘉之也此諸侯之褒也是知六等之君皆可褒而稱字許叔紀季是其類矣公侯之稱子何也僖九年宋子㑹于葵丘傳曰宋桓公卒未葬而襄公㑹諸侯故曰子凡在喪王曰小童公侯曰子在喪者未葬之稱既葬則稱爵也公羊曰君薨稱子某既葬稱子踰年稱公非矣彼既葬稱子者文十八年子卒傳曰諱之也魯人諱弒猶以未成君告故以子書僖二十五年衛子盟於洮成公上述父志降名稱子故嘉而從之是皆有故焉不得舉為例也僖二十八年衛子盟於踐土衛無新喪此亦稱子者武叔攝位未有成命不得為君也既公侯在喪稱子者是例也而非貶也則宋共衛惠衛定之流皆先君未葬而稱爵非禮矣既述父攝君者猶不稱爵則晉大子州蒲代父而稱侯非禮矣是皆可觸類而知也把伯之稱子變例以貶之也僖二十三把子卒傳曰書曰子把夷也二十七年把子來朝傳曰用夷禮故曰子襄二十九年把子來盟傳曰書子賤之也三者異事故重例以明之其實同以貶責爾荆者楚之初號也後乃改稱為楚國有二名猶小邾之初名郳者非貶也公羊曰州名也州不若國穀梁曰外之也夫貶之有道何乃於國名生異且楚之為狄久矣猾夏日甚何獨於初貶焉諸侯之貶或至沒而不書成二年盟於蜀傳曰許蔡不書乘楚車也謂之失位此仲尼削之以示譏亦變例之僅見者乃知貶諸侯之例或書名或削之或稱子盡矣未有以人稱者桓十五年邾人牟人葛人來朝公穀皆以為外之杜氏獨謂三人皆附庸之世子其君應稱名故其子降稱人蓋左氏無貶君稱人之例杜是以推其說也按經書人而傳言諸侯者十有一丘明皆不發例要亦當世告命記注之異若謂貶諸侯而去爵稱人是指責卿之例責君矣登謝堂而問鳯毛責坊州以貢杜若何以異此班序例齊桓公㑹盟之國十五周魯宋陳衛蔡鄭許邢曹邾滑滕江黃宋襄公㑹盟之國十一齊楚陳衛蔡鄭許曹邾滕鄫晉文公㑹盟之國十一周魯齊宋陳蔡鄭衛莒邾秦楚莊王㑹盟之國四魯宋陳鄭晉悼公㑹盟之國十六周魯齊宋陳衛鄭曹莒邾滕薛把小邾吳鄫晉平公㑹盟之國十七魯楚齊秦宋蔡衛陳鄭許曹莒邾滕薛把小邾楚靈王㑹盟之國十三宋蔡陳鄭許徐越滕頓胡沈小邾淮夷春秋之盟㑹侵伐魯㑹他國者皆序魯於㑹字之上非尊魯也從本國之辭自書其事於文宜然也若微者往㑹不合書名於經則㑹上無字直言所為之事而已莊十五年㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟於幽是也若魯人不與而諸侯相㑹則但序列前後雖伯主亦止序諸侯之上爾不言伯主㑹某某也莊十五年齊侯宋公陳侯衛侯鄭伯㑹于鄄是也若伯主遣大夫往㑹諸侯雖政在伯國猶序大夫於諸侯之下文十四年公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾同盟於新城是也若王臣在㑹不問尊卑必序王臣於列國之上僖八年公㑹王人齊侯宋公衛侯許男曹伯陳世子款盟于洮九年公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘是也是皆春秋之常法史氏之舊文仲尼為其合於書法因不革者春秋之國以大小彊弱為班序莊十四年以前征伐㑹盟之國十有六時無伯主未有成列蔡常在衛上唯桓十六年居陳下意者其後至乎桓文以來伯主之所序則為成例矣齊桓盟幽陳以小國班躋衛上遂終乎春秋是其所序而進也然而大夫不先正卿臣子不先諸侯故文十七年襄二十七年陳皆在衛下公孫寧孔奐非正卿也僖二十八年衛在鄭下叔武未成君也班序雖定而或先至後至伯主又得而升降之襄十年伐鄭傳曰齊大子光先至于師故長於滕二十六年㑹澶淵傳曰鄭先宋不失所也此復一時之進退而非常例矣伯主所序唯是土地甲兵以為前後不問其分封班爵同異姓也然而周之宗盟異姓為後故載書或與㑹次不同踐土之盟齊宋先也而定四年傳稱其載書云晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期召陵之㑹蔡先衛也而傳稱萇𢎞告劉子乃長衛侯是二者傳與經違蓋皆王臣臨之故㑹盟異序其餘雜盟未必盡然也列國有事大國雖居諸侯之上而主㑹主兵者則小國或居大國之前隱八年宋公齊侯衛侯盟於瓦屋齊尊宋使主㑹也隱五年邾人鄭人伐宋邾主兵也齊桓公之伐郳伐鄭伐徐皆先宋後齊蓋小國主兵即伯主亦退序其下史據實書之以見事之所自起舊法然爾桓十年齊侯衛侯鄭伯來戰於郎傳曰先書齊衛王爵也僖二年虞師晉師滅下陽傳曰先書虞賄故也鄭主兵而以王爵抑之虞貪賄助晉而用主兵之例此仲尼特示新意以正褒貶者故左氏發傳以明之也㑹盟而以國地者地主亦與其事桓十四年公㑹鄭伯于曹傳曰曹人致餼禮也僖十九年陳人蔡人楚人鄭人盟於齊傳曰修桓公之好也推此為例知諸以國地者國亦與焉僖二十七年公㑹諸侯盟於宋宋實不與盟而亦以國地者宋方見圍無嫌于同盟也若此者尋繹可知非地主之例矣殊㑹殊盟先序列國而後言㑹某於某僖五年公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子於首止傳曰謀寧周也成十五年叔孫僑如㑹某某㑹吳於鍾離傳曰始通吳也襄十年公㑹某某㑹吳於柤傳曰㑹吳子夀夢也十四年季孫宿叔老㑹某某㑹吳於向傳曰為吳謀楚故也諸侯為其國動故殊序之以顯其事若此者就事立文之宜傳是以但指歸趣不發褒貶之義公穀謂尊王世子既非其要而云外吳尤疏矣戚之㑹豈不猶是兹吳乎春秋之先㑹後盟者於㑹既序列諸侯矣於盟則不再序從省文也閒無異事則不稱諸侯昭十三年秋公㑹某某於平丘八月同盟於平丘是矣閒有異事則復總稱諸侯以明之僖九年夏公㑹某某於葵丘秋七月伯姬卒九月諸侯盟於葵丘是矣首止之㑹盟間雖無事然王世子㑹而不盟故稱諸侯以别之若此之總稱諸侯皆非貶也倘非前序後省之比列國有事不終則不加序列而輒稱諸侯以譏之僖十四年諸侯城緣陵傳曰不書其人有闕也文十五年諸侯盟於扈傳曰書曰諸侯無能為也十七年諸侯㑹於扈傳曰書曰諸侯無功也此皆以不足序列而略之是知總稱諸侯者皆仲尼變例之譏矣春秋自諸侯為政㑹列之所關遂重矣諸侯而篡立者苟得與於諸侯之㑹則以成君書爵侯伯不復致討臣子殺之與弒君同昭元年莒展輿出奔吳不稱爵未列㑹也故宣元年傳曰㑹於平州以定公位成十六年傳曰先君若有罪則君列諸㑹矣以此知列㑹則定位定位則書爵王政不行而諸侯自相推戴誠變局哉臣稱例卿大夫士臣爵之等差也公侯為大國伯為次國子男為小國周官之制其臣亦準之以分尊卑但時至春秋漸已改變所稱國之大小皆據當日之土地人民不復依班爵之舊傳稱衛之於晉不得比次國則莒邾滕薛固甚微矣聖人作經不得不據時宜而從之不能上同周官也諸侯必有命卿命卿者其君正爵命之於朝宫室車服禮儀皆如其命數若有事於㑹盟侵伐必列名書字於經魯晉齊楚宋衛鄭陳蔡所常書也春秋之微國當時附隨大國不得列㑹者甚衆及其列㑹上無通於天子下不能備禮成列唯是略而書人故㑹盟侵伐之役止曹公子首見經其餘以奔亡見者邾畀我曹公孫㑹等數人而已知合制者少也邾庶其莒牟夷邾黑肱來奔傳皆曰非卿紀裂繻逆女傳曰卿為君逆是此等微國亦皆有卿特以僻陋不得見經把降為夷况其臣乎楚之始見也略書國名而已漸而書人矣漸而有君臣矣至成二年盟蜀之役卿不書名為貶始得與中國準吳之始通也亦止書國名後乃漸有君臣皆其初禮文闕陋告辭不能合禮是以略之非貶於其始也公羊穀梁之說謂曹無大夫邾婁無大夫莒無大夫楚無大夫秦無大夫吳無君無大夫又曰隱不爵命大夫宋三世無大夫此皆拘謬違經不可為訓公羊曰州不若國國不若氏氏不若人人不若名名不若字字不若子信斯言也楚至於文宣吳至於定哀薦食日甚何德而進焉卿例書名其貶也外則降而稱人內則去族特稱名為不宜言我人也卿既卒不名例書字夷伯原仲是也大夫名例不見經外書曰人內則直言所為之事而已賤臣為亂書之曰盜定八年盜竊寶玉大弓哀四年盜殺蔡侯申是也若非士又不得言盜襄二十九年閽殺吳子餘祭是也此春秋書法之大略也臣之有族者古者天子賜姓命氏諸侯命族族者氏之别名也諸侯唯卿賜族隱八年無駭卒公命以字為展氏死而賜族禮也亦有生而賜族者莊三十二年立叔孫氏諸侯之子曰公子公子之子曰公孫子孫者繫公之常言非族也而與族同例書之皆常也去之皆貶也何以知去族之為貶乎隱四年翬帥師傳曰疾之也莊三年溺㑹齊師伐衛傳曰疾之也襄二十七年豹及諸侯之大夫盟於宋傳曰不書其族言違命也左氏三為發例知內臣有貶而去族之例矣貶去族則常例稱族文八年公子遂㑹雒戎盟於暴傳曰書曰公子遂珍之也此不由君命似宜去族然大夫出竟有可以利國家安社稷者專之可也嘉其解難珍而無貶故傳復發例焉卿之出入必稱族者族為君之所命卿行必奉命於君昏禮雖承時君之命其言必稱先君以為禮辭桓三年公子翬如齊逆女傳曰修先君之好故曰公子宣元年公子遂如齊逆女傳曰尊君命也成十四年叔孫僑如如齊逆女傳曰稱族尊君命也首發傳以明先君之好次發傳以明君命三發例以明族與公子之同凡此非褒也於昏禮互發其義以著稱族之常爾亦有有所尊崇而因以去族者遂以夫人婦姜至自齊傳曰尊夫人也僑如以夫人婦姜氏至自齊傳曰舍族尊夫人也昭十四年意如至自晉傳曰尊晉罪已禮也二十四年婼至自晉傳曰尊晉也內不使大夫與夫人敵貴外削吾臣族以崇大國凡此非盡臣之罪也又一例也內去族既與外稱人同貶即非貶亦同其例文二年晉人宋人陳人鄭人伐秦傳曰卿不書為穆公故尊秦也謂之崇德襄八年季孫宿㑹晉侯鄭伯齊人宋人衛人邾人於邢丘𫝊曰大夫不書尊晉侯也此類是也夫未命者及一命之大夫不得見經列名書字皆再命三命之卿大國之臣必當有命而經悉書以大夫何也按經傳卿大夫之文相涉晉殺三卿經曰大夫邢丘之㑹傳曰大夫其實卿也經不書卿者非無卿也王制云上大夫卿是卿之總名亦曰大夫也何以知外卿稱人之為貶乎僖二十九年盟於翟泉傳曰卿不書罪之也文九年救鄭傳曰卿不書緩也以懲不恪十七年伐宋傳曰卿不書失其所也宣十二年盟於清丘傳曰卿不書不實其言也成二年盟於蜀傳曰卿不書匱盟也襄十四年㑹吳於向㑹伐秦傳曰齊崔杼宋華閲仲江㑹伐秦不書惰也向之㑹亦如之衛北宫括不書於向書於伐秦攝也二十六年㑹於澶淵傳曰向戌不書後也三十年㑹於澶淵宋災故傳曰卿不書不信也清丘之盟宋實其言然華椒承羣僞之言以誤其國猶不免譏也諸皆卿㑹而經書人左氏每事發例事不同而貶責則一咸出仲尼之新意故不憚反覆以明之是外卿有貶而稱人之例矣大夫雖宜稱人然事或殊異則有變例以名見經者文二年晉士縠盟於垂隴傳曰書士縠堪其事也僖元年獲莒拿傳曰拿非卿也嘉獲之也襄二十一年邾庶其以漆閭丘來奔傳曰庶其非卿也以地來雖賤必書重地也昭五年莒牟夷以牟婁及防兹來奔傳曰牟夷非卿而書重地也三十一年黑肱以濫來奔傳曰賤而書名重地也此皆不當名而名故傳各發例以明之也卿之書字書子書官皆不斥其名褒之也莊二十五年陳侯使女叔來聘傳曰嘉之故不名閔元年季子來歸傳曰嘉之也齊仲孫來傳曰書曰仲孫嘉之也文十四年宋子哀來奔傳曰貴之也此稱字之褒也閔二年髙子來盟善其寧魯難而不名此稱子之褒也文八年宋殺其大夫司馬宋司城來奔傳曰司馬握節以死故書以官司城蕩意諸來奔效節於府人而出亦書以官皆貴之也此稱官之褒也文十五年宋司馬華孫來盟傳曰其官從之書曰宋司馬華孫貴之也此又兼書官與字以美之也是皆當名又貴而不名亦各發義以明之又一例也去族為內卿之貶然外臣亦多不書族者尋按春秋諸氏族之稱甚多參差欲託之於外赴則嫌有身自來者例不可通因有未賜族之說以無駭為比而復有有族不書者亦不可通也弒君不書族者四州吁無知公羊曰當國也穀梁曰弒而代之也然商人亦弒君取國胡為獨稱公子宋督宋萬穀梁曰萬宋之卑者也然宋督身為大宰胡為亦不稱族若以為未賜族傳中明有華父督南宫長萬之文豈是無族也殺大夫不書族者二得臣宜申若以為貶則自有國討之例且楚公子側成熊等六七人皆稱氏族何獨於二人貶也欲以為例則有如是之異欲以為無例而左氏發明諸稱炳然明著似非獨遺此也斯蓋非典策舊法故傳不發凡例當時諸國以意來赴辭有詳略仲尼采文示義義之所起刋而正之義無所關則仍故策而已或有因舊示義者宣十年齊崔氏出奔衛傳曰書曰崔氏非其罪也且告以族不以名從告為文明從其本史矣昭三十一年傳曰或求名而不得或欲蓋而名章是以春秋書齊豹曰盜三叛人名以懲不義數惡無禮其善志也似此新例定非舊法司馬華孫之稱亦無他比是豈大例也乃知傳之所發皆仲尼之變例傳所不發則仍史文而書或未賜族或時有詳略爾鄭宛莒慶魯挾柔之屬亦未必盡無族者也經自莊公以上弒君者皆不言氏閔公以下弒君者皆書氏亦足明時史之異非盡仲尼所刋正矣母弟例宣十七年公弟叔肸卒傳曰公母弟也凡大子之母弟公在曰公子不在曰弟凡稱弟皆母弟也此母弟通例也國有適長謂之儲君在王侯皆稱世子亦曰大子王世子不名僖五年㑹王世子於首止是矣諸侯世子稱名桓九年曹伯使其世子射姑來朝是矣附庸世子稱人十五年邾人牟人葛人來朝是矣大子之弟在王曰王子在侯曰公子繫之公者不必大子之母弟也尊在父也即母弟亦繫之公不得言大子之弟也統於公也若大子為君唯母弟稱弟書之於策所以殊而異之親而睦之既以隆友于之稱亦以奬為人弟之敬成相愛之益也母弟之見經者二十𫝊發其六而已凡稱弟皆母弟者正例也桓三年齊侯使其弟年來聘十四年鄭伯使其弟語來盟成十年衛侯之弟黑背帥師侵鄭皆母弟也然亦有不稱弟者何也庶弟不得稱弟而母弟得稱公子舊史原可兩通若非以此示例不必定加刋正也兄弟而相殺害則稱弟以示義仲尼據史策之例起新意以正貶責兄而害弟稱弟以章兄罪弟而害兄又去弟以罪弟身隱元年鄭伯克段于鄢𫝊曰段不弟故不言弟稱鄭伯譏失教也襄三十年天王殺其弟佞夫𫝊曰罪在王也鄭伯懷嫉害之心天王縱羣臣以殺弟顯稱二兄以為首惡佞夫弗知反謀故稱弟而專責王段為亂首故去弟而兩罪之此其所以異也襄二十年陳侯之弟黃出奔楚𫝊曰言非其罪也昭元年秦伯之弟針出奔𫝊曰罪秦伯也秦伯有千乘之國而不能容母弟罪秦伯則針無罪陳侯不能制禦臣下而弟見逐黃無罪則罪在陳侯此互舉之文也然則衛侯之弟鱄出奔晉亦罪衛侯矣昭八年陳侯之弟招殺陳世子偃師𫝊曰罪在招也春秋兩下相殺則兩名之以罪殺者招雖有罪然不推刃於其兄故從兩下相殺之文以首惡書弟書名罪又輕於段之害兄故存其弟也若夫嘉好之事則仍舊史之稱或曰弟或曰公子可爾莊二十五年公子友如陳昭元年陳公子招㑹虢此二公子皆君母弟既非貶責明是國之常言矣子弟之稱與族同貴非卿則不以公子公弟書之是以莒拿非卿雖嘉獲之而書名猶不曰莒子之弟拿知諸書弟者又必卿也昭二十年盜殺衛侯之兄縶公羊曰母弟稱弟母兄稱兄然傳止發母弟之例者諸侯有母弟常也有母兄者僅見於衛而已既非國之常事策書焉得有常典哉昏姻例納幣三逆十一送二歸六媵四至二入一求婦一致女一內女來三內女來歸三㑹內女一夫人如三夫人歸于一夫人㑹享雜如九文二年公子遂如齊納幣傳曰禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也孝禮之始也此發例以明昏禮之得書於經也儀禮士昏六禮下達納采納吉納徴請期親迎是也納徴有𤣥纁束帛故諸侯謂之納幣諸侯昏禮亡以士昏準之不得止有納幣逆女二事然二事書而餘不書者二事應使卿也成八年宋公使華元來聘傳曰聘共姬也聘即士禮所謂下逹者華元以卿而書然經用常聘之文𫝊止言其事而不謂禮蓋非所應使矣夏宋公使公孫夀來納幣𫝊曰禮也是納幣當使卿也士昏親迎諸侯亦當親迎莊二十四年公如齊逆女是也若君有故則使卿代之隱二年紀裂繻來逆女傳曰卿為君逆也文四年逆婦姜於齊傳曰卿不行非禮也是卿逆則為禮矣唯天子尊無與敵不行親迎使卿逆而上公臨之桓八年祭公來遂逆王后于紀傳曰禮也祭公為天子三公故言合禮不言卿舉重略輕也襄十五年劉夏逆王后於齊𫝊曰官師從單靖公逆王后於齊卿不行非禮也劉夏非卿而從上公逆后傳謂非禮知祭公逆后必有卿矣不書單靖公未過魯也昏姻必賔主敵體故天子聘后於諸侯必使同姓之諸侯為主令與后家為禮故祭公先來受命於魯魯主昏也天子嫁女於諸侯亦必使同姓之諸侯為主令與夫家為禮莊元年單伯送王姬是也嫁女則先送女於魯以待夫家之逆王姬至魯必為館以處之秋築王姬之館於外傳曰為外禮也魯齊仇讐莊不敢違王命且在諒暗故於外得禮變之正也迎后則令魯為主魯但遣使往逆王命已成不復過魯直歸京師而已桓九年紀季姜歸於京師𫝊曰凡諸侯之女行唯王后書按王后之書亦鮮又須從告嫁於列國雖告不書也納幣逆女或稱使或不稱使何也昏禮不稱主人為有廉恥之心不欲自言娶婦故卿禀君母之命而婦人之命又不可通於鄰國若言卿輒自來者紀裂繻之類是也若國君無母臣無所禀命不得不稱君命宋公孫夀是也此各據事以書非例也婦人謂嫁曰歸凡稱字以歸皆初嫁也莊十二年紀叔姬歸於酅紀侯去國而死叔姬歸魯紀季自定而後歸之全節守義故繫之紀而以初嫁為文僖十五年季姬歸於鄫前年季姬來寧公止之而絶鄫子兹既朝而還嫁之故來寧不書而用更嫁之辭二者非嫁書歸就事立文之義也婦人之稱天子於逆稱后舉其得王之命后禮已成示無外也於歸稱字所以伸父母之尊雖嫁於王猶曰吾女某紀姜是也諸侯於逆稱女卿為君逆亦如之內外皆然莊公紀裂繻公子遂逆女是也卿自為逆則稱所逆之字宣五年齊髙固來逆叔姬𫝊曰書曰逆叔姬卿自逆也是也若此者所以明尊卑之别示文義之順𫝊雖不發凡經文固昭然爾婦人對姑稱婦僖二十五年宋蕩伯姬來逆婦三十一年把伯姬來求婦是也婦人而求而逆蓋皆以非禮書也內娶不得逺指其歸曰至自某既入國不得稱女曰夫人婦某氏婦者有姑之辭至者告廟之文成十四年僑如以夫人婦姜氏至自齊是也文公之於出姜也貴聘賤逆而入不告至故曰逆婦姜於齊而不稱女莊公之於哀姜也納幣親迎而有孟任之嫌同反異入故曰夫人姜氏入而不稱至二者違於常禮略文以示異也宣元年遂以夫人婦姜至自齊史闕文無氏非義例也莊元年夫人孫於齊𫝊曰不稱姜氏絶不為親禮也夫人之貶僅見於此爾知其餘盡闕文矣桓三年齊侯送姜氏於歡𫝊曰非禮也凡公嫁女於敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之此通言送女之例也諸稱凡皆周公舊典經雖不盡有其事𫝊緣齊侯之失而並及之王后且不親送况列國乎禮夫人初至大夫執贄以見以明臣子之道宗婦亦見通謂之覿莊二十四年大夫宗婦覿用幣𫝊曰非禮也男贄大者玉帛小者禽鳥女贄不過榛栗棗修今男女同贄是無别也然則覿之常不書此以非常書也成八年衛人來媵傳曰禮也凡諸侯嫁女同姓媵之異姓則否古者諸侯取適夫人姪娣為媵同姓之國亦媵國三人凡九女所以廣繼嗣也夫人薨則不更聘以姪娣媵繼室一與之醮終身不二重人倫篤夫婦之義也若當時無人則待年而媵故有媵在嫁後者參骨肉至親以息隂訟故媵必用同姓禮稱納女於天子曰備百姓於國君曰備酒漿國君不言百姓是無異姓之媵矣九年晉人來媵𫝊曰禮也十年齊人來媵非禮可知也女嫁三月使大夫隨加聘問以致成婦禮謂之致女存謙序勤用篤昏姻之好在內則詳書其事在外則用聘文而已成九年季孫行父如宋致女桓三年齊侯使其弟年來聘傳曰致夫人也詳內略外之宜非義例也內臣外昏則皆因聘而往卿非君命不越竟而私家之昏姻不得書策悉皆曰如某猶聘問之常文而已僖五年公孫兹如牟成八年公孫嬰齊如莒是也女子既嫁有時而歸問父母之寧否謂之歸寧父母既沒則使卿寧其兄弟𫝊稱楚司馬子庚聘於秦為夫人寧禮也是矣婦人犯七出之條見絶於夫而歸父母之家謂之出莊二十七年把伯姬來𫝊曰寧也凡諸侯之女歸寧曰來出曰來歸夫人歸寧曰如某出曰歸于某此通言寧出之例也來與如皆有反之言歸者不反之辭也此年把伯姬來寧也宣十六年郯伯姬來歸𫝊曰出也文九年夫人姜氏如齊歸寧也魯之夫人無被出者文十八年夫人姜氏歸於齊𫝊曰大歸也子死自去故與出同文也文十五年齊人來歸子叔姬𫝊曰王故也此亦出而歸文在上齊以王命送魯是以異文爾婦人迎送不出門見兄弟不踰閾故禮有寧無㑹外事非所與也而春秋實有其事無例可稱故皆直書以明其失莊二十七年公㑹把伯姬於洮𫝊曰非事也天子非展義不巡守諸侯非民事不舉卿非君命不越竟㑹內女非諸侯之事是以譏之莊二年夫人姜氏㑹齊侯於禚𫝊曰書姦也七年夫人姜氏㑹齊侯於防𫝊曰齊志也文姜比年與齊侯㑹或曰㑹或曰享或曰如師既非禮之所及小君之行不得不書故經明記其事𫝊於齊地曰書姦於魯地曰齊志略舉兩端即實而言以見其餘也十九年二十年夫人姜氏如莒莒非父母之國不待貶而明矣桓十八年公與夫人姜氏遂如齊僖十一年公及夫人姜氏㑹齊侯於陽榖男女無别俱行朝㑹皆春秋直書以深譏也朝聘例王使來聘七公如京師一公朝王所二大夫如京師五公如晉二十一公如齊十一桓莊四如非朝不數公如楚二大夫如列國五十六因事而如者不數列國來朝四十四內書來者四列國來聘三十一外相如四君行曰朝卿行曰聘朝者諸侯朝於天子小國朝於大國聘者使卿執玉帛以相存問也夫諸侯朝於天子可也而諸侯之自相朝何也周禮大行人曰凡諸侯之邦交歲相問也殷相聘也世相朝也是諸侯亦有相朝之制皆所以習禮考義正刑一德以尊天子非若春秋之世彊弱衆寡相制使小國奔走不得寧也父死子立曰世新君初立或彼來朝或往朝之皆為世相朝法雖舊典廢闕而春秋猶有行者文十一年曹伯來朝𫝊曰即位而來見也此彼新立而朝此也襄元年邾子來朝衛侯使公孫剽來聘𫝊曰禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也邾之來朝是此新立而彼朝之也此於周禮世相朝之制蓋有合焉文十五年曹伯來朝𫝊曰禮也諸侯五年再相朝以修王命古之制也既云古制必亦周法而周禮無其文何也蓋一世一朝疏濶太甚其閒年必有相朝之法且一新一舊彼此未狎於此之際必須往朝周禮特舉其大者爾文元年公孫敖如齊𫝊曰始聘焉禮也凡君即位卿出竝聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也此曰即位而卿出聘襄元年又曰即位大國聘焉是新君初立復有交聘之法一如朝禮豈曰一世一聘而已閒年之聘又可類推也自霸主為政因時制宜非復周法之故子大叔云文襄之霸也其務不煩諸侯令諸侯三歲而聘五歲而朝蓋以五年再朝往來大數更制從簡所以說諸侯也霸主未能創制改物諸侯或從或違是以邾曹之國尚有率舊章合周禮者文襄德衰朝聘無復定準悼公又從而更命之襄八年傳曰㑹于邢丘以命朝聘之數是亦上同文襄爾而周禮不行久矣內之朝聘於列國皆書曰如如者書其始事未知其終事否也故朝一也則有至河乃復者聘一也則有至黃乃復不至而復奔莒者安得於其始遂書曰朝曰聘也僖二十八年夏公朝于王所冬公朝于王所王不在京師朝而後書故不言如也外之朝聘於魯皆書曰來朝來聘彼固已朝已聘矣書其終事也諸朝魯者若偕至而同行朝禮則總書來朝隱十一年滕侯薛侯來朝桓十五年邾人牟人葛人來朝是矣若各行朝禮則各書來朝桓七年穀伯綏來朝鄧侯吾離來朝是矣莊二十三年蕭叔朝公就穀而朝故不言來僖二十九年春介葛盧來冬介葛盧來襄十八年白狄來皆來而不能行朝禮故不言朝若此之類據實為文非寓褒貶於字句也公羊曰兼言之何微國也夫穀鄧之不大於滕薛明矣是故弗取也桓五年冬州公如曹六年春實來𫝊曰自曹來朝書曰實來不復其國也言奔則行朝禮言朝則遂留不去故變文言實來不言州公承上年省文也春秋固有省文之書若昭六年齊侯伐北燕七年暨齊平之類是矣公羊曰慢之也化我也穀梁曰以其畫我故簡言之也此亦偏執之論也外相朝亦曰如告而後書桓五年齊侯鄭伯如紀齊鄭借朝欲以襲紀紀懼而告來也州公如曹為明年實來書也文十四單伯如齊為魯如齊故書也襄五年叔孫豹鄫世子巫如晉傳曰言比諸魯大夫也魯覿之於晉故變例書之也外相如多矣餘悉不書以無關內事又不告故爾魯之朝聘於天子者八而朝聘於列國者九十魯之所朝者晉齊與楚而朝魯者曹邾滕薛等數小國而已春秋之世唯利是視尚何有於殷聘世朝之周禮哉㑹盟例㑹九十七盟一百九遇七胥命一平六合諸侯之謂㑹昭神要言之謂盟朝聘㑹盟皆所以睦鄰尊王相信之道也古者㑹盟於方嶽必出天子之命春秋王政不行故諸侯自相㑹盟也㑹而不盟者但書曰㑹殺牲載書而後書曰盟齊桓以前㑹盟之國十有五或特或參各從所好自北杏以後霸主為政則推為㑹盟之首而列國從之其列序亦唯霸主是命而已五等之爵公侯為尊列國之卿當小國之君故在㑹卿不敢敵公侯而可以敵伯子男僖二十九年㑹王人晉人宋人齊人陳人蔡人秦人盟於翟泉𫝊曰公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憗盟於翟泉卿不書罪之也在禮卿不㑹公侯㑹伯子男可也此其例也王子虎下盟列國以瀆大典諸卿上敵公侯虧禮傷義魯侯諱盟天子大夫故沒不書公又皆稱人所以知其然者若止責卿不應去公又不宜貶王子虎襄二十六年公㑹晉人鄭良霄宋人曹人於澶淵傳曰趙武不書尊公也鄭先宋不失所也卿㑹公侯皆應貶責方示宋向戌後期故書良霄以駮之此責卿而不沒公知沒公者諱矣文二年及晉處父盟𫝊曰以厭之也晉欲辱公使大夫盟于其都陽處父不能匡君以正親身盟公削族存名以彰其惡去公言及若使微者往㑹不用稱人之例以直厭其不直仲尼之變例也卿嫌敵公貶而稱人何也蓋人則微者雖書於䇿無嫌其敵隱八年公及莒人盟於浮來之類是也若國內無君雖大夫不嫌敵公莊九年公及齊大夫盟於蔇傳曰齊無君也是也若在㑹有君可以敵公則列國無貶僖七年公㑹齊侯宋公陳世子欵鄭世子華盟於寧母之類是也㑹而有君雖不在列卿亦不貶成二年公㑹楚公子嬰齊於蜀時有蔡許之君故嬰齊書名是也若此者因事立文不違常例既無關褒貶之義左氏無譏焉內卿之㑹公侯者甚多體例己舉故內事據史成文不復貶削襄十六年叔老㑹鄭伯晉荀偃衛寧殖宋人伐許傳曰書曰㑹鄭伯為夷故也㑹卿鄭伯可以等夷故於此示例所謂㑹伯子男可也者是矣春秋互文見義豈必事事發例哉王子虎翟泉之盟何以謂之瀆大典也諸侯㑹盟所以共奬王室天子使臣臨之爾故往往同㑹而不同盟以諸侯不敢盟王國也僖二十八年公㑹某某盟於踐土𫝊曰王子虎盟諸侯于王庭宣七年公㑹某某於黑壤𫝊曰盟於黑壤王叔桓公臨之以謀不睦哀十三年公㑹晉侯及吳子於黃池𫝊曰公㑹單平公晉定公吳夫差於黃池秋七月盟吳晉爭先此三者王臣皆不列盟是尊之者正法也倘有王室不靖命使結盟於諸侯則經無貶責僖八年王人盟洮𫝊曰謀王室也文十年及蘇子盟於女栗𫝊曰頃王立故也襄三年單子盟於雞澤時亦靈王新立此皆王命下盟事勢宜然唯翟泉諸侯新睦王室無虞子虎無故列盟是以貶之春秋王臣之㑹盟十餘事咸依是而類推矣盟而稱同服異之辭也假神明以要不信故載辭或稱同春秋之同盟十六公羊曰同者同欲也穀梁曰同尊周也同外楚也二說雖近是而服異之說尢多莊十六年于幽傳曰鄭成也二十七年于幽傳曰陳鄭服也文十四年于新城傳曰從於楚者服且謀邾也成五年於蟲牢𫝊曰鄭服也七年於馬陵傳曰尋蟲牢之盟且莒服故也襄三年於雞澤傳曰晉為鄭服故合諸侯九年於戲傳曰鄭服也十一年於亳城北傳曰鄭人懼乃行成二十五年於重丘傳曰齊成故也昭十三年於平丘傳曰齊服也此十盟者皆先同而復異故以服異為文若江黃之盟貫陳許頓胡之盟臯鼬原非同盟故不用服異之例也其似宜稱同而不稱者僖五年盟於首止鄭伯逃歸七年於寧母鄭大子華聽命於㑹然傳言子華請去三族管仲曰君其勿許鄭必受盟是鄭猶未服也八年於洮鄭伯乞盟然傳言請服是鄭猶未列㑹也文十五年郤缺入蔡冬盟於扈傳稱蔡亦與盟是蔡新來服然傳言郤缺入蔡以城下之盟而還是蔡已先服也此皆不於盟服異是以不用也宣十二年於清丘傳曰恤病討二十七年於斷道傳曰討二也成九年於蒲傳曰諸侯二於晉十五年於戚傳曰討曹成公也十七年於柯陵傳曰尋戚之盟也十八年於虛朾傳曰謀救宋也此六盟皆非服異而稱同盟者清丘斷道與蒲諸侯已有二心故同心討二戚與虛朾同心疾惡柯陵之盟鄭人不服欲令同心伐鄭是以載書亦皆稱同公羊所謂同欲是矣其他非諸侯之㑹而大夫盟於人國則往曰涖盟來曰來盟與夫來聘而因與盟者據事立文非義例之所加也諸㑹未有言其事者襄三十年㑹於澶淵宋災故傳曰尤之也宋人不克自責而出㑹求財諸侯又無所歸若但貶卿稱人則疑於無功之類故明繫其故以尤宋仲尼特綴異文爾桓二年㑹於稷以成宋亂傳曰為賂故立華氏也取郜大鼎於宋納於大廟𫝊曰非禮也本欲平亂竟立賊臣四國黨惡魯亦受賂乃國惡之大者史臣不便指斥故逺述為㑹之意後繫取鼎之文若宋亂果成而取賂非禮者實為魯諱所謂婉而成章是已且文亦連言所㑹之事若㑹於袲伐鄭之類非如宋災故之丁寧其辭也遇者草次之期各簡其禮若道路之逢遇非如㑹之預謀閒地克期聚集故有未及㑹期而遇者隱四年公及宋公遇於清之類是也有暫須相見而遇者莊三十年公及齊侯遇於魯濟是也曲禮云未及期相見曰遇相見於郤地曰㑹正指此類而或謂用周禮冬見曰遇者非矣申約言以相命而不㰱血謂之胥命桓三年齊侯衛侯胥命於蒲傳曰不盟也春秋之胥命止此一事豈他遂不為哉莊二十一年傳言胥命於弭蓋事亦有之特以不告故不書爾和而不盟曰平先有不平今始釋怨修好諸平皆舉國言平總言二國和平之義故不書公卿其或曰人與舉國一也穀梁曰人衆辭平稱衆上下欲之也然則彼不稱人者豈國君一人之志而臣民皆不欲乎其說陋矣宣十五年宋人及楚人平傳有盟辭昭七年燕暨齊平𫝊言盟於濡上似平亦有盟者然平實修好之事非要盟也定十一年及鄭平下乃云叔還如鄭涖盟知平後或别有盟而盟非平事矣其在周禮大宗伯以賔禮親邦國而以盟㑹發四方之志天子巡守諸侯既朝則設方明是㑹盟者天子之權也春秋二百四十二年之間盟㑹咸出諸侯之志即有褒譏亦曰彼善於此爾春秋無義戰春秋寧有義㑹盟哉左傳事緯前集卷二
