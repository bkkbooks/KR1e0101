body:
  text: 左傳事緯卷十二靈璧知縣馬驌撰王朝交魯平王隱元年十二月祭伯來非王命也三年春王正月壬戌平王崩赴以庚戌故書之武氏子來求賻王未葬也桓王七年初戎朝于周發幣于公卿凡伯弗賓冬王使凡伯來聘還戎伐之于楚丘以歸桓四年夏周宰渠伯糾來聘父在故名五年仍叔之子弱也十五年春天王使家父來求車非禮也諸侯不貢車服天子不私求財莊王莊三年夏五月葬桓王緩也僖王惠王襄王僖三十年冬王使周公閲來聘饗有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有僃物之享以象其德薦五味羞嘉穀鹽虎形以獻其功吾何以堪之文元年王使毛伯衛來賜公命叔孫得臣如周拜三年夏四月乙亥王叔文公卒赴弔如同盟禮也頃王九年毛伯衛來求金非禮也不書王命未葬也二月莊叔如周葬襄王十年秋七月及蘇子盟于女栗頃王立故也匡王定王宣公九年春王使來徵聘夏孟獻子聘于周王以為有禮厚賄之十年秋劉康公來報聘成五年十一月己酉定王崩簡王八年秋召桓公來賜公命靈王襄二十八年癸巳天王崩未來赴亦未書禮也王人來告喪問崩日以甲寅告故書之以徵過也景王敬王哀十九年冬叔青如京師敬王崩故也春秋二百四十二年周之來聘有七錫命有三歸脤有一賵葬有四來求有三魯君臣之朝聘于周有八會葬于周有四嘗綜其事而論之其得失大略可見也平王在位五十一年其四十九年為魯隱之元年於是為春秋所託始而宰咺以歸賵失禮而稱名祭伯以王臣私交而不稱命東遷之首王春秋之首事經兩譏焉下此尚可望乎平王崩而魯不奔喪隱公之無禮也桓王二十餘年五聘於魯求車求賻瀆而不恥而入朝之使無聞焉桓公之不臣也甚且凡伯銜命以來境外之患魯不為僃衛不出救委天子之臣於草莽諸侯寧知有天王哉莊王七年而葬桓王魯人僅一往會逮及僖王惠王三十年間王使不出魯臣不往春秋於是絶而不書雖祭叔有交世子王人有會魯無一介之使奔走京師春秋綱紀久弛上替下陵君不君而臣不臣壞法亂紀天下久不知其非又何獨責魯哉襄王春秋之賢王也僖公春秋之賢君也僖之事襄也從齊桓於首止以定位從晉文於踐土以復王兩朝王所恪守臣禮襄之於僖也生則周公報朝死則叔服會葬錫命其子賵葬其親上下有禮為春秋所希見意霸業隆而王室尊天下咸識天子之大抑王之於魯又何周詳無缺也頃王之立女栗有會是後十有八年厯匡王定王周魯使絶至宣公九年仲孫來朝王使季子往聘蓋王使下徵獻子始至未嘗為宣公志也公在位數年屢朝齊而不朝王奔齊喪而不奔王喪遣卿會齊侯葬而不會匡王葬專事大國豈知京師哉且身為篡逆九伐未加而王聘下答無王之悲至此極也魯成即位朝貢不修簡王忽來錫命春秋譏之越三年而以伐秦之役道過京師靈王享國二十餘年僅有叔豹一至何寥寥也景王之崩叔鞅雖來會葬其後敬王即位王室大亂反無一使以相存問政在季氏昭公出奔彼意如不知有其君又焉知有天子耶然自召伯錫命以及石尚歸脤之歲上下百年天使兩出王命其日惰矣古者諸侯有朝王有巡守歲時交聘吉凶告赴所以存紀綱篤親親也魯諸公之朝齊晉楚三十有三而朝周僅三諸大夫之聘列國五十有六而聘周僅五吾讀隱桓之春秋悲王命之日瀆讀襄昭之春秋哀王命之日惰瀆與惰皆自上始未可盡責之天下也周之衰也何日之有小國交魯曹附子臧之節桓九年冬曹大子來朝賓之以上卿禮也享曹大子初獻樂奏而嘆施父曰曹大子其有憂乎非嘆所也十年春曹桓公卒文十一年秋曹文公來朝即位而來見也成七年夏曹宣公來朝十三年曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其大子而自立也諸侯乃請討之晉人以其役之勞請俟他年冬葬曹宣公既葬子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑十五年春會于戚討曹成公也執而歸諸京師書曰晉侯執曹伯不及其民也凡君不道於其民諸侯討而執之則曰某人執某侯不然則否諸侯將見子臧于王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋十六年曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也先君無乃有罪乎若有罪則君列諸會矣君唯不遺德刑以伯諸侯豈獨遺諸敝邑敢私布之曹人復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出襄二十一年冬曹武公來朝始見也滕薛隱公七年春滕侯卒不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名告終稱嗣也以繼好息民謂之禮經十一年春滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賓有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯文十二年秋滕昭公來朝亦始朝公也襄六年秋滕成公來朝始朝公也三十一年冬十月滕成公來會葬惰而多涕子服惠伯曰滕君將死矣怠於其位而哀已甚兆於死所矣能無從乎昭三年丁未滕子原卒同盟故書名五月叔弓如滕葬滕成公子服椒為介及郊遇懿伯之忌敬子不入惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之三十一年薛伯穀卒同盟故書杞桓二年秋七月杞侯來朝不敬把侯歸乃謀伐之九月入杞討不敬也三年公會把侯于郕杞求成也十二年夏盟于曲池平把莒也莊公二十七年春公會把伯姬于洮非事也天子非展義不巡守諸侯非民事不舉卿非君命不越竟冬把伯姬來歸寧也凡諸侯之女歸寧曰來出曰來歸夫人歸寧曰如某出曰歸于某僖二十三年十一月杞成公卒書曰子把夷也不書名未同盟也凡諸侯同盟死則赴以名禮也赴以名則亦書之不然則否辟不敏也二十七年春把桓公來朝用夷禮故曰子公卑把把不共也秋入把責無禮也文十二年把桓公來朝始朝公也且請絶叔姬而無絶昏公許之二月叔姬卒不言把絶也書叔姬言非女也成四年杞伯來朝歸叔姬故也八年冬把叔姬卒來歸自把故書九年春杞桓公來逆叔姬之喪請之也杞叔姬卒為把故也逆叔姬為我也襄公六年春把桓公卒始赴以名同盟故也小邾初名郳莊公五年秋郳犂來來朝名未王命也襄七年小邾穆公來朝亦始朝公也昭三年小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之十七年春小邾穆公來朝公與之燕季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎哀十四年小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能鄫僖十四年鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝郕文十一年郕大子朱儒自安於夫鍾國人弗徇十二年春郕伯卒郕人立君大子以夫鍾與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔不書地尊諸侯也郯宣十六年秋郯伯姬來歸出也襄公七年春郯子來朝始朝公也昭十七年秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太皥氏以龍紀故為龍師而龍名我髙祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信介僖公二十九年春介葛盧來朝舍于昌衍之上公在會饋之芻米禮也冬介葛盧來以未見公故復來朝禮之加燕好介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信牟僖五年夏公孫兹如牟娶焉穀鄧桓公七年春穀伯鄧侯來朝名賤之也淳于即州桓五年冬淳于公如曹度其國危遂不復六年春自曹來朝書曰實來不復其國也戎隱公二年春公會戎于潛修惠公之好也戎請盟公辭戎請盟秋盟于唐復修戎好也桓二年公及戎盟于唐修舊好也冬公至自唐告于廟也凡公行告于宗廟反行飲至舍爵䇿勳焉禮也特相會往來稱地讓事也自參以上則往稱地來稱會成事也莊十八年夏公追戎于濟西不言其來諱之也白狄襄公十八年春白狄始來春秋之世朝魯者十有五國曹邾滕薛杞小邾紀鄫郯郜葛牟蕭穀鄧也州介白狄或來而不復或禮不能備故皆稱來焉滕初稱侯自桓二年書子薛初稱侯自莊三十年稱伯或曰自降也或曰時王所黜也樂正子記滕侯薛侯旅朝隱公桓王聞之徵朝滕以子往薛以伯往王怒皆黜焉此一證也二邾微國入春秋初尚無爵命故儀父稱字犂來稱名其後皆書為子蓋以王命進也二國附庸可以王命進則滕薛侯爵亦可以王命降但未知把初稱侯至莊二十七年稱伯僖二十三年又稱子文十年復稱伯至襄二十九年又稱子倐升倐降又誰命之也諸國曹邾滕杞小邾朝魯為多杞七朝而止于成曹五朝而止于襄小邾五朝而止于昭邾七朝而止于定滕五朝而訖于哀列國之述職于天子者春秋闕如而自相朝見皆非禮也穀鄧辟陋葛牟旅見羣然而走于桓杞伯姬之子鄫季姬之夫羣然而走于僖曹伯五年而再朝于文小邾子十五年而再朝于昭杞紀昏媾薛介比鄰邾子仇讎或咨難而不存或不敬而致討或終始一至或忽禮忽兵春秋之諸國何可長也總之東遷而後周禮不講久矣列國之君唯利是視曹滕諸國之朝于魯猶魯之朝于大國也是以齊晉更霸之日曹遂不朝晉悼昏杞之後把遂不至滕與二邾迄乎春秋之末而猶棲棲兩觀之間蓋式微甚矣小國欲託重于魯故亟于朝魯既而小邾子被執于宋不聞魯人救之是魯之不能庇小國也然僖公保須句而須句滅襄公屬鄫而鄫亡魯之不振也舊矣又何責乎定哀哉魯滅小國僖十七年師滅項淮之會公有諸侯之事未歸而取項齊人以為討而止公秋聲薑以公故會齊侯于卞九月公至書曰至自會猶有諸侯之事焉且諱之也宣九年秋取根牟言易也成六年取鄟言易也襄十三年夏邿亂分為三師救邿遂取之凡書取言易也用大師焉曰滅弗地曰入易則言取用大師則言滅春秋書法也魯之至項必越宋陳之境非大師不能克僖公淮會未歸别遣師徒以滅之是時行父方幼三桓未專未必非公志也霸主之討又何辭焉根牟鄟邿皆國小近魯乘其危亂而俘之猶掇之爾小國恃大國之安靖已也而包藏禍心以圖之可乎然魯之於人國也取其易者而已矣王臣喪亡周公閲文公十四年春頃王崩周公閲與王孫蘇爭政故不赴凡崩薨不赴則不書禍福不告亦不書懲不敬也周公將與王孫蘇訟于晉王叛王孫蘇而使尹氏與聃啓訟周公于晉趙宣子平王室而復之召戴公毛伯衛宣十五年王孫蘇與召氏毛氏爭政使王子捷殺召戴公及毛伯衛卒立召襄十六年為毛召之難故王室復亂王孫蘇奔晉晉人復之冬晉侯使士會平王室定王享之原襄公相禮殽蒸武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法周公楚成十一年周公楚惡惠襄之逼也且與伯與爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉十二年春王使以周公之難來告書曰周公出奔晉凡自周無出周公自出故也成肅公十三年公及諸侯朝王遂從劉康公成肅公會晉侯伐秦成子受脤于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎成肅公卒于瑕王叔陳生襄五年王使王叔陳生訴戎于晉晉人執之士魴如京師言王叔之二於戎也十年王叔陳生與伯輿爭政王右伯輿王叔陳生怒而出奔及河王復之殺史狡以説焉不入遂處之晉侯使士丐平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄于王庭士丐聽之王叔之宰曰篳門圭竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟曰世世無失職若篳門圭竇其能來東底乎且王何賴焉今自王叔之相也政以賄成而刑放於寵官之師旅不勝其富吾能無篳門圭竇乎唯大國圖之下而無直則何謂正矣范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉不書不告也單靖公為卿士以相王室儋括三十年初王儋季卒其子括將見王而嘆單公子愆期為靈王御士過諸廷聞其嘆而言曰烏乎必有此夫入以告王且曰必殺之不戚而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟佞夫罪在王也單獻公昭七年單獻公棄親用羈冬十月辛酉襄頃之族殺獻公而立成公單成公十一年單子會韓宣子于戚視下言徐叔向曰單子其將死乎朝有著定會有表衣有襘帶有結會朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事于會視不登帶言不過步貌不道容而言不昭矣不道不共不昭不從無守氣矣十二月單成公卒原伯絞十二年周原伯絞虐其輿臣使曹逃冬十月壬申朔原輿人逐絞而立公子跪尋絞奔郊甘悼公甘簡公無子立其弟過過將去成景之族成景之族賂劉獻公丙申殺甘悼公而立成公之孫鰌丁酉殺獻太子之傅庾皮之子過殺瑕辛于市及宫嬖綽王孫沒劉州鳩陰忌老陽子鞏簡公定元年周鞏簡公棄其子弟而好用逺人二年夏四月辛酉鞏子之羣子弟賊簡公在昔厲王之亂周召分治號曰共和或曰共伯和攝君位也蓋其時王雖昏虐大臣猶能和輯以安定國家是以宣王中興則有若甫侯若樊仲詩人美焉降而東遷王室益衰而天子慎選三公嘗兼冢宰猶遵先王之舊故出使會盟必繫之宰重其任也王臣私交始於祭伯之來諸侯用王師始於單伯之伐宋春秋猶謹而書之以記世道之變鄭虢代政廢置在王樊皮之叛旋就夷滅時周室猶有政焉未有如匡定簡靈以後爭訟煩興私劍相尋左史所載胡若是其紛紛也周公天子之三公也召氏毛氏周之世臣也自王孫蘇亂之一朝而尸兩卿春秋著以兩下相殺之文經曰王札子傳曰蘇實使之則殺二臣者明乎在下不在上也於是單獻甘悼鞏簡皆相繼弗獲考死矣自伯與亂之而大臣不安其位爭政以奔忿而不反春秋惡其自絶書曰出奔然而周公不繫之宰權號去矣政在多門三公無權嗣是尹子劉子單子之會伐諸侯猶之晉諸卿魯三桓也於是王叔原伯相繼而越在侯國矣景王初立殺弟佞夫問何以殺則儋括欲立之佞夫弗知也佞夫之罪不彰而王之翦之也急王則忍矣子瑕之奔哀佞夫之無罪亦猶元咺之於衛叔武耳王之暮年儲位不決用生子朝之亂日見兄弟之戕夷大臣之分爭也終乎春秋之世亂未遄巳周室寧可為哉然則周之衰也不在諸侯之不睦而在大臣之不和不在大臣之不和而在骨肉之不協然總由天子之無政也春秋十有二王而崩而不赴者三大臣之顯者十餘族而或奔或亡者九自莊迄敬二百年而王子之為亂者六此聖人發憤而作春秋憫魯兼以憫周端有以哉鄭臣之敗髙克閔二年鄭人惡髙克使帥師次于河上久而弗召師潰而歸髙克奔陳鄭人為之賦清人曼滿宣六年鄭公子曼滿與王子伯廖語欲為卿伯廖告人曰無德而貪其在周易豐之離弗過之矣間一歲鄭人殺之石制十二年是役也鄭石制實入楚師將以分鄭而立公子魚臣辛未鄭殺僕叔及子服君子曰史佚所謂毋怙亂者謂是類也詩曰亂離瘼矣爰其適歸歸於怙亂者也夫駟秦哀五年鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之子思曰詩曰不解于位民之攸塈不守其位而能久者鮮矣商頌曰不僭不濫不敢怠皇命以多福清人之篇刺文公退臣不以道也髙克好利而不顧君鄭君惡之於是衛方患狄用次師河上以禦之而顧使所惡者任其事久而弗召師潰將亡故詩咏翺翔春秋書棄師蓋交譏焉曼滿之貪也石制之怙亂也駟秦之侈也小國之臣不能恪慎乃職而咸就滅亡觀四臣之敗亦可為具位者戒云郊祀桓五年秋大雩書不時也凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸過則書十四年秋八月壬申御廩災乙亥嘗書不害也僖三十一年夏四月四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也宣公三年春不郊而望皆非禮也望郊之屬也不郊亦無望可也襄五年秋大雩旱也七年夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也八年秋九月大雩旱也二十八年秋八月大雩旱也昭三年八月大雩旱也六年秋九月大雩旱也十五年春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也十六年九月大雩旱也二十四年秋八月大雩旱也二十五年秋書再雩旱甚也郊禘者天子之祀魯何以有郊天子之所命也魯何以有禘天子之所命也皆為周公也故郊禘為魯國常祀雩旱祭也諸侯雩山川而天子得雩上帝曰大雩魯得郊天故大雩為魯國常祀望者郊之細也嘗蒸者宗廟之祭諸侯得以用之然則郊望禘雩嘗蒸凡皆魯之常祀也常祀不書其書之者皆譏也啓蟄為建寅之月在周為三月而春秋之書郊者咸不在三月皆失時也龍見為建巳之月在周為六月而春秋之書大雩者咸不在六月皆失時也始殺為建酉之月在周為十月而桓以八月是失時也閉蟄為建亥之月在周為十二月而桓以正月及五月皆失時也郊有九而龜違者四牛傷者四望有三而皆在不郊之餘蒸有二而歲兩用之雩二十有一而時或兩用月或再舉此又失中之失所亟書以示譏者矣曰禘曰吉禘曰大事曰有事皆禘也而或以速書或以致夫人書或以躋僖公書或以大夫卒書皆譏矣春秋據事以立文左氏互考以見義郊之僣不譏而譏其過禘之僣不譏而譏其失災餘而嘗猶為過中之得去樂卒禘猶為僣中之禮其義微哉朔閏僖公五年春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也文元年於是閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖六年閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民十六年夏五月公四不視朔疾也天子頒厯諸侯奉而行之月必告朔分至啓閉必登臺以望焉入春秋來魯之諸公不能常修其事而僖公值朔至同日兩政並舉尊王制重民事也左氏嘉之文公以降視朔之政浸廢故閏月不告經特書以示譏暮年寢疾其禮益弛故先儒所稱文公魯之惰君也然先王之厯法漸以不明周室所頒率多誣謬若文元年之閏三月若襄二十七年之再失閏若哀十二年之十二月螽皆司厯之失識者之所譏也上慢下怠蓋由來者漸矣搜狩桓公四年春正月公狩于郎書時禮也六年秋大閲簡車馬也昭八年秋大搜于紅自根牟至於商衛革車千乘搜苗獮狩四時之田獵所以教武習戰也故振旅而搜茇舍而苗治兵而獮大閲而狩三驅從禽乾豆充庖之需蓋國有常時有常地違者必書以示戒焉若郎禚及紅比蒲昌間皆非國內之地也夏秋而搜秋而大閲皆非時也正月之狩不違夏時故傳曰禮然而猶書者郎非地矣春秋之搜狩多矣何以不盡書春秋之苗獮蓋亦有矣何以絶不書其書皆譏也不書無譏也國內之獵地有常常則不書故西狩以獲麟書而不書大野此其義云城築隱元年夏四月費伯帥師城郎不書非公命也新作南門不書亦非公命也七年夏城中丘書不時也九年夏城郎書不時也桓十六年冬城向書時也莊二十八年築郿非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城二十九年春新作延廄書不時也凡馬日中而出日中而入冬十二月城諸及防書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢僖公二十年春新作南門書不時也凡啓塞從時文卜二年城諸及鄆書時也宣八年城平陽書時也成九年城中城書時也十八年築鹿囿書不時也襄十三年冬城防書事時也於是將早城臧武仲請俟畢農事禮也昭九年冬築郎囿書時也季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎定十五年冬城漆書不時告也土功必志重民力也曰城曰築曰作其事不同而用民力則一也城二十有三而違時者十二築邑築囿築館築臺者八而違時者六新作三而違時者二春秋之事其不勦民者鮮矣役而失時書之而非自見即役而不失時然而民力殫矣三時勤不獲一時之逸是皆不可以已乎災異隱元年有蜚不為災亦不書六年冬京師來告飢公為之請糴於宋衛齊鄭禮也九年春王三月癸酉大雨霖以震書始也庚辰大雨雪亦如之書時失也凡雨自三日以往為霖平地尺為大雪桓元年秋大水凡平原出水為大水十七年冬十月朔日有食之不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官于朝莊七年夏恆星不見夜明也星隕如雨與雨偕也秋無麥苗不害嘉穀也十八年秋有􅈮為災也二十五年夏六月辛未朔日有食之鼓用牲于社非常也唯正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝秋大水鼓用牲于社于門亦非常也凡天災有幣無牲非日月之眚不鼓二十八年冬飢臧孫辰告糴于齊禮也二十九年秋有蜚為災也凡物不為災不書僖公三年春不雨夏六月雨自十月不雨至于五月不曰旱不為災也十五年夏五月日有食之不書朔與日官失之也震夷伯之廟罪之也於是展氏有隱慝焉二十一年夏大旱公欲焚巫尪臧文仲曰非旱備也修城郭貶食省用務穡勸分此其務也巫尪何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲也飢而不害二十九年秋大雨雹為災也文三年秋雨螽于宋隊而死也十三年秋七月大室之屋壞書不共也十四年有星孛入于北斗周內史叔服曰不出七年宋齊晉之君皆將死亂十五年六月辛丑朔日有食之鼓用牲于社非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也十六年有蛇自泉宫出入于國如先君之數秋八月辛未聲薑薨毁泉臺十七年夏四月癸亥葬聲薑有齊難是以緩宣十五年冬蝝生飢幸之也十六年夏成周宣榭火人火之也凡火人火曰火天火曰災成五年梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壞而崩可若何國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而從之襄二十七年十一月乙亥朔日有食之辰在申司厯過也再失閏矣二十八年春無冰梓慎曰今兹宋鄭其飢乎歲在星紀而淫於玄枵以有時災陰不堪陽蛇乘龍龍宋鄭之星也宋鄭必飢玄枵虛中也枵耗名也土虛而民耗不飢何為昭四年大雨雹季武子問于申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其藏冰也深山窮谷固陰沍寒於是乎取之其出之也朝之祿位賓食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿冰皆與焉大夫命婦喪浴用冰祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至于老疾無不受冰山人取之縣人傳之輿人納之𨽻人藏之夫冰以風壯而以風出其藏之也周其用之也遍則冬無愆陽夏無伏陰春無凄風秋無苦雨雷出不震無災霜雹厲疾不降民不夭札今藏川池之冰棄而不用風不越而殺雷不發而震雹之為災誰能禦之七月之卒章藏冰之道也七年夏四月甲辰朔日有食之晉侯問于士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地於是有災魯實受之其大咎其衛君乎魯將上卿公曰詩所謂彼日而食于何不臧者何也對曰不善政之謂也國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時十一月季武子卒晉侯謂伯瑕曰吾所問日食從矣可常乎對曰不可六物不同民心不一事序不類官職不則同始異終胡可常也詩曰或燕燕居息或憔悴事國其異終也如是公曰何謂六物對曰歲時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之會是謂辰故以配日十七年夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否大史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月謂之孟夏平子弗從昭子退曰夫子將有異志不君君矣二十一年秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水於是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒二十四年夏五月乙未朔日有食之梓慎曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也二十九年秋龍見于絳郊魏獻子問于蔡墨曰吾聞之蟲莫知于龍以其不生得也謂之知信乎對曰人實不知非龍實知古者畜龍故國有豢龍氏有御龍氏獻子曰是二氏者吾亦聞之而不知其故是何謂也對曰昔有飂叔安有裔子曰董父實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川鬷夷氏其後也故帝舜氏世有畜龍及有夏孔甲擾于有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉纍學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后夏后饗之既而使求之懼而遷於魯縣范氏其後也獻子曰今何故無之對曰夫物物有其官官修其方朝夕思之一日失職則死及之失官不食官宿其業其物乃至若泯棄之物乃坻伏鬱湮不育故有五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰句芒火正曰祝融金正曰蓐收水正曰玄冥土正曰后土龍水物也水官棄矣故龍不生得不然周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉坤之剝曰龍戰于野若不朝夕見誰能物之獻子曰社稷五祀誰氏之五官也對曰少皥氏有四叔曰重曰該曰修曰熙實能金木及水使重為句芒該為蓐收修及熙為玄冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰犁為祝融共工氏有子曰句龍為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之哀三年夏五月辛卯司鐸火火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟于宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬱攸從之蒙葺公屋自大廟始外內以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立于象魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也於是乎去表之稿道還公宫孔子在陳聞火曰其桓僖乎十二年冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也十四年春西狩于大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之和氣致祥乖氣致異若形聲影響有感必隨是以先王愼之在詩曰朔日辛卯日有蝕之又曰日月鞠凶不用其行又曰百川沸騰山冢崒崩又曰正月繁霜我心憂傷凡皆乖戾之所致也詩人憫之而發為咏歌聖人録之以垂戒後世俾見災知警修德弭禍焉春秋之世天子衰微故諸侯僣亂權臣專恣於是二百四十二年之間有年僅二而災異一百二十有二在天則為薄蝕隕孛在地則為震動崩陀在物則為麋蜮鵒鷁李梅草菽違寒暑之節雨雪震電乖時令之宜瀕年不雨四國同災水旱相仍而螽蝝蜚螟並起當是時爭鬭相尋誅伐加焉原野厭人之肉川谷流人之血弒君三十二亡國五十四諸侯奔走不得保其社稷者不可勝數也或人事先見而變異輒應或妖孽先兆而禍亂隨之國君湣然不悟災異之文空載史䇿仲尼所由憂患而作春秋以哀生民示後世也夫太上修德其次修政其次修救其次修禳蓋修政可以禦災修德可以消禍故有熒惑退舍蝗不為災者皆恪慎之所孚爾春秋之君昏庸恣肆罔知悔禍天心怒而不懼人事違而不警日驅其民於兵戎力役之下而不恤也究也禍變屢見而國家亦危小則民離臣叛大則身弒國亡可哀矣夫左傳事緯卷十二
