body:
  text: 左傳事緯前集卷六靈璧知縣馬驌撰覽左隨筆周室封建自武王及成康皆有之故昭九年傳曰武王成康之建母弟二十六年傳曰武王克殷成王靖四方康王息民並建母弟以蕃屏周是也按周公營洛始封康叔成王翦桐以封唐叔如此之類明非武王所封也其昭二十八年傳曰武王克商光有天下兄弟之國十有五人姬姓之國四十人蓋言克商乃得封建歸功於武王耳又僖二十四年傳曰周公弔二叔之不咸故封建親戚以蕃屏周然所數二十六國亦非盡周公一時所建也天子建邦設都故諸侯分土而置周自后稷封邰公劉遷豳大王居岐文王作豐則猶夏商之侯國也武王宅鎬成王營洛以定鼎則為天子矣及周室凌夷而平王東遷遂入春秋其曰王城即成王定鼎之郟鄏也其敬王之遷成周即成王所營之下都也魯都曲阜本少昊之墟也又大庭氏居之故傳有大庭氏之庫又曰大庫之庭晉都唐謂之夏墟大名也本堯所都謂之平陽晉水出焉故名曰晉正名翼亦名絳而平陽是其總名曲沃繼統遂居晉都至景公遷于新田復命新田為絳而以故都為故絳齊都薄姑遷于營丘本顓頊之墟也秦非子始居秦谷襄公赴幽王之難故平王與以岐豐之地莊公居犬丘文公居汧渭德公遷于雍自德公以下十八世居雍至獻公遷櫟陽孝公遷咸陽皆在春秋後也楚都丹陽武王遷郢至昭王為吳所滅又遷于鄀其始號荆至成王始改號楚也宋都商丘本陶唐氏火正閼伯之墟也謂之火辰之墟相土因之衛都朝歌本紂都謂之商墟及懿公為狄所滅宋桓公立戴公以廬于曹齊桓公城楚丘而遷之後文公又遷于帝丘顓帝之墟也故曰帝丘夏世昆吾氏居之故曰昆吾之墟鄭本封西周畿內之地至武公而遷濟洛河潁之間謂之新鄭陳都宛丘太皥之墟蔡都汝南昭侯服役于楚徙州來許國小近鄭再滅之以為俘邑悼公附楚遷葉又遷于城父又遷于白羽又遷于容城曹都定陶莒都密州遷鹽官謂之南莒邾都邾文公遷于繹其後魯伐邾取繹當别有繹吳都姑蘇越都會稽滕遷都于公丘其故地為小邾薛故都本在魯地築臺于薛是也奚仲遷于邳杞都雍丘遷于緣陵又遷淳于小邾都故滕也以上二十國有世系圖諸小國都名見左傳者虢都上陽州都淳于鄅都開陽肥都昔陽鄀都商密諸侯興廢與原本異魯滅四國項根牟鄟邿晉滅十三國耿霍魏虢虞潞氏甲氏留吁鐸辰逼陽肥陸渾鼓齊滅五國紀談遂鄣萊秦滅二國梁滑楚滅二十國權申鄧息弦黃夔江六蓼庸蕭舒蓼舒庸舒鳩賴唐頓胡陳宋滅一國曹衛滅一國邢鄭滅一國許蔡滅一國沈莒滅一國鄫邾滅一國須句吳滅二國徐巢越滅一國吳狄滅一國溫燕有二故一曰北燕邾有二故一曰小邾虢亦有二而不稱東西者其時西虢已滅矣楚本號荆國有二名猶之晉曰唐殷曰商也邾至戰國為鄒鮮虞至戰國為中山古者以縣統郡與後世不同故楚人滅國以為九縣晉趙簡子曰克敵者上大夫受縣下大夫受郡杜氏曰千里百縣縣有四郡城方丈曰堵堵三為雉城上女墻曰堞曰陴曰短垣地有兩名者時來曰郲犬丘曰垂句瀆之丘曰穀丘黑壤曰黃父夷曰城父析曰白羽犖曰柳郯曰拔卷楚曰斷道沙曰瑣祝其曰夾谷垂葭曰郹氏牽曰脾上梁之間鄖曰發陽道六達謂之莊齊城外有之九達謂之逵鄭城內有之或名逵市或名逵路或名大逵吳晉往來之道曰夷庚魯東南有五父之衢鄭有周氏之衢衛有馬路之衢楚人冡前闕曰絰皇寢門闕曰窒皇大夫亦有寢門傳曰晉趙盾寢門闢矣臣亦有朝傳曰崔氏之朝王侯之廟以諡名宮如周平宮桓宮莊宮魯煬宮僖宮之類是也鄭祖廟曰大宮楚曰大室諸侯之宮曰公宮大子之宮曰東宮又魯有楚宮晉有固宮銅鞮之宮虒祁之宮楚有渚宮章華之宮宋有沃宮鄭有西宮北宮諸侯之臺晉虒祁之宮説苑作馳底之臺楚有章華之臺齊有遄臺檀臺衛有靈臺秦亦有靈臺按列國多有臺晉靈公從臺上彈人季平子登臺而請之類是也凡列國之城郭井里肆市園池記於左方以備參考周城門曰東門圉門北門亦名乾祭魯城門曰東門亦名雩門南門亦名稷門上東門東城北門鹿門南城東門北門郭門曰萊門子駒之門城內有社圃桐汝之閭外有蒲圃晉有桃園齊城門曰東門亦名東閭西門亦名揚門北門稷門鹿門雍門城中有魚里外有申池秦城門曰東門楚城門曰西門北門城中有蒲胥之市宋城門曰揚門正東盧門東南桐門北南門西門曹門蒙門澤門有舊墉桑林之門城內有南里衛城門曰東門南門西門北門閲門郭門曰蓋獲之門城內有藉圃鄭城門曰東門南門北門舊北門渠門皇門鄟門墓門師之梁時門閨門外郭門曰純門逺郊門曰桔柣之門城中有襄庫羊肆城中之里曰中分城外有南里陳城門曰栗門許城門曰東門邾城門曰魚門郭門曰范門絞城門曰南門北門爾雅曰梁莫大于湨梁又曰梁山晉望也魯有大野傳曰西狩于大野宋有孟諸傳曰孟諸之麋楚有雲夢傳曰楚子田江南之夢又曰涉睢濟江入于雲中鄭有圃田傳曰鄭之有原圃猶秦之有具圃大野諸名亦皆爾雅釋地文也姓氏今不復别按天子賜姓命氏諸侯命族族者氏之别名也姓以繫百世使不别氏以别子孫所自出舜之媯禹之姒伯夷之薑是因生賜姓也舜曰虞禹曰夏伯夷曰呂是胙土命氏也叔牙季友則以字矣宋戴衛齊則以諡矣司徒司馬則以官矣趙魏范韓則以邑矣蓋天子既命之曰齊魯侯業已胙土命氏而諸侯位卑無土可分故不命氏而命族久之則族亦氏也但不敢賜姓耳姓繫百世如周之支庶皆守姬姓其曰魯衛毛聃之名則子孫所别也謂之氏矣胙土命氏據封諸侯然耳亦有王臣不封者王亦或賜之族與諸侯之臣無異春秋尹氏武氏是已諸侯之臣卿乃得賜族蓋位登其極理合建家無駭卿也故翬請之有德薄未足建家則雖卿亦不賜族翬挾溺柔其後無聞未得族也國語稱黃帝之子二十五人其得姓者十二人天子之子不盡得姓諸侯之臣豈盡得族哉其士會之帑處秦者為劉氏伍員之子在齊為王孫氏如此之類非盡君賜子孫繁衍其流至于萬姓是又當别論也晉侯名周衛侯名鄭陳侯名吳衛侯名晉魯侯名宋皆以國為名者也或曰不以國謂不以本國耳婦人國下繫姓示不忘本且别他族齊薑衛姬葛嬴宋子之類是也有字下繫姓者齊女曰孟薑季薑宋女曰孟子仲子是也有諡下繫姓者莊薑聲子懷嬴文芈是也姬為周姓故王室及同姓之女皆曰某姬晉平公以同姓之女為嬪御故子産曰內有四姬後世不知遂以為侍妾之稱國䇿言幸姬如姬漢書言諸姬愛姬不辨為周姓矣惟娣姒之姒不以禹姓爾雅曰長婦謂稚婦為娣婦娣婦謂長婦為姒婦則自古已然婦人有名有字婚禮納采問名公羊傳笄而字之如宋元之母曰棄齊景之妃曰重是其名也伯姬叔姬伯叔是其字也匹配曰妃名通適妾故陳哀公有元妃二妃下妃魯惠公亦有元妃孟子元之一字兼始適二義故杜曰始適夫人若始而非適適而非始皆不得稱元孟任哀薑是已妃字則無尊卑之異雖大夫亦稱之禮曰以某妃配某氏是也其尊卑殊稱詳於曲禮天子曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻諸侯元妃既死禮無重娶之義而以元妃之姪娣為繼室故惠公繼室以聲子晉侯請繼室於齊是也大夫亦然傳曰臧宣叔娶於鑄而死繼室以其姪周諸王妃平王宜臼桓王琳紀季薑王后桓公九年逆莊王他王姚王妾生子頽僖王胡齊惠王閬陳媯王后生襄王及王子帶襄王鄭隗氏王后狄女頃王壬臣匡王班定王喻薑氏王后宣公六年逆簡王夷靈王泄心薑氏王后襄公十五年逆景王貴穆后王后生大子壽敬王丐魯諸公妃惠公孟子夫人聲子繼室生隱公仲子再娶夫人生桓公隱公息姑未詳桓公軌一名允文薑夫人生莊公及季友莊公十四嵗即位莊公同哀薑夫人叔薑生閔公孟任生子般成風生僖公閔公啓方未娶僖公申聲薑夫人生文公文公興出薑夫人生惡及視敬嬴生宣公叔肸宣公接一名倭穆薑夫人生成公及宋伯姬所杜氏曰計公衡之年成公又非穆薑生不知其母何氏也宣元年娶穆薑成二年公衡為質公衡成公子也如成公為穆薑所生未得有長成之男也成公黑肱齊薑夫人定姒生襄公四嵗即位襄公午敬歸生子野齊歸生昭公二十歲即位昭公稠孟子夫人定公宋定姒夫人生哀公哀公蔣公子荆之母嬖未詳何氏晉妃齊薑本武公妾獻公蒸之生秦穆姬及申生賈君獻夫人狐姬生文公小戎子生惠公驪姬生奚齊其娣生卓子以上獻妃梁嬴惠公妻生懷公文嬴文夫人逼姞文妃班在二生襄公季隗班在三生伯倏叔劉杜祁班在四生雍辰嬴即懷嬴班在九人生樂薑氏以上俱文妃穆嬴襄夫人生靈公悼夫人把女生平公少薑平公寵妾衛姬平公妾齊妃王姬襄夫人衛姬僖公之寵生桓公王姬徐嬴蔡姬以上三人桓夫人共姬即長衛姬生無虧少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生子雍以上六人桓諸妃子叔姬昭夫人生舍蕭同叔子惠妃生頃公聲孟子頃夫人生靈公顔懿姬靈夫人鬷聲姬生莊公仲子生牙戎子穆孟姬生景公以上靈諸妃燕姬景夫人鬻姒生荼胡姬重以上景妃季姬悼夫人秦妃穆姬穆夫人生康公及公子𢎞楚妃鄧曼武夫人息媯文夫人生堵敖成王秦嬴共夫人巴姬共王妾郹封人女平夫人生建秦嬴平納建之婦生昭公越女昭妃生惠王宋妃共姬共夫人生平公棄平妃生元公景曹元夫人衛妃莊薑莊夫人厲媯生孝伯戴媯生桓公上俱莊妃夷薑莊妾宣公蒸之生急子宣薑宣公納急子之妻為夫人生壽及惠公又昭伯蒸之生齊子戴公文公宋桓夫人許穆夫人定薑定夫人敬姒定妾生獻公宣薑襄夫人婤姶襄嬖生孟縶及靈公南子靈夫人呂薑莊夫人夏戊女出夫人鄭妃武薑武夫人生莊公及段鄧曼莊夫人生昭公雍姞莊妃生厲公及語陳媯子儀妃文公報之生子華子臧文芈文夫人薑氏江女生子士蘇女生子報俞彌燕姞生穆公以上文妃宋子穆妃生子然子孔圭媯穆妃生士子孔姚子穆妃生靈公夏姬陳妃鄭姬哀元妃生偃師二妃生留下妃生勝邾妃齊薑文元妃生定公晉姬文二妃生捷災諡法起于周前此未有也卒哭而諱將葬而諡周人以諱事神故諱則有諡白虎通言生有爵死有諡謂君卿大夫同也春秋之世吳越之君無諡闔廬勾踐是已秦楚宋鄭之卿無諡孟明子文華元子産是已晉衛之大夫無諡羊舌肸蘧瑗是已布德執義曰穆名與實爽曰繆秦伯任好三納晉君遂霸西戎宜稱穆矣而諸家謂其殺三良以殉故諡曰繆夫葬穆者康公也豈有故從其亂命而加以惡諡乎靈惡諡也春秋被弒之君如晉之夷臯陳之平國鄭之夷楚之虔咸諡曰靈楚成王諡靈不瞑共王曰為靈若厲其為惡諡也明矣然史稱周之東也王綱不振逮靈王周道始昌諸侯服從故左氏曰靈王生而有頿王甚神聖無惡于諸侯克終其世又似非惡諡也楚世家言熊通自立為楚武王則非諡法然恐亦臨文遷就之辭耳如周公謂伯禽曰我文王之子武王之弟成王之叔父伍子胥曰報爾平王當時周成楚平固在也史筆往往如此左氏亦有誤用者陳桓公方有寵於王惟一處而已春秋諡有三字者衛之貞惠文子也有生賜者衛侯之於北宮貞子析朱成子也有出奔而仍得諡者臧武仲中行文子也有作亂被誅而仍得諡者崔武子欒懷子也婦人無諡諡從其夫而已晉文嬴衛宣薑莊薑宋共姬秦穆姬之類是也亦有與夫異諡者如景之穆后桓之文薑莊之哀薑惠之繼室聲子成之妾定姒又不盡然卿之內子或亦殊諡孟穆伯之戴已聲已是也晉文公從亡之臣見於傳者狐偃趙衰顛頡魏犫胥臣狐毛賈他介之推凡八人鄭叔詹曰有三士足以上人國語宋公孫固曰晉公子父事狐偃師事趙衰長事賈他又説苑介子推懸書云五蛇從之左傳叔向曰有士五人諸説互異未詳所指傳曰驪姬之亂詛無畜羣公子故文公子雍在秦樂在陳黑臀在周襄公之孫談在周蓋諸子悉出他國懲驪姬之亂也雖成公復立公族而顯者亦少是後見于傳者惟揚干及憖耳昭十八年鄭人救火辭晉公子公孫于東門外是公族猶多在他國也晉卿十一族韓魏趙狐胥先郤欒范中行知也賈季奔狄而狐氏廢胥克有疾而胥氏廢先縠得罪而先氏廢欒郤廢趙而趙復興欒氏譖殺三郤而郤氏廢范宣子逐欒盈而欒氏廢知趙魏韓逐范中行氏而趙魏韓復共滅知伯是後遂為三晉矣韓氏其先與周同姓或曰韓萬曲沃莊伯之弟也晉獻封萬于韓原以為韓氏宣十二年景公以韓厥為司馬成三年晉作六軍使厥將新中軍賞鞍之功也十三年將下軍十八年繼欒書為政將中軍襄七年告老長子無忌有廢疾不得立讓于弟韓起使無忌掌公族大夫起佐上軍知罃稟厥以為政而悼公復霸昭二年起將中軍聘于魯觀書于大史氏曰周禮盡在魯矣十三年會于平丘二十八年卒定十三年韓不信同逐范中行氏不信之孫滅知伯再傳而侯侯六世而王王四世而秦滅之魏氏其先畢公髙之後也武王封弟高于畢以畢為姓其裔孫畢萬事晉晉獻公滅魏以封之卜偃曰其後必大萬盈數也魏大名也魏犫從亡文公以為戎右成十八年悼公即位以呂相魏頡為卿以魏絳為司馬襄三年絳佐新軍和諸戎十一年而有蕭魚之會公曰八年之中九合諸侯子之力也賜絳金石之樂十三年佐下軍十八年將之平公世也昭之五年魏舒佐上軍二十八年晉滅祁羊舌氏舒遂為政將中軍頃公十二年也定元年城成周卒十三年曼多同逐范中行氏後其子豹與韓趙共滅知伯傳斯而為列侯侯之孫稱王王六世而秦滅之趙氏其先與秦同祖至造父為周穆王御賜以趙城因以為姓七世孫叔帶去周事晉又五世而趙夙為獻公戎御賜之耿驪姬之難趙衰從重耳出亡文公反國以為原大夫僖二十七年晉作三軍欲以為卿趙衰辭三十一年晉作五軍衰將新上軍始為卿文二年襄公使佐中軍五年卒六年趙盾將中軍立靈公使趙穿為散卿宣二年公無道穿弒之大史書曰趙盾弒其君盾以趙括為公族大夫盾卒趙朔嗣立宣八年佐下軍十二年將之以括及趙嬰為中軍大夫趙同為下軍大夫成三年景公作六軍括佐新中軍趙旃佐新下軍嬰通於莊姬同括放之姬譖殺同括既景公用韓厥之言而立趙武焉悼公立以為卿佐新軍襄九年將之十二年將上軍二十五年將中軍相平公以為政傳曰再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于皆武之力也武退然如不勝衣其言呐呐然如不出諸口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉昭元年卒五年趙成佐中軍二十五年趙鞅合諸侯於黃父明年納敬王定十三年范中行攻鞅奔晉陽於是知韓魏氏共逐范中行氏而反鞅哀二十年子無恤嗣無恤與韓魏滅知伯其後侯者六世王者六世而秦卒滅之狐氏其先本唐叔之後别在戎狄為狐氏獻公娶二女於戎大戎狐姬生文公狐突以姬故事晉為大夫閔二年申生伐東山突為戎御二子狐毛狐偃從文公出亡懷公立召毛偃不至殺狐突及文公得國僖二十七年使毛將上軍偃佐之明年敗楚於城濮文六年襄公搜于夷使狐射姑將中軍趙盾為佐陽處父改搜而易之以射姑佐趙孟射姑怒及襄公卒射姑將迎公子樂于陳而立之趙盾不從殺公子樂于郫故射姑殺處父而奔狄狐氏亡胥氏胥臣食邑於臼曰臼季從文公出奔及反國使佐下軍文五年臣卒十二年趙盾使胥甲佐下軍宣元年放甲而立胥克八年克有蠱疾郤缺廢之胥氏亡先氏閔二年申生伐東山先友為右僖二十七年文公使先軫佐下軍二十八年將中軍上德也敗楚師於城濮文公為侯伯軫之功實大焉三十三年敗秦于殽獲三帥是秋免胄馳狄師而死狄人歸其元面如生襄公以其子先且居將中軍文五年卒七年先克佐中軍先蔑將下軍先都佐之初襄公之卒也趙盾使先蔑逆公子雍于秦既而背之故蔑奔秦九年都作亂殺克晉人殺都宣十二年先縠佐中軍邲之戰不用命而敗于楚十三年召赤狄將為亂景公殺之盡滅其族先氏亡郤氏晉公族也其先食邑于郤因氏焉至郤芮而受采于冀芮事夷吾及文公反國芮及呂甥將焚公宮公如河上秦穆公誘殺呂郤郤氏廢胥臣過冀見郤缺耨夫婦敬如賓言於文公而使為下軍大夫僖三十三年襄公立郤缺獲白狄子命為卿文十二年將上軍宣八年將中軍廢胥氏十二年郤克佐上軍十三年將之十六年佐中軍十七年將之成二年敗齊于鞍報其笑辱也十三年郤錡佐上軍郤至佐新軍十六年錡將上軍郤犫將新軍錡及至犫皆汰侈號三郤鄢陵之役至進六間之説而勝楚反役欒氏譖三郤而殺之郤氏亡欒氏亦公族也晉靖侯孫欒賓食采于欒因以為氏賓傅曲沃桓叔其子共叔事哀侯僖二十七年文公以欒枝將下軍文五年卒十二年欒盾將下軍宣十二年欒書佐下軍成二年將之從郤克以勝齊于鞍四年將中軍十六年勝楚于鄢陵十八年與中行偃弒厲公而立悼公以欒黶為公族大夫襄九年將下軍十六年平公使欒盈為公族大夫十八年佐下軍黶汰欒氏多怨盈又好施士丐畏之二十一年晉逐欒盈合諸侯以錮之盈入為亂二十三年克之欒氏亡范氏其先陶唐氏裔也在周為杜伯宣王殺杜伯其子隰叔奔晉為士師故為士氏士蒍為獻公除公族使為司空士縠嗣之文六年文公搜于夷將使縠將中軍先克不可八年作亂九年殺先克襄公殺縠靈公之立也士會奔秦既而復之宣十二年將上軍十六年滅赤狄甲氏留吁鐸辰景公請于王以黻冕命將中軍兼大傅明年先郤克而請老子士燮佐上軍成十三年將之十六年佐中軍反自鄢陵祈死而卒十八年悼公使士魴為卿士渥濁為大傅襄九年士丐佐中軍十三年魴卒將使丐將中軍讓於中行偃十九年將之二十三年克欒氏昭五年士鞅將下軍定元年將中軍十三年士吉射與中行寅作亂晉卿共逐之奔朝歌哀五年奔齊范氏亡中行氏本荀氏也荀林父將中行故為中行氏文七年佐上軍十二年佐中軍宣十二年將之敗于邲林父請死景公使復其位成十三年荀庚佐中軍十六年荀偃佐上軍襄九年將之十三年將中軍十四年伐秦十八年合諸侯同圍齊明年未至而卒昭元年荀吳將上軍敗無終及羣狄十二年滅肥二十二年滅鼓二十九年荀寅為下卿定公十三年與范氏作亂晉逐之中行氏亡知氏亦荀氏也與中行氏同宗荀首食采于知故别稱知氏宣十二年首為下軍大夫十三年佐上軍十七年佐中軍初楚之敗晉于邲也楚人囚知罃及首佐中軍乃以公子穀臣及襄老之尸易罃而歸之成十三年罃佐下軍襄九年將中軍輔悼公以為政明於戰陳之法三駕伐鄭遂復霸業罃之力也十三年卒昭五年荀盈佐下軍九年荀躒嗣之定十三年與韓魏趙共逐范中行氏其子荀瑤求地于三晉故三晉共滅之在春秋後知氏亡魯三桓孟孫叔孫季孫也慶父欲竊君位叔牙黨之季友鴆叔牙而立叔孫氏慶父縊而魯立孟孫氏友獲莒拿而立季孫氏此三桓之始也季孫氏自季友獲拿賜田而手文嘉名公輔上卿之兆始應至文子縱遂殺適而魯君失政武子專國而政逮大夫歷悼子平子而昭公見逐桓子嗣立而陽虎作亂康子奪適季氏漸衰原其初本以忠良之心除慶父而安魯國其後驕恣專國而家臣又專其家天之報施豈誣也哉叔孫氏僖四年戴伯侵陳為叔孫之始其子莊叔嗣之而惠伯别為叔仲氏莊叔黨遂殺適而惠伯死節穆叔則詛三軍以強公昭子則憂國而祈死成子繼之數年而卒叔牙之後有四善人皆不得志而莊叔弒君之子僑如通君之母豎牛餓父武叔毁聖亦足以報叔牙矣孟孫氏僖十五年公孫敖救徐而孟氏始至獻子之子它而别為子服氏其中文伯賢而死于父先惠叔孝而無後二子知禮而譖死雖以獻子之德莊子之孝僖子之講禮懿子之師聖而穆伯好色幾墜宗祀孝伯黜適以亂綱常其未免慶父之餘孽與春秋有兩蔡侯申一為文公一為昭公僅四世而同名必有一誤也有兩壽夢一為勾吳之君一為於越之大夫有兩庶其一為莒子一為邾婁之臣有兩子羽一為鄭行人一為衛行人有兩石乞一為衛人殺子路一為楚人事白公又如介子推晉臣也而又有行年十五而相荆者見説苑宛春楚行人也而又有進諫于衛靈公者見呂覽晉咎犯事文公者也而又有為平公參治國政者見説苑吳公子慶忌夫差之子也而又有王僚之子為要離所刺者見吳越春秋管子書載齊桓公之臣弦章説苑又載景公之臣弦章且傳中范宣子士丐士鞅之父也而士丐相士鞅又見于昭公之六年按杜注即士文伯豈與宣子乃同名哉然漢書古今人表復有兩士鞅一在中上一在中下相去不逺殆不可曉春秋經用周正而傳或參以夏時以經為孔子所筆削而傳則旁採傳記也周禮蒸以仲冬而魯蒸以正月時王之正月也定之方中夏之十月周之十二月而城楚丘乃書于來年之正月紀其成也何以見傳之參以夏時也四月取麥秋取禾是夏時矣穀鄧來朝經書夏傳記以春亦用夏時也而正月朔日南至傳顧以周正説傳亦何常之有若以孔子欲行夏時而遂謂春秋之經亦用夏正則二月無冰十月大雪又何必以異書哉抑又考之晉人城杞師曠曰會于承匡之嵗於今七十三年然自文十一年正月至襄三十年二月癸未實七十四年則與曠説違以長厯計之文十一年之三月乃甲子朔實夏之正月而合七十三年之數晉固用夏正矣左氏或據晉史不能盡革故十二月申生縊經書明年春十一月殺卓子經書明年正月冬殺丕鄭經書明年春經傳互異而杜氏每曰從赴夫赴必稱日月豈能更乎諸儒紛紛殊為無稽周歷春正月建子日南至土功畢殷十二月夏十一月二月建丑日在北陸藏冰殷正月夏十二月三月建寅啓蟄而郊殷二月夏春正月夏四月建卯日在降婁殷三月夏二月五月建辰日在西陸出氷火昏見殷四月夏三月六月建巳龍晨見東方而雩殷五月夏四月秋七月建午殷六月夏五月八月建未殷七月夏六月九月建申殷八月夏七月冬十月建酉始殺而嘗殷九月夏八月十一月建戌日在心龍晨見東方土功戒事殷十月夏九月十二月建亥火晨見土功致用閉蟄而蒸水昏正土功栽殷十一月夏十月分野之説古人每詳言之周禮保章之職既難考論而見於左氏內外傳者猶可類推也武王克商嵗在鶉火故伶州鳩曰歲之所在我周之分野也則鶉火為周分矣晉文即位歲受實沈故董因曰晉人是居則實沈為晉分矣襄二十八年歲淫玄枵禍衝于鳥尾周楚惡之則鶉尾為楚分矣昭十七年星見大辰梓慎知宋鄭之災曰宋大辰之虛也則大火為宋分矣獨其説有可疑者星紀北而吳越南井鬼南而秦居西虛危在北齊表東海降婁屬西魯宅曲阜或又以受封之始歲星所在為説然有絶而復續者封日既異前星又豈可據乎夫春秋戰國地域變遷三晉未分晉當何區秦拔西河魏當何屬周未東遷何故已直鶉火陳滅于楚何自而入韓分且中國幾何蠻夷戎狄豈日星所不臨哉天道在西北而晉不害越得歲而吳受其凶皆以歲星所在言之也然豕韋實衛晉何以吉吳越同野吳何以凶衛既水屬何故與宋陳鄭同火而禆竈先知之且顓頊之虛薑氏任氏實守其祀是又齊薛之分矣此皆不可曉者前哲要自有見也星名龍角亢也傳曰龍見而雩龍見而畢務天根氐也外傳曰天根見而水涸天駟房也外傳曰月在天駟大辰心也傳曰星孛大辰大火心也傳曰心為大火火伏而後蟄者畢龍尾尾也傳曰龍尾伏辰天策傅説星也傳曰天策焞焞析木之津箕斗間也傳曰今在析木之津星紀斗牽牛也傳曰嵗在星紀嫠女須女也傳曰星出嫠女玄枵虛危也傳曰淫于玄枵天黿虛危也外傳曰星在天黿蛇虛也傳曰蛇乘龍顓頊之虛虛也傳曰歲在顓頊之虛北陸虛危也傳曰日在北陸而藏冰大水營室也傳曰其星為大水娵訾之口室壁也傳曰歲在娵訾之口豕韋室壁也傳曰歲在豕韋降婁奎婁也傳曰降婁中而旦大梁昴畢也傳曰歲及大梁西陸昴畢也傳曰西陸朝覿而出之實沈參也傳曰實沈主參咮柳也傳曰咮為鶉火鶉火柳星張也傳曰鶉之賁賁鳥帑翼軫也傳曰以害鳥帑北斗紫微垣附近星也傳曰星孛入于北斗歲嵗星也漢天漢也傳曰西及漢孛妖星也彗妖星也傳曰齊有彗星易説變卦起于左氏如鄭伯廖論曼滿自豐上六變為離晉師救鄭自師初六變為臨子産論楚自復上六變為頥蔡墨論龍見自乾初九變為姤之類其説皆指一爻以立論耳若筮法則諸爻變動原無一定乃左氏所載悉不出一爻之變敬仲之觀六四變否畢萬之屯初九變比季友之大有六五變乾伯姬之歸妹上六變睽卜偃之大有九三變睽棠薑之困六三變大過穆子之明夷初九變謙婤姶之屯初九變比南蒯之坤六五變比晉救鄭之泰六五變需此十事更無變重爻者惟晉之遇復以全卦言而魯之艮之隨以六二不變爻取義豈春秋二百餘年遂無遇兩爻以上之變卦耶左氏失誣此可見之左傳引尚書以禹謨作夏書僖二十四年地平天成文七年戒之用休襄三年成允成功二十六年與其殺不辜哀十八年官占惟能蔽志皆大禹謨也臯陶謨亦作夏書莊八年臯陶邁種德臯陶謨也此二篇今實虞書以太甲作夏書昭十年欲敗度太甲篇也今實商書以洪範作商書文五年沈濳剛克襄三年無偏無黨皆洪範也今實周書雖古今敘書或有不同而太甲之為夏書更不可解杜氏釋傳往往以書辭為逸書則未見古文故也春秋賦詩斷章未必合於本詩之義皆取一章一句以寄意也左氏引詩以斷章義亦倣此其許穆夫人之賦載馳鄭人之賦清人秦人之賦黃鳥則作詩之始也僖公之時周王巡狩至于岱宗季孫行父為之請于周太史克作頌故詩有魯頌惟僖公而已逸詩翹翹車乘招我以弓豈不欲往畏我友朋我無所監夏后及商用亂之故民卒流亡俟河之清人壽幾何兆云詢多職競作羅雖有絲麻無棄菅蒯雖有姬薑無棄蕉萃凡百君子莫不代匱周道挺挺我心扄扄講事不令集人來定何以恤我我其收之禮義不愆何恤于人言淑慎爾止無載爾偽我之懷矣自詒伊戚子貢詩傳曰穆王西征祭公述民怨以諫作圻招是亦逸詩也祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心狐裘尨茸一國三公吾誰適從晉士蒍所作詩也國子賦轡之柔矣逸詩也汲冡周書録其辭曰馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣麃麃取與不疑河水僖二十三年晉重耳所賦茅鴟襄二十八年穆叔以諷慶封新宮昭二十五年宋公賦者右皆逸詩有篇名而逸其辭者如白華南陔之類也歌濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎聲伯夢歌我有圃生之把乎從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎鄉人歌南蒯既定爾婁豬盍歸吾艾豭野人歌南子景公死乎不與埋三軍之士乎不與謀師乎師乎何黨之乎萊人歌魯人之臯數年不覺使我高蹈唯其儒書以為二國憂齊人歌佩王繠兮余無所繫之旨酒一盛兮余與褐之父睨之申叔乞糧云云傳亦不言歌謳睅其目皤其腹棄甲而復于思于思棄甲復來宋城者謳牛則有皮犀兕尚多棄甲則那驂乘從其有皮丹漆若何役人澤門之晳實興我役邑中之黔實慰我心宋築者謳誦原田每每舍其舊而新是謀晉輿人臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾魯人取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之鄭人誦子産二章謠丙之晨龍尾伏辰均服振振取虢之旗鶉之賁賁天策焞焞火中成軍虢公其奔晉伐虢謠鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢逺哉遙遙裯父喪勞宋父以驕鸜鵒鸜鵒往歌來哭魯童謠銘余掖殺國子莫余敢止禮至銘一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是粥於是以糊余口正考父鼎銘昧旦丕顯後世猶怠讒鼎銘針芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處德用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞人針民生在勤勤則不匱楚針繇詞鳯皇于飛和鳴鏘鏘有媯之後將育於薑五世其昌並於正卿八世之後莫之與京懿氏專之渝攘公之羭一薰一蕕十年尚猶有臭晉獻公兆如山陵有夫出征而喪其雄衛孫文子其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌楚丘父卜成季是謂沈陽可以興兵利以伐薑不利子商晉救鄭如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰衛卜夢以上卜詞士刲羊亦無􅎺也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車説其輹火焚其旗不利行師敗於宗丘歸妹睽孤冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虛晉嫁伯姬南國蹙射其元王中厥目晉伐楚千乘三去三去之餘獲其雄狐秦伐晉同復于父敬如君所魯筮成季以上筮詞雜詞有酒如淮有肉如坻寡君中此為諸侯師晉中行穆子有酒如澠有肉如陵寡人中此與君代興齊景公右投壺詞登此昆吾之虛綿綿生之瓜余為渾良夫呌天無辜衛侯夢渾良夫譟諺古人之言附山有木工則度之賓有禮主則擇之匹夫無罪懷璧其罪心苟無瑕何恤乎無家輔車相倚脣亡齒寒心則不競何憚於病庇焉而縱尋斧焉畏首畏尾身其餘幾鹿死不擇音雖鞭之長不及馬腹高下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢民之多幸國之不幸也殺老牛莫之敢尸非宅是卜惟鄰是卜雖有挈瓶之知守不假器其父析薪其子弗克負荷室于怒市于色臣一主二無過亂門嫠不恤其緯而憂宗周之隕為將及焉唯食忘憂民保于信無穢虐士飛矢在上走驛在下誄旻天不弔不憗遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律哀公誄孔子仲尼一誄諸書互見不同禮檀弓云天不遺耆老莫相余位焉嗚呼哀哉尼父五行志云昊天不弔不憗遺一老俾屏余一人惟世家與左傳同策命舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命襄王命管仲王謂叔父敬服王命以綏四國糾逖王慝襄王命晉文公昔伯舅太公右我先王股肱周室師保萬民世祚大師以表東海王室之不壞繄伯舅是賴今余命女環兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命靈王賜命齊靈公叔父陟恪在我先王之左右以佐事上帝余敢忘高圉亞圉景王追命衛襄公盟辭渝盟無享國魯鄭結祊成皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而玄孫無有老幼晉文公盟踐土天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛衛人盟宛濮恤病討二晉盟清丘我無爾詐爾無我虞楚平宋凡晉楚無相加戎好惡同之同恤災危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討不庭有渝此盟明神殛之俾隊其師無克祚國晉楚盟于宋凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家晉悼公盟亳同討不庭晉平公盟湨梁戮力一心好惡同之信罪之有無繾綣從公無通外內昭公盟從者踐土之盟曰各復舊職平丘之盟曰無或失職黃池之盟曰好惡同之雖不見本年而互見諸篇若葵丘之五命則詳於孟子禱辭齊環怙恃其險負其衆庶棄好背盟陵虐神主曾臣彪將率諸侯以討焉其官臣偃實先後之苟捷有功無作神羞官臣偃無敢復濟唯爾有神裁之晉荀偃伐齊濟河曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛衛大子戰鐡誓辭范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車朴馬無入于兆下卿之罰也趙簡子鐡戰凡誓辭稱有如日有如河有如皎日有如白水有若大川皆取心之明白也有如上帝有如先君言上帝先君之見其心也軍志古書也其辭曰先人有奪人之心後人有待其衰凡二見宣十二昭二十一又曰允當則歸僖二十八鄭書古書也或曰鄭史其辭曰安定國家必大焉先襄三十又曰惡直醜正實蕃有徒昭二十八呼庚癸呼餘皇麥麴河魚皆軍中隱語也虞殯送葬之歌也見哀公十一年挽歌不始於田橫之客矣左氏字義謂止戈為武反正為乏皿蟲為蠱今人所知也亥有二首六身今人不知也用字之異者宋公靳之戲而相愧曰靳繩息媯繩譽也猶懼不蔇蔇至也見孟任從之閟閟不從也既合而來奔合答也楚人惎之脫扄惎教也以蕆陳事蕆敕也屈蕩尸之尸止也方震大叔震懷胎也則朝而塴塴下棺也子無我迋迋恐也楚師熸熸火滅也鑋而乘于他車鑋一足行也弄馬之故隱君身隱憂也惎間王室惎毒也咋謂林楚咋暫也或曰大聲雨不克襄事襄成也是躗言也躗謬也過也君將嗀之嗀嘔吐也以上叛下亦曰叛王叛王孫蘇是也男子喪妻亦曰寡崔杼生成及強而寡是也男亦曰媵以井伯媵秦穆姬是也至公羊謂昭公欲弒季氏則以上殺下亦可曰弒矣雪曰雨雪螽曰雨螽凡自上下者皆曰雨十月為良月傳曰就盈數焉胡耉壽也七十曰耋九十曰耄少君猶小君也上曰蒸下曰淫旁曰通季父之妻曰報易妻曰通室在牀曰尸在棺曰柩見曲禮車馬曰賵貨財曰賻衣被曰襚見公羊貝玉曰含見穀梁野饋曰餫弔亡曰唁遽傳馹皆今驛也文十六年楚子乘馹成五年以傳告伯宗昭二年乘遽而至師曰簡馬牛曰索皆言精也遺人以物曰問問子貢以弓問弦多以琴私旋皆小便也傳曰夷射姑旋焉師慧將私焉淖濘皆泥也傳曰有淖於前馬還濘刑名轘車裂轘高渠彌刖斷足刖強鉏又曰鬻拳自刖刖者之屨曰踊梏械手鬭射師諫執而梏之囚囚聃伯又曰管仲請囚圄亦囚也圄伯嬴鞭貫耳鞭七人貫三人耳尸磔膊亦磔也抶擊以撲抶職縶拘也南冠而縶醢齊人醢夙沙衛衛人醢子路古極刑也劓後者劓馘割耳炮燔炮郤宛敲奪之杖以敲之蔡流也殺管叔而蔡蔡叔亨烹同亨石乞軍獲曰俘毒死曰鴆自經曰縊餓死曰殣刎曰自剄一擊而死曰殪不以壽終曰鮮弗良死曰強死祈死者士燮叔孫婼不瞑者楚成王晉荀偃楚文王有僕區之法晉丹書以著罪鄭子産鑄刑書鄧析為竹刑今有鄧析子書陳名魚麗之陳鄭莊公禦王也有右拒左拒中軍先偏後伍伍承彌縫荆尸楚陳名也武王伐隨為之莊王因之軍行右轅左追蓐前茅慮無中權後徑君之戎分為二廣廣有一卒卒偏之兩崇卒中行穆子敗羣狄也五乘為三伍為伍乘以相離兩於前伍於後專為右角參為左角偏為前拒伐衛之陳齊莊公作也有先驅申驅二廣啓胠大殿楚田獵之陳宋公為右盂鄭伯為左盂鄭翩為鸛其御為鵝越子句卒衛支離之卒皆陳名也覆伏兵也衷中也衡陳橫也簡師精也羸師弱也凡步曰卒車曰乘古者兵車一乘甲士三人卒七十二人自荀吳毁車為行始用步戰然魏舒曰彼徒我車是狄先用卒矣隱之九年北戎侵鄭鄭伯曰彼徒我車是戎又更先用卒矣服牛乘馬以駕車古無單乘者故古書無騎字左師展將以昭公乘馬而歸蓋單騎之漸襄公二十四年楚子以舟師伐吳此水戰之始至哀公十年吳徐承帥舟師將自海入齊又海舟之始也拜賜之師遷延之役泛舟之役皆當日所名也曲禮約信曰誓涖牲曰盟盟者要言以昭神也凡合諸侯者必割牛耳取其血歃之以盟敦以盛血盤以盛耳讀其載書以次乃歃既歃乃坎牲加書而埋之其盟神則無復定限故襄十一年傳稱司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖也其歃必取血及耳以手執玉敦之血進之於口定八年捘衛侯之手及捥襄九年口血未乾是也盟用牛耳卑者執之尊者涖之故鄟澤之盟衛侯請執牛耳發陽之役衛石魋蒙之盟魯孟武伯皆小國執牛耳也唯鄫衍之役吳以大國執之不合盟禮故孟彘不從凡盟牲用牛而莊三十二年孟任割臂盟公定四年割子期之心哀十五年輿豭從之十六年輿豭從已是倉卒又不必盡用牛矣春秋王侯之享年久者周平王五十一年齊景公五十八年楚武王五十一年把桓公六十年滕宣公七十餘年許穆公小邾穆公皆五十餘年邾文公五十一年遷繹而卒不為不吉也善星文者晉士文伯鄭裨竈魯梓慎皆詳於傳時有宋子韋不見左氏而别詳于鴻烈説苑拾遺記諸書能相人者周內史叔服識牛鳴者介葛盧勇力者南宮長萬之破犀革圉人犖之投蓋于稷門郰人紇之抉縣門狄虒彌之自成一隊秦堇父之登城隊而復上者三顔高之弓六鈞狼瞫之斬囚爭右先軫之免胄馳狄叔山冉之搏人以投高固之桀石以投人干犫之請一矢熊宜僚之當五百人子期之抉豫章殺人慶舍之援桷動于甍如此之類事固甚竒左氏形容曲盡其妙善射者多養由基為最射徹七札射呂錡以一矢復命淮南子曰楚有白猿王射之則搏矢而嬉使養由基射之始調弓矯矢而猿抱柱號矣形貌則晉文公駢脅合幹宋華元睅目出目皤腹大腹于思多鬢之貌宋子罕黔黑色皇國父晳白晳齊陳武子白晳鬒鬚睂甚口大口楚穆王蜂目而豺聲越椒熊虎之狀豺狼之聲宋公子鮑美而艷元公惡而婉大子痤美而很惡貌醜也晉叔虎美而有勇力伯石豺狼之聲齊陳豹長而上僂望視衛渾良夫長而美孟縶足不良弱行跛也鄭鬷蔑賈大夫俱惡魯豎牛黑而上僂深目而豭喙叔孫氏之子穀梁傳季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時而聘於齊杜預云行父跛又長狄身橫九畝斷其首而載之睂見于軾婦人形貌則孔父之妻美而艷宋芮司徒女赤而毛長而美手文則唐叔曰虞成季曰友仲子曰為魯夫人石經古文虞作魯作􅨞手文或似之衣飾則楚子玉瓊辨玉纓鄭子臧鷸冠晉郤至韎韋之跗注齊東郭書晳幘而衣貍製衛渾良夫紫衣狐裘雨衣曰製左右異色曰偏衣軍中上下同服曰均服籃縷敝衣也遊服常服也鞶鑑以鑑飾帶也縞帶吳地所貴紵衣鄭地所貴故子産季札以相贈也婦人之衣曰蒙衣其近身衣曰衵服左氏近誣先儒既言之矣即以鬼神論之方伯有之報帶段也國人恐矣然伯有之出乃子晳攻之而始伐之今不先報晳而顧急殺段何耶且申生之死驪姬譖之也而徒知報惠公之改葬楚成之死本大子商臣所弒也而徒知以不瞑爭諡皆昧於輕重矣他如柩聲如牛老人結草秦諜六日而蘇之類皆小説家之談而左氏不免況後世之史書乎言夢左氏蓋屢見之夢天使者燕姞趙嬰夢河神者子玉夢祖先者衛成及孔成之夢康叔曹人之夢振鐸昭公之夢襄公韓宣之夢文公荀偃之夢厲公夢鬼物者晉景之夢大厲夢二豎平之夢黃熊鄭人之夢伯有衛侯之夢渾良夫至於叔孫之夢天壓已宋昭公之夢已為大鳥則幻極矣衛侯之夢譟聲伯之夢歌則竒甚矣昭七年一歲而言夢者四晉景公一卒而敘夢者三則煩甚矣物怪則豕人立內外蛇鬭蛇出泉宮虎乳子文鳥鳴出出石言龍鬬雄雞斷尾龍見絳郊左氏之誣在是其章句之妙亦在是車名廣車軘車皆兵車也轏士車即棧車也犀軒卿車也魚軒飾以魚也衝戰車也巢車車上望櫓也亦曰樓車有障曰藩有衣曰蔥靈篳路柴車也衷甸一轅亦卿車也韅靷鞅靽車乘之飾也美澤可鑑言其美也舟名吳有餘皇比舟為梁曰造舟鼎名郜鼎莒方鼎甲文鼎讒鼎吳壽夢鼎衛舒鼎晉鑄刑鼎鐘名鄭有襄鐘衛有大呂晉有姑洗季武子鑄林鐘鼓名晉有密須之鼓琴名魯齊薑有頌琴猶言雅琴也劒名吳有屬鏤虞叔有寶劒弓名魯有封父之繁弱楚有大屈弓無緣者曰弭弓衣曰韜矢名魯有金僕姑矢之善者曰菆矢桶曰冰亦曰房甲名晉有闕鞏之甲旗名趙簡子有蜂旗齊有靈姑鉟鄭有蝥弧玉名魯有龍輔璠璵韓宣子有玉環晉有埀棘之璧崔氏有拱璧周有寶圭魯有夏后氏之璜衛向魋亦有之爾雅肉倍好謂之璧肉好若一謂之環肉邊好孔也雙玉曰玨器名齊以紀甗玉磬賂晉燕以瑤甕玉櫝斝耳賂齊鄭有瓘斝玉瓉魯昭公賜子家雙琥一環一璧輕服鄭賂晉以歌鐘鎛磬周有魯壺以人賄者魯賂楚以執斫執緘執紝皆百人鄭賂晉以師悝師觸師蠲又賂宋以師筏師慧請帶請冠皆求賂也衛賂叔鮒一篋錦季孫賂梁丘據幣錦二兩縳一如瑱木名則晉首山有翳桑多蔭桑也楚朝有豫章大木也趙盾之庭有槐季氏之家有嘉樹鳥名則五鳩祝鳩瞗鳩鳲鳩爽鳩鶻鳩也詳傳中五雉杜曰雉有五種鷷雉鶅雉翟雉鵗雉翬雉九扈扈有九種春扈鳻鶞夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃鳩雉扈少昊用以名官爰居海鳥茅鴟鸜鵒鷸鷁皆鳥名也獸名則渾敦窮竒檮杌叨餮封豕皆取惡獸為喻也於莵楚人謂虎也臯比虎皮也婁豬求子豬也艾豭老牡豕也燧象者以火繫象尾如田單火牛之類也犀似豕兕似牛麇多為災熊蹯難熟鼠有螫毒曰鼷鼠馬名則鄭有小駟唐有肅爽衛有啓服晉有屈産之乘畫馬為文曰文馬宋景公朱白馬之尾鬛犬名則晉有獒犬之狂曰瘈狗叔孫有吠狗龜名則衛有成之昭兆魯臧氏有大蔡僂句蟲名則有螽螟蜚􅈮螽始生曰蝝左傳事緯前集卷六
