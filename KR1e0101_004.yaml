body:
  text: 左傳事緯卷四靈璧知縣馬驌撰晉靈之弒文六年靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四德者難必抒矣賈季曰不如立公子樂辰嬴嬖於二君立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓逼姞而上之以狄故讓季隗而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士會如秦逆公子雍賈季亦使召公子樂於陳趙孟使殺諸郫七年秦康公送公子雍於晉曰文公之入也無衛故有吕郤之難乃多與之徒衛穆嬴日抱大子以啼於朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之步招御戎戎津為右及堇隂宣子曰我若受秦秦則賓也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起戊子敗秦師於令狐至於刳首己丑先蔑奔秦士會從之先蔑之使也荀林父止之曰夫人大子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章又弗聽及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也士會在秦三年不見士伯其人曰能亡人於國不能見於此焉用之士季曰吾與之同罪非義之也將何見焉及歸遂不見秋八月齊侯宋公衛侯陳侯鄭伯許男曹伯會晉趙盾盟於扈晉侯立故也公後至故不書所會凡會諸侯不書所會後也後至不書其國辟不敏也八年夏秦人伐晉取武城以報令狐之役晉人以扈之盟來討冬襄仲會晉趙孟盟於衡雍報扈之盟也遂會伊雒之戎書曰公子遂珍之也十年春晉人伐秦取少梁夏秦伯伐晉取北徴十二年秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賓答曰寡君願徼福於周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師於河曲叟駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士會曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰於河十二月戊午秦軍掩晉上軍趙穿追之不及反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見也叟駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕十三年春晉侯使詹嘉處瑕以守桃林之塞晉人患秦之用士會也夏六卿相見於諸浮趙宣子曰隨會在秦賈季在狄難日至矣若之何中行桓子曰請復賈季能外事且由舊勳郤成子曰賈季亂且罪大不如隨會能賤而有恥柔而不犯其知足使也且無罪乃使魏壽餘偽以魏叛者以誘士會執其帑於晉使夜逸請自歸於秦秦伯許之履士會之足於朝秦伯師於河西魏人在東壽餘曰請東人之能與夫二三有司言者吾與之先使士會士會辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之以策曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏宣元年晉人討不用命者放胥甲父於衛而立胥克先辛奔齊二年晉靈公不君厚斂以雕牆從臺上彈人而觀其避丸也宰夫胹熊蹯不熟殺之置諸畚使婦人載以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也會請先不入則子繼之三進及溜而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈唯羣臣賴之又曰衮職有闕惟仲山甫補之能補過也君能補過衮不廢矣猶不改宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死秋九月晉侯飲趙盾酒伏甲將攻之其右提彌眀知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉眀搏而殺之盾曰棄人用犬雖猛何為鬭且出提彌眀死之初宣子田於首山舍於翳桑見靈輒餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉置諸槖以與之既而與為公介倒戟以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也乙丑趙穿攻靈公於桃園宣子未出山而復大史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰嗚呼我之懷矣自貽伊戚其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免宣子使趙穿逆公子黑臀於周而立之壬申朝於武宫居乎數千載之下其事不可見也趙盾之獄亦難言矣弒君之賊明書於經而傳謂趙穿何居無己則穿之弒而盾之謀乎靈為不道斗摮膳宰其行事誠不足以為人君雖然豈天性哉君在襁褓未聞誨訓盾秉國政霸業以衰楚人曰北方可圖鄭人曰晉不足與非盾罪乎族子得兵先樹黨與君既不仁臣又不遜至禍成伏甲而踆犬絶頷曰君之獒不如臣之獒也豈人臣禮哉乃左氏述孔子之言曰趙盾良大夫也為法受惡惜也越竟乃免此必非孔子之言也夫盾若與聞乎弒即至海外猶將罪之詎以越竟免哉且盾之於人積不能容先都箕鄭之流咸以私憾而除之矣董狐直書豈反能忍是又知必無其事而趙盾弒其君斷為孔子書法也鄭靈之弒宣四年楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譖子家子家懼而從之夏弒靈公書曰鄭公子歸生弒其君夷權不足也君子曰仁而不武無能達也凡弒君稱君君無道也稱臣臣之罪也鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公將去穆氏而舍子良子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為乃舍之皆為大夫十年鄭子家卒鄭人討幽公之亂斫子家之棺而逐其族改葬幽公諡之曰靈弒君之事可未同而謀哉且以一饌之隙而至於大逆為人君者不亦難乎知必有所由矣歸生自大棘戰勝以來權勢驕恣其君必有不能堪者子公故敢伺釁而動也子公欲弒必與歸生謀之是歸生能制子公矣不制之而反從之其蓄志寧一日哉斫棺逐族鄭人要自有公論也楚越椒之亂文九年冬楚子越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也宣四年初楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大戚及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及令尹子文卒鬭般為令尹子越為司馬蒍賈為工正譖子揚而殺之子越為令尹已為司馬子越又惡之乃以若敖氏之族圄伯嬴於轑陽而殺之遂處蒸野將攻王王以三王之子為質焉弗受師於漳澨秋七月戊戌楚子與若敖氏戰於臯滸伯棼射王汰輈及鼓跗著於丁寧又射汰輈以貫笠轂師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏初若敖娶於鄖生鬭伯比若敖卒從其母畜於鄖淫於鄖子之女生子文焉鄖夫人使棄諸夢中虎乳之鄖子田見之懼而歸夫人以告遂使收之楚人謂乳穀謂虎於菟故命之曰鬭穀於菟以其女妻伯比實為令尹子文其孫針尹克黃使於齊還及宋聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生楚莊初立外有庸麇百濮之虞內有儀燮越椒之亂國亦稱多故矣而皆不能為患者莊有以勝之也史謂莊之立也左鄭姬右越女坐鐘鼓之間三年不出號令伍舉進諫乃罷淫樂而聽政是蓋三年之內楚政方怠故庸濮儀燮乘隙交起至乎子越之亂則在三年之外矣勵政方新首干憲典宜其不能久也子文具知幾之哲良不能從卒為大患及若敖滅王為立後以勸善焉雖曰善人有後厥為天道而莊王之權謀霸略實見於此其為楚之雄主也不亦宜乎陳靈之弒宣九年陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲於朝泄冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶孔子曰詩云民之多辟無自立辟其泄冶之謂乎十年陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廄射而殺之二子奔楚十一年冬楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徴舒轘諸栗門因縣陳陳侯在晉申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弒其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徵舒弒其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懷而與之也乃復封陳鄉取一人焉以歸謂之夏州故書曰楚子入陳納公孫寧儀行父於陳書有禮也株林澤陂風詩所以刺靈公也其亦孔之醜哉靈公無道政令怠荒火覿而道猶茀水涸而梁不成築臺夏南奪時廢事蓋非止淫亂而已且病民焉已則病民而朝夕説駒於株野政由夏氏又焉免其弒逆乎泄冶知亡昧死直諫使從其言則君不沒於夏南國不夷於九縣諫之益也愈於比干矣二子助惡不悛卒成廄中之禍春秋於此實深痛之楚人專伺中國乘釁而動其素智也莊王圖霸鷙乎成穆辰陵之盟陳成公業已從事矣無端而受孔儀之訟宣言討罪輒欲有陳詐以濟貪亦何恤乎神明之後也輿論不協猶立夏州婦淫不誅而納其亂臣其不合於霸討也明矣夫徵舒大逆陳不能討莊王車裂以徇斯誠快舉也然而孔儀逄惡擅殺忠臣其罪寧宜末減哉既誅夏南以謝陳靈亦當誅孔儀以謝泄冶乃狃於二子之先託強納於陳以亂人國左氏以為有禮無乃春秋所不許與楚莊爭霸宣元年宋人之弒昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟於晉又會諸侯於扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟於楚陳共公之卒楚人不禮焉陳靈公受盟於晉秋楚子侵陳遂侵宋晉趙盾帥師救陳宋會於棐林以伐鄭也楚蒍賈救鄭遇於北林囚晉解揚晉人乃還晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競於楚二年春鄭公子歸生受命於楚伐宋宋華元樂呂御之二月壬子戰於大棘宋師敗績囚華元獲樂呂及甲車四百六十乘俘二百五十人馘百人狂狡輅鄭人鄭人入於井倒戟而出之獲狂狡君子曰失禮違命宜其為禽也戎昭果毅以聽之之謂禮殺敵為果致果為毅易之戮也將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉詩所謂人之無良者其羊斟之謂乎殘民以逞宋人以兵車百乘文馬百駟以贖華元於鄭半入華元逃歸立於門外告而入見叔牂曰子之馬然也對曰非馬也其人也既合而來奔宋城華元為植巡功城者謳曰其目皤其腹棄甲而復于思于思棄甲復來使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡夏晉趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚鬬椒救鄭曰能欲諸侯而惡其難乎遂次於鄭以待晉師趙盾曰彼宗競於楚殆將斃矣姑益其疾乃去之三年晉侯伐鄭及郔鄭及晉平士會入盟楚子伐陸渾之戎遂至於雒觀兵於周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逄不若魑魅罔兩莫能逄之用能協於上下以承天休桀有昏德鼎遷於商載祀六百商紂暴虐鼎遷於周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也夏楚人侵鄭鄭即晉故也四年冬楚子伐鄭鄭未服也五年楚子伐鄭陳及楚平晉荀林父救鄭伐陳六年春晉衛侵陳陳即楚故也楚人伐鄭取成而還是為厲之役七年春衛孫桓子來盟始通且謀會晉也鄭及晉平公子宋之謀也故相鄭伯以會冬盟於黑壤王叔桓公臨之以謀不睦晉侯之立也公不朝焉又不使大夫聘晉人止公於會盟於黃父公不與盟以賂免故黑壤之盟不書諱之也八年陳及晉平楚師伐陳取成而還九年會於扈討不睦也陳侯不會晉荀林父以諸侯之師伐陳晉侯卒於扈乃還楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師於柳棼國人皆喜唯子良憂曰是國之災也吾死無日矣十年鄭及楚平諸侯之師伐鄭取成而還楚子伐鄭晉士會救鄭逐楚師於潁北諸侯之師戍鄭十一年春楚子伐鄭及櫟子良曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟於辰陵陳鄭服也楚左尹子重侵宋王待諸郔令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平板幹稱畚築程土物議逺邇略基趾具餱糧度有司事三旬而成不愆於素厲之役鄭伯逃歸自是楚未得志焉鄭既受盟於辰陵又徼事於晉十二年春楚子圍鄭旬有七日鄭人卜行成不吉卜臨於大宫且巷出車吉國人大臨守陴者皆哭楚子退師鄭人修城進復圍之三月克之入自皇門至於逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福於厲宣桓武不泯其社稷使改事君夷於九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟子良出質夏六月晉師救鄭荀林父將中軍先縠佐之士會將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之楚歸而動不後隨武子曰善會聞用師觀釁而動德刑政事典禮不易不可敵也不為是征楚軍討鄭怒其二而哀其卑叛而伐之服而舍之德刑成矣伐叛刑也柔服德也二者立矣昔嵗入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸而舉商農工賈不敗其業而卒乘輯睦事不姦矣蒍敖為宰擇楚國之令典軍行右轅左追蓐前茅慮無中權後徑百官象物而動軍政不戒而備能用典矣其君之舉也內姓選於親外姓選於舊舉不失德賞不失勞老有加惠旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣德立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競惟烈撫弱耆昧以務烈所可也彘子曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵強而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟知莊子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有力以如己也故曰律否臧且律竭也盈而以竭夭且不整所以凶也不行之謂臨有帥而不從臨孰甚焉此之謂矣果遇必敗彘子尸之雖免而歸必有大咎韓獻子謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也事之不捷惡有所分與其專罪六人同之不猶愈乎師遂濟楚子北師次於郔沈尹將中軍子重將左子反將右將飲馬於河而歸聞晉師既濟王欲還嬖人伍參欲戰令尹孫叔敖弗欲曰昔嵗入陳今兹入鄭不無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔為無謀矣不捷參之肉將在晉軍可得食乎令尹南轅反斾伍參言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聽而無上衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之次於管以待之晉師在敖鄗之間鄭皇戍使如晉師曰鄭之從楚社稷之故也未有二心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗彘子曰敗楚服鄭於此在矣必許之欒武子曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申警之于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路藍縷以啓山林針之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不德而徼怨於楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩右廣初駕數及日中左則受之以至於昏內官序當其夜以待不虞不可謂無備子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙括趙同曰率師以來唯敵是求克敵得屬又何俟必從彘子知季曰原屏咎之徒也趙莊子曰欒伯善哉實其言必長晉國楚少宰如晉師曰寡君少遭閔凶不能文聞二先君之出入此行也將鄭是訓定豈敢求罪於晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人敢拜君命之辱彘子以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹於鄭曰無辟敵羣臣無所逃命楚子又使求成於晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜晉鮑癸當其後使攝叔奉麋獻焉曰以嵗之非時獻禽之未至敢膳諸從者鮑癸止之曰其左善射其右有辭君子也既免晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還楚潘黨逐之及滎澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給於鮮敢獻於從者叔黨命去之趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往郤獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也師無成命多備何為士季曰備之善若二子怒楚楚人乘我喪師無日矣不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也彘子不可士季使鞏朔韓穿帥七覆於敖前故上軍不敗趙嬰齊使其徒先具舟於河故敗而先濟潘黨既逐魏錡趙旃夜至於楚軍席於軍門之外使其徒入之楚子為乘廣三十乘分為左右右廣雞鳴而駕日中而説左則受之日入而説許偃御右廣養由基為右彭名御左廣屈蕩為右乙卯王乘左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳晉人懼二子之怒楚師也使軘車逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我詩云元戎十乘以先啓行先之也軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動工尹齊將右拒卒以逐下軍楚子使唐狡與蔡鳩居告唐惠侯曰不穀不德而貪以遇大敵不穀之罪也然楚不克君之羞也敢藉君靈以濟楚師使潘黨率遊闕四十乘從唐侯以為左拒以從上軍駒伯曰待諸乎隨季曰楚師方壯若萃於我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗王見右廣將從之乘屈蕩尸之曰君以此始亦必以終自是楚之乘廣先左晉人或以廣隊不能進楚人惎之脫扄少進馬還又惎之拔斾投衡乃出顧曰吾不如大國之數奔也趙旃以其良馬二濟其兄與叔父以他馬反遇敵不能去棄車而走林逢大夫與其二子乘謂其二子無顧顧曰趙叟在後怒之使下指木曰尸女於是授趙旃綏以免明日以表尸之皆重獲在木下楚熊負羈囚知罃知莊子以其族反之厨武子御下軍之士多從之每射抽矢菆納諸厨子之房厨子怒曰非子之求而蒲之愛董澤之蒲可勝既乎知季曰不以人子吾子其可得乎吾不可以苟射故也射連尹襄老獲之遂載其尸射公子穀臣囚之以二者還及昏楚師軍於邲晉之餘師不能軍宵濟亦終夜有聲丙辰楚重至於邲遂次於衡雍潘黨曰君盍築武軍而收晉尸以為京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之又作武其卒章曰耆定爾功其三曰鋪時繹思我徂惟求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉能定功所違民欲猶多民何安焉無德而強爭諸侯何以和衆利人之幾而安人之亂以為己榮何以豐財武有七德我無一焉何以示子孫其為先君宮告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又可以為京觀乎祀於河作先君宮告成事而還鄭伯許男如楚秋晉師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬬况國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位冬楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰師人多寒王巡三軍拊而免之三軍之士皆如挾纊遂傅於蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目於眢井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之晉原縠宋華椒衛孔達曹人同盟於清丘曰恤病討二於是卿不書不實其言也宋為盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之十三年夏楚子伐宋以其救蕭也君子曰清丘之盟唯宋可以免焉秋赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族君子曰惡之來也已則取之其先縠之謂乎清丘之盟晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰苟利社稷請以我説罪我之由我則為政而亢大國之討將以誰任我則死之十四年春孔達縊而死衛人以説於晉而免遂告於諸侯曰寡君有不令之臣達搆我敝邑於大國既伏其罪矣敢告衛人以為成勞復室其子使復其位夏晉侯伐鄭為邲故也告於諸侯搜焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良於楚鄭伯如楚謀晉故也鄭以子良為有禮故召之楚子使申舟聘於齊曰無假道於宋亦使公子馮聘於晉不假道於鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劔及於寢門之外車及於蒲胥之市秋九月楚子圍宋孟獻子言於公曰臣聞小國之免於大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公説十五年春公孫歸父會楚子於宋宋人使樂嬰齊告急於晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之強能違天乎諺曰髙下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許二而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之祿也寡君有信臣下臣獲考死又何求楚子舍之以歸夏五月楚師將去宋申犀稽首於王之馬前曰毋畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以㸑雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞成公三年春諸侯伐鄭次於伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戍如楚獻捷晉人歸楚公子穀臣與連尹襄老之尸於楚以求知罃於是荀首佐中軍矣故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也臣實不才又誰敢怨王曰然則德我乎對曰二國圖其社稷而求紓其民各懲其忿以相宥也兩釋纍囚以成其好二國有好臣不與及其誰敢德王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無德不知所報王曰雖然必告不穀對曰以君之靈纍臣得歸骨於晉寡君之以為戮死且不朽若從君之惠而免之以賜君之外臣首首其請於寡君而以戮於宗亦死且不朽若不獲命而使嗣宗職次及於事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也王曰晉未可與爭重為之禮而歸之荀罃之在楚也鄭賈人有將置諸褚中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂適齊病霸者楚也春秋何為而豫莊王乎晉政日怠諸夏離叛相與俯首而服楚焉辰陵之役經無貶詞説春秋者遂居然以霸目楚子矣嗚呼聖人豈得已哉晉自靈公無道文襄霸衰盟會皆出於大夫趙盾驟諫不入卒有弒逆之禍然猶曰晉侯弱故也諸侯失望久矣至乎成公之立春秋幸焉兩會諸侯公皆親行於黃父則執魯宣於扈則伐陳靈正詞討擕張師伐罪中國庶乎其有霸與而究之陳鄭之郊無日不有楚師則何居乎曰政在趙氏成公猶靈公也在位不永志弗克終彼楚莊誠一世之雄也晉方多難奚堪與抗耶楚欲效桓文之事故強為仁義之言其於陳也既縣而復封之則曰不貪其富於是乎釋陳而得陳矣其於鄭也既入而復和之則曰其君下人於是乎釋鄭而得鄭矣其於宋也既困而復盟之則曰爾無我虞於是乎釋宋而得宋矣邲戰不競晉國震驚清丘弗信衛人渝盟莊王至此豈猶有顧中國者乎知三國之不可取而不取以德為威諸夏盡得故申叔不賀而獻蹊田之諭子反在師而受登床之盟君臣之間有成謀焉為操為舍總以收中國之霸權也善哉晉人之料楚也欒武子曰楚自克庸以來其君不驕隨武子曰民不罷勞君無怨讟夫莊之為莊晉固已明知之矣知之而猶與戰其罪寧止在彘子哉晉滅赤狄宣六年秋赤狄伐晉圍懷及邢丘晉侯欲伐之中行桓子曰使疾其民以盈其貫將可殪也周書曰殪戎殷此類之謂也七年赤狄侵晉取向隂之禾十一年晉郤成子求成於衆狄衆狄疾赤狄之役遂服於晉秋會於攢函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非德莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤况寡德乎十五年潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而申固其命若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之六月癸卯晉荀林父敗赤狄於曲梁辛亥滅潞鄷舒奔衛衛人歸諸晉晉人殺之晉侯賞桓子狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職説是賞也曰周書所謂庸庸祗祗者謂此物也夫士伯庸中行伯君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳錫載周能施也率是道也其何不濟十六年春晉士會帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘晉侯請於王戊申以黻冕命士會將中軍且為大傅於是晉國之盜逃奔於秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄氷善人在上也善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也成三年晉郤克衛孫良夫伐牆咎如討赤狄之餘焉牆咎如潰上失民也赤狄白狄以衣色名入春秋來世為諸夏之患東則齊當其衝南則鄭當其衝東南則界衛西南則界晉一盛於莊閔之際而齊桓公救邢衛以攘之再盛於僖文之際而晉襄公敗箕以創之中國有霸狄所憚也齊桓衰而狄熾則救齊以伐衛黨叔帶以伐周間晉文有鄭虞以侵齊乘衛成初歸國以圍衛四十年間橫行中國未嘗稍挫也晉襄沒而狄逞則侵齊而又越齊以及魯伐衛而又越衛以及宋狄之無忌較昔為甚僑如之獲春秋大之然止能殄其一種而未能滅其族類也及乎宣公之世狄勢亦分蓋衆狄之中赤狄最強而赤狄之中潞氏為大比嵗侵齊晉人懼焉攢函之會先離其黨間鄷舒之不臣因滅潞而有其土次及甲氏留吁之屬除惡務盡無俾遺種晉景之於赤狄也能殱其類矣雖然春秋猶有貶焉酆舒之亂其罪在下傷君目殺夫人其大惡也鄷舒奔衛潞氏之亂靖矣滅其國而以其君歸非定潞氏實利之焉蹊田奪牛晉能免其譏乎荀林父士會之帥經皆不書至伐牆咎如郤克孫良夫又具書不書之而貶在晉具書之而貶并及衛矣於斯時也楚莊肆虐宋人告急不能出師以爭諸侯而方沾沾赤狄以逞其志則晉之不競於楚也豈無故而遂然王師敗於茅戎文十七年秋周甘歜敗戎於邥垂乘其飲酒也成公元年春晉侯使瑕嘉平戎於王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎三月癸未敗績於徐吾氏秋王人來告敗若據公穀則皆以晉敗之矣考曲沃叛王以來晉世世無與王為難者胡為而一旦敗王師耶且移誅貿戎春秋不亦掩惡乎善哉劉氏之言曰聖人立法以垂後世一書王師敗績於茅戎而尊王之義與王自取敗之道及諸侯不勤王之義咸得而見矣晉景楚共狎盟宣公十三年春齊師伐莒莒恃晉而不事齊故也十七年春晉侯使郤克徴會於齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬待命於齊曰不得齊事無復命矣郤子至請伐齊晉侯弗許請以其私屬又弗許齊侯使髙固晏弱蔡朝南郭偃會及斂盂髙固逃歸夏會於斷道討二也盟於卷楚辭齊人晉人執晏弱於野王執蔡朝於原執南郭偃於溫苖賁皇使見晏桓子歸言於晉侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮舉言羣臣不信諸侯皆有二志齊君恐不得禮故不出而使四子來左右或沮之曰君不出必執吾使故髙子及斂盂而逃夫三子者曰若絶君好寧歸死焉為是犯難而來吾若善逆彼以懷來者吾又執之以信齊沮吾不既過矣乎過而不改而又久之以成其悔何利之有焉使反者得辭而害來者以懼諸侯將焉用之晉人緩之逸秋八月晉師還范武子將老召文子曰燮乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以已亂也弗己者必益之郤子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子唯敬乃請老郤獻子為政十八年春晉侯衛大子臧伐齊至於陽穀齊侯會晉侯盟於繒以公子強為質於晉晉師還蔡朝南郭偃逃歸夏公使如楚乞師欲以伐齊楚莊王卒楚師不出既而用晉師楚於是乎有蜀之役成元年為齊難故作丘甲聞齊將出楚師夏盟於赤棘冬臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞二年春齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊侯親鼓士陵城三日取龍遂南侵及巢丘衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也夏有闕文失新築戰事石成子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次於鞠居新築人仲叔于奚救孫桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也己孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乘許之郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師會之及衛地韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以徇告其僕曰吾以分謗也師從齊師於莘六月壬申師至於靡笄之下齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也齊髙固入晉師桀石以投人禽之而乘其車繫桑本焉以徇齊壘曰欲勇者賈余餘勇癸酉師陳於鞍邴夏御齊侯逄丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合苟有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥夢子輿謂己曰且辟左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越於車下射其右斃於車中綦毋張喪車從韓厥曰請寓乘從左右皆肘之使立於後韓厥俯定其右逄丑父與公易位將及華泉驂絓於木而止丑父寢於轏中蛇出於其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出每出齊師以帥退入於狄卒狄卒皆抽戈盾冒之以入於衛師衛師免之遂自徐關入齊侯見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免矣曰鋭師徒免乎曰免矣曰苟君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也子之石窖晉師從齊師入自丘輿擊馬陘齊侯使賓媚人賂以紀甗玉磬與地不可則聽客之所為賓媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非德類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也樹德而濟同欲焉五伯之霸也勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百祿是遒子實不優而棄百祿諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聽魯衛諫曰齊疾我矣其死亡者皆親昵也子若不許讎我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣齊晉亦唯天所授豈必晉晉人許之對曰羣臣帥賦輿以為魯衛請若苟有以藉口而復於寡君君之惠也敢不唯命是聽禽鄭自師逆公秋七月晉師及齊國佐盟於爰婁使齊人歸我汶陽之田公會晉師於上鄍賜三帥先路三命之服司馬司空輿師候正亞旅皆受一命之服九月衛穆公卒晉三子自役弔焉哭於大門之外衛人逆之婦人哭於門內送亦如之遂常以葬晉師歸范文子後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉宣公使求好於楚莊王卒宣公薨不克作好公即位受盟於晉會晉伐齊衛人不行使於楚而亦受盟於晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寧夫文王猶用衆況吾儕乎且先君莊王屬之曰無德以及逺方莫如惠恤其民而善用之乃大戶己責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆強冠之冬楚師侵衛遂侵我師於蜀使臧孫往辭曰楚逺而久固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斫執針織紝皆百人公衡為質以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟於蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯况其下乎詩曰不解於位民之攸暨其是之謂矣楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴以棄魯國國將若之何誰居後之人必有任是夫國棄矣是行也晉辟楚畏其衆也君子曰衆之不可以己也大夫為政猶以衆克况明君而善用其衆乎大誓所謂商兆民離周十人同者衆也晉侯使鞏朔獻齊捷於周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今叔父克遂有功於齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室又姦先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍三年夏公如晉拜汶陽之田秋叔孫僑如圍棘取汶陽之田棘不服故圍之冬十一月晉侯使荀庚來聘且尋盟衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衛禮也十二月甲戌晉作六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞍之功也齊侯朝於晉將授玉郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也四年夏公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉夫晉侯之命在諸侯矣可不敬乎秋公至自晉欲求成於楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聽焉未可以二史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止五年夏晉荀首如齊逆女故宣伯餫諸穀宋公子圍龜為質於楚而歸華元享之請鼓譟以出鼓譟以復入曰習攻華氏宋公殺之冬同盟於蟲牢鄭服也諸侯謀復會宋公使向為人辭以子靈之難六年二月季文子以鞍之功立武宫非禮也聽於人以救其難不可以立武立武由己非由人也三月晉伯宗夏陽説衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏侵宋以其辭會也師於針衛人不保説欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛唯信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止師還衛人登陴晉人謀去故絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬國利君樂不可失也韓獻子新將中軍且為僕大夫公揖而入獻子從公立於寢庭謂獻子曰何如對曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘於是乎有沈溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡且民從教十世之利也夫山澤林盬國之寶也國饒則民驕佚近寶公室乃貧不可謂樂公説從之夏四月丁丑晉遷於新田子叔聲伯如晉命伐宋秋孟獻子叔孫宣伯侵宋晉命也楚子重伐鄭鄭從晉故也冬季文子如晉賀遷也晉欒書救鄭與楚師遇於繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知莊子范文子韓獻子諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱己甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政將酌於民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎七年鄭子良相成公以如晉見且拜師秋楚子重伐鄭師於汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉八月同盟於馬陵尋蟲牢之盟且莒服故也晉人以鍾儀歸囚諸軍府八年春晉侯使韓穿來言汶陽之田歸之於齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士二其行士也罔極二三其德七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而况霸主霸主將德是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡行父懼晉之不逺猶而失諸侯也是以敢私言之晉欒書侵蔡遂侵楚獲申驪楚師之還也晉侵沈獲沈子揖初從知范韓也君子曰從善如流宜哉詩曰愷悌君子遐不作人求善也夫作人斯有功績矣晉侯使申公巫臣如吳假道於莒與渠丘公立於池上曰城己惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎九年為歸汶陽之田故諸侯二於晉晉人懼會於蒲以尋馬陵之盟季文子謂范文子曰德則不競尋盟何為范文子曰勤以撫之寬以待之堅強以御之明神以要之柔服而伐二德之次也是行也將始會吳吳人不至楚人以重賂求鄭鄭伯會楚公子成於鄧秋鄭伯如晉晉人討其二於楚也執諸銅匙欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也楚子重侵陳以救鄭冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫詩曰雖有絲麻無棄菅蒯雖有姬薑無棄蕉萃凡百君子莫不代匱言備之不可以己也鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君十年衛子叔黑背侵鄭晉命也鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立大子州蒲以為君而會諸侯伐鄭鄭子罕賂以襄鍾子然盟於修澤子駟為質辛巳鄭伯歸鄭伯討立君者戊申殺叔申叔禽君子曰忠為令德非其人猶不可况不令乎十三年六月丁卯夜鄭公子班自訾求入於大宫不能殺子印子羽反軍於市己巳子駟帥國人盟於大宫遂從而盡焚之殺子如子駹孫叔孫知晉景公即位初年而當楚莊之霸於是乎大創於邲厥禍烈焉晉自靈成再世不競至是而敗傷為甚於以振救之亦云難也是冬有清丘之盟其言曰恤病討二未幾宋伐陳衛救之不討二也楚伐宋晉不救不恤病也不實其言春秋惡之繼而又有斷道之盟先是四國同聘於齊忿於登臺之一笑踦閭而謀奮志同讎是會也齊使見執兵端見矣懼晉者曰諸侯離叛私憾復搆晉至此其益衰乎幸晉者曰楚旅幸隕中國改圖晉霸庶乎其再振焉乃楚共雖弱則又為諸夏一徑敵也陽橋之役悉師入援侵衛及魯公衡入質惟時十三國之君公若而人卿大夫若而人悉靡然而從於蜀雖成之盟薄穆之厥貉莊之辰陵於斯為烈焉是役也諸侯畏晉而潰盟晉亦懼衆而避楚蓋以鞍勝方新楚勢正鋭兩大之形為相當矣然鞍之戰為婦人之笑辱也其辭則曰以大國朝夕釋憾於魯衛則為魯衛動矣而魯衛附晉矣袁婁之盟紀甗入晉汶陽入魯齊頃欲尊王於晉而晉不受兩君且同堂矣則齊附晉矣蜀盟從楚偶壓於勢嗣是北方諸侯實多睦於盟主焉中惟攝大國而多反覆者一鄭耳是後兩國之兵故多為爭鄭也蟲牢馬陵以前鄭在晉故楚伐之蒲以後鄭在楚故晉伐之鄭服而為會則蟲牢稱善救鄭而為會則馬陵尤善此兩盟者春秋所許也至於蒲乃晉人懼二而尋盟也春狄乃不許矣耄年志衰釋楚囚以求成大子監國命亦不常楚人乘鋭以伐莒鄭人狎侮而圍許晉亦無如之何惟惴惴於鍾儀子商庶乎大國之息我甲兵爾晉德其衰乎共方盛年景遂忽諸是以晉亦無如楚何也晉趙氏之難僖二十四年狄人歸季隗於晉而請其二子文公妻趙衰生原同屏括樓嬰趙姬請逆盾與其母子餘辭姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請於公以為嫡子而使其三子下之以叔隗為內子而已下之二十八年晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行三十一年秋晉搜於清原作五軍以禦狄趙衰為卿文五年晉陽處父聘於衛反過寧寧嬴從之及溫而還其妻問之嬴曰以剛商書曰沈漸剛克高明柔克夫子一之其不沒乎天為剛德猶不干時况在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之晉趙成子欒貞子霍伯臼季皆卒六年春晉搜於夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自溫改搜於董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政制事典正法罪辟獄刑董逋逃由質要治舊汙本秩禮續常職出滯淹既成以授大傅陽子與大師賈他使行諸晉國以為常法賈季怨陽子之易其班也而知其無援於晉也九月賈季使續鞫居殺陽處父書曰晉殺其大夫侵官也十一月丙寅晉殺續簡伯賈季奔狄宣子使臾駢送其帑夷之搜賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也損怨益仇非知也以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟七年狄侵我西鄙公使告於晉趙宣子使因賈季問酆舒且讓之酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也八年夷之搜晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田於堇隂故箕鄭父先都士縠梁益耳蒯得作亂九年春王正月己酉使賊殺先克乙丑晉人殺先都梁益耳三月甲戌晉人殺箕鄭父士縠蒯得宣二年初麗姬之亂詛無畜羣公子自是晉無公族及成公即位乃宦卿之適而為之田以為公族又宦其餘子亦為餘子其庶子為公行晉於是有公族餘子公行趙盾請以括為公族曰君姬氏之愛子也微君姬氏則臣狄人也公許之冬趙盾為旄車之族使屏季以其故族為公族大夫十五年晉侯使趙同獻狄俘於周不敬劉康公曰不及十年原叔必有大咎天奪之魄矣成四年晉趙嬰通於趙莊姬五年春原屏放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能有不能舍我何害弗聽嬰夢天使謂己祭余余福女使問諸士貞伯貞伯曰不識也既而告其人曰神福仁而禍淫淫而無罰福也祭其得亡乎祭之之明日而亡八年晉趙莊姬為趙嬰之亡故譖之於晉侯曰原屏將為亂欒郤為徵六月晉討趙同趙括武從姬氏畜於公宫以其田與祁奚韓厥言於晉侯曰成季之勳宣孟之忠而無後為善者其懼矣三代之令王皆數百年保天之祿夫豈無辟王賴前哲以免也周書曰不敢侮鰥寡所以明德也乃立武而反其田焉十年晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞戶公覺召桑田巫巫言如夢公曰何如曰不食新矣公疾病求醫於秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及樂不至焉不可為也公曰良醫也厚為之禮而歸之六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如厠陷而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉趙氏以晉國勳臣聨婚公室自衰及盾兩世執政其及於民也為孔厚矣乃嬰齊亂淫原屏罹禍姬氏一譖幾至覆宗雖史稱追論靈公之弒然所謂當其時不能治也後之人何罪晉之於此為失刑哉同括及嬰於盾為弟而異母無寵盾卒則其子朔佐下軍焉同括之流皆非卿也邲之戰二子黨先縠而取敗及桑隧之役二子復欲戰甚哉輕躁好進是必小才小智有足以殺其身者惜乎殺之非其罪也韓厥進言趙氏獲祀猶曰子文無後何以勸善也烏得不動人君之聽哉景公不明往往妄殺先縠先軫之孫也縱曰違命罪不至族同括成季之子也為亂無形豈遂至死天道不爽大厲為祟其言雖不經要可為好殺者戒云至夫屠岸作難程嬰保孤之説既不合於左氏亦無取焉左傳事緯卷四
