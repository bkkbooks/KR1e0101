body:
  text: 左𫝊事緯前集卷三靈璧知縣馬驌撰左氏辨例中祭祀例郊九望三雩二十一嘗一蒸二禘二大事一從祀一有事二作主一立宫二考宫一丹楹刻桷各一屋壞一桓五年秋大雩傳曰書不時也凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸過則書此言祀事有常時也周禮天神曰祀地祗曰祭人鬼曰享分言之則其名為三統言之直以祀包之而已凡祀蓋通指天地宗廟之事然文止舉郊雩嘗蒸不言礿祠與地祗者左氏采周公之典裁約為文略經之所無也啓蟄建寅之月龍見建巳之月始殺建酉之月閉蟄建亥之月四者咸指月之中氣言之自兹中氣以迄來月中氣之前三旬之內皆為祀限若踰斯限是為過時矣故卯月猶可郊子月猶可蒸也不舉月而舉氣者月分四時間之以閏其節未必恆在其月爰指天宿物候以為徵驗土功之例亦猶是焉魯以周公勳勞世世用郊故禮稱魯侯孟春乘大路載弧韣旗十有二旒日月之章祀帝于郊配以后稷於是南郊之禮為魯常祀僖三十一年夏四月四卜郊不從乃免牲猶三望傅曰非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也傳稱孟獻子云啓蟄而郊郊而後耕耕謂春分也以節候言之四月而郊容未失時故傳不言過而但譏其卜常祀有期又焉庸卜卜不從而免已成之牲因以廢郊是怠慢矣望而祭者有三祭國之分星焉祭國之名山焉祭國之大川焉此因郊而舉者今廢郊而修小祀故曰猶猶者可已之辭也宣三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望傳曰不郊而望皆非禮也望郊之屬也不郊亦無望可也禮不卜郊而卜其牲與日既得吉日改牛曰牲若未卜日猶謂之牛而已牛死廢郊亦為非禮故傳重例以明之也是皆以違禮書者若夫或以五月或以九月或在既耕之後或在啓蟄之前則過時之譏如凡例所稱矣諸侯雩其山川魯得雩於上帝故經書大雩建巳六月祭於天帝逺為百穀祈膏雨焉此定時也桓以秋雩故傳稱不時經雩二十有一無當時者以凡例準之似可盡知然而有異說焉雩雖夏祀倘遇嵗旱則又修之以為祈禳即不當時亦不為過襄五年秋大雩傳曰旱也八年秋九月大雩傳曰旱也二十八年秋八月大雩傳曰旱也昭三年八月大雩傳曰旱也六年秋九月大雩傳曰旱也十六年九月大雩傳曰旱也二十四年秋八月大雩傳曰旱也二十五年秋七月上辛大雩季辛又雩傳曰書再雩旱甚也因旱而雩雩而得雨是以喜而志雩不復志旱此與不時之雩異傳每事釋之以别凡例所稱也隂氣始殺嘉穀時熟用以薦嘗宗廟傳稱十月上辛有事大廟此酉月用嘗之徵也桓十四年秋八月壬申御廪災乙亥嘗傳曰書不害也御廪以藏粢盛災其屋不及其穀嘉穀不害不廢祀典用書以示法此先時而過傳不復譏傳固已有成例矣火伏蟄畢昆蟲閉戶萬物告成可薦者衆于是蒸祭宗廟蒸之為言衆也桓八年正月己卯蒸夏五月丁丑蒸以限言之正月之蒸非過然而五月復蒸瀆而失時故兩書以顯示其譏爾四者國之常祀得時不書失時違禮乃書以警怠慢示法戒焉魯以天子之禮樂祀周公故得用禘祭禘三年而一舉君薨三年喪畢致新主于大廟廟之逺主當遷入祧因大祭以審諦昭穆之序于是遂以三年為節禘為吉禮故必三年之後于廟行之除喪即吉卜日而行無復常月也僖三十三年傳曰凡君薨卒哭而祔祔而作主特祀于主蒸嘗禘于廟此作主祭祀吉凶之節也既葬反虞於是卒哭而以神祔于祖尸柩已逺孝子思慕倣徨乃造木主立几筵焉特禮以祀之不同于廟冬蒸秋嘗時祭之事三年大禘遷主于廟乃同于吉此皆於廟行之不於主也然則急作主者以伸孝子之思緩用禘者以終三年之制文二年二月作僖公主傳曰書不時也過葬十月違祔祖之時故書之以譏其緩閔二年夏五月吉禘于莊公傳曰速也莊薨二十二月喪制未闋未應吉而吉禘且不于大廟而于莊公故詳書以譏其急也禘唯計即吉之月而行原無常月故莊公吉禘但以速譏而非違時也吉禘之後率三年而復舉仍計除喪之月卜日行之則是新君即位法當三年而禘五年又禘八年又禘禘自國之常祀例皆不書春秋略記數事又皆以志非常雖不失常時者常之中有不常因是書焉文二年大事于大廟躋僖公傳曰逆祀也禘而稱大事者僖以庶兄繼閔之位嘗為之臣應次閔位之下而躋在其上故書以譏之未終喪而行于大廟其譏已明不復書吉特以逆祀之故為之大其事異其文焉定八年從祀先公傳亦稱禘順祀先公而正閔僖之位故特書從祀不復書禘皆殊文以起非常也僖八年禘于大廟用致夫人傳曰非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也夫人四禮有闕不得致主于廟禘祀非所與焉姜氏淫而與殺不薨于寢僖公疑其禮歷三禘而終致之書之以顯其非常也宣八年六月辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥傳曰襄仲卒而繹非禮也昭十五年二月癸酉有事于武宫籥入叔弓卒去籥卒事傳曰禮也祭之明日又祭陳昨日之禮所以賓尸謂之繹祭必用樂故吹籥萬舞卿佐之喪理當去樂廢繹仲遂之卒魯人但知去樂不知廢繹納萬去籥惡聞其聲故曰非禮叔弓涖事籥方入而暴卒因為之盡去衆樂故曰禮也皆禘祭而書有事者義在二卿之卒略言有事以明得失禘雖常而仲遂叔弓卒非常是以書之也三年之禘于大廟羣公之禘于其宫非禘而用禘禮亦名為禘故武宫之禘不譏蓋亦有是制爾昭二十五年傳言禘于襄公非其比與經於周公之廟曰大廟其室曰大室文十三年大室屋壞傳曰書不共也廟中之室復廟重檐不修而使壞故以不共書之穀梁曰周公曰大廟伯禽曰大室羣公曰宫按爾雅宫室無尊卑之别既稱大則知周公之號矣羣公之廟以諡名宫煬宫武宫桓宫僖宫是也神主初入謂之新宫成三年新宫災是也夫人之廟亦曰宫仲子之宫是也至𫝊所稱無復一定者大廟或稱大宫羣宫或稱祖禰廟是知宫廟亦無尊卑之分所異者其號爾宫廟修建之常亦非所書故春秋羣公不書立宫莊二十三年秋丹桓宫楹二十四年春刻桓宫桷傳曰皆非禮也成六年立武宫傳曰非禮也定元年立煬宫莊公將逆夫人而崇飾過奢行父意如以私意逺立毁廟故皆書也魯唯周公之廟得用八佾其後他宫僭而用之隱五年考仲子之宫初獻六羽隱成父志為夫人仲子立宫考成其宫因明大典義不在立宫故略言成宮公問羽數故書六羽善復古也傳言名器不可假人是以曲縣繁纓孔子猶惜所以防其微也魯以周公之故禮樂擬於天子在成王以賜有功可爾乃羣公僭用而大夫復僭於公究使雍徹用於三家之堂八佾舞於季孫之庭矣嗚呼告廟例公至七十九公至而居四公在四夫人至一單伯至一大夫至二喪至三還三復六桓二年公至自唐傳曰告于廟也凡公行告于宗廟反行飲至舍爵䇿勳焉禮也特相㑹往來稱地讓事也自參以上則往稱地來稱㑹成事也凡公行者統朝㑹盟伐而言也孝子之於親也出必告反必面事死如事生故出必告廟反必面至曾子問曰告用制幣反必如之蓋出入皆以幣告也但出則告而遂行反則告畢飲至飲至者嘉其行至飲廟中以為樂桓十六年公至自伐鄭傳曰以飲至之禮也是已既飲置爵則書勳勞於䇿以速紀功謂之䇿勳襄十三年公至自晉傳曰孟獻子書勞于廟禮也是已舍爵乃䇿勳䇿勳在廟知飲至亦在廟也告廟飲至䇿勳其事有三傳皆曰禮至自唐為㑹盟至自伐鄭為侵伐至自晉為朝見是知朝㑹盟伐告廟同禮傳所以反覆申例焉例言䇿勳而孟獻子書勞二事一也周禮王功曰勳事功曰勞對言之則勳大而勞小故傳又變文以包之凡例三事而桓十六年但言飲至襄十三年但言書勞何也蓋三者雖不遍行亦得書至唯悉闕乃不書事本相因未有不告而飲不告而書者或既告以後飲至書勞偏行其一禮則亦書之故傳轉相發明也公至自晉朝也而獻子書勞則策勳者不但征伐之勳雖常事有以定國安民亦得紀功於廟有行而至必以嘉㑹昭告祖禰有功䇿勳無功告事而已無不告也公行一百七十有六書至者七十有九餘皆不告廟也隱公之不告謙也他公之不告慢也然慢亦就大例言之即有行或恥辱不足為榮所當反躬罪已不與嘉禮同終若此者不告非慢告之實非書以譏之宣五年公至自齊傳曰書過也執止受辱連昏鄰國之臣而猶行飲至之禮故書之以示過也桓十八年公之喪至自齊此以死還告廟也莊二十三年公如齊觀社公至自齊非㑹非朝此以失禮書至也襄十三年公至自晉以榮還告廟也昭二十六年公至自齊居于鄆此以宜告而書也告廟啓反率皆即實而言乃或有避諱則仲尼亦或從之僖十七年公至自㑹傳曰淮之㑹公有諸侯之事未歸而取項齊人以為討而止公書曰至自㑹猶有諸侯之事焉且諱之也諱止以㑹告廟故書以㑹宣八年公至自㑹黑壤賂免諱不書盟然猶書至知必不以止告廟矣傳於桓襄著告至之常於宣公見書過之譏於僖公昭避諱之義舉此以包他行也諸侯之盟必在㑹後而至皆書㑹不書盟者以盟皆因㑹而為之初必以㑹徵諸侯公行以㑹告矣反亦告㑹雖竝告盟不書於經蓋行不以盟告也公與一國特相㑹㑹必有主人二國相讓莫肯為主㑹事不成故但書地定八年公至自瓦十年公至自夾谷是矣自三國以上㑹事已成故遂書㑹諸書公至自㑹者是矣以國至者二十有七以侵伐圍救至者二十以㑹至者二十有六以地至者六而乾侯非㑹焉僖二十八年公㑹某某于溫遂圍許公至自圍許襄十年公㑹某某于柤遂滅逼陽公至自㑹二事相類而至文異諸如此類事勢相接或以始告或以終告無他義也公羊曰得意致㑹不得意致伐穀梁曰㑹夷狄不致致存中國也惡事不致致危之也桓之㑹不致致危之也離㑹不致致危之也若然則書至與否盡存褒譏推尋事實殊不盡然定十二年公至自圍成行未出竟而亦書至者陪臣執命大都耦國公親戎事故出入皆告穀梁曰危之也邊乎齊也抑又鑿矣內娶必告于廟故夫人初入書至或有行而反例亦書之文九年夫人姜氏至自齊夫人行十二而至唯此一書他或禮儀不備或淫縱不告也其餘例不應書而書至者則魯人殊異其事用以告廟仲尼起舊為新因示變例文十五年單伯至自齊傳曰貴之也執節不移終不廢禮故貴而告至以示崇異之文昭十四年意如至自晉二十四年婼至自晉幸其得免喜而告廟又以申尊晉罪已之義春秋公行而至始得書至軍旅之事例不書還莊八年師還傳曰君子是以善魯莊公克己復禮全軍而退故特書師還宣十五年歸父還自晉傳曰善之也嘉其以禮自退故特書還自晉或采用時史舊文或出聖人新意雖非凡例所稱亦褒善之微文也君臣若朝聘不至而復經雖屢書傳不發例則就事以見得失爾非例也公而在國每月之朔用以朝享之禮親祭於廟若其在外此禮闕焉不舉則守臣昭告宗廟言公所在故經有公在之書襄二十九年公在楚傳曰釋不朝正于廟也每月必告而正月嵗首嘉禮尤重故以是月釋之按諸公在外闕朝正之禮最多斯禮有常非例所急特於公逺出踰年之尤甚者存一事以示法而已昭公之孫也羣臣用以告廟故經書公在自二十五年始出居鄆復居乾侯纍年在外而經不書逮後乃書何也三十年公在乾侯傳曰不先書鄆與乾侯非公且徵過也三十一年公在乾侯傳曰言不能外內也三十二年公在乾侯傳曰言不能外內又不能用其人也前此既以非公之妄且明過謬之猶可掩故不斥言之若猶在國三十年以後明罪在公非復過謬矣是以經每嵗必書傳每嵗互言其事以昭顯書之義亦聖人所不得已也然則二十九年以前舊史必盡書公在仲尼削其前而存其後即成仲尼之新意諸所謂起舊為新者類如此告赴例春秋書列國之事從告赴也國之大事曰㑹盟曰朝聘曰征伐曰滅取曰奔違曰死喪曰弒殺曰災異內則告廟書䇿外則告赴鄰國必有告赴史乃承而書之告赴者所以重大事避怠慢昭告鄰國敬慎之意也諸侯各有國史大事書之于䇿小事記之簡牘簡牘所録詳記本末雜采辭令不必皆告約文著義乃登于䇿周公之典禮存焉於列國之事非告赴不書也隱十一年傳曰鄭伯以虢師伐宋大敗宋師宋不告命故不書凡諸侯有命告則書不然則否師出臧否亦如之雖及滅國滅不告敗勝不告克不書于䇿文十四年傳曰頃王崩周公閲與王孫蘇爭政故不赴凡崩薨不赴則不書禍福不告亦不書懲不敬也此兩發凡以互明告赴之總例也命者國之大事政令槩指諸事來告則書不告則否告辭有詳略異同史書有虛實得失仲尼作經遵周制以明典禮加刋正以示勸戒于是義例往往生焉故有彼以實告改辭而書者有彼以虛告因虛而書者或告雖不典偶合聖人之㫖因書之以為法或告赴失時違禮因而不復改正遂書之以為戒則亦有䇿所不書即以為例者是皆聖人立經褒貶章示善惡起舊為新以昭大義也襄十四年傳言孫林父寧殖出其君及其書經則曰衛侯出奔齊如此之類是改其告辭也文七年傳言晉潛師夜起敗秦于令狐實未陳也晉人諱背前言以皆陳告及其書經乃曰晉人及秦人戰于令狐如此之類是因其虛言也宣十年齊崔氏出奔衛傳曰崔杼奔衛書曰崔氏非其罪也且告以族不以名舊法當告以名今告以族適合無罪之義如此之類是因告以示法也文十四年九月齊公子商人弒其君舍傳曰齊人定懿公使來告難故書以九月隱三年三月庚戌天王崩傳曰壬戌平王崩赴以庚戌故書之襄二十八年十有二月甲寅天王崩傳曰十一月癸巳天王崩未來赴亦未書禮也十二月王人來告喪問崩日以甲寅告故書之以徵過也桓五年甲戌己丑陳侯鮑卒傳曰再赴也僖五年傳曰晉侯使以殺太子申生之故來告十一年傳曰晉侯使以㔻鄭之亂來告及諸經傳倒錯與夫不同盟而赴以名同盟而不赴以名如此之類雖失時違禮遂書之以示勸戒也征伐㑹盟之大魯若親與其事則告廟書䇿不待鄰國之告若列國師出相加克滅相尋崩薨禍福之事非告則無由知即或知之例亦不書文五年楚人滅蓼臧孫聞而興歎魯非不知但非遣使相告未敢輒登史䇿若是者所以防謬誤避不審蓋其慎也例稱崩薨不赴禍福不告然則鄰國相命凶事謂之赴他事謂之告其實對言則别散言則通他事不可言赴而凶事或稱告昭七年傳曰衛齊惡告喪于周不又稱告與福莫大於享國有家反福則為禍成元年傳曰王人來告敗是敗師有告也僖二十四年傳曰王使來告難曰不穀不德得罪于母弟之寵子帶鄙在鄭地汜是君奔有告也宣十年傳例曰某氏之守臣某失守宗廟敢告是臣違有告也十四年傳曰孔達縊而死衛人以說于晉而免遂告于諸侯曰寡君有不令之臣達搆我敝邑于大國既伏其罪矣敢告是殺大夫有告也文十四年傳曰齊人定懿公使來告難是弒君有告也僖八年傳曰王人來告喪難故也是以緩是死喪有告也昭十八年鄭災傳曰使行人告于諸侯是災異有告也敗滅告則勝克亦告奔亡告則歸復亦告死喪災異有禍無福無不告也無不書也乃春秋之世則有違棄典章怠慢不敬者崩薨禍福多不告赴考之于經既無其事而簡牘之記尚存左氏因經立傳廣記而備言之采簡牘為傳以補經所未備者上稽周公之典則有不告不書以懲不敬之㫖知皆仲尼因之以示法戒者故往往發明其義用以為例也隱元年傳曰紀人伐夷夷不告故不書僖九年傳曰齊侯以諸侯之師伐晉令不及魯故不書二十四年傳曰秦伯納重耳不書不告入也使殺懷公于髙梁不書亦不告也襄十年傳曰王叔奔晉不書不告也哀元年傳曰吳入越不書吳不告慶越不告敗也左氏反覆申明二凡之意以見諸有傳無經之事皆以不告故爾天王十二而不書崩者三楚十二世而不書卒者亦三秦穆之卒鄭昭之弒許莊之奔皆有傳無經邾莒薛宿間書其卒鄧息申隨唐蓼肥鼓之滅咸不見經侵伐㑹盟襲取奔亡之事經不載者于傳多有莊十九年二十年二十六年經皆無傳傳不解經而備記他事是皆簡牘所記丘明采集成傳當時彼不來告故舊䇿不書仲尼之修春秋不取簡牘以補之者以其正合不告不書之例于是因舊以成新也例言滅不告敗勝不告克不書于䇿此互言其告也狄之伐邢非狄能告克楚之滅庸非庸能告敗但有一告遂亦書之故傳于吳入越之下兼舉告慶告敗為言以明諸不書者為其兩不告爾周之王也八百之國來同然則周公告赴䇿書之法諸侯必盡聞之矣魯秉周禮故舊史所書多合典制晉乘楚檮杌不勝其刋正也聖人所由因魯史而作春秋哉內諱例外事不書固為不告矣乃春秋魯史自記國事然亦有所不書何也魯事之不書者有三一者不告廟不書二者非君舉不書三者隱諱不書公行一百七十六而不書至者九十有七夫人之行十二而不書至者十有一此皆不告廟者也隱元年傳曰費伯帥師城郎不書非公命也改葬惠公公弗臨故不書衛侯來㑹葬不見公亦不書公子豫及邾人鄭人盟于翼不書非公命也新作南門不書亦非公命也此皆非君舉者也坊記曰善則歸君過則歸已是隱惡揚善義存君親也是以聖賢作法通有諱例僖元年傳曰公出復入不書諱之也諱國惡禮也諱雖有例然無定體或諱大書小或諱小書大皆當時臣子率已意而為之隱在禮固有掩惡之法聖人有時而聽之也不奪所諱亦不為之定制者若每事皆諱則為惡者無復忌憚居上者不知所懲但有小惡即發其短又傷愛敬之義非復臣子之心故諱惡為禮無隱為直二者通之聖人立法以為世教也公羊曰於外大惡書小惡不書於內大惡諱小惡書若然是諱有常準考之於經乃不其然納鼎惡於易田而不諱鼎公入小於公出諱入而不諱孫公羊之說固未安矣諱之法亦不一端有隱約其辭者有避諱其名者有全隱其事絶不見經者大都有例無凡唯盟扈二傳既稱仲尼之書法復舉凡以申之知亦采舊章以為新意而掩惡隱恥莫非周公之典禮特無一定之諱法爾文七年公㑹諸侯晉大夫盟于扈傳曰公後至故不書所㑹凡㑹諸侯不書所㑹後也後至不書其國辟不敏也十五年諸侯盟于扈𫝊曰書曰諸侯盟于扈無能為故也凡諸侯㑹公不與不書諱君惡也與而不書後也㑹盟無功則諸侯不序既以為例矣若非無功之㑹列國皆在我獨後至不敏孰甚焉避君惡而略諸侯猶若諸侯無功者文七年之盟扈是已至十五年之盟扈責在諸侯之無能為雖公不㑹非公之惡然經文與後至相同左氏復申前例以明非此之謂也僖二年城楚丘傳曰不書所㑹後也桓十三年公㑹紀侯鄭伯及齊侯宋公衛侯燕人戰傳曰不書所戰後也於城不書所㑹之國於戰不書所戰之地所諱不同皆是避不敏矣宣七年公㑹晉侯宋公衛侯鄭伯曹伯于黑壤傳曰公不與盟以賂免故黑壤之盟不書諱之也㑹盟同例皆用此法同為諱君惡矣莊十八年公追戎于濟西傳曰不言其來諱之也僖十七年公至自㑹傳曰猶有諸侯之事焉且諱之也襄三十年㑹于澶淵宋災故傳曰不書魯大夫諱之也哀十二年孟子卒傳曰昭公娶于吳故不書姓諸如此類是隱約其辭也諱奔曰孫諱弒曰薨諱殺未成君曰卒諱殺大夫曰刺諸如此類是辟諱其名也僖元年傳曰公出復入不書諱之也文二年傳曰適晉不書諱之也成十年傳曰葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也昭十六年傳曰公在晉晉人止公不書諱之也諸如此類是全隱其事絶不見經也三者之諱法不同總歸諱國惡之義爾成十六年㑹于沙隨不見公公止皆諱如此不諱者恥輕於執止且晉用僑如之譖非公罪也昭十三年同盟于平丘公不與盟黑壤并盟皆諱而此不諱者魯不堪晉求讒慝𢎞多晉用邾莒之訴非國惡也諸諱之例或本䇿書之制或因魯史之文或出聖人之意況後㑹舉凡而諱惡稱禮故曰莫非周公之典禮云爾將師例經之大例君自將者言君不言師隱七年公伐邾之類是也卿將而滿師則師將竝書隱二年無駭帥師入極之類是也卿將而不滿師則空舉將名宣六年晉趙盾衛孫免侵陳之類是也大夫將而滿師則稱師隱五年衛師入郕之類是也大夫將而不滿師則稱人隱二年莒人入向之類是也所以然者何也周禮萬二千五百人為軍二千五百人為師五百人為旅用兵多少其數無常重其舉大事動大衆滿師則書之輕其舉衆少故不書旅師者衆也雖復五軍三軍悉皆以師為名義取其衆也定四年傳曰君行師從卿行旅從是以君將不言帥師卿將不言帥旅舉其重者事從可知卿行不合師從若不言師則師不可見卿尊自應書名師文又須别見故將師竝舉也若不滿師卿須自見唯舉將名而已旅少不足録也大夫名氏不合見經但所帥實衆師須自見故略不言人若不滿師一旅之卒既不足録須空舉其將謂之曰人人即大夫身也內之大夫於經不合書曰我人故直言其事桓二年入把八年伐邾之類是也此類顯然易知故傳不發凡言例焉其有不盡然者亦告辭之詳略異同非盡褒貶之義文十二年河曲之戰實晉卿與秦伯也而經書人僖二十七年圍宋楚子玉也而經書人若此者傳無義例皆彼恥無功以微者告為是因而書之爾卿之盟㑹無功則有貶而稱人之例征伐亦然是皆屢發於傳者故可引類而知傳無諸侯稱人之法未可曲為牽合荆楚僻陋在夷其始也告命違禮君臣混雜不與中國準成二年以前亦未以入例也宣二年晉人宋人衛人陳人侵鄭按傳鄭受楚命伐宋囚華元獲樂吕此晉之不競也趙盾興諸侯之師將為宋報恥乃畏越椒之衆託辭班師以虛諸侯之望所以貶而稱人也襄八年鄭人侵蔡陳蔡楚之與國鄭欲親晉伐陳入之且以東門之怨子産有辭故免於譏及其侵蔡既無晉命又無直辭且無怨於蔡而輕動寡謀以啓四五年之弗寧故子國而稱人亦以貶之也莊十年荆敗蔡師于莘不稱將帥僖二十三年楚人伐陳得臣不名既尚未以入例皆其告命之略爾諸凡外域之事大率舉國言之僖十八年僅書狄人皆緣僻陋不同於中國也成三年鄭伐許昭十二年晉伐鮮虞或當日告辭之略或後人傳録之闕皆非義例之所在也榖梁曰其曰晉狄之也不正其與夷狄交伐中國故狄稱之以鮮虞為中國其說已悖又何必辨其餘哉左氏不為發例者知非聖人修經之要也是以不膚引近說以亂之師出例及伐三及圍一及救一㑹伐三十六㑹侵三㑹圍三㑹救四㑹戰二以三次十六乞師五宣七年公㑹齊侯伐萊傳曰不與謀也凡師出與謀曰及不與謀曰㑹與謀者同志之國彼我之計未成與之講議利害計定而後行之故以相連及為文不與謀而出師者謂不得已而應命故以外合為文二者據魯而言之也公㑹伐萊而傳以師出示例者君行師從知必有師且例又稱凡蓋通卿大夫之帥師者而統言之焉桓十六年公㑹宋公衛侯陳侯伐鄭春㑹于曹以謀伐鄭至夏而伐之于例當言及然而書㑹者鄭厲篡忽納之非正故諱從不與謀之文也成八年晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯先謀而不言及者盟主之令上行乎下非匹敵之國非例所及故雖與謀亦悉皆言㑹也將有侵伐而卑辭借兵于人謂之乞師大之于小小之于大皆書曰乞乞者不保得之辭皆謙辭以逼成其計故悉從不與謀之例與謀必彼此同欲乞則志在乞者晉乞師四固出伯令即成二年傳稱臧宣叔如晉乞師而鞍戰亦不言及謂非謀爾此經書㑹及之義也僖二十六年公以楚師伐齊取榖傳曰凡師能左右之曰以此經書以之例也小國而用大國之師或匹敵相用欲左則左欲右則右專制其命進退在己故變㑹及之文而書曰以若伯主之令又非例所及矣莊三年公次于滑傳曰凡師一宿為舍再宿為信過信為次此經書次之例也兵尚神速老師費財故春秋行師三日以上則記其次舍之與信輕碎不書也兵未有所加所次則書之以示遲速莊三年公次于滑八年師次于郎之類是也既書兵所加則不書次以事為宜非為虛次諸久師而不言次者是也既書兵所加又書次者義有取於次僖四年遂伐楚次於陘十五年盟于牡丘遂次于匡是也春秋有書次於事前者次以成事也僖元年次于聶北救邢之類是矣有書次於事後者事成而次也襄二十三年叔孫豹帥師救晉次于雍榆之類是矣隨其事實非義例也公羊曰何為先言次而後言救君也何為先言救而後言次先通君命也此皆臆度不得其實次之為例但記師行非寓褒貶聶北雍榆傳皆曰禮者善其事非善其次也而於次之一字生義則溺矣以上三凡稱師明皆為師發例非師出則不在此例也若公㑹戎于潛之㑹公及邾儀父盟于蔑之及以蔡侯獻舞歸之以次于乾侯之次似此之類不可枚舉既非戰伐之事不必悉為牽合也遂者兩事之辭春秋君臣之出因彼及此皆書曰遂記事之宜非例所加僖四年侵蔡蔡潰遂伐楚桓八年祭公來遂逆王后于紀僖三十年公子遂如京師遂如晉桓十八年公㑹齊侯于濼公與夫人姜氏遂如齊如此之類本謀為二事也僖六年伐鄭圍新城楚人圍許諸侯遂救許莊十九年公子結媵陳人之婦于鄄遂及齊侯宋公盟如此之類本未謀而因事便行也但有兩事即書為遂不别其本謀與否公羊曰遂者何生事也不盡然矣大夫出竟有可以安社稷利國家者則專之文八年冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴傳曰書曰公子遂珍之也四日之間不容反報雖專命而盟患難俱解故不用遂事之文重舉名氏以貴之公子結本以媵陳而出聞齊宋有㑹權宜以盟二君既非君命又失陳好至冬三國來伐無善可褒故不重書名氏然亦無貶者本欲安社稷利國家也襄十年春㑹吳于柤夏五月甲午遂滅逼陽傳曰書曰遂滅逼陽言自㑹也諸遂皆不發傳特於此言書曰者仲尼之所改也舊史蓋别書諸侯滅逼陽仲尼改而書遂以見因㑹滅國用章其失遂事特假文以明事之所因其實善惡繫於事不繫於遂也遂之為文不主於師而師出亦用之且非例也故附諸此侵伐例伐二百十一侵六十襲一圍四十四救二十三追二戍三城六莊二十九年鄭人侵許傳曰凡師有鐘鼓曰伐無曰侵輕曰襲三者所以别興師用兵之狀也周禮大司馬掌九伐之法賊害賢良則伐之負固不服則侵之而無襲之之名然禮更有七名曰眚曰壇曰削曰正曰殘曰社曰滅春秋無其事者傳不發凡而滅與入别為例所謂左氏裁約舊章為文也鳴鐘擊鼓以聲其罪而討之如是者經書曰伐僖四年齊伐楚傳稱責楚以包茅不入昭王不復文十七年晉伐宋傳稱討曰何故弒君此類是矣寢其鐘鼓潛師入境以陵之如是者經書曰侵莊十五年鄭人侵宋傳稱諸侯為宋伐郳鄭人閒之而侵宋僖三十三年狄侵齊𫝊稱因晉喪也此類是矣倍道輕行乘其不備而掩之如是者經書曰襲襄二十三年齊侯襲莒傳稱齊侯還自晉不入遂襲莒是矣公羊曰粗者曰侵精者曰伐穀梁曰苞人民毆牛馬曰侵斬樹木壞宫室曰伐三傳之說不同考之文義左氏為長焉襄十九年晉士丐帥師侵齊至穀聞齊侯卒乃還傳曰聞喪而還禮也傳既稱禮然則兵不加喪必有常制得禮之常雖不待君命可也詳書所至及還善得禮也春秋書戰敗書執獲書追救書圍入書滅取皆侵伐用師之事左氏凡例數條以類相從今亦各立為篇以相發明焉圍救追戍傳不言例統附此篇之內義在不可遺也公羊曰戰不言伐圍不言戰入不言圍滅不言入其說雖近是然戰圍滅入事本不同難以舉為大例且伐取伐圍固多兼言之者既無關褒貶之義亦舊史從告或詳或略爾環而攻之曰圍聚兵守之曰戍彼此相援曰救繕其都邑曰城敵去而躡之曰追諸皆無例就事立文而已褒譏之義别有所在也僖元年齊師宋師曹師城邢傳曰救患也凡諸侯伯救患分災討罪禮也桓為侯伯邢遷如歸善其得禮故詳叙三師傳因發救患之例然美在救患不在於城十四年諸侯城緣陵傳曰不書其人有闕也此非其貶與救亦美名也文九年公子遂㑹晉人宋人衛人許人救鄭傳曰卿不書緩也以懲不恪此非其貶與莊十八年公追戎于濟西傳曰不言其來諱之也邊竟無備戎來不知故諱不稱其侵僖二十六年齊人侵我西鄙公追齊師至酅弗及備文以書是無可諱矣圍國者直書圍某莊八年師及齊師圍郕僖六年楚人圍許之類是也圍邑者書伐某國圍某邑隱五年宋人伐鄭圍長葛僖二十三年齊侯伐宋圍緡之類是也蓋不繫之國邑無由知伐國取邑者亦然昭二十三年晉人圍郊郊不繫周者春秋之法大都以名通者不繫之國莊三十二年城小榖傳稱為管仲也而不繫之齊僖二年虞師晉師滅下陽虢邑也而不繫之虢成七年吳入州來昭十三年吳滅州來楚邑也而不繫之楚是知春秋有大都通名之例矣隱六年宋人取長葛長葛不繫之鄭者前年宋人伐鄭圍長葛鄭邑可知此從其省文而非大都之例也若實非其邑而繫於其國者則仲尼偶示變例以見義又非書法之常也襄元年圍宋彭城傳曰非宋地追書也於是為宋討魚石故稱宋且不登叛人也謂之宋志十年戍鄭虎牢傳曰非鄭地也言將歸焉是皆聖人所修特立異文而非魯史之舊矣莊二年公子慶父帥師伐於餘丘三十年齊人降鄣閔二年齊人遷陽三者既非大都又無所繫知皆附庸之國公羊曰於餘丘邾婁之邑也不繫乎邾婁國之也君存焉爾夫國自為國邑自為邑寧得以君存而亂其名公羊穀梁又曰鄣紀之遺邑也紀滅已二十餘年其國不能自存豈得有孤立之邑厯久乃降哉二家舛謬之說往往而然無怪乎元凱之目為異端也戰敗例敗師十六戰二十三敗績十五克一取師三王師敗績一莊十一年公敗宋師于鄑傳曰宋師未陳而薄之敗諸鄑凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績得俊曰克覆而敗之曰取某師京師敗曰王師敗績于某此䇿書戰敗之通例也敵人未陳設權譎變詐以取勝使彼不得成列即成列而不得用者亦以未陳為文此年公敗宋師于鄑昭元年晉荀吳敗狄于大鹵傳皆曰未陳而薄之是其未成列也莊十年公敗齊師于長勺待齊人三鼓氣竭而克之定十四年於越敗吳于欈李使罪人屬劍詐吳而伐之二者敵雖已陳設權勝之是其成列不得用也昭五年叔弓帥師敗莒師于蚡泉傳曰莒未陳也重發例者嫌君臣之異二十三年吳敗頓胡沈蔡陳許之師于雞父傳曰不言戰楚未陳也重發例者嫌與陳相涉也兩敵對壘堅而有備權謀槩無所施成敗決于志力於是書戰師徒撓敗若岸沮山崩喪其功績於是書敗績其或未至成敗各自收斂故有言戰不言敗者若夫未陳而書戰及實敗而不書敗皆從告也文七年晉人及秦人戰于令狐晉諱食言雖夜薄秦師而以戰告故不書敗師而書戰昭十七年楚人及吳戰于長岸吳楚兩敗莫肯以告故書戰不書敗績宣十二年晉荀林父帥師及楚子戰于邲晉師敗績上軍成陳林父乃敗故戰敗兩書也敗皆稱師或稱人成十六年晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績師徒未崩楚子傷目而退故指事言之僖十五年晉侯及秦伯戰于韓獲晉侯君雖見執戎馬還濘師實不大崩也二十八年晉侯齊師宋師秦師及楚人戰于城濮楚師敗績傳稱左右師潰子玉收其卒而止經書敗績敗多而存少也成十六年楚子鄭師敗績傳稱子反曰臣之卒實奔經不書師敗敗少而存多也內之雄俊才力足以服衆威權足以自固進不成為外寇彊敵退復狡壯有二君之形克而勝之則不言彼敗績而書所克之名隱元年鄭伯克段于鄢傳曰如二君故曰克是其事也威力兼備若羅網掩覆一軍盡禽謂之取師哀九年宋皇瑗取鄭師于雍丘傳稱皇瑗圍鄭師壘合鄭師哭是自知盡死無逃遺之路矣使有能者無死是一軍生死盡在宋矣取狀蓋如斯也王者無敵天下莫之得挍故其敗也不言戰而直以自敗為文成元年王師敗績于茅戎是其事也六者記事之通例內外無復殊稱也公羊曰內不言敗言戰乃敗矣於乾時則曰不與公復讎也榖梁曰中國與夷狄不言戰直曰敗之兩夷狄曰敗於雞父則曰中國不敗胡子髠沈子盈其滅乎其言敗釋其滅也於長岸則曰進楚子曰戰既立異而又曲說以求通違意以生例用意雖勤不若左氏之彰明矣戰必由伐故春秋言戰即不言伐伐者討罪之辭若言戰而先言伐皆罪彼所伐之國我以鐘鼓聲討其罪彼不服而敢戰用兩書伐戰以深責之莊二十八年齊人伐衛衛人及齊人戰是也桓十二年及鄭師伐宋戰于宋傳曰宋無信也彼無信故言伐言戰直書戰于宋者尤其無信以彼獨戰為文也桓十年齊侯衛侯鄭伯來戰于郎傳曰我有辭也故不稱侵伐我有辭故不言伐惡其無禮亦以彼獨戰為文也二者不言及某戰皆不令彼與我敵所以痛責之焉戰必先期戰地是為戰所桓十三年公㑹紀侯鄭伯及齊侯宋公衛侯燕人戰傳曰不書所戰後也紀鄭先至期戰公後不及期猶與諸侯共其成敗故備書諸國而不言地是則為內諱爾夫兵加於人一也曰伐曰侵曰襲而其狀分焉臨敵一也曰戰曰敗師曰取師而其狀分焉䇿書如是所以區别其名昭然可知也而二傳乃於內外夷狄之間立說不亦褊乎安在春秋為平恕之書耶執獲例執君十三執臣十執行人六執單伯子叔姬各一君滅一獲君一獲臣五得一獻捷二歸俘一成十五年晉侯執曹伯歸于京師傳曰不及其民也凡君不道於其民諸侯討而執之則曰某人執某侯不然則否執者討罪之辭也春秋執君十餘事或名或否非例所加而例唯在乎執者之所稱天生民而樹之君俾司牧之以為民主若乃肆於民上人懷怨讎諸侯討而執之則從衆討之文稱人以執僖五年晉人執虞公傳曰罪虞且言易也貪璧馬而拒忠諫同於無道及民晉侯假道取虞而稱人以執是已倘身為不義而惡不及民雖執之猶不稱人晉侯執曹伯是已諸稱人以執者未必皆有加民之罪當時赴告欲重其辜多以加民為辭國史承以書䇿而簡牘之記具存仲尼因示虛實以明得失焉僖二十一年執宋公以伐宋宋無德而爭盟諸侯所疾故不言楚執而總見衆國共執之文以貶之是又一例爾行人以通兩國之情古者飛矢在上走驛在下成九年傳曰兵交使在其間可也是其例也若乃肆忿遷怒快意使人譬諸豺狼求食而已經於是顯稱行人以罪執者行人六傳發其三襄十一年楚人執鄭行人良霄傳曰書行人言使人也昭八年楚人執陳行人干徴師殺之傳曰罪不在行人也二十三年晉人執我行人叔孫婼傳曰言使人也因良霄以顯行人之事因干徵師以示非罪之義因叔孫婼以同內外之稱則餘三人皆隨例而知矣濤塗寧喜之屬罪在其身鄭詹行父之流以執政受罪本非使人從實以書皆以罪之鄭祭仲之如宋也非㑹非聘於以見誘而以行人應命不能死節挾僞以篡其君此宜稱行人而不稱是為祭仲之罪矣唯王使不在行人之例無論有罪無罪諸侯不得而執是以不稱行人婦人亦無拘執之義文十四年齊人執單伯齊人執子叔姬所執皆非可執直書之而義不可見與執者討罪之名無論執君執臣法當歸于京師蓋諸侯不得相治禮宜天子治之定元年晉人執宋仲幾于京師執人於天子之側以歸久乃歸之京師故但書所執不書所歸若夫或執以歸或歸諸侯皆非其地或復放之舍之殺之用之皆非其事矣諸如此類傳雖不發例顯書其事而義自明也戰獲之名君死曰滅大夫生死皆曰獲昭二十三年吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧傳曰君臣之辭也此其例也國君社稷之主與社稷宗廟共其存亡者也而身死於敵國國雖存亦書曰滅胡子沈子之滅傳曰吾君死矣是已諸以戰傷死者雖敗而不見禽故不書滅也至夫國亡君存雖出奔若以歸亦皆書滅但彼滅文在上此滅文在下爾通戰敗滅入之間君而被禽在外則曰以歸在內則曰以來莊十年荆敗蔡師于莘以蔡侯獻舞歸哀七年入邾以邾子益來是也僖十五年晉侯及秦伯戰于韓獲晉侯晉侯背賂無親愎諫違卜秦人獲之經不書以歸而謂之獲貶從臣下之例也何以知大夫生死皆曰獲乎宣二年戰于大棘獲宋華元傳稱華元逃歸是生獲矣哀十一年戰于艾陵齊師敗績獲齊國書傳稱歸國子之元是死獲矣然則獲者大夫之名而加之晉侯豈不謂貶焉貶之所稱豈得舉為例乎公羊曰君死於位曰滅生得曰獲不盡然矣定九年得寶玉大弓傳曰書曰得器用也凡獲器用曰得得用焉曰獲物之成器可為人用寶玉大弓是也用器物以有獲若麟為田獲俘為戰獲俘即大夫之被獲者是也軍獲之俘而獻於上謂之獻捷莊三十一年齊侯來獻戎捷傳曰非禮也凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘六年齊人來歸衛俘傳稱衛寶夫敵體之謂遺歸亦遺也遺俘已非禮况又失辭稱獻乎兩者皆譏矣僖二十一年楚人使宜申來獻捷宋捷非四夷之功其譏已明不言宋者上言伐宋省文可知公羊曰不言捷乎宋為襄公諱也榖梁曰不與楚捷乎宋也義在此而求諸彼其無乃蛇足之說與滅取例滅國二十九大去一亡一取國四滅邑三取邑十五入國二十三入邑四歸邑田五墮邑二取田五假田一疆田一遷十降二文十五年晉郤缺帥師伐蔡戊申入蔡傳曰凡勝國曰滅之獲大城焉曰入之宣九年取根牟傳曰言易也成六年取鄟傳曰言易也襄十三年取邿傳曰凡書取言易也用大師焉曰滅弗地曰入昭四年取鄫傳曰言易也鄫叛而來故曰取凡克邑不用師徒曰取滅取入三者言國邑之通例也夫國稱滅邑稱取常也春秋實不論國邑唯以事之難易為辭蓋典䇿之舊法焉傳於文十五年已發滅入之例至襄十三年復發者兵之所加不可細舉故舉舊䇿之典以例而言大師陷敵絶其社稷有其土地謂之勝國則通以滅為文若成師重力雖獲大都得而弗有直以入為辭而已然而國不通邑城不包地滅邑必主大師是故再發例也敵人拒戰斬獲俘馘用力難重雖邑亦曰滅不用師徒及用師徒而不勞雖國亦曰取勝其國邑而不有其地通謂之入莊十三年齊人滅遂僖十七年滅項若此之類是滅國矣隱六年宋人取長葛十年取郜取防若此之類是取邑矣僖二年虞師晉師滅下陽昭十三年吳滅州來是滅邑矣根牟鄟邿是取國矣郤缺入蔡之類是入國矣成七年吳入州來之類是入邑矣故曰三者言國邑之通例也傳發取例者四而皆言易於鄫發凡又言不用師徒不用師徒即易狀也例言克邑而鄟邿根牟皆國知國邑同稱矣取例之四發者邿用師徒鄫受潰叛鄟為附庸根牟為夷四者各不同故事事明之邿為小國非邑非夷因以凡例附之也取鄫之例云不用師徒何以知用而不勞亦曰取乎鄫邑也又叛而來雖解甲戢兵可以坐收其利若諸國之內各有君長僖三年徐人取舒舒又蠻夷之大者也曾是不煩一旅可盡以虛言恐喝之乎若是則當書降不當書取矣春秋之伐國取邑者多矣既稱伐當必有師徒焉僖二十六年公以楚師伐齊取榖宣十年公孫歸父帥師伐邾取繹二者於經又顯稱師豈皆整師不用而諸邑望風來附乎故知取之云者或乘其衰亂或受其潰叛或用少師而不頓兵勞力或因伐國而以餘力得邑通謂之取如取如攜言其易也而不用師徒尤為更易其事亦多有之傳因鄫以申其例其實用師徒者多也取邑既易則取田亦易成二年取汶陽田乞師盟主興兵伐齊得之既難而亦書取者晉使齊人還我魯不加兵是以從易言之爾隱八年鄭伯使宛來歸祊我入祊桓元年鄭伯以璧假許田祊者鄭祀泰山之邑其田近魯許者魯國朝宿之邑其田近鄭而有周公之廟鄭欲以祊易許田各從本國之宜遜辭以求請釋泰山而祀周公故使宛來歸祊經言入祊未肯受而有其地也桓元年鄭伯復請卒易祊田實以祊易許田而經書璧假魯不宜聽鄭祀周公又不宜取祊田言若進璧以假田非久易者史䇿諱惡之辭也春秋之取例有二用之於師則為覆而敗之加之國邑土田皆言易也入例亦有二在於歸復則為國逆施於國邑土田皆弗地也文同義異適乎立文之宜而已諸田之書來歸歸我歸之于疆田皆因史成文詳録內事無義例也定十二年叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費墮者毁其城邑三都彊盛以奪三家之權陪臣執命下陵上替是以仲由墮之孔子不禁帥師登臺僅而獲克直書其事以示三家之彊亦無例也文三年秦人伐晉傳稱取王官及郊襄二十三年齊侯伐衛遂伐晉傳稱取朝歌竝書伐不書取隱四年莒人伐把取牟婁伐取兩書者彼告伐不告取此伐取兩告猶諸伐國圍邑者或書或否非例所加悉從告辭為詳略爾滅國而虜其君曰以歸其君逃亡曰奔某莊十年齊師滅談談子奔莒僖二十六年楚人滅夔以夔子歸此類是也若不言以歸又不言奔蓋其君死矣就事而書皆非義例唯秦人取梁仲尼以變文貶之僖十九年梁亡傳曰不書其主自取之也作事不時則怨讟動於民梁伯虛興無益之功詐稱無害之寇蕩百姓而啓大國之心亡徵已先兆矣以自亡為文非取者之罪也莊四年紀侯大去其國傳稱以國與季社稷有奉故不言滅不見迫逐故不言奔不忍屈辱自違其國大去者不反之辭時史據實而言仲尼因之傳無書曰故書之文知非聖人新意矣春秋之例滅同姓者書名僖二十五年衛侯燬滅邢傳曰同姓也故名斯其例也滅國己非而親親相殘為惡尤甚故斥名以罪之也僖五年晉人執虞公方示罪虞之例且晉人修虞之祀歸貢於王是以免於滅同姓之譏二十六年楚人滅䕫䕫有不祀之罪親親已絶是以無貶襄六年齊侯滅萊萊人恃謀不㑹齊命齊侯遷萊于郳未絶其世故亦無譏也入既以弗地為例故其國雖絶亦止曰入僖三十三年秦人入滑傳稱滅滑而還不有其地也閔二年狄入衛哀八年宋公入曹據傳皆滅國取地而皆不書滅何也狄無文告衛之君臣盡死齊桓公欲以存衛播告諸侯言狄已去不能有其地矣故不書滅而書入曹人背晉奸宋宋師致討既還而詬之怒而復反遂以滅曹滅非本志故以入告也公羊曰諱同姓之滅也何諱乎同姓之滅力能救之而不救也夫前此有力而不救者多矣何故不譏至此而式微已甚何力之有哉徙其民人曰遷脅而服之曰降僖元年邢遷于夷儀三十一年衛遷于帝丘成十五年許遷于葉昭九年許遷于夷十八年許遷于白羽定四年許遷于容城哀二年蔡遷于州來皆彼所欲遷故以自遷為文莊元年齊師遷紀郱鄑郚十年宋人遷宿閔二年齊人遷陽皆迫而遷之故以齊宋為文也莊八年師及齊師圍郕郕降于齊師彼畏而來降也三十年齊人降鄣此遙以兵威迫之也此皆據事以書非例也世之治也八柄之權掌於大宰九伐之法統自夏官治之不能不亂也周公爰立滅取之名以為䇿書之法然而典䇿有其號周官不備其文禮樂征伐自諸侯出聖人惡之久矣曰遷曰降雖典䇿亦無其例總皆亂世之事春秋之於爭國攘地未見有善文也齊襄逼紀而公羊大其復讎嗚呼其亦不思而已矣左傳事緯前集卷三
