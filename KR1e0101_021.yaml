body:
  text: 左傳事緯前集卷八靈璧知縣馬驌撰左傳事釋通用傳去聲訓也續也遞也傳也又音囀馹車也解上聲音蟹地名人名去聲作懈又悟也説去聲作稅入聲作悅或作脫徼平聲音邀求也又作邀又音驕幸也女上聲作汝去聲納女於人也厭平聲作饜上聲作掩入聲作壓適入聲作嫡又作謫又音的定也費去聲音味人姓音祕人名又邑名觀上聲國名去聲臺類又卦名向上聲人名去聲音餉地名又人姓比平聲音皮人名去聲音避黨也卒入聲作猝又子律反終也任平聲人名又當也又佞也上聲孕也間本從月俗從日非平聲音間暇也去聲與也錯也隙也差平聲音叉吳子名去聲音嘬較也又病除也射入聲音石射之也又音亦人名又律名又音夜亦人名辟本音碧法也君也又除也去聲作譬又作避入聲作闢又作僻幾平聲微也尚也近也危也又幾會又人名去聲作冀耆上聲音旨去聲作嗜屬入聲音燭聯也托也質去聲作贄又相贅也祭去聲音瘵邑名又人姓兩上聲作掚去聲乘也匹也齊平聲作齋去聲作劑要平聲作腰又求也劫也稅去聲音退追服也入聲作脫針平聲音鉗人名地名莫去聲作暮入聲音陌罷平聲音皮人名又作疲免去聲作絻音問又人名難平聲音那又去聲艱也麇平聲作羣上聲音稇作乘去聲車也又同車也施去聲與也又音異及也賈上聲音古去聲作價還平聲音旋師還也雍去聲作壅又地名虛平聲作墟音區共平聲作恭又作供食去聲音嗣食人也應平聲國名又當也且平聲音疽人名思平聲音腮作䰄卷平聲音權地名從去聲侍也或作縱句平聲作勾又作劬員平聲音云人名羮平聲音郎邑名爽平聲作驦駿馬名純平聲音屯地名識去聲音志作志中去聲當也注的也姓平聲音生人名道去聲作導又言也部上聲作培鄉去聲作向塞去聲音賽貫去聲作慣衰平聲音崔黨上聲音掌縣平聲繫也穀上聲奴走反孫去聲作遜奉上聲作捧飲去聲飲人也百入聲作陌馮平聲作慿枕去聲枕之也竟上聲作境輅去聲作迓路作輅本音傅去聲作附鞠平聲作芎趣入聲音促桀入聲作磔推平聲他回反妃去聲作配災平聲作災內入聲作納校去聲作效亨平聲作烹艾去聲作刈瀆去聲音豆只上聲音旨召去聲作邵頗平聲偏也責去聲作債敖去聲作傲焦平聲作憔載上聲年也蓼入聲音六將平聲音鏘稱去聲副也張去聲作脹灑上聲作洗大去聲作太冒入聲音墨斐平聲人姓葉入聲音攝壇上聲音善蕰去聲作藴陳去聲作陳招平聲音韶感入聲作憾不上聲作否蒲平聲作匍伏入聲作匐鬻入聲作粥關平聲音彎姦平聲音干震平聲作娠蛇平聲音移著入聲直略反率入聲音律矜平聲作鰥創平聲作瘡索入聲山責反介去聲作個藉去聲作慈夜反蓋入聲音合舍上聲作捨取去聲作娶信平聲作伸居平聲音基助語逢平聲音龎人姓否上聲音丕植去聲音治主將也陶平聲音遙焞平聲音吞闕入聲作掘行去聲巡視也訾婁音資慮扶伏作匍匐直音人部儋擔傒兮儳讒鯈紬叟叟佻挑僂呂傴嫗僔撙伉亢儷麗俊俊刀部劓刈劌貴刜勿刲奎簫朔又簫剌辣刺次劖慚女部媯規姞吉嫠釐姺跣婼綽姆茂嫳撇嫚慢婤周妵他口反姶罨娵苴媵孕妘云娠身震二音口部咺烜嘷豪唁彥嘖責咋澤唶借咮晝嗾叟詬吼呰紫嗀黑角反土部塿力斗反塈戲堙因圻祈圬烏塓覓堊惡塤暄埴直墉庸坻止瘞意墠善塴逋鄧反廣部牆墻庀嚭庈琴廑覲彡部耐而彤同巾部幘責裙裙尤部尨芒尪汪弓部韜叨彄摳弭米心部婪力南反憖魚覲反惎忌悝恢悛詮懻記慆滔手部抶叱擐患掀軒摦話掎几捘逡捥蜿拿袽挶掬撊僩抒黍掫諏撎意掚兩月部脤腎脰豆朐渠胹而膇墜胠區肓荒腯突膈傳作鬲腶段假别肸迄膊博膞轉木部櫕攢櫟歷櫜高榼磕朾汀樗樞杙弋枵囂橛掘橁春檛柤柲祕棼焚柤查柣迭桔結櫬襯椓琢枹浮槖託柞昨楯吮柷觸栫薦柎附楄駢棫域樠朗擕醉檮桃櫛側乞反水部湨古闃反濰維泂迥汜似汜凡又泛泠伶漷郭洮桃泜帝汋酌淖閙溷慁洧偉浞濁汾文瀋昌枕反濘寧滍雉洎寄渻省湧勇澨筮滸虎泱央渢馮濩護汭遂湫啾澶蟬火部熒榮焜昆熸尖焮釁熬翺燠郁燀闡焞純燉屯燬毁日部旰幹昳絰昵尼質反欠部欿大感反歜徂感反歂傳支部敔語敳五才反毛部氂釐毳蚩瑞反方部旐兆旝檜牛部犣獵犖洛犫紬牼坑牷全犬部獳奴候反獮跣猈皮犴岸㲋綽獒敖歹部殱纎殣堇目部睅莞眢寃瞢懵瞀茂矔貫眕軫瞞鰻睔棍眅攀眚省瞫審睢雖玉部玤棒瑗院瑱震瓘貫璵豫璠煩瓚才贊反玦決珽挺珧姚珌必璗蕩璆求璜黃瑰回玨角石部碏鵲砭悲亷反磔責示部祓弗祧挑禜詠禖梅祏石祲侵祊必彭反祔附禚酌禋因祟粹田部畚本畤止畛珍町挺禾部秬巨秣末穮標秕鄙稗敗秆幹稡卒穴部窖溜窀屯穸夕窋竹律反竀柳窆陂驗反疒部疸亶痎皆痁苫瘈制痤嵯瘥嵯瘯簇廢廢皿部盬古盥管瓦部甍萌甗彥糸部繄衣纁勳組祖絓卦縶執紝壬繻須紇轄紼弗綪茜繾譴綣勸縛符約反繇由絻問縵謾綆梗縋墜紞都感反紘宏綖延繂律絿求緡民繠蘃縳篆縠斛縷呂纊曠竹部篳必笄雞笫子蟲部螭癡蚠忿蝥矛蟜喬蠆嘬􅈮域螽中蝝緣蚡粉蠜煩蜚非虺卉缶部罍雷甕甕􅧲陷罃鶯羊部牂臧羯訐羭俞衣部襚遂襘檜衵日裯稠袪區褘輝袲侈褚貯草部荐在甸反蒍偉薀溫蔇忌菅姦萇長萑丸葴斟蕕猶蔑滅莬徒芮遂苴葅堇謹菁精爇如悅反茷肺蓐辱菆鄒茀弗萩秋茢列蔉袞茸戎萴則藟纍蘀托芈米韡偉蓼了薳偉虍部􅕝暴虒斯足部躒歷跪求委反蹊兮蹲存跗附踣匐跦朱蹯煩躗火怪反跳調蹕必躓志踏沓言部諜牒讟讀嘻僖諗審詬詬諂滔諂别走部躍剔趡翠軌反赳九趄爰同邑部邘于郕成郰鄒鄟專鄆運鄋搜鄇侯邶佩酀燕鄑滋酁讒鄶檜鄣章郠梗鄎息鄖云郹鴂邽圭酆豐邿詩鄐蓄鄸蒙郳倪鄫繪鄀若鄗敲邲必鄍冥鄤瞞鄬偉鄢煙鄵糙郟夾鄏辱塢塢郜告郇荀酅兮鄄絹郤隙􅮖沈鄩尋鄾憂邗寒邧阮酈離辵部逖剔遄傳遒酋逖剔迋旺又誑迸北孟反簉初救反車部轘患軘屯轏棧軷跋轄黠挽晚翬輝輈舟輿預軨令輻福軼逸轑遼軥劬貝部賵諷賸剩蕆闡豕部豷意豭加角部觥古橫反觩虯豸部貜躩貙區見部覬冀覦于金部鋌挺鏚戚鏃簇鉏鋤同鑋磬鈹披鍥挈銔壞錫揚錫别鑣標鍇楷鎛博錞隊門部閻簷閼遏閈扞閎𢎞閟祕闞勘闉因闃苦鴂反闋缺阜部隰習隤頽陘刑阪反陴皮隧遂隈煨隃同逾雨部霣隕霤溜隹部雃牽雂鉗睢苴頁部資頜閣頡曵頎祈纇類顆苦果反頯葵頷五感反食部饘旃叨叨餮鐵饁葉飧孫餞踐餫鄆革部鞶盤􅙽偉鞏拱鞬肩鞮低韅憲靷孕靽半鞞丙鞛布孔反鞘肖鞫掬風部飂溜揚揚馬部駘台駹厖騑非馹日騶鄒騅追駵留鬥部鬩呼歷反闞喊鬬俗鬪同髟部髽查髢替髲避鬒軫韋部韎昧韠必鬼部魑鴟魅昧鳥部鷁逆鸜瞿鵒欲瞗疽鶻胡骨反鶬倉鴳晏鷃同鷩鱉鷦追鴶戞鵴掬鷷尊鶅淄鵗希鳻文鶞春鳶鳶同鶩木鷸聿魚部鱣專鮪偉鰷條鱨常魴房鱄專鰌秋黑部黶奄黰軫黝於九反鹿部麀憂麕均麇均麋糜粗粗粗與粗同麑迷鼠部鼬又鼷兮鼯吾􅢓部贏盈裸裸羸雷齒部齮倚齔襯齹嵯雜部屝吠扉别鼆猛圄語匜移斚假巖巖同衁荒勦子小反匕比蠲捐寪偉主偷上黃聲罥絹嘏賈戭衍玈盧矞聿赭者砥旨殳殊鬷宗奊潔卣酉翣喋骼格馘虢嚳酷左傳事緯前集卷八
