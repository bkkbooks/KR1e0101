body:
  text: 左傳事緯卷三靈璧知縣馬驌撰晉文建霸僖二十三年晉公子重耳之及於難也晉人伐諸蒲城蒲城人欲戰重耳不可曰保君父之命而享其生禄於是乎得人有人而挍罪莫大焉吾其奔也遂奔狄從者狐偃趙衰顚頡魏武子司空季子狄人伐廧咎如獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉請待子處狄十二年而行過衞衞文公不禮焉出於五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之及齊齊桓公妻之有馬二十乗公子安之從者以為不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懐與安實敗名公子不可姜與子犯謀醉而遣之醒以戈逐子犯及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤自貳焉乃饋盤飱寘璧焉公子受飱反璧及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉叔詹諌曰臣聞天之所啓人弗及也晉公子有三焉天其或者將建諸君其禮焉男女同姓其生不蕃晉公子姬出也而至於今一也離外之患而天不靖晉國殆將啟之二也有三士足以上人而從之三也晉鄭同儕其過子弟固將禮焉况天之所啟乎弗聽及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舎若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寛忠而能力晉侯無親外内惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懐嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也何以卑我公子懼降服而囚他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜二十四年春王正月秦伯納之不書不告入也及河子犯以璧授公子曰臣負羈絏從君廵於天下臣之罪甚多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧于河濟河圍令狐入桑泉取臼衰二月甲午晉師軍于廬柳秦伯使公子縶如晉師師退軍于郇辛丑狐偃及秦晉之大夫盟于郇壬寅公子入于晉師丙午入于曲沃丁未朝于武宫戊申使殺懐公于髙梁不書亦不告也吕郤畏偪將焚公宫而弑晉侯寺人披請見公使讓之且辭焉曰蒲城之役君命一宿女即至其後余從狄君以田渭濱女為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在女其行乎對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鉤而使管仲相君若易之何辱命焉行者甚衆豈唯刑臣公見之以難告三月晉侯潛㑹秦伯于王城己丑晦公宫火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦伯送衞於晉三千人實紀綱之僕初晉侯之豎頭須守藏者也其出也竊藏以逃盡用以求納之及入求見公辭焉以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為羈紲之僕其亦可也何必罪居者國君而讐匹夫懼者甚衆矣僕人以告公遽見之晉侯賞從亡者介之推不言禄禄亦弗及推曰獻公之子九人唯君在矣惠懐無親外内棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜況貪天之功以為己力乎下義其罪上賞其姦上下相䝉難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隠焉用文之是求顯也其母曰能如是乎與女偕隠遂隠而死晉侯求之不獲以緜上為之田曰以志吾過且旌善人二十五年秋秦晉伐鄀楚鬬克屈禦㓂以申息之師戍商密秦人過析隈入而係輿人以圍商密昏而傅焉宵坎血加書偽與子儀子邊盟者商密人懼曰秦取析矣戍人反矣乃降秦師秦師囚申公子儀息公子邊以歸楚令尹子玉追秦師弗及遂圍陳納頓子于頓衞人平莒于我十二月盟于洮修衞文公之好且及莒平也二十六年春王正月公㑹莒兹㔻公寗莊子盟于向尋洮之盟也齊師侵我西鄙討是二盟也夏齊孝公伐我北鄙衞人伐齊洮之盟故也公使展喜犒師使受命于展禽齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以紏合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也宋以其善於晉侯也叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取榖凡師能左右之曰以寘桓公子雍於榖易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫於楚二十七年夏齊孝公䘚有齊怨不廢䘮紀禮也楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵于蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政于子玉曰以靖國也靖諸内而敗諸外所獲㡬何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣苟入而賀何後之有冬楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新昏於衞若伐曹衞楚必救之則齊宋免矣於是乎蒐于被廬作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣說禮樂而敦詩書詩書義之府也禮樂徳之則也德義利之夲也夏書曰賦納以言明試以功車服以庸君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍譲於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犫為右晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懐生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣乎子犯曰民未知禮未生其共於是乎大蒐以示之禮作執秩以正其官民聽不惑而後用之出榖戍釋宋圍一戰而霸文之教也二十八年春晉侯將伐曹假道于衞衞人弗許還自南河濟侵曹伐衞正月戊申取五鹿二月晉郤縠卒原軫將中軍胥臣佐下軍上徳也晉侯齊侯盟于斂盂衞侯請盟晉人弗許衞侯欲與楚國人不欲故出其君以說於晉衞侯出居于襄牛公子買戍衞楚人救衞不克公懼於晉殺子叢以說焉謂楚人曰不䘚戍也晉侯圍曹門焉多死曹人尸諸城上晉侯患之聽輿人之謀曰稱舎於墓師遷焉曹人兇懼為其所得者棺而出之因其兇也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也魏犫顚頡怒曰勞之不圖報於何有爇僖負羈氏魏犫傷於胷公欲殺之而愛其材使問且視之病將殺之魏犫束胷見使者曰以君之靈不有寧也距躍三百曲踊三百乃舎之殺顚頡以狥于師立舟之僑以為戎右宋人使門尹般如晉師告急公曰宋人告急舎之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舎我而賂齊秦藉之告楚我執曹君而分曹衞之田以賜宋人楚愛曹衞必不許也喜賂怒頑能無戰乎公說執曹伯分曹衞之田以畀宋人楚子入居于申使申叔去榖使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有徳不可敵此三志者晉之謂矣子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告於晉師曰請復衞侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讐已多將何以戰不如私許復曹衞以攜之執宛春以怒楚既戰而後圖之公說乃拘宛春於衞且私許復曹衞曹衞告絶於楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎㣲楚之惠不及此退三舎辟之所以報也背惠食言以亢其讐我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舎楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次于城濮楚師背酅而舎晉侯患之聽輿人之誦曰原田每每舎其舊而新是謀公疑焉子犯曰戰也戰而㨗必得諸侯若其不㨗表裏山河必無害也公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之思小惠而忘大恥不如戰也晉侯夣與楚子搏楚子伏已而盬其腦是以懼子犯曰吉我得天楚伏其罪吾且柔之矣子玉使鬬勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉晉侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乘敬爾君事詰朝將見晉車七百乗韅靷鞅靽晉侯登有莘之虚以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣䝉馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曵柴而偽遁楚師馳之原軫郤溱以中軍公族横擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其䘚而止故不敗晉師三日館榖及癸酉而還甲午至于衡雍作王宫于踐土鄉役之三月鄭伯如楚致其師為楚師既敗而懼使子人九行成于晉晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯侑王命尹氏及王子虎内史叔興父䇿命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國紏逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲癸亥王子虎盟諸侯于王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而𤣥孫無有老幼君子謂是盟也信謂晉於是役也能以德攻初楚子玉自為瓊弁玉纓未之服也先戰夣河神謂己曰畀余余賜女孟諸之麋弗致也大心與子西使榮黄諌弗聽榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連榖而死晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉己而已不在民矣城濮之戰晉中軍風于澤亡大斾之左旃祁瞞奸命司馬殺之以狥于諸侯使茅茷代之師還壬午濟河舟之僑先歸士㑹攝右秋七月丙申振旅愷以入于晉獻俘授馘飲至大賞徴㑹討貳殺舟之僑以狥于國民於是大服君子謂文公其能刑矣三罪而民服詩云惠此中國以綏四方不失賞刑之謂也冬㑹于温討不服也是㑹也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明徳也壬申公朝于王所丁丑諸侯圍許晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為㑹而封異姓今君為㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衞偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舎此三者君將若之何公說復曹伯遂㑹諸侯于許二十九年夏公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不㑹公侯㑹伯子男可也三十年春晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也夏狄侵齊九月甲午晉侯秦伯圍鄭以其無禮于晉且貳于楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也己公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益于君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舎鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯說與鄭人盟使杞子逢孫楊孫戍之乃還子犯請擊之公曰不可㣲夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之東門襄仲將聘于周遂初聘于晉三十一年春取濟西田分曹地也使臧文仲往宿于重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅于濟盡曹地也襄仲如晉拜曹田也三十二年春楚鬭章請平于晉晉陽處父報之晉楚始通晉文之入國也年已六十二矣路車乘黄方報秦施而吕郤之難復作焉以遲暮之年當患難之後覇業一成數世因之何其遇之艱而功之偉乎宋襄不競楚氛日惡蠶食中國凌虐諸姬泓戰一勝而宋求成頓子既納而陳聽命且齊孝廢職魯人求援以宗國之大􅌂然托重於蛇豕晉若不起中國之勢必至大潰區區宋齊而可與抗乎文公見晉霸之成在此一舉也即諸夏之振在此一舉也示信義以服民用詩書以選將計成謀定奮志決䇿先挾必勝之勢而後用兵焉一戰得雋荆蠻敗衂楚方收其殘夷而晉之霸業已赫然於天下矣昔齊桓之世楚非不彊也然用師不過淮漢之間中國諸侯未至大病既而召陵觀兵屈完來盟齊無亡矢遺鏃之費而楚服焉今日者楚勢方熾號召中國盟薄以來諸夏咸拱手以聽命非用大創楚豈輕服即中國之諸侯亦未敢輒相信也文公復二國以助已執一使以怒敵我得其利楚受其愚城濮一㨗諸侯景赴於是鷩冕上賜牛耳獨執中國日以睦楚人乃不敢北視矣故召陵之師較晉為逸而城濮之績視齊為烈時勢不同遲速異效桓文之事正未可以低昻也說者謂文之入也龍蛇作歌胼胝居後誅觀狀于鄭國責乘軒于曹人請隧召王威偪天子凡其舉動大抵報復私讐不顧禮義則較之齊桓為不侔焉然孔子不云乎晉文譎而不正齊桓正而不譎論其功雖無大小之殊而考其心不無邪正之異也至如齊桓方沒五子交争晉文既薨數世繼霸則善後之術是又文之勝於桓者爾衞元咺搆訟僖二十八年衞侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟或訴元咺於衞侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衞侯寗武子與衞人盟于宛濮曰天禍衞國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不貳衞侯先期入寗子先長牂守門以為使也與之乘而入公子歂犬華仲前驅叔武將沐聞君至喜捉髪走出前驅射而殺之公知其無罪也枕之股而哭之歂犬走出公使殺之元咺出奔晉衞侯與元咺訟寗武子為輔鍼莊子為坐士榮為大士衞侯不勝殺士榮刖鍼莊子謂寗俞忠而免之執衞侯歸之于京師寘諸深室寗子職納槖饘焉元咺歸于衞立公子瑕三十年晉侯使醫衍酖衞侯寗俞貨醫使薄其酖不死公為之請納玉於王與晉侯皆十㲄王許之秋乃釋衞侯衞侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適子儀公入祀先君周冶既服將命周歂先入及門遇疾而死冶厪辭卿三十一年冬狄圍衞衞遷于帝丘卜曰三百年衞成公夢康叔曰相奪予享公命祀相寗武子不可曰鬼神非其族類不歆其祀杞鄫何事相之不享於此久矣非衞之罪也不可以閒成王周公之命祀請改祀命三十二年夏狄有亂衞人侵狄狄請平焉秋衞人及狄盟文四年衞寗武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾楚衞新婚晉文圖霸侵曹伐衞以致楚師衞成公懼其無禮且不假道也越在襄牛旋又適楚奔走逃避不敢寧處故叔武攝位元咺奉以受盟而成公獲反國焉叔武之賢也譲位不獲蒙難盟霸元咺之忠也殺子不顧卒安社稷衞雖多難頼二子繾綣其間庶幾克協衞尚可以無事也成胡不信反覆懐疑宛濮之口血未乾輒先期以入叔武被殺衞患復興左氏曰公子歂犬射殺之非公志也公羊氏曰成公怒武之簒也咺諌不聽而卒殺之叔武之死雖莫能定要以訴言一入而咺子先死瀆盟失期中懐忌刻歂犬一矢不可謂非成公之志也雖然骨肉相殘罪在成公君臣搆訟罪在元咺晉人不察為臣執君天王曰君臣無獄君臣皆獄父子將獄信斯言也晉可釋衞乃君寘深室咺别奉主為此舉也亦云過矣薄酖免死醫亦不誅納玉復國竟亦殺瑕曾㡬何時而衞之兄弟君臣數相夷也昔齊桓公之為霸也存三亡國今晉文一戰而曹衞幾亡罪晉者曰衞國之亂文公為之世衰道㣲功利是急霸業之中亦有升降焉大難甫息遷國圖存寗子之謀厥為長慮非曰予得吉卜遂棄先君之終焉允臧者也或曰寗武子之事成公也先無道而後有道吾攷元咺之獄紛紛三載嗣是以來國中無事無道短而有道長則猶為春秋之令主也鄭穆之立僖十六年冬十一月乙卯鄭殺子華二十四年鄭子華之弟子臧出奔宋好聚鷸冠鄭伯聞而惡之使盜誘之八月盜殺之于陳宋之間君子曰服之不衷身之災也詩曰彼己之子不稱其服子臧之服不稱也夫詩曰自詒伊慼其子臧之謂矣夏書曰地平天成稱也三十年初鄭公子蘭出奔晉從於晉侯伐鄭請無與圍鄭許之使待命于東鄭石甲父侯宣多逆以為大子以求成于晉晉人許之三十一年鄭洩駕惡公子瑕鄭伯亦惡之故公子瑕出奔楚三十三年楚令尹子上侵陳蔡陳蔡成遂伐鄭將納公子瑕門于桔柣之門瑕覆于周氏之汪外僕髠屯禽之以獻文夫人歛而𦵏之鄶城之下宣三年冬鄭穆公卒初鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎公曰諾生穆公名之曰蘭文公報鄭子之妃曰陳媯生子華子臧子臧得罪而出誘子華而殺之南里使盜殺子臧于陳宋之間又娶于江生公子士朝于楚楚人酖之及葉而死又娶于蘇生子瑕子俞彌俞彌早䘚洩駕惡瑕文公亦惡之故不立也公逐羣公子公子蘭奔晉從晉文公伐鄭石癸曰吾聞姬姞耦其子孫必蕃姞吉人也后稷之元妃也今公子蘭姞甥也天或啟之必將為君其後必蕃先納之可以亢寵與孔將鉏侯宣多納之盟于大宫而立之以與晉平穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒鄭文公之子六人惟穆存焉穆公之生也有夣蘭之祥有姞甥之吉是以子孫孔多七穆蕃庶石癸之言卒驗焉誠如是也鄭之將興止在燕姞一女子乎余獨謂不然昔桓公受封國人便愛入為司徒周民和集而犬戎作難竟死王室武公繼之爰定東周是鄭之先葢嘗有功于國有造于民殆有必興之理即無燕姞穆公固將生也七穆者何穆公之子十有三人靈襄嗣位公子嘉誅子然士子孔之族奔楚羽氏適晉不在其數其餘罕氏駟氏國氏良氏游氏豐氏印氏謂之七穆宋之盟七子賦詩則七族也韓起之聘六卿賦詩其時良氏㣲矣終春秋世穆族代為卿也因並記之秦穆霸西戎僖三十二年冬晉文公卒庚辰將殯于曲沃出絳柩有聲如牛卜偃使大夫拜曰君命大事將有西師過軼我擊之必大㨗焉把子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師之所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉秦師遂東三十三年春秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將歩師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衞且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以閒敝邑若何杞子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾䘮而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂𤼵命遽興姜戎子墨衰絰梁𢎞御戎萊駒為右夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以𦵏文公晉於是始墨文嬴請三帥曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舎之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長㓂讐亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼔使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大徳文元年殽之役晉人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政二年春秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師戰于殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而退亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣秦伯猶用孟明孟明増修國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而増徳不可當也詩曰母念爾祖聿修厥徳孟明念之矣念徳不怠其可敵乎冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役卿不書為穆公故尊秦也謂之崇徳三年秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之壹也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉四年秋晉侯伐秦圍邧新城以報王官之役五年初鄀叛楚即秦又貳於楚夏秦人入鄀六年秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎詩曰人之云亡邦國殄瘁無善人之謂若之何奪之古之王者知命之不長是以竝建聖哲樹之風聲分之采物著之話言為之律度陳之藝極引之表儀予之法制告之訓典教之防利委之常秩道之以禮則使勿失其土宜衆𨽻頼之而後即命聖王同之今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也中國不可一日無霸也齊桓既沒晉文未興曠八年而無霸矣無霸而有霸則秦穆公為之也穆公初立齊桓方盛征伐盟㑹不一及秦不惟不及秦且不及晉獻公内亂易樹子以妾為妻葵丘之㑹所首戒也興師致討宜莫如晉而桓若不聞焉何則桓猶獻也如夫人者六人宫中姊妹不嫁已先多瑕何以正人故里克兩弑卒莫能定也秦穆公奮然有為再置晉君城濮一戰文公遂霸君子曰晉之霸也秦穆其有焉定晉之亂成文之功左右霸主中國再振齊桓所不能為者穆能為之雖謂之霸亦未嘗不可也秦晉世好加以婚媾乃圍鄭之役秦受私盟二國之畔於此焉始既而秦人襲鄭晉襄擊之隻馬不反春秋于是大惡秦也斥之為狄為其貪鄰國違黄髪亂人男女䘮其師徒也穆公悔過而能用賢彭衙再敗又復増徳三舉而晉人不能争方之蕭魚庶幾同烈轉敗為功賢孰大焉左氏大其悔過也為之張其詞曰遂霸西戎豈不偉哉書載秦誓取其悔過詩録秦風譏其殺良其亂命可戒其用賢可法秦穆之為秦穆盡於此也晉襄繼霸僖三十三年狄侵齊因晉䘮也狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生初臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫反自箕襄公以三命命先且居將中軍以再命命先茅之縣賞胥臣曰舉郤缺子之功也以一命命郤缺為卿復與之冀亦未有軍行晉陳鄭伐許討其貳於楚也文元年晉文公之季年諸侯朝晉衞成公不朝使孔逹侵鄭伐緜訾及匡晉襄公既祥使告于諸侯而伐衞及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王于温先且居胥臣伐衞五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子衞人使告于陳陳共公曰更伐之我辭之衞孔逹帥師伐晉君子以為古古者越國而謀秋晉侯疆戚田故公孫敖㑹之二年晉人以公不朝來討公如晉夏四月己巳晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也公未至六月穆伯㑹諸侯及晉司空士縠盟于垂隴晉討衞故也書士縠堪其事也陳侯為衞請成于晉執孔逹以説三年春莊叔㑹諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰在上曰逃衞侯如陳拜晉成也晉人懼其無禮於公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂四年春晉人歸孔逹于衞以為衞之良也故免之夏衞侯如晉拜曹伯如晉㑹正六年臧文仲以陳衞之睦也欲求好於陳夏季文子聘于陳且娶焉秋季文子將聘于晉使求遭䘮之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害八月乙亥晉襄公卒冬十月襄仲如晉𦵏襄公七年晉郤缺言於趙宣子曰日衞不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懐非威非懐何以示徳無徳何以主盟子為正卿以主諸侯而不務徳將若之何夏書曰戒之用休董之用威勸之以九歌勿使壊九功之徳皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正徳利用厚生謂之三事義而行之謂之徳禮無禮不樂所由叛也若吾子之徳莫可歌也其誰來之盍使睦者歌吾子乎宣子說之八年春晉侯使解揚歸匡戚之田于衞且復致公壻池之封自申至于虎牢之竟襄公即位戰殽以却秦敗箕以翦狄伐許以離楚一歳而退三彊其善繼文業者哉而説者謂墨絰即戎厄人於險實開秦晉七十二年兵争之始則襄為病焉雖然未為過也秦穆雄視西戎積有年日當晉文之初薨而興師以窺中原此其志將欲圖霸也襲鄭入滑漸将及晉既而長驅諸夏東方之諸侯非晉有矣殽戰一勝晉始復振終襄之世與秦五争而不勝者止一穆公遂卒焉秦之不能病中國皆襄公力也狄乘晉䘮故一戰而獲其君文公之霸許人不至故帥二國以伐之夫中國為霸所病者秦楚與狄而已今一舉而三者莫與争也病霸者去而霸成矣文襄所由并稱也然而有異焉文公之業首在制楚襄公之業首先制秦制楚者天下之公制秦者一人之私襄惟先其私而後其公故終身不能病楚夾泜之陣求紓以退商臣弑立坐失事幾乃頻年興師止在小國得衞沈而失江蓼垂隴之盟委諸大夫楚氛日甚卒莫能問也其志衰其功墮矣享年不永功業漸㣲以視墨絰視師獲秦三帥時何前後之不侔也是則襄之可議者爾公孫敖之奔文公元年春王使内史叔服來㑹𦵏公孫敖聞其能相人也見其二子焉叔服曰榖也食子難也收子榖也豐下必有後於魯國七年穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉冬徐伐莒莒人來請盟穆伯如莒涖盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之公將許之叔仲惠伯諌曰臣聞之兵作於内為亂於外為宼宼猶及人亂自及也今臣作亂而君不禁以啟宼讐若之何公止之惠伯成之使仲舎之公孫敖反之復為兄弟如初從之八年秋襄王崩穆伯如周弔䘮不至以幣奔莒從己氏焉十四年穆伯之從己氏也魯人立文伯穆伯生二子於莒而求復文伯以為請襄仲使無朝聽命復而不出三年而盡室以復適莒文伯疾而請曰榖之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告䘮請𦵏弗許十五年齊人或為孟氏謀曰魯爾親也飾棺寘諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之䘮為孟氏且國故也𦵏視共仲聲已不視帷堂而哭襄仲欲勿哭惠伯曰䘮親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬䘮哀情雖不同毋絶其愛親之道也子無失道何怨于人襄仲說帥兄弟以哭之他年其二子來孟獻子愛之聞於國或譖之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎逺禮不如死一人門于句鼆一人門于戾丘皆死魯之弱也由於三桓而三桓之僭起於孟氏自慶父不道魯人失罰為之立後是魯國之無政也敖當僖公之世雖嘗帥師止奉覇令猶未見其專政也迨乎文公而專之形遂成矣兩㑹諸侯侈然得志實為春秋以來大夫專㑹諸侯之始焉罪人之餘幸而不廢輒得政柄嗣是得臣行父帥師城邑三家之勢於是遂成總由孟氏為之先也敖争己氏以幣奔莒狥欲肆淫廢棄君命倘數其罪而除其世且以振慶父之惡彼二氏者庶知懼矣魯無法紀聽其出入至客死而猶歸其䘮孟氏至此何所忌乎孟氏侈而三家俱侈孟氏固而三家俱固魯之不振非無因也楚穆圖北方僖三十三年晉陽處父侵蔡楚子上救之與晉師夾泜而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舎子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲渉大孫伯曰不可晉人無信半渉而薄我悔敗何及不如紓之乃退舎陽子宣言曰楚師遁矣遂歸楚師亦歸大子商臣譖子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上文元年初楚子將以商臣為大子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聽既又欲立王子職而黜大子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芈而勿敬也從之江芈怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王請食熊蹯而死弗聽丁未王縊謚之曰靈不瞑曰成乃瞑穆王立以其為大子之室與潘崇使為大師且掌環列之尹九年范山言于楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平公子遂㑹晉趙盾宋華耦衞孔逹許大夫救鄭不及楚師卿不書緩也以懲不恪夏楚侵陳克壺丘以其服于晉也秋楚公子朱自東夷伐陳陳人敗之獲公子茷陳懼乃及楚平十年初楚范巫矞似謂成王與子玉子西曰三君皆將強死城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶王使適至遂止之使為商公㳂漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為工尹又與子家謀弑穆王穆王聞之五月殺鬭宜申及仲歸陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以狥或謂子舟曰國君不可戮也子舟曰當官而行何彊之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟彊也敢愛死以亂官乎十一年夏叔仲惠伯㑹晉郤缺于承匡謀諸侯之從于楚者十三年冬公如晉朝且㝷盟衛侯㑹公于沓請平于晉公還鄭伯㑹公于棐亦請平于晉公皆成之鄭伯與公宴于棐子家賦鴻雁季文子曰寡君未免於此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜十四年邾文公元妃齊姜生定公二妃晉姬生㨗菑文公卒邾人立定公㨗菑奔晉六月同盟于新城從于楚者服且謀邾也晉趙盾以諸侯之師八百乘納㨗菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還十五年新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還凡勝國曰滅之獲大城焉曰入之楚之圖北方久矣成王在位四十餘年無日不以争覇為事召陵以後楚人歛翼窺桓公之沒越漢東以陵上國晉文奮起而戰城濮楚氛始息伺釁則起勢阻則退鷙鳥伏攫戰守並用其才類有能過人者然卒不能大得志於中國以中國之有霸故也穆王弑立晉襄不能正其罪使得肆其兵力蠶食小國江六之區騷然煩苦焉既而襄公即世晉益不支楚於是乘閒竊𤼵觀兵中原二年之中而鄭陳蔡宋靡然影從其圖北方也銳于成王矣夫穆王之蠭目豺聲其凶忍雖不亞於父其逺畧未必能及父也然而戰勝攻取師出必利十二年間未嘗一跌較之成王其功尤烈此其故何哉則時勢之不同爾晉立靈公方在襁褓秦晉日戰楚反休息盾不能和輯國家專務殺戮處父射姑之流相繼死亡焉晉之不在諸侯也夫人而知之矣豈止范山哉蠻夷伺隙又誰能禦厥貉之役宋人望風而服固其宜也天祐其衷穆王隕命莊王身坐鐘鼔之間尚未北顧是以晉國稍得息肩而從楚之國於是漸服穆若不死野戰伏屍恐將見也方穆之欲弑君也先除子上蓄謀而𤼵國人莫問及子西謀弑漏言身死又何益乎稔惡無咎為諸夏患讀春秋者至於楚穆之事而思霸更深矣宋昭之弑文七年夏四月宋成公卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司㓂昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則夲根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以徳皆股肱也誰敢攜貳若之何去之不聽穆襄之族率國人以攻公殺公孫固公孫鄭于公宫六卿和公室樂豫舎司馬以讓公子卬昭公即位而𦵏書曰宋人殺其大夫不稱名衆也且言非其罪也八年宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸來奔效節於府人而出公以其官逆之皆復之亦書以官皆貴之也十一年襄仲聘于宋且言司城蕩意諸而復之因賀楚師之不害也十四年宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也十五年三月宋華耦來盟其官皆從之書曰宋司馬華孫貴之也公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命於亞旅魯人以為敏十六年宋公子鮑禮於國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自桓以下無不恤也公子鮑美而豓襄夫人欲通之而不可乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師公孫友為左師華耦為司馬鱗矔為司徒蕩意諸為司城公子朝為司㓂初司城蕩卒公孫壽辭司城請使意諸為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之貳也姑紓死焉雖亡子猶不亡族既夫人將使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死盡以其寳賜左右而使行夫人使謂司城去公對曰臣之而逃其難若後君何冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之書曰宋人弑其君杵臼君無道也文公即位使母弟須為司城華耦卒而使蕩虺為司馬十七年春晉荀林父衛孔逹陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還卿不書失其所也晉侯蒐于黄父遂復合諸侯于扈平宋也公不與㑹齊難故也書曰諸侯無功也於是晉侯不見鄭伯以為貳於楚也鄭子家使執訊而與之書以告趙宣子曰寡君即位三年召蔡侯而與之事君九月蔡侯入于敝邑以行敝邑以侯宣多之難寡君是以不得與蔡侯偕十一月克减侯宣多而隨蔡侯以朝于執事十二年六月歸生佐寡君之嫡夷以請陳侯于楚而朝諸君十四年七月寡君又朝以蕆陳事十五年五月陳侯自敝邑往朝于君往年正月燭之武往朝夷也八月寡君又往朝以陳蔡之密邇於楚而不敢貳焉則敝邑之故也雖敝邑之事君何以不免在位之中一朝于襄而再見于君夷與孤之二三臣相及於絳雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也徳則其人也不徳則其鹿也鋌而走險急何能擇命之罔極亦知亡矣將悉敝賦以待於鯈唯執事命之文公二年六月壬申朝于齊四年二月壬戌為齊侵蔡亦獲成於楚居大國之間而從于彊令豈其罪也大國若弗圖無所逃命晉鞏朔行成于鄭趙穿公壻池為質焉冬十月鄭大子夷石楚為質于晉十八年宋武氏之族道昭公子將奉司城須以作亂十二月宋公殺母弟頁及昭公子使戴莊桓之族攻武氏於司馬子伯之館遂出武穆之族使公孫師為司城公子朝卒使欒吕為司㓂以靖國人宣三年宋文公即位三年殺母弟須及昭公子武氏之謀也使戴桓之族攻武氏於司馬子伯之館盡逐武穆之族武穆之族以曹師伐宋秋宋師圍曹報武氏之亂也九年滕昭公卒冬宋人圍滕因其䘮也十年滕人恃晉而不事宋六月宋人伐滕成二年八月宋文公卒始厚𦵏用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而争今二子者君生則縱其惑死又益其侈是棄君於惡也何臣之為四年春宋華元來聘通嗣君也五年孟獻子如宋報華元也史稱宋成公卒弟禦殺世子而自立國人殺禦而立公之少子杵臼是為昭公然則討賊正名國人援立昭公之得位可謂正矣乃即位未幾而骨肉肇變患難交作身弑而得無道之名焉雖昭公之自取何宋人之輕於廢置耶夫宋國三世内娶故妃黨彊盛此其威勢所積固未易除也公方在衰絰忽開難端力不能勝祗以速禍兩年之内而公孫大臣相繼戕賊羣公子未除而公之黨已盡矣枝葉撥落爪牙盡去凡宋之人皆公敵也而誰與處乎子哀去位而髙潔身之義華孫來盟而無恤國之心亂兆已形公猶不悛公子鮑者宋公之弟也有禮而好施國人因之内有夫人為之主外有諸大夫為之助故昭公既弑文公遂立其迹固疑與乎弑也而經不斥名後世原之然昭方多忌鮑禮于人以徳易怨勢難並立且也文公未立不能逃亂既立不能討賊安享其國兄受惡名則昭公之死謂非文公而誰為之乎晉靈方弱不能正罪趙宣子請伐備鐘鼔以聲其罪戰以錞于丁寧以儆其民兵方入境輒以賂成傳曰猶立文公而還蓋深憾乎其立文公也霸討不明反成宋亂為文公者又何懼乎武氏作難實懐不平文公除害兼及母弟殺其兄并殺其兄之子殘忍極矣先用商人驟施之謀繼行詭諸除偪之智隂謀市國戕滅天倫幸而不討實春秋所深惡也豈曰賢乎齊懿之弑文十四年子叔姬妃齊昭公生舎叔姬無寵舎無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舎即位秋七月乙卯夜齊商人弑舎而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之齊人定懿公使來告難故書以九月齊公子元不順懿公之為政也終不曰公曰夫己氏襄仲使告于王請以王寵求昭姬于齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬十五年春季文子如晉為單伯與子叔姬故也夏曹伯來朝禮也諸侯五年再相朝以修王命古之制也齊人許單伯請而赦之使來致命書曰單伯至自齊貴之也秋齊人侵我西鄙故季文子告于晉冬十一月晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不㑹書曰諸侯盟于扈無能為故也凡諸侯㑹公不與不書諱君惡也與而不書後也齊人來歸子叔姬王故也齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣十六年春王正月及齊平公有疾使季文子㑹齊侯于陽榖請盟齊侯不肯曰請候君閒公使襄仲納賂于齊侯故盟于郪丘十七年齊侯伐我北鄙襄仲請盟六月盟于榖襄仲如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死十八年春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨齊懿公之為公子也與邴歜之父争田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘夏五月公游于申池二人浴于池歜以扑抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀殺懿公納諸竹中歸舎爵而行齊人立公子元史記曰孝公卒昭公因開方殺孝公子而自立殺人之子者人亦殺其子天道其好還哉夫齊桓有夫人三人皆無子而如夫人者六人皆有子均非適也其誰當立以長則無虧矣其次則惠公元也廢長立少自孝公已為不順昭懿之徒咸懐覬覦矣昭公殺孝公子春秋畧其事然齊國内亂争端久形昭之得國要必非以義立者也昭公在位奉晉惟謹故享國二十年間國内無事商人雖欲圖之而無其間今也昭卒舎立商人肯甘心下之乎先用小惠以結人心乘隙而動中外咸順弑國君而執國母搆難於魯四年之中三侵魯鄙違逆王命蔑棄霸主即其行事固好大喜功而不能靖國者也申池難𤼵國人不問葢懿實不道慮惠圖位亟戰無度民漸弗堪二賊舎爵固知懿之無助爾子元順國人之請而居君位竹中之罪亦無誅焉無他懿之不仁元所素惡始雖讓立心實不平商人被弑亦惠公之志也初管仲之寢疾也桓公往問之仲曰臣願君之逺易牙豎刁開方也桓公不聽使三子專權又多内嬖卒啟五子之争齊是以弑奪相尋四十餘年國猶不靖皆由内外多寵而不用管仲之言也周書曰美男破舌美女破老觀於齊桓之事而益信矣仲遂殺適立庶文二年襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也孝禮之始也四年逆婦姜于齊卿不行非禮也君子是以知出姜之不允於魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壊其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也十八年六月𦵏文公秋襄仲莊叔如齊惠公立故且拜𦵏也文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏夫人姜氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀姜莒紀公生大子僕又生季佗愛季佗而黜僕且多行無禮於國僕因國人以弑紀公以其寳玉來奔納諸宣公公命與之邑曰今日必授季文子使司㓂出諸竟曰今日必逹公問其故季文子使大史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀徳徳以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名頼姦之用為大凶徳有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉徳盜賊藏姦為凶徳夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶徳是以去之昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至于堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟共子孝内平外成昔帝鴻氏有不才子掩義隠賊好行凶徳醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譖庸回服䜛蒐慝以誣盛徳天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舎之則嚚傲很明徳以亂天常天下之民謂之檮杌此三族也世濟其凶増其惡名以至于堯堯不能去縉雲氏有不才子貪于飲食冐于貨賄侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之饕餮舜臣堯賓于四門流四凶族渾敦窮竒檮杌饕餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰愼徽五典五典克從無違教也曰納于百揆百揆時序無廢事也曰賓于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎宣公元年春王正月公子遂如齊逆女尊君命也三月遂以夫人婦姜至自齊尊夫人也夏季文子如齊納賂以請㑹㑹于平州以定公位東門襄仲如齊拜成六月齊人取濟西之田為立公故以賂齊也五年春公如齊髙固使齊侯止公請叔姬焉夏公至自齊書過也秋九月齊髙固來逆女自為也故書曰逆叔姬卿自逆也冬來反馬也七年夏公㑹齊侯伐萊不與謀也凡師出與謀曰及不與謀曰㑹八年有事于太廟襄仲卒而繹非禮也冬𦵏敬嬴旱無麻始用葛茀雨不克𦵏禮也禮卜𦵏先逺日辟不懐也十年春公如齊齊侯以我服故歸濟西之田夏齊惠公卒公如齊奔䘮季文子初聘于齊國武子來報聘十四年冬公孫歸父㑹齊侯于榖見晏桓子與之言魯樂桓子告髙宣子曰子家其亡乎懐于魯矣懐必貪貪必謀人謀人人亦謀已一國謀之何以不亡十五年初稅畝非禮也榖出不過藉以豐財也十七年冬公弟叔肸卒公母弟也凡大子之母弟公在曰公子不在曰弟凡稱弟皆母弟也十八年公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命於介既復命袒括髪即位哭三踊而出遂奔齊書曰歸父還自晉善之也文公魯國之惰君也三書不雨而無勤民之心四不視朔而鮮自强之志政事日怠三桓日專周公至此其益衰矣然三桓雖盛未若東門遂之尤惡也僖之末年季友卒而公子遂進聘鄰帥師經凡五書以僖公之賢而不能察焉度其才必善惑人主者也及乎文公得君益專十八年之内遂四交齊兩交晉一盟雒戎一救鄭一如宋列國之事遂必與聞雒戎之盟不待君命三桓之子亦不能與之亢寵也夫文公政媮弗堪自立其所畏者晉齊而已遂於晉則結趙盾於齊則賂懿公兩國之交皆由遂成文公欲通晉齊必恃乎遂遂以多奸又挾兩大功髙震主雖公亦且依頼之矣行父世賢反居其下敬嬴内嬖先託其子威勢日盛不至易君之嗣不止也惡及視齊出也其母出姜叔姬所生叔姬既素無寵齊又兩易君矣惠公初立請命遂允姜氏大歸齊人不恤其視出姜曽不若魯市人也宣公即位輒請齊婚繼又請㑹平州之後比歳如齊甚而大夫止公求婚厭尊毁列宣無慚焉無他襄仲𤼵難先與齊成言而後舉事宣公之位齊實成之故終始奉之惟謹爾既而仲遂卒齊惠薨魯之執政改轍事晉公孫歸父猶堅從齊故伐莒㑹榖終始同之無敢後也斷道以來晉景日彊歸父為謀又欲借晉之力以去三桓而張公室計不獲成公先忽諸行父巧獄蔽以殺適之罪而除之歸父出奔非適齊而誰適乎夫東門之惡在弑二君而行父所忌在去三桓公償私怨子任父愆其誰服焉東門既去季氏遂彊欲除之而反張之魯之日弱率由此也左傳事緯卷三
