body:
  text: 左傳事緯卷五靈璧知縣馬驌撰晉楚鄢陵之戰成九年晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰泠人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為大子也師保奉之以朝于嬰齊而夕于側也不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱大子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟君盍歸之使合晉楚之成公從之重為之禮使歸求成十二月楚子使公子辰如晉報鍾儀之使請修好結成十年春晉侯使糴茷如楚報大宰子商之使也秋公如晉晉人止公使送葬於是糴茷未反冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也十一年春王三月公至自晉晉人以公為二于楚故止公公請受盟而後使歸郤犫來聘且涖盟夏季文子如晉報聘且涖盟也宋華元善于令尹子重又善于欒武子聞楚人既許晉糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成十二年宋華元克合晉楚之成夏五月晉士燮㑹楚公子罷許偃癸亥盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討不庭有渝此盟明神殛之俾隊其師無克胙國鄭伯如晉聽成㑹于瑣澤成故也狄人閒宋之盟以侵晉而不設備秋晉人敗狄于交剛晉郤至如楚聘且涖盟楚子享之子反相為地室而懸焉郤至將登金奏作于下驚而走出子反曰日云莫矣寡君須矣吾子其入也賔曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂寡君須矣吾子其入也賔曰若讓之以一矢禍之大者其何福之為世之治也諸侯閒于天子之事則相朝也於是乎有享宴之禮享以訓共儉宴以示慈惠共儉以行禮而慈惠以布政政以禮民民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰赳赳武夫公侯干城及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民略其武夫以為己腹心股肱爪牙故詩曰赳赳武夫公侯腹心天下有道則公侯能為民干城而制其腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫冬楚公子罷如晉聘且涖盟十二月晉侯及楚公子罷盟于赤棘十五年楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰十六年春楚子自武城使公子成以汝隂之田求成于鄭鄭叛晉子駟從楚子盟于武城夏四月滕文公卒鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍于夫渠不警鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也衛侯伐鄭至于鳴雁為晉故也晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之郤錡將上軍荀偃佐之韓厥將下軍郤至佐新軍荀罃居守郤犫如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣戊寅晉師起鄭人聞有晉師使告于楚姚句耳與往楚子救鄭司馬將中軍令尹將左右尹子辛將右過申子反入見申叔時曰師其何如對曰德刑詳義禮信戰之器也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我蒸民莫匪爾極是以神降之福時無災害民生敦厖和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚內棄其民而外絶其好瀆齊盟而食話言奸時以動而疲民以逞民不知信進退罪也人恤所底其誰致死子其勉之吾不復見子矣姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰楚懼不可用也五月晉師濟河聞楚師將至范文子欲反曰我僞逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇于鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆彊不盡力子孫將弱今三彊服矣敵楚而已唯聖人能外內無患自非聖人外寧必有內憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范丐趨進曰塞井夷竈陳於軍中而疏行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六閒不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂合而加囂各顧其後莫有鬬心舊不必良以犯天忌我必克之楚子登巢車以望晉軍子重使大宰伯州犁侍于王後王曰騁而左右何也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乘矣左右執兵而下矣曰聽誓也戰乎曰未可知也乘而左右皆下矣曰戰禱也伯州犁以公卒告王苖賁皇在晉侯之側亦以王卒告皆曰國士在且厚不可當也苗賁皇言于晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗矣公筮之史曰吉其卦遇復曰南國䠞射其元王中厥目國䠞王傷不敗何待公從之有淖於前乃皆左右相違於淖步毅御晉厲公欒針為右彭名御楚共王潘黨為右石首御鄭成公唐苟為右欒范以其族夾公行陷於淖欒書將載晉侯針曰書退國有大任焉得専之且侵官冒也失官慢也離局姦也有三罪焉不可犯也乃掀公以出于淖癸巳潘尫之黨與飬由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝吕錡夢射月中之退入於泥占之曰姬姓日也異姓月也必楚王也射而中之退入於泥亦必死矣及戰射共王中目王召飬由基與之兩矢使射吕錡中項伏􅋶以一矢復命郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓曰方事之殷也有韎韋之跗注君子也識見不榖而趨無乃傷乎郤至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間䝉甲胄不敢拜命敢告不寧君命之辱為事之故敢肅使者三肅使者而退晉韓厥從鄭伯其御杜溷羅曰速從之其御屢顧不在馬可及也韓厥曰不可以再辱國君乃止郤至從鄭伯其右茀翰胡曰諜輅之余從之乘而俘以下郤至曰傷國君有刑亦止石首曰衛懿公唯不去其旗是以敗於熒乃內旌於􅋶中唐苟謂石首曰子在君側敗者一大我不如子子以君免我請止乃死楚師薄於險叔山冉謂飬由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷欒針見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇請攝飲焉公許之使行人執榼承飲造于子重曰寡君乏使使針御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎受而飲之免使者而復鼓旦而戰見星未已子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苗賁皇狥曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀穀陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日穀范文子立于戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰唯命不于常有德之謂楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒十七年春王正月鄭子駟侵晉虛滑衛北宫括救晉侵鄭至于髙氏夏五月鄭大子髠頑侯獳為質於楚楚公子成公子寅戌鄭公㑹尹武公單襄公及諸侯伐鄭自戲童至于曲洧晉范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝我使我速死無及於難范氏之福也六月戊辰士燮卒乙酉同盟于柯陵尋戚之盟也楚子重救鄭師于首止諸侯還冬諸侯伐鄭十月庚午圍鄭楚公子申救鄭師于汝上十一月諸侯還襄十三年楚子疾告大夫曰不穀不德少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師于鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋楚共王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之晉厲公在位八年而乞師於魯者三其伐秦也郤錡來其戰楚也欒黶來其伐鄭也荀罃來說者曰春秋霸令未嘗書乞今卑詞下魯晉其衰乎乃鋭師所指又莫不勝數年之間而交剛以敗狄麻隧以勝秦兹復鄢陵以破楚凡諸彊大鮮不為所挫焉功烈若此其庶乎文公城濮一戰襄公箕殽二師矣既而內難忽作身死無後是又何亡之暴與曰成功易居功難也且鄢陵之勝幸勝也兩軍相遇幸而薄楚于險大戰方殷猶同戲謔郤子下車以免胄欒氏攝飲而示暇軍旅之際豈宜然乎一矢偶集非出成算而厲公遂曰吾能勝楚矣昔城濮勝而晉國霸邲戰敗而晉國弱此一舉也逺紹文烈近洗景恥是桓文之業非厲公所能堪也獻捷稱伐相矜于朝難且作矣勝于何有士燮知之故益深其危懼未戰則求釋楚以為外虞既勝又進戒以正君心祝宗祈死老成云逝彼寧不欲坐享勝敵之福哉知禍將伏於此也夫楚之於晉初欲求成其始也郤至操盟子反不信其後也賁皇狥師子反復醉楚之取敗惟一側焉子反伏罪共王豈甘心下晉者乎嗣是晉三伐鄭楚救必出夷氛自若猶無勝爾共王惕于一敗之畏更涖其常勝之勢即悼公三駕未至重困况區區一厲公也遺恨以沒雄心未已其人不死固中國一徑敵哉叔孫僑如之亂文十一年鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔綿房甥為右富父終甥駟乘冬十月甲午敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門以命宣伯初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耐班御皇父充石公子榖甥為右司冦牛父駟乘以敗狄于長丘獲長狄緣斯皇父之二子死焉宋公於是以門賞耐班使食其征謂之耐門晉之滅潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟榮如埋其首于周首之北門衛人獲其季弟簡如鄋瞞由是遂亡成八年宋華元來聘聘共姬也夏宋公使公孫夀來納幣禮也衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否九年二月伯姬歸于宋夏季文子如宋致女復命公享之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入晉人來媵禮也十一年秋宣伯聘于齊以修前好十三年三月公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之十四年秋宣伯如齊逆女稱族尊君命也九月僑如以夫人婦姜氏至自齊舍族尊夫人也故君子曰春秋之稱微而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人誰能修之十六年戰之日齊國佐髙無咎至于師衛侯出于衛公出于壞隤宣伯通于穆姜欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壞隤申宫警備設守而後行是以後使孟獻子守于公宫秋㑹于沙隨謀伐鄭也宣伯使告郤犫曰魯侯待于壞隤以待勝者郤犫將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公于晉侯晉侯不見公七月公㑹尹武公及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食于鄭郊師逆以至聲伯四日不食以待之食使者而後食諸侯遷于制田知武子佐下軍以諸侯之師侵陳至于鳴鹿遂侵蔡未反諸侯遷于潁上戊午鄭子罕宵軍之宋齊衛皆失軍宣伯使告郤犫曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉郤犫曰茍去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必閒之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讐亡而為讐治之何及郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不貳圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫冬十月出叔孫僑如而盟之僑如奔齊十二月季孫及郤犫盟于扈歸刺公子偃召叔孫豹于齊而立之齊聲孟子通僑如使立于髙國之間僑如曰不可以再罪奔衛亦閒于卿十七年初聲伯夢涉洹或與已瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒襄九年穆姜薨於東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是於周易曰隨元亨利貞無咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣三十年或呌于宋大廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也秋七月叔弓如宋葬共姬也成公即位以來事晉無懈晉景之喪止公送葬時厲公新立多行無禮而魯當其首辱矣乃成公恪慎聘㑹往來無失常職何哉晉霸主也魯多內難其或賴以弭之故厲雖無道弗敢二也沙隨之㑹公有內警僑如善譛後至獲戾晉侯遂怒不見公夫以積弱之國羈旅之君而內則受制于國母外則見擯于侯伯成公於此亦危矣哉賊臣淫亂義當誅討晉無霸令輕受讒慝晉亦不足與矣而伐鄭之役公親從焉猶始終事晉也郤氏黷貨無厭僑如之訴復行季孫見執大臣是辱豈晉之君臣剛愎自用不可以禮義諫誨乎抑中冓之醜魯方諱之未肯直言也聲伯抗論于郤犫然後釋行父而平魯於是比年伐鄭或來乞師或不乞師公必先從二國之好猶無閒爾穆姜母也置諸東宫子偃弟也殺而不赦君蹈城潁誓姜之名國有京城克段之禍成公處此亦不幸哉或曰姜雖指二子以脅公未必有廢立之謀而公遽殺之為遷怒焉然偃刺而鉏不刺吾意偃必有窺君之心若僑如之凶淫亂國不䝉顯戮是則魯之失刑而亦晉討之不明也秦晉為成宣元年晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成二年秦師伐晉以報崇也遂圍焦八年春白狄及晉平夏㑹晉伐秦晉人獲秦諜殺諸絳市六日而蘇十五年秋七月秦桓公伐晉次于輔氏壬午晉侯治兵于稷以略狄土立黎侯而還及雒魏顆敗秦師于輔氏獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報成九年秦人白狄伐晉諸侯二故也十一年秦晉為成將㑹于令狐晉侯先至焉秦伯不肯涉河次于王城使史顆盟晉侯于河東晉郤犫盟秦伯于河西范文子曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦伯歸而背晉成十三年夏四月戊午晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以婚姻天禍晉國文公如齊惠公如秦無祿獻公即世穆公不忘舊德俾我惠公用能奉祀于晉又不能成大勳而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊德矣鄭人怒君之疆場我文公帥諸侯及秦圍鄭秦大夫不詢于我寡君擅及鄭盟諸侯疾之將致命于秦文公恐懼綏靜諸侯秦師克還無害則是我有大造于西也無祿文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勳而懼社稷之隕是以有殽之師猶願赦罪于穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志于我穆襄即世康靈即位康公我之自出又欲缺翦我公室傾覆我社稷帥我蝥賊以來蕩搖我邊疆我是以有令狐之役康猶不悛入我河曲伐我涑川俘我王官翦我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不惠稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邉垂我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車來命我景公曰吾與女同好棄惡復修舊德以追念前勳言誓未就景公即世我寡君是以有令狐之㑹君又不祥背弃盟誓白狄及君同州君之仇讐而我之昏姻也君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其德也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不榖惡其無成德是用宣之以懲不一諸侯備聞此言斯是用痛心疾首昵就寡人寡人帥以聽命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圗利之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦于晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙旃將新軍郤至佐之郤毅御戎欒針為右孟獻子曰晉帥乘和師必有大功五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父曹宣公卒于師師遂濟涇及侯麗而還迓晉侯于新楚襄九年秦景公使士雃乞師于楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不易方其卿讓於善其大夫不失守其士競於教其庶人力於農穡商賈皂𨽻不知遷業韓厥老矣知罃禀焉以為政范丐少于中行偃而上之使佐中軍韓起少於欒黶而欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師秋楚子師于武城以為秦援秦人侵晉晉饑弗能報也十年晉荀罃伐秦報其侵也十一年秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴禦之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也十二年秦嬴歸于楚楚司馬子庚聘于秦為夫人寧禮也十四年夏諸侯之大夫從晉伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子說二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至于棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未有是也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯遊曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役欒針曰此役也報櫟之役也役又無功晉之恥也吾有二位於戎路敢不恥乎與士鞅馳秦師死焉士鞅反欒黶謂士丐曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦於是齊崔杼宋華閲仲江㑹伐秦不書惰也向之㑹亦如之衛北宫括不書於向書於伐秦攝也秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實章將於是乎在秦伯以為知言為之請於晉而復之十九年於四月丁未鄭公孫蠆卒赴於晉大夫范宣子言於晉侯以其善於伐秦也六月晉侯請于王王追賜之大路使以行禮也二十五年㑹于夷儀之嵗齊人城郟其五月秦晉為成晉韓起如秦涖盟秦伯車如晉涖盟成而不結二十六年春秦伯之弟針如晉修成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劍從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲已侈能無卑乎昭元年秦后子有寵於桓如二君於景其母曰弗去懼選癸卯針適晉其車千乘書曰秦伯之弟針出奔晉罪秦伯也后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也后子見趙孟趙孟曰吾子其曷歸對曰針懼選於寡君是以在此將待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也國於天地有與立焉不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰針聞之國無道而年榖和熟天贊之也鮮不五稔趙孟視䕃曰朝夕不相及誰能待五后子出而告人曰趙孟將死矣主民玩嵗而愒日其與幾何子干奔晉從車五乘叔向使與秦公子同食皆百人之餼趙文子曰秦公子富叔向曰底祿以德德鈞以年年同以尊公子以國不聞以富且夫以千乘去其國彊禦已甚詩曰不侮鰥寡不畏彊禦秦楚匹也使后子與子干齒辭曰針懼選楚公子不獲是以偕來亦唯命且臣與羈齒無乃不可乎史佚有言曰非羈何忌五年秦后子復歸於秦景公卒故也六年大夫如秦葬景公禮也秦晉兵爭六十九年始于殽而終于十三國之伐其在秦穆公之世與晉襄交兵者五而殽與彭衙書敗秦康公之世與晉靈交兵者三而令狐河曲書戰至于秦共公之世與晉靈交兵者一秦桓公之世與晉成交兵者一與晉景交兵者二與晉厲交兵者一秦景公之世與晉悼交兵者三秦厯五君晉歷六君干戈日尋疆場暴骨兵連禍結未有如二國之甚者也夫自獻穆相好再世為昏惠文得國咸資秦力城濮之役秦之龍盾虎韔悉用輔行晉是以大破楚頵以成霸業秦之於晉也功云多矣穆不能終而釁兆于圍鄭怨結于敗殽則秦有以取之兩國之易玉帛而興戎也襄穆其皆有焉自是以後兵端相繼秦康公晉之甥也渭陽之篇克念舅氏而即位以來日與晉搆夫非舅氏之國歟晉實不能親既求君於其國又變計而擊之晉則無禮豈能堪乎令狐河曲漸為仇讐於是二國之怨彌深秦楚之交始合嬴且坐大晉弗知也共公初立晉欲修好趙穿曰我侵崇秦必救之夫求成而伐其與國召戎速冦何成之有焉穿有異志故迂其謀而晉於是乎為失計矣及秦桓之立晉宜釋怨以結好乃又偕白狄伐秦以益其怨讎而晉於是乎為再失計矣輔氏以來秦楚益固故蜀盟之役秦人先諸侯而首從白狄介在兩大之交戎性無常唯利是視何昏姻之可恃哉令狐懷疑要盟不信麻隧大舉敗傷孔多秦雖不競而虎視西戎徘徊俟隙固未嘗一日忘報晉也吕相之絶秦也以殽師責穆以令狐河曲責康以輔氏責桓其詞多文秦不能對而左氏特舉其背盟召狄以正其懷詐取敗之故雖二國之曲直經不明書要之欲求成而先加兵既從盟而後食言狙詐相尚兵戈無已秦之共桓晉之靈成景厲其政固兄弟也晉悼復霸奮志攘楚而兵挫于秦豈秦彊於楚哉昔文公親秦以戰楚故力倍而功髙今悼公爭楚而伐秦故勢罷而志惰下軍違命諸帥遷延於是晉之報秦至是其遂懈矣晉既不急報秦秦亦閉關自守山河四塞不與晉爭蓋兵戢于外威蓄于內針子千乘而卒歸國包胥七日而後出師飬鋭觀時將有大圖故動則有威戰則必克其後子孫終能并六王而有天下未必不肇基乎此也晉厲之弒宣八年晉胥克有蠱疾郤缺為政秋廢胥克使趙朔佐下軍成十一年聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁于齊管于奚生二子而寡以歸聲伯聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犫來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷子將若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亡晉人歸之施氏施氏逆諸河沈其二子婦人怒曰已不能庇其伉儷而亡之又不能字人之孤而殺之將何以終遂誓施氏晉郤至與周爭鄇田王命劉康公單襄公訟諸晉郤至曰溫吾故也故不敢失劉子單子曰昔周克商使諸侯撫封蘇忿生以溫為司冦與檀伯達封于河蘇氏即狄又不能於狄而奔衛襄王勞文公而賜之溫狐氏陽氏先處之而後及子若治其故則主官之邑也子安得之晉侯使郤至勿敢爭十三年春晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為十四年衛侯饗苦成叔寧惠子相苦成叔傲寧子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔彼交匪傲萬福來求今夫子傲取禍之道也十五年晉三郤害伯宗譛而殺之及欒弗忌伯州犁奔楚韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難十六年晉侯使郤至獻楚捷于周與單襄公語驟稱其伐單子語諸大夫曰溫季其亡乎位於七人之下而求掩其上怨之所聚亂之本也多怨而階亂何以在位夏書曰怨豈在明不見是圗將慎其細也今而明之其可乎十七年晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖於厲公郤錡奪夷陽五田五亦嬖於厲公郤犫與長魚矯爭田執而梏之與其父母妻子同一轅既矯亦嬖於厲公欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘于周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命罪孰大焉壬午胥童夷陽五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結衽而僞訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位溫季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲劫欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在內為軌御姦以德御軌以刑不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌并至臣請行遂出奔狄公使辭於二子曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊於匠麗氏欒書中行偃遂執公焉召士丐士丐辭召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也閏月乙邜晦欒書中行偃殺胥童民不與郤氏胥童道君為亂故皆書曰晉殺其大夫十八年春王正月庚申晉欒書中行偃使程滑弒厲公葬之于翼東門之外以車一乘使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將焉用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽庚午盟而入館于伯子同氏辛巳朝于武宫逐不臣者七人周子有兄而無慧不能辨菽麥故不可立嗚呼敗國亡家皆未有無故而然者也欒郤自傾危趙氏以來權勢日張而郤氏則三子同時為卿彊逼尤甚君侈臣犯既多猜忌之釁叔傲季伐復為聚怨之藪有一於此未或不亡而上下同之喪亂無日矣疆場多虞日夜警惕君臣協謀猶堪紓死今也鄢陵一戰猝勝大敵六間之謀復出溫季是速之禍也故趙武初冠而張老知三郤之亡柯陵為盟而單子識晉國之亂難之將作夫人而皆見之矣寧止魯衛之臣哉厲公多嬖而又信讒欒書懷忌而復善譖胥童挾怨陽魚煽惑三郤之死曽不煩一甲兵焉一朝而尸三卿凡晉國之大臣其誰不人人自危乎嬖人無厭復搆欒荀匠麗難作公亦罹禍然後知晉國之患果不在楚而在乎君大夫也殺三郤者厲公也而不可謂獨出於厲公殺胥童弒君者書偃也而不可謂獨出於書偃蔽殺大夫于國而郤胥之罪均蔽殺君於國而書偃之首惡著勝不能居反以為厲危社稷而快荆楚之心此范文子所由抑鬱而祈死也吳通上國成二年楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰明德慎刑文王所以造周也明德務崇之之謂也慎刑務去之之謂也若興諸侯以取大罰非慎之也君其圗之王乃止子反欲取之巫臣曰是不祥人也是夭子蠻殺御叔弒靈侯戮夏南出孔儀喪陳國何不祥如是人生實難其有不獲死乎天下多美婦人何必是子反乃止王以豫連尹襄老襄老死于邲不獲其尸其子黑要蒸焉巫臣使道焉曰歸吾聘女又使自鄭召之曰尸可得也必來逆之姬以告王王問諸屈巫對曰其信知罃之父成公之嬖也而中行伯之季弟也新佐中軍而善鄭皇戌甚愛此子其必因鄭而歸王子與襄老之尸以求之鄭人懼於邲之役而欲求媚於晉其必許之王遣夏姫歸將行謂送者曰不得尸吾不反矣巫臣聘諸鄭鄭伯許之及共王即位將為陽橋之役使屈巫聘于齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也及鄭使介反幣而以夏姫行將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因郤至以臣於晉晉人使為邢大夫子反請以重幣錮之王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣且彼若能利國家雖重幣晉將可乎若無益于晉晉將弃之何勞錮焉七年春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣楚圍宋之役師還子重請取於申呂以為賞田王許之申公巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也晉鄭必至于漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族子閻子蕩及清尹弗忌及襄老之子黑要而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書曰而以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死巫臣請使於吳晉侯許之吳子夀夢說之乃通吳於晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐子重奔命馬陵之㑹吳入州來子重自鄭奔命子重子反於是乎一嵗七奔命蠻夷屬於楚者吳盡取之是以始大通吳於上國八年晉士燮來聘言伐郯也以其事吳故公賂之請緩師文子不可曰君命無二失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師㑹伐郯十五年十一月㑹吳于鍾離始通吳也襄公三年春楚子重伐吳為簡之師克鳩兹至于衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒五年吳子使夀越如晉辭不㑹于雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯衛先㑹吳且告㑹期故孟獻子孫文子㑹吳于善道十年春㑹于柤㑹吳子夀夢也三月癸丑齊髙厚相大子光以先㑹諸侯于鍾離不敬士莊子曰髙子相大子以㑹諸侯將社稷是衛而皆不敬棄社稷也其將不免乎十二年秋吳子夀夢卒臨於周廟禮也凡諸侯之喪異姓臨于外同姓于宗廟同宗於祖廟同族于禰廟是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨于周公之廟十三年吳侵楚養由基奔命子庚以師繼之飬叔曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師獲公子黨君子以吳為不弔詩曰不弔昊天亂靡有定十四年春吳告敗于晉秋楚子為庸浦之役故子囊師于棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能相救吳人敗之獲楚公子宜榖勾吳之大自壽夢始也伐郯之役始見於經是秋復入州來一嵗而兵再見吳能驟彊也晉之㑹吳始于鍾離先是景公盟蒲吳人不至至厲公乃合七國以㑹吳而吳至焉悼公繼立雞澤之盟吳又不至逾二年而㑹于戚魯衛先之而吳至焉夫吳自太伯端委以治周禮仲雍嗣之斷髮文身不通中華吳固夷也義當驅攘而晉乃亟亟㑹之何哉將以病楚也戚之後又㑹于柤遂滅逼陽以通吳使諸樊初立又㑹于向為吳謀楚凡晉之與吳有四㑹焉惟戚則吳人一來餘皆諸侯往會也來㑹則叙吳往㑹則殊吳遇吳有禮固不憚其路之逺矣夫有楚鷙悍専與霸爭當日能與為敵者唯晉與秦齊而已齊既攜二秦自殽師以後反棄晉而與楚合楚獲彊助晉勢漸孤雖鄢陵新勝終不能服厲悼之際晉欲一舉而詘楚勢不能也吳居其肘腋之下夀夢方鋭巫臣啓謀伐其附庸撓之奔命晉吳既通吳益致力楚師未出則擾其旁出則議其後鳩兹未定楚駕已取鄧廖子重一朝盡喪楚雖伐吳而吳常獲其勝矣楚人畏逼無暇北視晉悼公睦交息民三駕而成霸業此以夷制夷因時濟變之權衡也㑹向之後吳楚之釁已成晉亦不復㑹吳嗣是兩國交爭晉直以楚委吳矣於是再𫝊而闔盧卒能入郢亦諸姬振患雪恥之一義戰也哉宋桓族之亂成十五年夏六月宋共公卒秋八月葬宋共公於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司冦鱗朱為少司冦向帶為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師茍獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀于宋也右師討猶有戍在桓氏雖亡必偏魚石自止華元於河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山書曰宋殺其大夫山言背其族也魚石向為人鱗朱向帶魚府出舍於睢上華元使止之不可冬十月華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而從之則决睢澨閉門登陴矣左師二司冦二宰遂出奔楚華元使向戌為左師老佐為司馬樂裔為司冦以靖國人十八年夏六月鄭伯侵宋及曹門外遂㑹楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乘戍之而還書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入宋人患之西鉏吾曰何也若楚人與吾同惡以德於我吾固事之也不敢二矣大國無厭鄙我猶憾不然而收吾憎使贊其政以間吾釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼吳晉吾庸多矣非吾憂也且事晉何為晉必恤之七月宋老佐華喜圍彭城老佐卒焉冬十一月楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安彊自宋始矣晉侯師于台谷以救宋遇楚師於靡角之谷楚師還晉士魴來乞師季文子問師數於臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之十二月孟獻子㑹于虛朾謀救宋也宋人辭諸侯而請師以圍彭城孟獻子請于諸侯而先歸㑹葬襄公元年春己亥圍宋彭城非宋地追書也於是為宋討魚石故稱宋且不登叛人也謂之宋志彭城降晉晉人以宋五大夫在彭城者歸置諸瓠丘彭城之役晉悼公謀霸之首事也宋平初立華元秉政桓氏怙恃其宗彊以蕩覆公室倚楚為援鄭又助之逞叛逆之志而啓蠻夷之心蓋未有甚於此時者也彭城淪沒吳晉不通楚人將以大伺中國焉虛朾一怒而諸侯協從悼公於是乎平宋亂矣北杏者齊桓之始救宋者晉文之始宋大國也爵為上公文襄以來在南則楚彊在北則晉霸宋固諸侯圗霸之樞機也蕩魚之變楚共贊逆雖搆難于宋而實窺晉虛晉有嗣君未嘗舉事此而不競楚將馳驅中原尚何畏忌哉華元告急師出有名欒黶仗義而動諸侯宋人曰晉能恤我矣天下曰晉君有志於諸侯也徵師有禮列國畢從協謀而動師出克濟善其始而終以有成雖繼文襄功實創建此悼公所由稱復霸也惜五臣大逆而僅置瓠丘亂逆不誅用長奸宄是亦晉人之失刑爾晉悼復霸成十八年二月乙酉朔晉悼公即位于朝始命百官施舍己責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾節器用時用民欲無犯時使魏相士魴魏頡趙武為卿荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟使士渥濁為大傅使修范武子之法右行辛為司空使修士蒍之法辨糾御戎校正屬焉使訓諸御知義荀賓為右司士屬焉使訓勇力之士時使卿無共御立軍尉以攝之祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候奄鐸遏冦為上軍尉籍偃為之司馬使訓卒乘親以聽命程鄭為乘馬御六騶屬焉使訓羣騶知禮凡六官之長皆民譽也舉不失職官不易方爵不踰德師不陵正旅不逼師民無謗言所以復霸也公如晉朝嗣君也公至自晉晉范宣子來聘且拜朝也君子謂晉於是乎有禮秋把桓公來朝勞公且問晉故公以晉君語之把伯於是驟朝于晉而請為昏襄元年齊人不㑹彭城晉人以為討二月齊大子光為質于晋夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵于洧上於是東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援秋楚子辛救鄭侵宋呂留鄭子然侵宋取犬丘二年春鄭師侵宋楚令也鄭成公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰昵我免寡人唯二三子秋七月庚辰鄭伯睔卒於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改㑹于戚謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈惟寡君賴之冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成楚公子申為右司馬多受小國之賂以逼子重子辛楚人殺之故書曰楚殺其大夫公子申三年晉為鄭服故且欲修吳好將合諸侯使士丐告于齊曰寡君使丐以嵗之不易不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使丐乞盟齊侯欲不許而難為不協乃盟於耐外祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可於是羊舌職死矣晉侯曰孰可以代之對曰赤也可於是使祁午為中軍尉羊舌赤佐之君子謂祁奚于是能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫唯善故能舉其類詩云惟其有之是以似之祁奚有焉六月公㑹單頃公及諸侯己未同盟于雞澤晉侯使荀㑹逆吳子于淮上吳子不至楚子辛為令尹侵欲于小國陳成公使袁僑如㑹求成晉侯使和組父告于諸侯秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也晉侯之弟揚干亂行於曲梁魏綘戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無二志事君不辟難有罪不逃刑其將來辭何辱命焉言終魏絳至授僕人書將伏劍士魴張老止之公讀其書曰日君乏使使臣斯司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司冦公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍張老為中軍司馬士冨為候奄楚司馬公子何忌侵陳陳叛故也許靈公事楚不㑹于雞澤冬晉知武子帥師伐許四年春楚師為陳叛故猶在繁陽韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也今我易之難哉三月陳成公卒楚人將伐陳聞喪乃止陳人不聼命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎而况小乎夏楚彭名侵陳陳無禮故也楚人使頓間陳而侵伐之故陳人圍頓無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜二勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠尨圉而用寒浞寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚于內而施賂于外愚弄其民而虞羿于田樹之詐慝以取其國家外內咸服羿猶不悛將歸自田家衆殺而亨之以食其子其子不忍食諸死于窮門靡奔有鬲氏浞因羿室生澆及豷恃其讒慝詐僞而不德于民使澆用師滅斟灌及斟尋氏處澆于過處豷于戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼滅豷于戈有窮由是遂亡失人故也昔周辛甲之為大史也命百官官針王闕於虞人之針曰芒芒禹跡畫為九州經啓九道民有寢廟獸有茂草各有攸處德用不擾在帝夷羿冒于原獸亡其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞針如是可不懲乎於是晉侯好田故魏絳及之公曰然則莫如和戎乎對曰和戎有五利焉戎狄薦居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四夷振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒于后羿而用德度逺至邇安五也君其圗之公說使魏絳盟諸戎修民事田以時五年楚人討陳叛故曰由令尹子卒實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑詩曰周道挺挺我心扄扄講事不令集人來定己則無信而殺人以逞不亦難乎夏書曰成允成功九月丙午盟于戚㑹吳且命戍陳也楚子囊為令尹范宣子曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳子囊伐陳十一月甲午㑹于城棣以救之七年冬十月晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露又曰弗躬弗親庶民弗信無忌不才讓其可乎請立起也與田蘇游而曰好仁詩曰靖共爾位好是正直神之聼之介爾景福恤民為德正直為正正曲為直參和為仁如是則神聽之介福降之立之不亦可乎庚戌使宣子朝遂老晉侯謂韓無忌仁使掌公族大夫楚子囊圍陳㑹於鄬以救之陳人患楚慶虎慶寅謂楚人曰吾使公子黃往而執之楚人從之二慶使告陳侯于㑹曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圗陳侯逃歸八年春公如晉朝且聽朝聘之數庚寅鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣五月甲辰㑹于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊髙厚宋向戌衛寧殖邾大夫㑹之鄭伯獻捷于㑹故親聽命大夫不書尊晉侯也冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之曰俟河之清人夀幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟以待彊者而庇民焉冦不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道請從楚騑也受其咎乃及楚平使王子伯駢告于晉曰君命敝邑修而車賦警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討于蔡獲司馬燮獻于邢丘今楚來討曰女何故稱兵于蔡焚我郊保馮陵我城郭敝邑之衆夫婦男女不遑啓處以相救也剪焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟于楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圗之晉范宣子來聘且拜公之辱告將用師于鄭公享之宣子賦摽有梅季武子曰誰敢哉今譬於草木寡君在君君之臭味也歡以承命何時之有武子賦角弓賓將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍受彤弓于襄王以為子孫藏丐也先君守官之嗣也敢不承命君子以為知禮九年夏季武子如晉報宣子之聘也冬十月諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士丐門于鄟門衛北宫括曹人邾人從荀偃韓起門于師之梁滕人薛人從欒黶士魴門于北門把人郳人從趙武魏絳斬行栗甲戌師于汜令於諸侯曰修器備盛餱糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月己亥同盟于戲鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輒公孫蠆公孫舍之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭國而不唯晉命是聼而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將弃我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還晉人不得志於鄭以諸侯復伐之十二月癸亥門其三門閏月戊寅濟于隂阪侵鄭次于隂口而還子孔曰晉師可擊也師老而勞且有歸志必大克之子展曰不可楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯彊是從今楚師至晉不我救則楚彊矣盟誓之言豈敢背之且要盟無質神弗臨也所臨惟信信者言之瑞也善之主也是故臨之明神不蠲要盟背之可也乃及楚平公子罷戎入盟同盟于中分楚莊夫人卒王未能定鄭而歸晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賓以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭十年夏四月戊午㑹于祖晉荀偃士丐請伐逼陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克孟氏之臣秦堇父輦重如役逼陽人啓門諸侯之士門焉縣門發郰人紇抉之以出門者狄虒彌建大車之輪而䝉之以甲以為櫓左執之右拔㦸以成一隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之隊則又縣之蘇而復上者三主人辭焉乃退帶其斷以狥於軍三日諸侯之師久於逼陽荀偃士丐請于荀罃曰水潦將降懼不能歸請班師知伯怒投之以機出於其閒曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之五月庚寅荀偃士丐帥卒攻逼陽親受矢石甲午滅之書曰遂滅逼陽言自㑹也以與向戌向戌辭曰君若猶辱鎮撫宋國而以逼陽光啓寡君羣臣安矣其何貺如之若専賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃豫宋公宋公享諸侯於楚丘請以桑林荀罃辭荀偃士丐曰諸侯宋魯於是觀禮魯有禘樂賓祭用之宋以桑林享君不亦可乎舞師題以旌夏晉侯懼而退入于房去旌卒享而還及著雍疾卜桑林見荀偃士丐欲奔請禱焉荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之晉侯有閒以逼陽子歸獻于武宫謂之夷俘逼陽妘姓也使周內史選其族嗣納諸霍人禮也師歸孟獻子以秦堇父為右生秦丕兹事仲尼六月楚子囊鄭子耳伐宋師于訾母庚午圍宋門于桐門衛侯救宋師于襄牛鄭子展曰必伐衛不然是不與楚也得罪於晉又得罪於楚國將若之何子駟曰國病矣子展曰得罪於二大國必亡病不猶愈於亡乎諸大夫皆以為然故鄭皇耳帥師侵衛楚令也孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫出征而喪其雄姜氏曰征者喪雄禦冦之利也大夫圖之衛人追之孫蒯獲鄭皇耳于犬丘秋七月楚子囊鄭子耳侵我西鄙還圍蕭八月丙寅克之九月子耳侵宋北鄙孟獻子曰鄭其有災乎師競已甚周猶不堪競况鄭乎有災其執政之三士乎諸侯伐鄭齊崔杼使太子光先至于師故長于滕己酉師于牛首諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也丁未諸侯之師還侵鄭北鄙而歸楚人亦還十一年鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將辟之何為而使晉師致死於我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆埸之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣夏鄭子展侵宋四月諸侯伐鄭己亥齊大子光宋向戌先至于鄭門于東門其莫晉荀罃至于西郊東侵舊許衛孫林父侵其北鄙六月諸侯㑹于北林師于向右還次于鎖圍鄭觀兵于南門西濟于濟隧鄭人懼乃行成秋七月同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救荒患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋九月諸侯悉師以復伐鄭鄭人使良霄大宰石㚟如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之書曰行人言使人也諸侯之師觀兵于鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯十二月戊寅㑹于蕭魚庚辰赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告于諸侯公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備凡兵車百乘歌鐘二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂只君子殿天子之邦樂只君子福祿攸同便蕃左右亦是帥從夫樂以安德義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福祿來逺人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑微子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之魏絳於是乎始有金石之樂禮也十二年夏晉士魴來聘且拜師冬楚子囊秦庶長無地伐宋師于楊梁以報晉之取鄭也公如晉朝且拜士魴之辱禮也十三年春公至自晉孟獻子書勞于廟禮也荀罃士魴卒晉侯搜于綿上以治兵使士丐將中軍辭曰伯游長昔臣習於知伯是以佐之非能賢也請從伯游荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乘官屬以從於下軍禮也晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之刑善也夫一人刑善百姓休和可不務乎書曰一人有慶兆民賴之其寧惟永其是之謂乎周之興也其詩曰儀刑文王萬邦作孚言刑善也及其衰也其詩曰大夫不均我從事獨賢言不讓也世之治也君子尚能而讓其下小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿德及其亂也君子稱其功以加小人小人伐其技以馮君子是以上下無禮亂虐並生由爭善也謂之昏德國家之敝恆必由之鄭良霄大宰石㚟猶在楚石㚟言於子囊曰先王卜征五年而嵗習其祥祥習則行不習則增修德而改卜今楚實不競行人何罪止鄭一卿以除其逼使睦而疾楚以固於晉焉用之使歸而廢其使怨其君以疾其大夫而相牽引也不猶愈乎楚人歸之十四年㑹于向為吳謀楚故也范宣子數吳之不德也以退吳人執莒公子務婁以其通楚使也將執戎子駒支范宣子親數諸朝曰來姜戎氏昔秦人迫逐乃祖吾離于瓜州乃祖吾離被苫蓋䝉荆棘以來歸我先君我先君惠公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者蓋言語漏泄則職女之由詰朝之事爾無與焉與將執女對曰昔秦人負恃其衆貪于土地逐我諸戎惠公蠲其大德謂我諸戎是四嶽之裔胄也毋是翦棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不二昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之戎何以不免自是以來晉之百役與我諸戎相繼于時以從執政猶殽志也豈敢離逖今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不達何惡之能為不與於㑹亦無瞢焉賦青蠅而退宣子辭焉使即事於㑹成愷悌也於是子叔齊子為季武子介以㑹自是晉人輕魯幣而益敬其使師歸自伐秦晉侯舍新軍禮也成國不過半天子之軍周為六軍諸侯之大者三軍可也於是知朔生盈而死盈生六年而武子卒彘裘亦幼皆未可立也新軍無帥故舍之楚共王奮志圖霸之雄主也晉厲無道鄭服於楚同病北方幸而有鄢陵之捷則楚弱晉彊之㑹也乃恃勝而驕難自內作晉有憂而楚喜可知矣悼公新立楚輕中國彭城納叛首先病宋未幾而又繼之以侵楚之讎宋以撓晉也諸侯合圍叛人就執宋乃定焉韓獻子曰成霸安疆必自宋始晉有成謀悼能驟彊而楚共於是乎稍挫哉虛朾一㑹而晉得宋虎牢再役而晉得鄭得宋較易得鄭較難者宋固屬晉鄭實屬楚也陳邇于楚久非晉有雞澤之㑹袁僑來盟於是陳既服晉晉輒為陳城棣及鄬不憚煩勞無何陳侯以國難逃歸邢丘不至晉不復問悼公之於陳也其來則字之其去則舍之急在宋鄭故緩在陳度勢量力知彼知己范宣子有長慮悼無侈心此則晉國之善謀也夫共王忿于鄢陵之恥幸乘厲公之弒欲以肆其馮陵而悼公又能復霸是以計無所施日逞兵於宋鄭陳之國以覬疲晉故虎牢城而殺申陳叛而殺壬夫蓄怒强忍二卿之死甚於子反焉貪殘凶鷙期在兵彊詎宜驟當其鋭乎鄭起蔡釁疆場日擾孫僑識禍亂之萌子駟持兩待之論兩大之勢既不相下悼公不欲交其鋒也卷甲息民守之以靜楚出晉還示之以怯以退為進不戰而勇故五㑹以著信三駕以著威九合以著和服鄭即止未嘗暴骨原野殘民鋒鏑而霸業已隆矣或謂衛人逐君晉不能誅邾莒肆行晉不能禁雖攘夷日勤而治夏為踈不知悼公所處之勢艱於文襄逺矣齊靈梗霸秦景合楚大難方殷孑然孤立享國不永志弗克終奚暇稱兵小弱乎君臣持籌先急後緩不事耀武為能也和戎睦華得安內攘外之權通吳制楚得逺交近攻之法㑹鄬棄陳賢于齊桓之盟貫蕭魚服鄭比于晉文之勝楚天假之年功當加烈惜乎年未三十而薨諡之為悼不亦誠可悼也哉左傳事緯卷五
