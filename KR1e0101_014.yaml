body:
  text: 左傳事緯前集卷一靈璧知縣馬驌撰晉杜預春秋左傳序春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以紀逺近别同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也周禮有史官掌邦國四方之事達四方之志諸侯亦各有國史大事書之於策小事簡牘而已孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王韓子所見蓋周之舊典禮經也周德既衰官失其守上之人不能使春秋昭明赴告策書諸所記注多違舊章仲尼因魯史策書成文考其真偽而志其曲禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刋而正之以示勸戒其餘則皆即用舊史史有文質辭有詳略不必改也故傳曰其善志又曰非聖人孰能修之蓋周公之志仲尼從而明之左丘明受經於仲尼以為經者不刋之書也故傳或先經以始事或後經以終義或依經以辨理或錯經以合異隨義而發其例之所重舊史遺文略不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其文緩其旨逺將令學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其微顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例然亦有史所不書即以為義者此蓋春秋新意故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趣而已非例也故發傳之體有三而為例之情有五一曰微而顯文見於此而起義在彼稱族尊君命舍族尊夫人梁亡城緣陵之類是也二曰志而晦約言示制推以知例參會不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱辟璧假許田之類是也四曰盡而不汙直書其事具文見意丹楹刻桷天王求車齊侯獻捷之類是也五曰懲惡而勸善求名而亡欲蓋而章書齊豹盜三叛人名之類是也推此五體以尋經傳觸類而長之附於二百四十二年行事王道之正人倫之紀備矣或曰春秋以錯文見義若如所論則經當有事同文異而無其義也先儒所傳皆不其然答曰春秋雖以一字為褒貶然皆須數句以成言非如八卦之爻可錯綜為六十四也固當依傳以為斷古今言左氏春秋者多矣今其遺文可見者十數家大體轉相祖述進不得為錯綜經文以盡其變退不守丘明之傳於丘明之傳有所不通皆沒而不説而更膚引公羊穀梁適足自亂預今所以為異專修丘明之傳以釋經經之條貫必出於傳傳之義例總歸諸凡推變例以正褒貶簡二傳而去異端蓋丘明之志也其有疑錯則備論而闕之以俟後賢然劉子駿創通大義賈景伯父子許惠卿皆先儒之美者也末有潁子嚴者雖淺近亦復名家故特舉劉賈許潁之違以見同異分經之年與傳之年相附比其義類各隨而解之名曰經傳集解又别集諸例及地名譜第厯數相與為部凡四十部十五卷皆顯其異同從而釋之名曰釋例將令學者觀其所聚異同之説釋例詳之也或曰春秋之作左傳及穀梁無明文説者以為仲尼自衛反魯修春秋立素王丘明為素臣言公羊者亦云黜周而王魯危行言孫以辟當時之害故微其文隱其義公羊經止獲麟而左氏經終孔丘卒敢問所安答曰異乎余所聞仲尼曰文王既沒文不在兹乎此制作之本意也歎曰鳯鳥不至河不出圖吾己矣夫蓋傷時王之政也麟鳯五靈王者之嘉瑞也今麟出非其時虛其應而失其歸此聖人所以為感也絶筆於獲麟之一句者所感而起固所以為終也曰然則春秋何始於魯隱公答曰周平王東周之始王也隱公讓國之賢君也考乎其時則相接言乎其位則列國本乎其始則周公之祚胤也若平王能祈天永命紹開中興隱公能𢎞宣祖業光啓王室則西周之美可尋文武之迹不墜是故因其厯數附其行事采周之舊以會成王義垂法將來所書之王即平王也所用之厯即周正也所稱之公即魯隱也安在其黜周而王魯乎子曰如有用我者吾其為東周乎此其義也若夫制作之文所以彰往考來情見乎辭言髙則旨逺辭約則意微此理之常非隱之也聖人包周身之防既作之後方復隱諱以辟患非所聞也子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也先儒以為制作三年文成致麟既已妖妄又引經以至仲尼卒亦又近誣據公羊經止獲麟而左氏小邾射不在三叛之數故余以為感麟而作作起獲麟則文止於所起為得其實至於反袂拭面稱吾道窮亦無取焉晉杜預春秋長厯論書稱期三百六旬有六日以閏月定四時成嵗允釐百工庶績咸熙是以天子必置日官諸侯必置日御世修其業以考其術舉全數而言故曰六日其實五日四分之一日日行一度而月日行十三度十九分度之有竒日官當會集此之遲疾以考成晦朔錯綜以設閏月閏月無中氣而北斗邪指兩辰之間所以異於他月也積此以相通四時八節無違乃得成嵗其微密至矣得其精微以合天道事敘而不悖故傳曰閏以正時時以作事事以厚生生民之道於是乎在然隂陽之運隨動而差差而不已遂與厯錯故仲尼丘明每於朔閏發文蓋矯正得失因以宣明厯數也桓十七年日食得朔而史闕其日單書朔僖十五年日食而史闕朔與日故傳因其得失並起時史之謬兼以明其餘曰食或厯失其正也莊二十五年經書六月辛未朔日有食之鼓用牲於社周之六月夏之四月所謂正陽之月也而時厯誤實是七月之朔非六月故傳云非常也唯正月之朔慝未作曰有食之於是乎有用幣於社伐鼓於朝此非用幣伐鼓常月因變而起厯誤也文十五年經文皆同而更復發傳曰非禮明前傳欲以審正陽之月後傳發例欲以明諸侯之禮也此乃聖賢之微旨先儒所未喻也昭十七年夏六月日有食之而平子言非正陽之月以誣一朝近於指鹿為馬故傳曰不君矣且因以明此月為得天正也劉子駿造三統厯以修春秋春秋日食有甲乙者三十四而三統厯唯一食厯術比諸家既最疏又六千餘嵗輒益一日凡嵗當纍日為次而無故益之此不可行之甚者班固前代名儒而謂之最密非徒班固也自古以來諸論春秋者多述謬誤或造家術或用黃帝以來諸厯以推經傳朔日皆不得諧合日食於朔此乃天驗經傳又書其朔食可謂得天而劉賈諸儒説皆以為月二日或三日公違聖人明文其蔽在於守一説不與天消息也余感春秋之事常著厯論極言厯之通理其大指曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限纍日為月以新故相序不得不有毫毛之差此自然理也故春秋日有頻月而食者曠年不食者理不得一而算守恆數故厯無不有差失也始失於毫毛而尚未可覺積而成多以失弦望朔晦則不得不改憲以從之書所謂欽若昊天厯象日月星辰易所謂治厯明時言當順天以求合非為合以驗天者也推此論之春秋二百餘年其治厯變通多矣雖數術絶滅還尋經傳微旨大略可知時之違謬則經傳有驗學者固當曲循經傳月日日之食以考朔晦也以推時驗而皆不然各據其學以推春秋此無異度已之迹而欲削他人之足也余為厯論之後至咸寧中善算李修夏顯依論體為術名乾度厯表上朝廷其術合日行四分之數而微增月行用三百嵗改憲之意二元相推七千餘嵗承以強弱強弱之差蓋少而適足以逺通盈縮時尚書及史官以乾度與太始厯參校古今記注乾度厯殊勝今其術具存時又并考古今十厯以驗春秋知三統厯之最疏也今具列其時得失之數又據經傳微旨證據及失閏旨考日辰朔晦以相發明為經傳長厯諸經傳證據及失閏時文字謬誤皆甄發之雖未必其得天蓋春秋當時文厯也學者覽焉晉杜預後序大康元年三月吳冦始平余自江陵還襄陽解甲休兵乃申抒舊意修成春秋釋例及經傳集解始訖會汲郡汲縣有發其界內舊冡者大得古書皆簡編科斗文字發冡者不以為意往往散亂科斗書久廢推尋不能盡通始者藏在祕府余晚得見之所記大凡七十五卷多雜碎怪妄不可訓知周易及紀年最為分了周易上下篇與今正同别有隂陽説而無彖象文言繫辭疑於時仲尼造之於魯尚未播之於逺國也其紀年篇起自夏殷周皆三代王事無諸國别也惟特記晉國起自殤叔次文侯昭侯以至曲沃莊伯莊伯之十一年十一月魯隱公之元年正月也皆用夏正建寅之月為嵗首編年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之史記也推校哀王二十年太嵗在壬戌是周赧王之十六年秦昭王之八年韓襄王之十三年趙武靈王之二十七年楚懷王之三十年燕昭王之十三年齊湣王之二十五年也上去孔丘卒百八十一嵗下去今太康三年五百八十一嵗哀王於史記襄王之子惠王之孫也惠王三十六年卒而襄王立立十六年卒而哀王立古書記年篇惠王三十六年改元從一年始至十六年而稱惠成王卒即惠王也疑史記誤分惠成之世以為後王年也哀王二十三年乃卒故特不稱諡謂之今王其著書文意大似春秋經推此足見古者國史策書之常也文稱魯隱公及邾莊公盟於姑蔑即春秋所書邾儀父未王命故不書爵曰儀父貴之也又稱晉獻公會虞師伐虢滅下陽即春秋所書虞師晉師滅下陽先書虞賄故也又稱周襄王會諸侯於河陽即春秋所書天王狩於河陽以臣召君不可以訓也諸若此輩甚多略舉數條以明國史皆承告據實而書時事仲尼修春秋以義而制異文也又稱衛懿公及赤翟戰於洞澤疑洞當為泂即左傳所謂熒澤也齊國佐來獻玉磬紀公之甗即左傳所謂賔媚人也諸所記多與左傳符同異於公羊穀梁知此二書近世穿鑿非春秋本意審矣雖不皆與史記尚書同然參而求之可以端正學者又别有一卷純集疏左氏傳卜筮事上下次第及其文義皆與左傳同名曰師春師春似是抄集者人名也紀年又稱殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放太甲於桐乃自立也伊尹即位於太甲七年太甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之左氏傳伊尹放太甲而相之卒無怨色然則太甲雖見放還殺伊尹而猶以其子為相也此條大與尚書敘説太甲事乖異不知老叟之伏生或致昏忘將此古書亦當時雜記未足以取審也為其粗有益於左氏故略記之附集解之末焉孔穎達春秋正義序夫春秋者紀人君動作之務是左史所職之書王者統三才而宅九有順四時而治萬物四時序則玉燭調於上三才協則寶命昌於下故可以享國永年令聞長世然則有為之務可不慎與國之大事在祀與戎祀則必盡其敬戎則不加無罪盟會協於禮興動順其節失則貶其惡得則褒其善此春秋之大旨為皇王之明鑒也若夫三始之目章於帝軒六經之道光於禮記然則此書之發其來尚矣但年祀綿邈無得而言暨乎周室東遷王綱不振楚子北伐神器將移鄭伯敗王於前晉侯請隧於後竊僣名號者何國不然專行征伐者諸侯皆是下陵上替內叛外侵九域騷然三綱遂絶夫子內韞大聖逢時若此欲垂之以法則無位正之以武則無兵賞之以利則無財説之以道則不用虛歎銜書之鳯乃似喪家之狗既不救於己往冀垂訓於後昆因魯史之有得失據周經以正褒貶一字所嘉有同華衮之贈一言所黜無異蕭斧之誅所謂不怒而人威不賞而人勸實永世而作則厯百王而不朽者也至於秦滅典籍鴻猷遂寖漢德既興儒風不泯其前漢傳左氏者有張蒼賈誼尹咸劉歆後漢有鄭衆賈逵服虔許惠卿之等各為詁訓然雜取公羊穀梁以釋左氏此乃以冠雙屨將絲綜麻方鑿圓枘其可入乎晉世杜元凱又為左氏集解專取丘明之傳以釋孔氏之經所謂子應乎母以膠投漆雖欲勿合其可離乎今校先儒優劣杜為甲矣故晉宋傳授以至於今其為義疏者則有沈文何蘇寬劉炫然沈氏於義例粗可於經傳極疏蘇氏則全不體本文唯旁攻賈服使後之學者鑽仰無成劉炫於數君之內實為翹楚然聰惠辨博固亦罕儔而探賾鉤深未能致逺其經注易者必具飾以文辭其理致難者乃不入其根節又意在矜伐性好非毁規杜氏之失凡一百五十餘條習杜義而攻杜氏猶蠧生於木而還食其木非其理也雖規杜過義又淺近所謂捕鳴蟬於前不知黃雀在其後按僖公三十三年經云晉人敗狄於箕杜注云郤缺稱人者未為卿劉炫規云晉侯稱人與殽戰同按殽戰在葬晉文公之前可得云背喪用兵以賤者告箕戰在葬晉文公之後非是背喪用兵何得云與殽戰同此則一年之經數行而已曽不勘省上下妄規得失又襄公二十一年傳云邾庶其以漆閭丘來奔以公姑姊妻之杜注云蓋寡者二人劉炫規云是襄公之姑成公之姊只一人而已按成公二年成公之子公衡為質及宋逃歸按家語本命云男子十六而化生公衡己能逃歸則十六七矣公衡之年如此則於時成公三十三四矣計至襄二十一年成公七十餘矣何得有姊而妻庶其此等皆其事厯然猶尚妄説况其餘錯亂良可悲矣然比諸義疏猶有可觀今奉敕刪定據以為本其有疏漏以沈氏補焉若兩義俱違則特申短見雖課率庸鄙仍不敢自專謹與朝請大夫國子博士臣谷那律故四門博士臣楊士勛四門博士臣朱長才等對共參定至十六年又奉敕與前修疏人及朝散大夫行大學博士上騎都尉臣馬嘉運朝散大夫行大學博士上騎都尉臣王德韶給事郎守四門博士上騎都尉臣蘇德融登仕郎守大學助教雲騎尉臣隨德素等對敕使趙𢎞智覆更詳審為之正義凡三十六卷冀貽諸學者以裨萬一焉左丘明小傳左丘明魯人或曰楚左史倚相之後也為魯太史受經於孔子時周室衰微載籍殘缺仲尼思存前聖之業以魯周公之國禮文備物史官有法故與丘明觀其史記據行事仍人道因物以立功就敗以成罰假日月以定厯數藉朝聘以定禮樂有所褒諱貶損不可書見口授弟子弟子退而異言丘明恐弟子各安其意以失其真故論本事而作傳明夫子不以空言説經也春秋所貶損大人當世君臣有權威勢力其事實皆形於傳是以隱而不宣所以免時難也又采録前世穆王以來下訖於魯悼知伯之謀無不備載以為國語其文不主於經故號曰春秋外傳云魯侯欲以孔子為司徒將召三桓議之乃謂左丘明丘明曰臣丘其聖人與夫聖人在政過者離位焉君雖欲謀其將弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珍羞欲為千金之裘而與狐謀其皮欲為少牢之珍而與羊謀其羞言未卒狐相與逃於重丘之下羊相與藏於深林之中故周人五年不製一裘十年不足一牢何者周人之謀失矣今君欲以孔丘為司徒召三桓而議之亦與狐謀裘與羊謀羞也於是魯侯遂不與三桓謀而召孔子為司徒愚按狐羊之喻類戰國策士之言而孔子之為司徒不見於家語及太史公書無乃後世之所附益當時未必有其事與或曰丘明孔子以前賢人孔子所引率前世人如老彭伯夷之類又左傳國語屬綴不倫似非一人所為傳春秋者疑楚人左史倚相之後故載楚事特詳多無經之傳此其證也其説頗乖異不可考據夫孔子所稱淵騫之流豈非及門之士馬遷謂魯君子左丘明作傳又謂左丘失明厥有國語且內外傳雜採異文若齊晉大國亦皆有無經之傳何必楚人之所作哉自左氏既沒二百餘年經既遭焚書亦廢滅及魯共王壞孔子舊宅於壁中得古文逸禮三十九篇書十六篇天漢之後孔安國獻之遭巫蠱之難未及施行及春秋左氏丘明所修皆古文舊書多者二十餘通藏於祕府伏而未發漢武帝時河間獻左氏及古文周官光武之世議立左氏學公羊之徒上書詆左氏左氏之學不立成帝時劉歆挍祕書見府中左氏傳大好之引傳釋經轉相發明由是章句義理備焉歆以為左氏好惡與聖人同親見孔子而公羊穀梁在七十二弟子後傳聞之與親見其詳略不同歆數以問向向不能非也及歆親近欲建立左氏列於學宫哀帝令歆與五經博士講論其義諸儒博士或不肯置對歆因移書於太常博士責讓之和帝元興中鄭興父子及歆創通大義奏上左氏始立學宫自此以後左氏顯而二傳微矣今觀左氏一書條例文辭無不燦然明備而公穀穿鑿往往自生抵牾優劣昭然奈何漢儒聚訟紛紛久而後定豈古文之隱顯有時聖賢之大業諒亦終不可晦爾左傳事緯前集卷一
