body:
  text: 左傳事緯卷七靈璧知縣馬驌撰臧孫紇出奔襄公二十二年春臧武仲如晉雨過御叔御叔在其邑將飲酒曰焉用聖人我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而傲使人國之蠧也令倍其賦二十三年季武子無適子公彌長而愛悼子欲立之訪於申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行乃止訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正慍而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲己酒而以具往盡舍旃故公鉏氏富又出為公左宰孟孫惡臧孫季孫愛之孟氏之御騶豐點好羯也曰從余言必為孟孫再三云羯從之孟莊子疾豐點謂公鉏茍立羯請讐臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己卯孟孫卒公鉏奉羯立于户側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從己而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾初臧宣叔娶于鑄生賈及為而死繼室以其姪穆薑之姨子也生紇長於公宮薑氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請茍守先祀無廢二勳敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聽公命殺適立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何乃弗與田仲尼曰知之難也有臧武仲之知而不容於魯國抑有由也作不順而施不恕也夏書曰念兹在兹順事恕施也適庶少長人倫之大者也季孫宿昵寵廢長而魯人未嘗正其失非不正之也自仲遂殺適羣臣效尤公室無政勢不能正之也乃臧紇為國司寇號稱知者而阿比季氏以成其私違道犯逆幾滅宗祀此其故何耶夫紇固宣叔之庶子也因寵嗣位季孫宿知其可謀也而後訪焉會孟氏之卒公鉏遂用其知而立羯季氏之不能正孟氏猶臧氏之不能正季氏也當時季孫之賢不逮孟氏而紇為宿所愛此其人豈真知哉至公鉏為讒而所愛與所惡皆羣起而攻之究使斬關之罪著于史册要君之名流于後世若是乎知能為人謀而明不能自鏡齊崔慶之亂宣十年崔杼有寵於惠公高國畏其逼也公卒而逐之奔衛書曰崔氏非其罪也且告以族不以名凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使者則告不然則否成十七年齊慶克通于聲孟子與婦人蒙衣乘輦而入于閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以會高鮑處守及還將至閉門而索客孟子訴之曰高鮑將不納君而立公子角國子知之秋七月壬寅刖鮑牽而逐高無咎無咎奔莒高弱以盧叛齊人來召鮑國而立之初鮑國去鮑氏而來為施孝叔臣施氏卜宰匡句須吉施氏之宰有百室之邑與匡句須邑使為宰以讓鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以為鮑氏後仲尼曰鮑莊子之知不如葵葵猶能衛其足齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以榖叛齊侯與之盟于徐關而復之十二月盧降使國勝告難于晉待命于清十八年齊為慶氏之難故甲申晦齊侯使士華免以戈殺國佐于內宮之朝師逃于夫人之宮書曰齊殺其大夫國佐棄命專殺以穀叛故也使清人殺國勝國弱來奔王湫奔萊慶封為大夫慶佐為司寇既齊侯反國弱使嗣國氏禮也襄十七年齊晏桓子卒晏嬰粗縗斬苴絰帶杖菅屨食鬻居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫十九年齊侯娶于魯曰顏懿姬無子其姪鬷聲姬生光以為大子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為大子許之仲子曰不可廢常不祥間諸侯難光之立也列于諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東大子光使高厚傅牙以為大子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市夏五月壬辰晦齊靈公卒莊公即位執公子牙於句瀆之丘以夙沙衛易已衛奔高唐以叛秋八月齊崔杼殺高厚於灑藍而兼其室書曰齊殺其大夫從君於昏也齊慶封圍高唐弗克冬十一月齊侯圍之見衛在城上號之乃下問守備焉以無備告揖之乃登聞師將傅食高唐人殖綽工僂會夜縋納師醢衛于軍二十一年齊侯使慶佐為大夫復討公子牙之黨執公子買于句瀆之丘公子鉏來奔叔孫還奔燕二十四年孟孝伯侵齊晉故也二十五年春齊崔杼帥師伐我北鄙以報孝伯之師也公患之使告于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使民不嚴異於他日齊師徒歸齊棠公之妻東郭偃之姊也東郭匽臣崔武子棠公死偃御武子以弔焉見棠薑而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宮不見其妻凶困于石往不濟也據于蒺藜所恃傷也入于其宮不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎崔子因是又以其間伐晉也曰晉必將報欲弒公以説于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒人朝于齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從薑氏薑入于室與崔子自側户出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃于廟弗許皆曰君之臣杼疾病不能聽命近於公宮陪臣干掫有淫者不知二命公踰墻又射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝他父祭於高唐至復命不説辨而死于崔氏申蒯侍漁者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死崔氏殺鬷蔑於平陰晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晉王何奔莒叔孫宣伯之在齊也叔孫還納其女於靈公嬖生景公丁丑崔杼立而相之慶封為左相盟國人於大宮曰所不與崔慶者晏子仰天嘆曰嬰所不唯忠於君利社稷者是與有如上帝乃歃辛巳公與大夫及莒子盟大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還閭丘嬰以帷縛其妻而載之與申鮮虞乘而出鮮虞推而下之曰君昏不能匡危不能救死不能死而知匿其昵其誰納之行及弇中將舍嬰曰崔慶其追我鮮虞曰一與一誰能懼我遂舍枕轡而寢食馬而食駕而行出弇中謂嬰曰速驅之崔慶之衆不可當也遂來奔崔氏側莊公于北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲二十七年齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也齊崔杼生成及強而寡娶東郭薑生明東郭薑以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立明成請老于崔崔子許之偃與無咎弗豫曰崔宗邑也必在宗主成與強怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告慶封曰子姑退吾圖之告盧蒲嫳盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔強殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出且曰崔氏有福止余猶可遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宮而守之弗克使國人助之遂滅崔氏殺成與強而盡俘其家其妻縊嫳復命于崔子且御而歸之至則無歸矣乃縊崔明夜辟諸大墓辛巳崔明來奔慶封當國二十八年齊慶封好田而耆酒與慶舍政則以其內實遷于盧蒲嫳氏易內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有寵妻之慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗癸言王何而反之二人皆嬖使執寢戈而先後之公膳日雙雞饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣使析歸父告晏平仲平仲曰嬰之衆不足用也知無能謀也言弗敢出有盟可也子家曰子之言云又焉用盟告北郭子車子車曰人各有以事君非佐之所能也陳文子謂桓子曰禍將及矣吾其何得對曰得慶氏之木百車於莊文子曰可慎守也已盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讐敢獻其兆子之曰克見血冬十月慶封田于萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸慶嗣聞之曰禍將作矣謂子家速歸禍作必于嘗歸猶可及也子家弗聽亦無悛志子息曰亡矣幸而獲在吳越陳無宇濟水而戕舟發梁盧蒲薑謂癸曰有事而不告我必不捷矣癸告之薑曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗于大公之廟慶舍涖事盧蒲薑告之且止之弗聽曰誰敢者遂如公麻嬰為尸慶奊為上獻盧蒲癸王何執寢戈慶氏以其甲環公宮陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至於魚里欒高陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動於甍以俎壺投殺人而後死遂殺慶繩麻嬰公懼鮑國曰羣臣為君故也陳須無以公歸稅服而如內宮慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宮弗克反陳于嶽請戰弗許遂來奔獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封汜祭穆子不説使工為之誦茅鴟亦不知既而齊人來讓奔吳吳句餘豫之朱方聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘及慶氏亡皆召之具其器用而反其邑焉與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度始無遷也夫民生厚而用利於是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之公以為忠故有寵釋盧蒲嫳於北竟求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬既崔氏之臣曰與我其拱璧吾獻其柩於是得之十二月乙亥朔齊人遷莊公殯于大寢以其棺尸崔杼於市國人猶知之皆曰崔子也二十九年二月癸卯齊人葬莊公於北郭昭三年齊侯田於莒盧蒲嫳見泣且請曰余髮如此種種余奚能為公曰諾吾告二子歸而告之子尾欲復之子雅不可曰彼其髮短而心甚長其或寢處我矣九月子雅放盧蒲嫳於北燕嗚呼寵逼之害於人國也可勝道哉齊之有高國天子之命大夫也而崔慶不能與並立究使齊國三世不靖而弒亂之禍未輒已焉噫人君而可以任其寵乎崔出自丁慶出自桓皆以公族而居微秩杼以惠公之寵而致高國之逐雖寵禍未彰史稱無罪然而防微止亂齊之幸也乃無何而慶氏張崔氏入矣聲孟子靈公母也慶克淫亂罪同僑如公受其譖而刖鮑牽逐高無咎國佐義忿又復見殺夫信讒慝而專殺戮一之為甚豈可再乎靈公不明故慶克雖誅而封佐並進齊之患何有極也公又不道廢光立牙崔杼迎立變從中作靈之為靈於母無魯成之明於子無仲子之智幸而獲沒豈曰亂而不損哉莊公即位尸戎子執子牙殺高厚醢夙沙衛其所以謀安其位者汲汲然如將弗及而崔慶在側若不聞焉唯是興師勞民日勤四方崔內蓄其逆志而外收其兵權莊曾不之知也逮賜冠禍搆猶弗能察登臺三請冀或得生又何愚哉崔杼弒莊以説晉即立景公大宮為盟羣臣懾服不惟無弒君之罪而反有立君之功不惟無大國之討而反得大國之寵晏嬰仰天而歎亦莫如之何也二氏為黨終未易圖乃崔氏內亂而慶封乘之崔慶離而崔杼孤矣崔氏滅而慶封又孤矣二子之狡也能免于國之討而不能免于家之難盧蒲嫳搆之而崔子誅盧蒲癸王何搆之而慶氏亡齊有兩大逆不旋踵而皆滅之豈或太公之德在人抑亦晏嬰之陰相其成討亂者咸知有濟是以嫳攻崔而國人助之癸與何攻慶而欒高陳鮑又交助之也天道有知姦回弗赦故崔杼雖三子皆死而不免一身之縊慶封既聚族皆奔而不免朱方之誅弒逆之徒何克長世為亂者其亦可以止哉晉楚弭兵襄二十五年趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭二十六年齊人城郟之嵗其夏齊烏餘以廪丘奔晉襲衛羊角取之遂襲我高魚有大雨自其竇入介于其庫以登其城克而取之又取邑于宋於是范宣子卒諸侯弗能治也及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往二十七年春胥梁帶使諸喪邑者具車徒以受地必周使烏餘具車徒以受封烏餘以其衆出使諸侯偽效烏餘之封者而遂執之盡獲之皆取其邑而歸諸侯諸侯是以睦於晉宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大災也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告於秦秦亦許之皆告於小國為會于宋五月甲辰晉趙武至于宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介司馬置折俎禮也仲尼使舉是禮也以為多文辭戊申叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈從趙武至丙辰邾悼公至壬戌楚公子黑肱先至成言於晉丁卯宋向戌如陳從子木成言於楚戊辰滕成公至子木謂向戌請晉楚之從交相見也庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能于齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊壬申左師復言於子木子木使馹謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至是夜也趙孟及子晳盟以齊言庚辰子木至自陳陳孔渙蔡公孫歸生至曹許之大夫皆至以藩為軍晉楚各處其偏伯夙謂趙孟曰楚氛甚惡懼難趙孟曰吾左還入于宋若我何辛巳將盟于宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信于楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信大宰退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣食言者不病非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟故不書其族言違命也晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人書先晉晉有信也壬午宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也乙酉宋公及諸侯之大夫盟于蒙門之外子木問于趙孟曰范武子之德何如對曰夫子之家事治言于晉國無隱情其祝史陳信于鬼神無愧辭子木歸以語王王曰尚矣哉能歆神人宜其光輔五君以為盟主也子木又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭晉荀盈遂如楚涖盟宋左師請賞曰請免死之邑公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之左師辭邑向氏欲攻司城左師曰我將亡夫子存我德莫大焉又可攻乎君子曰彼己之子邦之司直樂喜之謂乎何以恤我我其收之向戌之謂乎楚薳罷如晉涖盟晉侯享之將出賦既醉叔向曰薳氏之有後於楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能養民政其焉往二十八年夏齊侯陳侯蔡侯北燕伯杞伯胡子沈子白狄朝于晉宋之盟故也齊侯將行慶封曰我不與盟何為於晉陳文子曰先事後賄禮也小事大未獲事焉從之如志禮也雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行孟孝伯如晉告將為宋之盟故如楚也蔡侯之如晉也鄭伯使遊吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問諸晉而以告子大叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以嵗之不易聘於下執事令執事有命曰女何與政令之有必使而君棄而封守跋涉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚子大叔歸復命告子展曰楚子將死矣不修其政德而貪昧於諸侯以逞其願欲久得乎周易有之在復之頥曰迷復凶其楚子之謂乎欲復其願而棄其本復歸無所是謂迷復能無凶乎君其往也送葬而歸以快楚心楚不幾十年未能恤諸侯也吾乃休吾民矣裨竈曰今兹周王及楚子皆將死歲棄其次而旅於明年之次以害鳥帑周楚惡之九月鄭遊吉如晉告將朝於楚以從宋之盟為宋之盟故公及宋公陳侯鄭伯許男如楚及漢楚康王卒公欲反叔仲昭伯回我楚國之為豈為一人行也子服惠伯曰君子有逺慮小人從邇飢寒之不恤誰遑其後不如姑歸也叔孫穆子曰叔仲子專之矣子服子始學者也榮成伯曰逺圖者忠也公遂行宋向戌曰我一人之為非為楚也飢寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反楚屈建卒趙文子喪之如同盟禮也二十九年春王正月公在楚釋不朝正于廟也楚人使公親襚公患之穆叔曰襚殯而襚則布幣也乃使巫以桃茢先祓殯楚人弗禁既而悔之夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓葬靈王鄭上卿有事子展使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎詩云王事靡盬不遑啓處東西南北誰敢寧處堅事晉楚以蕃王室也王事無曠何常之有遂使印段如周三十年為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宮他鄭罕虎及小邾之大夫會于澶淵既而無歸于宋故不書其人君子曰信其不可不愼乎澶淵之會卿不書不信也夫諸侯之上卿會而不信寵名皆棄不信之不可也如是詩曰文王陟降在帝左右信之謂也又曰淑愼爾止無載爾偽不信之謂也書曰某人某人會于澶淵宋災故尤之也不書魯大夫諱之也三十一年鄭子皮使印段如楚以適晉告禮也昭公元年春楚公子圍聘于鄭且娶於公孫段氏伍舉為介將入館鄭人惡之使行人子羽與之言乃館於外既聘將以衆逆子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聽命令尹命大宰伯州犂對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室圍布几筵告於莊共之廟而來若野賜之是委君貺於草莽也是寡大夫不得列于諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜而入許之正月乙未入逆而出遂會于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志于晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉況不信之尤者乎楚重得志于晉晉之恥也子相晉國以為盟主於今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有飢饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已晉人許之三月甲辰盟楚公子圍設服離衛叔孫穆子曰楚公子美矣君哉鄭子皮曰二執戈者前矣蔡子家曰蒲宮有前不亦可乎楚伯州犂曰此行也辭而假之寡君鄭行人揮曰假不反矣伯州犂曰子姑憂子晳之欲背誕也子羽曰當璧猶在假而不反子其無憂乎齊國子曰吾代二子愍矣陳公子招曰不憂何成二子樂矣衛齊子曰茍或知之雖憂何害宋合左師曰大國令小國共吾知共而已晉樂王鮒曰小旻之卒章善矣吾從之退會子羽謂子皮曰叔孫絞而婉宋左師簡而禮樂王鮒字而敬子與子家持之皆保世之主也齊衛陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲夫必從之三大夫兆憂憂能無至乎言以知物其是之謂矣令尹享趙孟賦大明之首章趙孟賦小宛之二章事畢趙孟謂叔向曰令尹自以為王矣何如對曰王弱令尹強其可哉雖可不終趙孟曰何故對曰強以克弱而安之強不義也不義而強其斃必速詩曰赫赫宗周褒姒滅之強不義也令尹為王必求諸侯晉少懦矣諸侯將往若獲諸侯其虐滋甚民弗堪也將何以終夫以強取不義而克必以為道道以淫虐弗可久已矣夏四月趙孟叔孫豹曹大夫入于鄭鄭伯兼享之子皮戒趙孟禮終趙孟賦瓠葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻子其從之子皮曰敢乎穆叔曰夫人之所欲也又何不敢及享具五獻之籩豆於幕下趙孟辭私於子産曰武請於冢宰矣乃用一獻趙孟為客禮終乃宴穆叔賦鵲巢趙孟曰武不堪也又賦采蘩曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟比以安尨也可使無吠穆叔子皮及曹大夫興拜舉兕爵曰小國賴子知免於戾矣飲酒樂趙孟出曰吾不復此矣天王使劉定公勞趙孟於潁館於雒汭劉子曰美哉禹功明德遠矣微禹吾其魚乎吾與子辨冕端委以治民臨諸侯禹之力也子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕于𨽻人朝不謀夕棄神人矣神怒民叛何以能久趙孟不復年矣神怒不歆其祀民叛不即其事祀事不從又何以年弭兵美名也美名則不可逆故一號而諸侯皆至焉盟宋之役齊秦不交相見邾滕為私屬皆不與盟宋為地主盟者十國晉楚同為盟主而兩國之從交相見是時與盟之國魯衛曹宋從晉者也陳蔡鄭許從楚者也會分二主小國共屬是直以諸夏之權授之荆楚而令諸侯之國奔走不寧也嗚呼兵而可弭乎哉晉自夷儀再會諸侯多攜趙孟執政而晉霸浸衰兵不止則北方之勢日急宋實首當其鋭故向戌啓謀欲令兩國為成以紓其難是舉也宋之利亦楚之志也告于晉而晉大夫之言曰兵民之殘財用之蠧其言也順國君聽之雖然楚入春秋荐食中國舊矣中國不得已而修霸令豈好兵哉文公躬擐甲胄經營中原不辭黷兵之名以禦強楚者凡以存天下之大防也使晉早以諸侯讓楚則兵之不用也久矣楚自成穆動務稱兵以恐喝諸侯諸侯之從之者半疑之者半故霸主起而應之侵伐盟會不遑寧處誠欲令諸侯之從晉者不復從楚而從楚者亦使從晉如是則中國之勢常伸矣今也楚不能多得志於諸侯厭苦甲兵又欲借弭兵之説以收天下之權而晉乃貪弭兵之名以求一時之利晏安鴆毒坐失事幾晉之為謀何其拙也夫以楚成之強楚莊之賢百餘年間師勞力頓未嘗得一號令北方而康王乃不煩一卒直晏然以為諸侯之盟主又復衷甲以先進歃于是中國之大勢盡移于楚楚誠得矣晉將何以自處哉向戌不知而蹈千古之罪反自喜為不世之功微子罕之言終不悟也春秋痛諸姬之國皆奔走而服事于楚故既書公之如楚復書在楚宗國而北面荆蠻自周公以來於今始也晉不惡宋而反感其德澶淵之役合三十國之大夫以奔走之天下意宋必有大征伐焉而孰知止以宋災故爾是時諸夏之國或弒其君或弒其父不聞晉為會以問之而忽急宋災非愍共姬之死實以其首倡弭兵故集四方而並走其國也晉亦愚矣虢之會復讀舊書楚仍先晉其為盟主也若故有之何嘗德晉哉趙孟力不敵楚而兩為之下畏強國以隳其霸業亦何信之有焉春秋至是仍書晉國于前者為中國抑楚為天下扶晉且為春秋二百四十餘年惜晉也子木盟而馹謁諸王楚之權實在其上晉則趙孟直自主之矣大夫專諸侯替而蠻夷得志此天下一大變也昔華元之合晉楚也兩國盟于宋西門之外而春秋不書猶曰此特相盟未甚害也今則華夷並列故書宋所以痛其始書虢所以痛其成既而楚子會申晉人莫救而中國之事去矣宋前有華元而兩霸之端起後有向戌而兩霸之勢成宋誠晉之蠧而兩臣誠宋之罪人哉吳季札讓國襄十四年吳子諸樊既除喪將立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也誰敢姦君有國非吾節也札雖不才願附于子臧以無失節固立之棄其室而耕乃舍之二十四年夏楚子為舟師以伐吳不為軍政無功而還二十五年十二月吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱于短墻以射之卒二十九年吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀殺之吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀于周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘于齊説晏平仲謂之曰子速納邑與政無邑無政乃免于難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免于欒高之難聘于鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加于戮夫子獲罪于君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃于三族乎説叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免于難三十一年吳子使屈狐庸聘于晉通路也趙文子問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吳天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立讓國正乎曰季札不宜立者也不宜立雖與弗受有識者皆能之況季札之賢哉昔壽夢四子札弱而才其兄皆欲立之而札不聽故三君迭立皆好勇輕生欲以終致季子飲食必祝曰天茍有吳尚速有悔于豫身誠如是也札似可以受矣雖然季子秉志守節是豈可以移哉昔伯夷逃而叔齊亦逃雖國人立其中子而孤竹終以不昌後世不以叔之逃為非者賢其能以義自處也況今季札不以父命立而三兄交讓季札懼焉棄室耕野甘同匹夫受命通嗣義秉臣禮有國不立屈狐庸而知之矣三君乃不知哉且三君未聞道矣當楚康之世吳楚交爭國方多難吳之欲立札以永吳也札既不受可以已矣而輕生以危社稷巢隕閽戕令荆人得肆志于疆場幾何不亡其國而謂季子安乎先君安乎先儒不察謂季札讓國以生亂夫亂生于三君而不在季子也曾以蠻夷之公子近效子臧之節逺符叔齊之義而反以生亂責之以為後世竊位者之口實哉鄭子産相國襄二十二年夏晉人徴朝于鄭鄭人使少正公孫僑對曰在昔先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮于寡君寡君懼因是行也我二年六月朝于楚晉是以有戲之役楚人猶競而申禮于敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜二于楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟遂帥羣臣隨于執事以會歲終二于楚者子侯石盂歸而討之溴梁之明年子蟜老矣公孫夏從寡君以朝于君見于嘗酎與執燔焉間二年聞君將靖東夏四月又朝以聽事期不朝之間無歲不聘無役不從以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讐敝邑是懼其敢忘君命委諸執事執事實重圖之九月鄭公孫黑肱有疾歸邑于公召室老宗人立段而使黜官薄祭祭以特羊殷以少牢足以共祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也已已伯張卒君子曰善戒詩曰慎爾侯度用戒不虞鄭子張其有焉十二月鄭遊昄將如晉未出竟遭逆妻者奪之以館于邑丁巳其夫攻子明殺之以其妻行子展廢良而立大叔曰國卿君之二也民之主也不可以茍請舍子明之類求亡妻者使復其所使遊氏勿怨曰無昭惡也二十四年范宣子為政諸侯之幣重鄭人病之二月鄭伯如晉子産寓書於子西以告宣子曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚于公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞何沒沒也將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨女無二爾心有令名也夫恕思以明德則令名載而行之是以逺至邇安母寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子説乃輕幣是行也鄭伯朝晉為重幣故且請伐陳也鄭伯稽首宣子辭子西相曰以陳國之介恃大國而陵虐于敝邑寡君是以請罪焉敢不稽首晉侯嬖程鄭使佐下軍鄭行人公孫揮如晉聘程鄭問焉曰敢問降階何由子羽不能對歸以語然明然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉且夫既登而求降階者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂也二十五年初陳侯會楚子伐鄭當陳隧者井堙木刋鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其大子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍爾母辭曰不祥與其妻扶其母以奔墓亦免子展命師無入公宮與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還鄭子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至于莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而耻大姬天誘其𠂻啓敝邑心陳知其罪授手於我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復于趙文子文子曰其辭順犯順不祥乃受之冬十月子展相鄭伯如晉拜陳之功子西復伐陳陳及鄭平仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功愼辭哉晉程鄭卒子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔且曰他日吾見蔑之面而已今吾見其心矣子大叔問政于子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣二十六年鄭伯賞入陳之功三月甲寅朔享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固豫之乃受三邑公孫揮曰子産其將知政矣讓不失禮二十七年鄭伯享趙孟于垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁趙孟曰牀笫之言不踰閾況在野乎非使人之所得聞也子西賦黍苗之四章趙孟曰寡君在武何能焉子産賦隰桑趙孟曰武請受其卒章子大叔賦野有蔓草趙孟曰吾子之惠也印段賦蟋蟀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈趙孟曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮其能久乎幸而後亡叔向曰然已侈所謂不及五稔者夫子之謂矣文子曰其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎二十八年子産相鄭伯以如楚舍不為壇外僕言曰昔先大夫相先君適四國未嘗不為壇自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大茍舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其災患賞其德刑教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於德小適大有五惡説其罪戾請其不足行其政事共其職貢從其時命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也公過鄭鄭伯不在伯有迋勞于黃崖不敬穆叔曰伯有無戾於鄭鄭必有大咎敬民之主也而棄之何以承守鄭人不討必受其辜濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也敬可棄乎二十九年鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將強使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟于伯有氏裨諶曰是盟也其與幾何詩曰君子屢盟亂是用長今是長亂之道也禍未歇也必三年而後能紓然明曰政將焉往裨諶曰善之代不善天命也其焉辟子産舉不踰等則位班也擇善而舉則世隆也天又除之奪伯有魄子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾不然將亡矣三十年子産相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此嵗也駟良方爭未知所成若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣夏四月己亥鄭伯及其大夫盟君子是以知鄭難之不已也鄭伯有耆酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許大夫聚謀子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生伯有汰侈故不免人謂子産就直助強子産曰豈為我徒國之禍難誰知所敝或主強直難乃不生姑成吾所辛丑子産斂伯有氏之死者而殯之不及謀而遂行印段從之子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者況生者乎遂自止之壬寅子産入癸卯子石入皆受盟于子晳氏乙巳鄭伯及其大夫盟於大宮盟國人于師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶率國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死于羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止於是遊吉如晉還聞難不入復命于介八月甲子奔晉駟帶追之及酸棗與子上盟用兩圭質于河使公孫肸入盟大夫己巳復歸書曰鄭人殺良霄不稱大夫言自外入也於子蟜之卒也將葬公孫揮與裨竈晨會事焉過伯有氏其門上生莠子羽曰其莠猶在乎於是嵗在降婁降婁中而旦裨竈指之曰猶可以終嵗歲不及此次也已及其亡也嵗在娵訾之口其明年乃及降婁僕展從伯有與之皆死羽頡出奔晉為任大夫雞澤之會鄭樂成奔楚遂適晉羽頡因之與之比而事趙文子言伐鄭之説焉以宋之盟故不可子皮以公孫鉏為馬師鄭子皮授子産政辭曰國小而逼族大寵多不可為也子皮曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寬子産為政有事伯石賂與之邑子大叔曰國皆其國也奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往子大叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先姑先安大以待其所歸既伯石懼而歸邑卒與之伯有既死使太史命伯石為卿辭大史退則請命焉復命之又辭如是三乃受策入拜子産是以惡其為人也使次已位子産使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之豐卷將祭請田焉弗許曰唯君用鮮衆給而已子張怒退而徴役子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里三年而復之反其田里及其入焉從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之三十一年公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修寇盜充斥無若諸侯之屬辱在寡君者何是以令吏人完客所館高其閈閎厚其牆垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺墻以待賓客若皆毁之其何以共命寡君使丐請命對曰以敝邑褊小介于大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宮室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廄繕修司空以時平易道路圬人以時塓館宮室諸侯賓至甸設庭燎僕人巡宮車馬有所賓從有代巾車脂轄𨽻人牧圉各贍其事百官之屬各展其物公不留賓而亦無廢事憂樂同之事則巡之教其不知而恤其不足賓至如歸無寧災患不畏寇盜而亦不患燥濕今銅鞮之宮數里而諸侯舍於𨽻人門不容車而不可踰越盜賊公行而夭癘不戒賓見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子曰信我實不德而以𨽻人之垣以贏諸侯是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也詩曰辭之輯矣民之協矣辭之繹矣民之莫矣其知之矣十二月北宮文子相衛襄公以如楚宋之盟故也過鄭印段廷勞于棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與子大叔逆客事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯禮之於政如熱之有濯也濯以救熱何患之有子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為而辨于其大夫之族姓班位貴賤能否而又善為辭令裨諶能謀謀於野則獲謀于邑則否鄭國將有諸侯之事子産乃問四國之為于子羽且使多為辭令與裨諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事北宮文子所謂有禮也鄭人遊于鄉校以論執政然眀謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也然眀曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子于鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國昭元年鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晳盛飾入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而娶其妻子南知之執戈逐之及衝擊之以戈子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞幼賤有罪罪在楚也乃執子南而數之曰國之大節有五女皆姦之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也姦國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪五月庚辰鄭放遊楚於吳將行子南子産咨于大叔大叔曰吉不能亢身焉能亢宗彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而蔡蔡叔夫豈不愛王室故也吉若獲戾子將行之何有于諸遊鄭為遊楚亂故六月丁巳鄭伯及其大夫盟于公孫段氏罕虎公孫僑公孫段印段遊吉駟帶私盟于閨門之外實薰隧公孫黑強與於盟使大史書其名且曰七子子産弗討二年秋鄭公孫黑將作亂欲去遊氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司寇將至七月壬寅縊尸諸周氏之衢加木焉三年夏四月鄭伯如晉公孫段相甚敬而卑禮無違者晉侯嘉焉授之以䇿曰子豐有勞於晉國余聞而弗忘賜女州田以胙乃舊勳伯石再拜稽首受䇿以出君子曰禮其人之急也乎伯石之汰也一為禮於晉猶荷其祿況以禮終始乎詩曰人而無禮胡不遄死其是之謂乎初州縣欒豹之邑也及欒氏亡范宣子趙文子韓宣子皆欲之文子曰溫吾縣也二宣子曰自郤稱以别三傳矣晉之别縣不唯州誰獲治之文子病之乃舍之二子曰吾不可以正議而自與也皆舍之及文子為政趙獲曰可以取州矣文子曰退二子之言義也違義禍也余不能治余縣又焉用州其以徼禍也君子曰弗知實難知而弗從禍莫大焉有言州必死豐氏故主韓氏伯石之獲州也韓宣子為之請之為其復取之之故四年鄭子産作丘賦國人謗之曰其父死於路已為蠆尾以令于國國將若之何子寬以告子産曰何害茍利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤于人言吾不遷矣渾罕曰國氏其先亡乎君子作法于涼其敝猶貪作法于貪敝將若之何姬在列者蔡及曹滕其先亡乎逼而亡禮鄭先衛亡逼而無法政不率法而制於心民各有心何上之有五年鄭罕虎如齊娶於子尾氏晏子驟見之陳桓子問其故對曰能用善人民之主也六年三月鄭人鑄刑書叔向使詒子産書曰始吾有虞于子今則已矣昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故間之以義糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以強斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徴于書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書將以靖民不亦難乎詩曰儀式刑文王之德日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徴於書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠士文伯曰火見鄭其火乎火未出而作火以鑄刑器藏爭辟焉火如象之不火何為六月丙戌鄭災七年子産為豐施歸州田于韓宣子曰日君以夫公孫段為能任其事而賜之州田今無祿早世不獲久享君德其子弗敢有不敢以聞於君私致諸子宣子辭子産曰古人有言曰其父析薪其子弗克負荷施將懼不能任其先人之祿其況能任大國之賜縱吾子為政而可後之人若屬有疆埸之言敝邑獲戾而豐氏受其大討吾子取州是免敝邑于戾而建置豐氏也敢以為請宣子受之以告晉侯晉侯以與宣子宣子為初言病有之以易原縣于樂大心鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子大叔問其故子産曰鬼有所歸乃不為厲吾為之歸也大叔曰公孫泄何為子産曰説也為身無義而圖説從政有所反之以取媚也不媚不信不信民不從也及子産適晉趙景子問焉曰伯有猶能為鬼乎子産曰能人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽至于神明匹夫匹婦強死其魂魄猶能馮依於人以為淫厲況良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而強死能為鬼不亦宜乎子皮之族飲酒無度故馬師氏與子皮氏有惡齊師還自燕之月罕朔殺罕魋罕朔奔晉韓宣子問其位于子産子産曰君之羈臣茍得容以逃死何位之敢擇卿違從大夫之位罪人以其罪降古之制也朔於敝邑亞大夫也其官馬師也獲戾而逃唯執政所置之得免其死為惠大矣又敢求位宣子為子産之敏也使從嬖大夫十二年三月鄭簡公卒將為葬除及遊氏之廟將毁焉子大叔使其除徒執用以立而無庸毁曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣既如是子産乃使辟之司墓之室有當道者毁之則朝而塴弗毁則日中而塴子大叔請毁之曰無若諸侯之賓何子産曰諸侯之賓能來會吾喪豈憚日中無損于賓而民不害何故不為遂弗毁日中而葬君子謂子産于是乎知禮禮無毁人以自成也六月葬鄭簡公十六年三月晉韓起聘于鄭鄭伯享之子産戒曰茍有位於朝無有不共恪孔張後至立于客間執政禦之適客後又禦之適縣間客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我我皆有禮夫猶鄙我國而無禮何以求榮孔張失位吾子之恥也子産怒曰發命之不衷出令之不信刑之頗類獄之放紛會朝之不敬使命之不聽取陵于大國罷民而無功罪及而弗知僑之恥也孔張君之昆孫子孔之後也執政之嗣也為嗣大夫承命以使周於諸侯國人所尊諸侯所知立于朝而祀於家有祿于國有賦於車喪祭有職受脤歸脤其祭在廟已有著位在位數世世守其業而忘其所僑焉得恥之辟邪之人而皆及執政是先王無刑罰也子寧以他規我宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器也寡君不知子大叔子羽謂子産曰韓子亦無幾求晉國亦未可以二晉國韓子不可偷也若屬有讒人交鬪其間鬼神而助之以興其凶怒悔之何及吾子何愛于一環其以取憎于大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎韓子買諸賈人既成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義弗敢復也今買諸商人商人曰必以聞敢以為請子産對曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無強賈毋或丐奪爾有利市寶賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱而謂敝邑強奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝鄭鄙邑也亦弗為也僑若獻玉不知所成敢私布之韓子辭玉曰起不敏敢求玉以徼二罪敢辭之夏四月鄭六卿餞韓子于郊宣子曰二三君子請皆賦起亦以知鄭志子齤賦野有蔓草宣子曰孺子善哉吾有望矣子産賦鄭之羔裘宣子曰起不堪也子大叔賦褰裳宣子曰起在此敢勤子至於他人乎子大叔拜宣子曰善哉子之言是不有是事其能終乎子遊賦風雨子旗賦有女同車子柳賦蘀兮宣子喜曰鄭其庶乎二三君子以君命貺起賦不出鄭志皆昵燕好也二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我將子産拜使五卿皆拜曰吾子靖亂敢不拜德宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜鄭大旱使屠擊祝欵豎柎有事于桑山斬其木不雨子産曰有事于山蓻山林也而斬其木其罪大矣奪之官邑十七年冬有星孛于大辰西及漢申須曰彗所以除舊布新也天事恆象今除于火火出必布焉諸侯其有火災乎梓愼曰往年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出于夏為三月於商為四月于周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皥之虛也鄭祝融之虛也皆火房也星孛天漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭裨竈言于子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火子産弗與十八年夏五月火始昏見丙子風梓愼曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓愼登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火裨竈曰不用吾言鄭又將火鄭人請用之子産不可子大叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫于東門使司寇出新客禁舊客勿出于宮使子寬子上巡羣屏攝至于大宮使公孫登徙大龜使祝史徙主祏于周廟告于先君使府人庫人各警其事商成公警司宮出舊宮人置諸火所不及司馬司寇列居火道行火所焮城下之人伍列登城明日使野司冦各保其徴郊人助祝史除于國北禳火于玄冥回祿祈于四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也七月鄭子産為火故大為社祓禳於四方振除火災禮也乃簡兵大搜將為搜除子大叔之廟在道南其寢在道北其庭小過期三日使除徒陳于道南廟北曰子産過女而命速除乃毁於而鄉子産朝過而怒之除者南毁子産及衝使從者止之曰毁于北方火之作也子産授兵登陴子大叔曰晉無乃討乎子産曰吾聞之小國忘守則危況有災乎國之不可小有備故也既晉之邊吏讓鄭曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉鄭之有災寡君之憂也今執事􅏌然授兵登陴將以誰罪邊人恐懼不敢不告子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人荐為敝邑不利以重君之憂幸而不亡猶可説也不幸而亡君雖憂之亦無及也鄭有他竟望走在晉既事晉矣其敢有二心十九年是歲也鄭駟偃卒子遊娶於晉大夫生絲弱其父兄立子瑕子産憎其為人也且以為不順弗許亦弗止駟氏聳他日絲以告其舅冬晉人使以幣如鄭問駟乞之立故駟氏懼駟乞欲逃子産弗遣請龜以卜亦弗豫大夫謀對子産不待而對客曰鄭國不天寡君之二三臣札瘥夭昏今又喪我先大夫偃其子幼弱其一二父兄懼隊宗主私族於謀而立長親寡君與其二三老曰抑天實剝亂是吾何知焉諺曰無過亂門民有兵亂猶憚過之而況敢知天之所亂今大夫將問其故抑寡君實不敢知其誰實知之平丘之會君尋舊盟曰無或失職若寡君之二三臣其即世者晉大夫而專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之鄭大水龍鬪于時門之外洧淵國人請為禜焉子産弗許曰我鬪龍不我覿也龍鬪我獨何覿焉禳之則彼其室也吾無求於龍龍亦無求於我乃止也二十年鄭子産有疾謂子大叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難疾數月而卒大叔為政不忍猛而寬鄭國多盜取人于萑苻之澤大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也毋從詭隨以謹無良式遏寇虐慘不畏明糾之以猛也柔逺能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百祿是遒和之至也及子産卒仲尼聞之出涕曰古之遺愛也定八年鄭駟歂嗣子大叔為政九年鄭駟歂殺鄧析而用其竹刑君子謂子然於是不忠茍有可以加於國家者棄其邪可也靜女之三章取彤管焉竿旄何以告之取其忠也故用其道不棄其人詩云蔽芾甘棠勿翦勿伐召伯所茇思其人猶愛其樹況用其道而不恤其人乎子然無以勸能矣國非有強弱也得其人則昌不得其人則亡鄭小國耳居南北之衝自莊公而下晉楚之師交躪其地國之不亡也蓋亦幸矣乃以五歲即位之簡公國家內亂疆場外擾悼共方爭邊吏日戒而不數年間外患以平內政以修解甲息仇國家晏然稱治焉謂非子産之力乎其始從政也輿人謗之同列忌之逮其後誰嗣歌矣甚至鑄刑書作丘賦而民不怨賢能任矣甚至放遊楚誅駟黑而大夫不怒使當大國而權藉馮焉管仲蒍獵之功不足多也乃受政之日惴惴然國逼族寵之是懼有子皮左右而先後之猶懼弗勝任無他春秋之國鄭稱多事固難治也自桓文爭霸而鄭始病自悼共爭霸而鄭始危成公從楚鄢陵不振僖公從晉鄬會不終鄭蓋不可問矣齊桓之世鄭雖受兵而三良為政諸侯莫之敢輕今則子駟之侈焉而死子孔之專焉而死伯有之愎焉而死且伯石豐卷之流猶耽耽焉鄭益不可問矣子産奔晉子皮止之委以大權而功業於是乎炳耀鄭之有子皮齊之有鮑叔牙也而子産之功不及管仲則以無大國爾雖然猶有幸焉晉悼霸而鄭人賴以反正晉楚衰而鄭人因以休息蕭魚而後國無外敵入陳而後國有兵威子産為政正鄭國化弱為強之時也而子産之德足以舉之故諸大國之卿大夫咸欽其人而莫與逆外交固內事舉民賴以安惠孔厚也死之日鄭人丈夫舍玦珮婦人舍珠珥丁壯號哭老人兒啼曰子産去我死乎民將安歸嗚呼生令民愛死令民泣如子産者所稱古良臣哉左傳事緯卷七
