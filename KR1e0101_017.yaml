body:
  text: 左傳事緯前集卷四靈璧知縣馬驌撰左氏辨例下搜狩例搜五狩四治兵一大閲一焚一矢魚一觀社一周禮大司馬之職曰中春教振旅遂以搜田中夏教苃舍遂以苖田中秋教治兵遂以獮田中冬教大閲遂以狩田爾雅曰春獵為搜夏獵為苗秋獵為獮冬獵為狩出為治兵入為振旅傳曰春搜夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實凡此皆教戰田獵之大略也古者教戰田獵事本相因國家雖安忘戰必危是以四時之隙咸用舉事其禮不同故其名亦異周官大閲狩田之法特詳于三時蓋亦因農隙之宜以大習武備也治兵振旅即秋春教戰之名而傳稱三年者然則四時講武之外復三年而大舉亦猶常祀之外復有禘祭爾教戰近于習殺故繼之以田獵田獵患其盡物故約之以三驅農隙而舉非黷武也鳥獸之肉以登於俎皮革齒牙骨角毛羽以登於器非禽荒也田獵既有常時復有常地天子必於王畿諸侯必於封內擇山澤不毛之地近國之隙地而為之傳稱鄭之原圃秦之具囿是其類矣春秋二百四十二年魯之搜苗獮狩必且甚多苟非失時違地則為國之常禮例皆不書經之所書止搜狩數事而已皆譏也桓四年春正月公狩于郎傳曰書時禮也三代異正朔而夏數為得天是以政令治教猶用夏時春秋之正月實周禮之仲冬故傳以得時為禮然而猶書者郎非狩地而狩之故書地以示譏若于禚于紅比蒲昌間同有非地之譏矣何以知書地之為譏乎隱五年春公矢魚于棠傳曰非禮也且言逺地也陳魚而觀既非田獵之常傳以非禮釋之其譏已明而復曰言逺地則於于棠見之且天王河陽之狩傳亦釋其非地是知書地者皆譏辭矣諸搜皆言大搜昭八年秋搜于紅傳稱革車千乘而經特不言大若此者非關褒貶之要亦仍舊史為詳略爾教戰以習戎備欲就尊嚴之處以示威命禮必告廟而行莊八年春王正月甲午治兵傳曰治兵于廟禮也是已治兵不於仲秋而無譏者申明號令將以圍郕雖非因獵而舉猶以合禮為宜亦如備難之城不復以時律之者桓六年秋八月壬午大閲亦以懼齊之故是以無貶非其類與桓七年春二月己亥焚咸丘按爾雅火田為狩在古亦有此法彼但放火燎草守其下風而已今則盡焚一澤故特書焚以譏盡物禮天子不合圍諸侯不掩羣羣且不取而乃焚澤況咸丘又非地乎春秋搜閲治兵皆不書公定十四年秋大搜于比蒲邾子來會公公實親在而經不書何也諸搜之不書公非皆公不臨之也國之大事曰祀與戎非一人之私事故例不書公乃怠慢之主比於禽荒其獵也未必因教戰而行如是者特書公以顯之莊四年冬公及齊人狩于禚越竟而與微者狩必為遊戲之事若如棠觀魚之類爾但郎禚猶行狩禮故以狩書也公之朝于列國也但書公如某而不書其事以為國之常事故不書之莊二十三年公如齊觀社傳曰非禮也魯語云齊棄大公之法而觀民於社襄二十四年傳云齊社搜軍實使客觀之然則此亦齊搜軍實聚民於社既非吾國習戎之事而越竟以觀失禮之舉故傳曰君舉必書書而不法後嗣何觀特書觀社其譏深矣哀十四年春西狩獲麟傳稱狩于大野蓋得國之狩地故不書地虞人修其常職故不言狩者春而狩又非失時然而猶書者則以獲麟故也麟者仁獸聖王之嘉瑞也明王不作出而遇獲仲尼傷周道之不興感嘉瑞之無應故因魯史而作春秋寓褒貶以明中興之教所感而起因以為終於是絶筆於獲麟焉僖二十八年冬天王狩于河陽傳曰晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明德也周室之衰久矣晉侯為會以尊天子而自嫌強大不敢入朝於是召王出狩因盡臣禮此其志誠善也但舊史直言召王既以彰天子之弱又以昭晉侯之失不知名分為重寧使若王自為出狩因以越竟失地而書失地之愆小而天王之尊自在且隱其召王之闕以明晉德也傳稱書曰故書之類皆仲尼之新意而河陽之狩趙盾之弒泄冶之罪皆違凡變例以起大義危疑之理故又顯稱聖言以昭著其書法故曰春秋之稱非聖人孰能修之土功例城二十三築邑一築館一築囿三築臺三作三浚一毁一莊二十九年冬十有二月城諸及防傳曰書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢此土功之總例也國家之大城築修作在所不廢然而慎妨民務必擇農隙之時故為察天星以制常節焉龍星角亢晨見東方是時禾稼已登三務始畢於是戒民以土功之事大火次角亢而晨見乃致築作之用定星昏中遂樹板幹而興作日南至微陽始動農事將興土功於是乎畢也土功力役之大故書於經隱元年傳曰費伯帥師城郎不書非公命也新作南門不書亦非公命也然則但出公命得時與否皆在所書矣姑以城論之桓十六年冬城向傳曰書時也莊二十九年冬十有二月城諸及防傳曰書時也文十二年冬十有二月季孫行父帥師城諸及鄆傳曰書時也宣八年冬城平陽傳曰書時也成九年冬十有一月城中城傳曰書時也此皆以得時書也隱七年夏城中丘傳曰書不時也九年夏城郎傳曰書不時也此皆以失時書也土功之時本設此節以為農事既間得用力役若實不病農雖天象未至亦無所譏襄十三年冬城防傳曰書事時也是已苟或城實非時自知不可而緩以告廟既以病民復慢其祖經因依告而書以示其失定十五年冬城漆傳曰書不時告也是已土功既有凡例而城之時與不時傳復屢發者何也春秋之於城有二義焉無事備預則用農隙臨難禦敵則四時皆可傳所重發皆備預之城也所不發皆禦敵之城也禦敵而城不須待時故傳不言得失襄十九年冬城西郛傳曰懼齊也城武城傳曰穆叔曰齊猶未也不可以不懼乃城武城若此之類直言歸趣或時或否不在凡例之內亦如過雩之外復有旱雩爾莊二十八年冬築郿傳曰非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城此别城築之名也周禮四縣為都四井為邑此都邑雖未必為周禮之制大約都大邑小是以春秋所書猶用典䇿之名在都曰城在邑曰築都之稱城不論有廟與否若城漆是矣漆為邾庶其所以來奔者寧有宗廟先君之主乎若廟之所在雖邑亦曰都尊其號故崇其稱以宗廟而大之也郿本為邑而又無廟是以獨書為築傳因於此發例例稱凡邑則非他築之例若臺囿與館咸謂之築無大小之異名矣臺囿館之言築創始之辭也延廏南門雉門兩觀之言新修舊之辭也是則其立名之宜也莊二十九年春新延廢傳曰書不時也凡馬日中而出日中而入春秋分而晝夜等謂之日中馬以春分出牧秋分入廄此周典也今春而作廄既失民務又違馬節二者皆譏故傳稱不時而發馬出入之例諸皆言新作而此言新不言作經闕文爾非例也僖二十年春新作南門傳曰書不時也凡啓塞從時春秋泛興之役總用土功之時若門户道橋之啓城郭牆塹之塞皆官民之開閉不可一日而闕又須隨壞時而修之不得用土功之候今僖公無故修飾南門非啓塞之急務傳嫌城門或壞涉於開閉之急故譏其不時因别起從時之例也由此例以推之一切急務皆可從時莊元年秋築王姬之館于外王女下嫁不得不築也文十六年秋毁泉臺蛇出為妖聲薑以薨不得不毁也莊九年冬浚洙畏齊之難不得不浚也及諸禦難之城或春或夏或冬都無褒譏是亦從時之説而已定二年夏雉門及兩觀災冬新作雉門及兩觀諸宫之災大室之壞皆不言作蓋皆從時修之重在災壞故不書作今厯三時而後作是以别書若夫不急之務遊觀之所自當以土功之限為宜傳是以於城都築囿新廏作南門之下各言得失用以顯明諸例也昭九年冬築郎囿傳曰書時也成十八年秋築鹿囿傳曰書不時也定十三年夏築蛇淵囿亦知其不時矣莊三十一年春築臺于郎夏築臺于薛秋築臺于秦嵗三力役既已極奢又違天候傳不言而自明也魯之役民者三十六而霸者之六城不與焉役而失時固有勦民之害即役不失時然而民力殫矣三時耕不獲一時之息此經之所以悉書哉災異例日食三十六星孛三恆星不見星隕如雨一隕石六鷁退飛一大雨震電一震廟一雨雪一無冰三隕霜不殺草李梅實一隕霜殺菽一雨木冰一大雨雹三大水九不雨七大旱二螽十一螟三多麇有蜮有蜚蝝生各一飢三有年大有年各一無麥苗大無麥禾各一災十一火一地震五山崩二鸜鵒來巢一春秋記災異謹天變重民事也人事不修而隂陽沴戾爰有雨陽寒燠之乖震動崩陀之患水旱飢饉之罰螽螟蝝蜚之害在內則為災必書在外則來告必書而日食星變尤其昭昭在上者故事事謹而志之也日者衆陽之會人君之象也周天三百六十五度四分度之一日嵗一周天月月一周天每月一會會常在朔日被月掩則日為之食經不言月食日闕所不見也日月動物雖同行而不必同道厯家所推復有盈縮之異故有積嵗不食者有頻月而食者術存於星臺之官非經所急經唯據見諸天者書曰日有食之而已若日被全掩則書曰既既日光盡也日食之書必備朔日甲乙者厯之紀朔者日月之會日官於日食應記月朔朔有甲乙乃可推求失則為過桓十七年冬十月朔日有食之傳曰不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官于朝僖十五年夏五月日有食之傳曰不書朔與日官失之也前止失日後並失朔傳是以重發例推此而言諸朔日不備者皆日官之失矣日食雖天變之大然亦厯數之常唯正陽之月君子惡之於是有伐鼓用幣之禮按傳正陽之月當夏四月是為孟夏則周之六月是也莊二十五年夏六月辛未朔日有食之鼓用牲于社傳曰非常也唯正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝正陽月朔隂慝未作隂尤不宜侵陽故諸侯用幣于社社為上公之神是以祈而不責伐鼓于朝退而自責也此雖書為六月以長厯推之其實七月置閏失所致令月錯不當鼓而鼓失其時矣鼓當于朝而于社失其處矣社應用幣而用牲失其用矣一舉三失故傳譏非常既以明禮因以正時也文十五年六月辛丑朔日有食之鼓用牲于社傳曰非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝此正陽之月雖宜伐鼓然禮有等差不可僭越天子貶膳修省不舉盛饌伐鼓于社以責羣隂諸侯位卑但宜用幣于社伐鼓于朝而已今則鼓社用牲有二失焉雖不失常月猶以非禮書也莊三十年九月庚午朔日有食之鼓用牲于社失時違禮可依例而推矣孛為妖星亦謂之彗傳稱除舊布新亦云除穢經雖不言占驗而以妖變非常用是書之文十四年秋七月有星孛入于北斗既見而移入故稱曰入昭十七年冬有星孛于大辰傳稱于大辰西及漢總在大辰之度故曰大辰哀十三年冬十有一月有星孛于東方平旦衆星皆沒故不言次此皆據事以書無義例也昭二十六年傳言齊有彗星而經不書蓋魯不見爾莊七年夏四月辛卯夜恆星不見傳曰夜明也夜中星隕如雨傳曰與雨偕也夜明而常星不見夜半而有雲星隕且雨變異非常故書于經不言石者見星之隕于上不見在地之驗也僖十六年春王正月戊申朔隕石于宋五傳曰隕星也是月六鷁退飛過宋都傳曰風也隕于地視之則石數之則五隨其聞見先後而書之不言星者止見在地為石不見其隕于上也鷁遇迅風而退飛過宋國都不與隕石同曰故重言是月宋人以異來告是以並書焉隱九年三月癸酉大雨震電庚辰大雨雪傳曰癸酉大雨霖以震書始也庚辰大雨雪亦如之書時失也凡雨自三日以往為霖平地尺為大雪霖雪積日書兩日以記其始建寅之月不當震電既震電又不當大雪隂陽錯行故以時失而書因發霖雪之例然經不言霖知經誤爾雷甚擊物通謂之震僖十五年震夷伯之廟傳曰罪之也於是展氏有隱慝焉隱惡法所不及尊貴罪所不加而天變震其祖廟聖人因自然之妖章顯其事以感動穢行之人立教亦何深與霜雪寒燠各有定時反則為災隕霜殺物雨雪無冰冬燠而李梅實過寒而雨木冰諸如此類蓋皆以時失書矣僖二十九年秋大雨電傳曰為災也然則雨電皆以為災書昭四年春王正月大雨雹當雪而雹是亦為災也桓元年秋大水傳曰凡平原出水為大水廣平曰原原猶出水為災可知故經之於水悉以大書之莊十一年秋宋大水傳稱公使弔焉往弔所以書也二十五年秋大水鼓用牲于社于門傳曰亦非常也凡天災有幣無牲非日月之眚不鼓此年日食之禮非常而此又非常因總發天災之例日食大水皆為天災禮當有幣無牲而魯皆用牲非日月之災不鼓而魯復以大水鼓一嵗而天災二咸失常焉傳是以顯舉周公之典禮也夫旱即不雨而經何以或書不雨或書旱乎僖二年冬十月不雨三年春王正月不雨夏四月不雨六月雨傳曰自十月不雨至于五月不曰旱不為災也春秋之法雩而得雨書大雩諸經言大雩傳言旱者是矣雩而不得雨書旱僖二十一年夏大旱宣七年秋大旱是矣旱而不為災書不雨此年及莊三十一年文二年十年十三年是矣僖之不雨每時必舉首月又書得雨之月文之不雨皆於既雨之後總計前之不雨而書之雖不復書雨事從可知若是者蓋前既具其體例後遂從其省文左氏不發傳以非義例之所在爾穀梁曰一時言不雨者閔雨也有志乎民也厯時而言不雨文不憂雨也無志乎民也春秋記天災而榖梁言人事文若一時不雨當以何法書之也哉隱元年傳曰有蜚不為災亦不書莊十八年秋有􅈮傳曰為災也二十九年秋有蜚傳曰為災也凡物不為災不書前顯不書之義後發凡例以明諸物皆然螽食五穀螟食苗心多麇害稼皆以為災而書蜚臭惡害人􅈮含沙射影嫌非害稼故於此各發傳也文三年秋雨螽于宋傳曰隊而死也自上而下為雨故雪曰雨雪電曰雨雹螽曰雨螽螽死則不為災宋人蓋以為天祐喜而來告是以書經穀梁曰災甚也茅茨盡矣果爾則胡不書多螽而書雨螽乎知不然矣宣十五年冬蝝生飢傳曰幸之也是年秋螽至冬而子復生遇寒而死不成為螽既不為災然而猶書者若使早生民困必甚故雖飢猶幸非幸飢也幸蝝生爾春秋五穀皆熟書有年五穀大熟書大有年五穀不豐而民困書飢五穀盡無而民大困書大飢若但指所無而不言飢者皆未至困民也莊七年秋大水無麥苗傳曰不害嘉穀也今之五月大水殺熟麥及苗而黍稷嘉穀尚可更種則可以不飢二十八年冬大無麥禾臧孫辰告糴于齊傳曰冬飢臧孫辰告糴于齊禮也傳據未糴之時言飢得齊之榖蘇民之困故以告糴為禮終亦弗飢是以傳言飢而經不書飢春秋水旱螽螟之災甚多其書飢者有三而已其餘非盡諱飢也天災物害所指在物無麥無禾所指在穀飢與大飢所指在民民有菜色道殣相望經之所以書飢也天災物害敗稼傷禾經之所以書水旱螽螟也亦若旱與不雨之有深淺者僖二十一年夏大旱傳稱飢而不害此不足以徵與地道安靜動為失常國主山川崩竭為戾諸書山崩地震皆記異也昭二十五年有鸜鵒來巢傳曰書所無也此鳥穴居不在魯界今來而又巢以所無書之不在為災之例矣宣十六年成周宣榭火傳曰人火之也凡火人火曰火天火曰災春秋之災十有一而火唯此一事餘皆天火也聖人重天變故特異其名曰災莊二十年齊大災來告以大故書為大公羊曰大瘠也何以書及我也若然則御廩西宫之災亦將曰御廪瘠西宫瘠乎公羊每好竒實未見其竒也成三年新宫災三日哭哀禰廟之災特異其禮經是以善而書之傳稱禍福不告則不書是知外災之書皆從告也莊十一年宋大水公羊曰及我也穀梁曰王者之後也襄九年宋災穀梁曰故宋也僖十四年沙鹿崩成五年梁山崩昭十八年宋衛陳鄭災公羊皆曰為天下記災也穀梁曰其志以同日也公羊於宋災既誤為火遂妄為之例曰大者曰災小者曰火穀梁於陳災亦誤為火遂妄為之例曰國曰災邑曰火紛紛穿鑿之説將以何者為適從乎昭九年陳災陳已滅亡降為楚縣而不繫之楚者春秋之書災害皆以所災所害言之梁山沙鹿之崩不繫于晉知陳亦不必繫楚矣宣榭之繫成周則宣榭不能以名通也公羊曰成周宣榭災樂器藏焉爾新周也穀梁曰周災不志其曰宣榭目之也公羊曰陳已滅矣其言陳火存陳也穀梁曰火不志此何以志閔陳而存之也夫曰災曰火何足以存陳而新周若不災不火將目之閔之之法又於何者寄文耶春秋燦然明備大義數十而已且因事而明例豈因例而書事哉左氏親見孔子猶多闕疑不論公穀乃於數百年之後欲事事揣合聖人之意乎每事而生異端未免以子之矛刺子之盾矣奔放例天王居三公孫一夫人孫二唁三王臣奔三諸侯奔十二滅國奔四內臣奔六外臣子弟奔四十七以地來奔三放三叛五潰四逃三僖二十四年天王出居于鄭傳曰天子無出書曰天王出居于鄭辟母弟之難也成十二年周公出奔晉傳曰凡自周無出周公自出故也諸言出者皆謂出其封疆天子以天下為家本無出封之理雖有出奔之人史不言出示無外也天子所至皆安其居故不言奔而别以居為名尊天子也重發例者所以示君臣之同焉昭二十三年天王居于狄泉襄三十年王子瑕奔鄭所謂凡自周無出者正例也襄王蔽於匹夫之孝不顧天下之義避母弟難自絶其國故稱出居周公既為王所復而又自出自絶于周故稱出奔皆不應書出而書出所謂變例也唯天子不言奔王臣及諸侯之君臣則皆書奔奔者迫逐之名而於內之公及夫人獨書為孫使若不為臣下所迫逐孫讓而去者為內諱也諸侯之出奔皆見出於其臣下舊䇿所書槩舉臣名襄十四年衛侯出奔齊傳稱名在諸侯之䇿曰孫林父寧殖出其君此以臣名來告之本文也仲尼修史咸示變例皆沒出者之名而以君自奔為文昭三年北燕伯款出奔齊傳曰罪之也謂君不能自安自固而至見逐於下所犯實多寧獨逐之之臣哉臣而逐君其罪已著沒臣稱君所以深著君惡傳發北燕伯款以例其餘經之所書悉如是焉至其稱名與否傳不發例蓋從告而已子朝之亂昭公之逐事既非常大都就事立文難以例舉昭二十二年劉子單子以王猛居于皇二十六年尹氏召伯毛伯以王子朝奔楚所稱之以亦非師能左右之以也二十二年劉子單子以王猛入于王城二十六年天王入于成周所稱之入亦非國逆而立之入也昭二十五年次于陽州二十八年次于乾侯所稱之次亦非師出過信之次也二十六年公至自齊居于鄆傳曰言魯地也二十七年公至自齊居于鄆傳曰言在外也已入竟故書至猶在外故書地傳互言以明其義所稱之至亦非告廟之至也所稱之居亦非天王之居也據事而書不得不然若執例以求合盈庭之言寧可盡通哉弔亡之謂唁昭公之孫經書唁公者三詳內事也昭二十五年傳曰書曰公孫于齊次于陽州齊侯唁公于野井禮也將求於人則先下之禮之善物也公至齊竟齊將來唁公不敢逺勞齊侯而逆之于野井仲尼詳書所次所唁之地合數句之文以見公之先下不於唁生例焉諸國滅而君奔者皆不言出國亡實無所出亦非例也諸侯之大夫迫逐逃亡曰奔受罪黜免曰放奔放情有優劣放為君舍其罪緩步而出較為稍優奔為懼罪苟免奔馳而去斯為劣矣奔放之書各從其實優劣自見襄二十九年齊髙止出奔北燕傳曰放其大夫髙止于北燕書曰出奔罪髙止也實放書奔貶優從劣斯為仲尼新意矣外大夫之奔放經不盡書何也宣十年傳曰凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使者則告不然則否違兼奔放而言兩國交聘往來是臣嘗奉玉帛之使則用以告若其不然恩好未接不告亦不書也發例言告是䇿之所書皆從告也諸侯君臣之奔者於外曰出奔某於內曰來奔來奔則不言出史氏立辭之宜若來而又奔他國賤不復書傳稱邾子益奔齊慶封奔楚不見於經是也以地來奔重在地雖賤必書亦書其地邾庶其莒牟夷邾黑肱是也重在人則止書人文十二年郕伯來奔傳曰太子以夫鍾與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔不書地尊諸侯也是也奔而書名皆罪奔者之身司城舉官子哀稱字崔氏書族皆非其罪陳黃衛鱄秦針皆稱弟以罪其兄若無善文者悉罪之矣大夫而披邑自屬志附他國經書曰叛宋華亥弟辰晉趙鞅荀寅之流皆與國相距得歸乃復敗則出奔有叛屬他人之意故皆書叛定十一年宋樂大心自曹入于蕭上言某某入于蕭以叛此從叛可知經省文也襄二十三年晉欒盈復入于晉入于曲沃帥曲沃之甲以入晉都敗而至死未附他國故不言叛也叛之賤者不書外而髙弱髙豎內而陽虎南蒯皆不見經至如庶其牟夷黑肱傳稱為三叛人經不書叛則於內不可言叛而來也襄二十六年衛孫林父入于戚以叛傳曰罪孫氏也叛皆背君之名衛時無君然專邑背國猶謂之叛蓋仲尼特起之新意舊史未必以叛書矣潰者衆散流移若積水之潰文三年伐沈沈潰傳曰凡民逃其上曰潰在上曰逃衆保于城城保于德交相依懷以衛社稷苟無固志一朝而散如水之潰矣國君而逃師棄盟違其典儀棄其車服羣臣不知其謀社稷不保其安此與匹夫之逃無異是以在衆為潰在上為逃以别上下之名也公羊曰國曰潰邑曰叛夫潰者民散而去叛者舉城而屬他人強大夫為之也傳言慶氏以陳叛何必於邑哉昭二十九年鄆潰公羊曰邑不言潰郛之也君存焉爾公羊每以君存生例春秋之書曾若是其紛紛哉僖五年盟于首止鄭伯逃歸不盟襄七年會于鄬陳侯逃歸此所謂在上之逃也文十年楚子蔡侯次于厥貉傳稱麇子逃歸而經不書公不在次楚人不以告爾莊十七年鄭詹自齊逃來見囚於齊不能守節而逃以其至魯故本其事以書於經然而非例所云矣例之潰逃蓋指一國一軍一邑之內君臣相需為用為變文以别之詹為逸囚無不可逃既非其類焉得混以入例哉歸入例歸十五復歸五入七復入二納七立二成十八年宋魚石復入于彭城傳曰書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入襄二十六年衛侯衎復歸于衛傳曰書曰復歸國納之也明復歸亦國逆也凡去其國通言君臣子弟之例國逆而立之本無位則稱入有位而復之則稱復歸莊九年齊小白入于齊若此之類無位者也僖二十八年衛侯鄭自楚復歸于衛若此之類有位者也諸侯納之有位無位皆謂之歸成十四年衛孫林父自晉歸于衛若此之類有位者也桓十七年蔡季自陳歸于蔡若此之類無位者也身為戎首稱兵入伐則稱復入襄二十三年晉欒盈復入于晉及此魚石是也四者所以明內外之援辨順逆之辭通君臣取國有家者而言之仲尼正魚石衛衎之文以表舊制左氏發凡言例總而明之以著春秋之大例焉在內不可言歸于魯故稱來歸閔元年季子來歸是也莊六年衛侯朔入于衛五國違抗王命以納衛朔朔懼有逆衆之犯以國逆告故不書歸而書入成十五年宋華元自晉歸于宋元實國逆欲挾晉以自助以外納告故不書復歸而書歸春秋因之以示二子之情也定十三年晉趙鞅歸于晉昭十三年楚公子比自晉歸于楚趙鞅因韓魏之請楚比依陳蔡之餘並非諸侯之納而書歸者韓魏有耦國之形陳蔡有復國之端言非晉楚所能制也僖二十八年曹伯襄復歸于曹雖晉人復之而侯獳愛君以請故有國逆之辭桓十五年許叔入于許本未出竟今始就國羣下嘉之故用國逆之文皆時史因周典以起時事之情也傳稱諸侯納之曰歸而經實有書納者僖二十五年楚人圍陳納頓子于頓若此之流皆有興師見納之事不須例而自明是以但言其納不言其歸春秋諸侯之外納有三一者言語告請蔡季之類是矣二者興師送入頓子之類是矣三者所納之君别在他國而伐其本國令之得入衛朔之類是矣言歸則知為納言納則歸亦不待言從納者之告則書納從歸者之告則書歸因事之宜皆非義例之所興也僖三十年衛侯鄭歸于衛成十六年曹伯歸自京師二君皆見執在周事同而文異者諸侯歸國或書名或不書名或言歸于某或言歸自某或言自某歸史氏異辭傳不發例例在於歸而已不在他文也若謂稱所自之國其國有力然楚比無援于外何以書自晉陳蔡封于楚平何以不書自楚斯非其明徵與襄二十五年衛侯入于夷儀晉人憫衛衎之失國使衛分之一邑此非國逆亦書曰入何也入者自外而入之常辭爾春秋之入多矣例唯有二焉施於國邑則為弗地在於歸復則為國逆國逆又以立為例逆而不立則皆非例所及襄三十年鄭良霄出奔許自許入于鄭鄭人殺良霄獨還無兵入始為惡非以惡入既不得稱復入入即見殺又非國逆而立之者雖稱入亦自外而入之常辭爾昭二十二年劉子單子以王猛入于王城二十六年天王入于成周此雖言入亦難牽合例言凡去其國明非王朝之制且自周無出焉得有入知舊典亦不及是也諸納直書納之之事本無分於難易穀梁曰納者內弗受也此説非也圍陳而納頓子頓必欲之宣十一年楚子入陳納公孫寧儀行父于陳二子雖淫道楚匡國賊討君葬上下交歡傳稱有禮誰復難之昭十二年齊髙偃帥師納北燕伯于陽傳稱因其衆也既云因衆明非弗受知穀梁之説未善矣文十四年晉人納捷災于邾弗克納直書弗克乃見弗受趙盾降而稱人是為貶責不於納生義也立者直書所立之人隱四年衛人立晉傳曰書曰衛人立晉衆也晉本國逆宜書曰入于衛仲尼善其得衆故變文以示美昭二十三年尹氏立王子朝獨言尹氏知非周人所與穀梁曰立者不宜立抑又褊矣春秋立文以明得失左氏發例以正褒貶雖比事可知猶必屬辭而後見之若執曲説以目全經吾知致逺之恐泥薨葬例天王崩九葬天王五王猛卒一公薨十一葬我君九子卒三諸侯卒一百二十四葬諸侯八十七王臣卒二葬王臣一內臣卒三十一歸內臣喪一葬外大夫一夫人薨十葬小君九內妃卒三葬內妃一王姬卒一內女卒七葬內女三來逆內女喪一奔喪一會葬四歸含賵二歸襚一求賻一曲禮曰天子曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死古之制也士庶不得書䇿春秋唯記王侯內大夫而已魯史自書公薨若鄰國亦同書薨則與已君無别故略外書卒用别內以自異焉五等之爵在臣子皆稱公春秋於魯稱公書薨於列國稱爵書卒從內辭也列國葬則舉諡稱公從彼臣子之辭也君薨之所當以路寢為正成十八年公薨于路寢傳曰言道也僖三十三年公薨于小寢傳曰即安也昭三十二年公薨于乾侯傳曰言失其所也春秋十二公其薨于路寢者莊宣成三公而已推例而言文之于臺下襄之于楚宫定之于髙寢皆非道矣桓之于齊亦失其所矣傳不言可知也公薨書所者所以詳內事謹凶變隱閔二君身遭弒逆史䇿所諱是以書薨而不言地若言地則國惡彰是以隱而不書也春秋詳內略外故列國君卒例不書地至有卒不在國非地不顯者又須書地以明之鄭伯之于鄵宋公之于曲棘吳子之于巢蔡侯許男之于楚此類是也諸侯卒稱名唯天王至尊之極是以敬而不名昭二十二年王子猛卒傳曰不成喪也未踰年即位不得稱君故書名又不言崩內君不名若未踰年即位則名而書卒莊三十二年子般卒襄三十一年子野卒未成君故曰子子者在喪之稱也列國之卒葬得書于經何也古者交鄰之道有赴告之文有弔臨之節有會葬之禮書卒赴也書葬會也諸侯之卒或名或否何也古者同盟之國生有通名之義死有赴名之辭書名從赴也不書名亦從赴也隱七年滕侯卒傳曰不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名告終稱嗣也謂之禮經僖二十三年把子卒傳曰不書名未同盟也凡諸侯同盟死則赴以名禮也赴以名則亦書之不然則否辟不敏也此二例者所以明書名與否之義前發凡以示薨赴之常法後發凡以言雖或違法史亦承告而書且疑於杞子降爵故重發例焉然則未同盟而不赴名者滕侯把子此類是也同盟而赴名者隱三年宋公和卒桓十一年鄭伯寤生卒此類是也未同盟而赴名者桓五年陳侯鮑卒十年曹伯終生卒此類是也同盟而不赴名者隱八年宿男卒成十四年秦伯卒此類是也同盟非唯見在位之君若嘗與其父同盟亦應以名赴其子若是者所以繼先君之意敦世好之誼襄六年把伯姑容卒傳曰始赴以名同盟故也昭三年滕子原卒傳曰同盟故書名把與成同盟而卒於襄滕與襄同盟而卒於昭與先君盟者亦赴以名傳故發例以明之隱八年蔡侯考父卒知與惠公同盟矣昭三十一年薛伯榖卒傳曰同盟故書赴例屢發至是又重言者薛入春秋是始書名傳不嫌重言以申之也盟而以國地者地主亦列其盟雖大夫出盟亦稱已君以啓神明故薨皆從身盟之例以赴莊二十一年鄭伯突卒十六年與魯大夫盟幽也成四年鄭伯堅卒二年公與鄭人盟蜀也昭七年衛侯惡卒元年叔孫豹與齊惡盟虢也隱元年及宋人盟于宿宿為地主君即不出能無大夫同盟乎而宿男之卒不名知是同盟而不赴矣諸侯之喪聞則臨之同盟之喪赴則弔之弔臨事微不書于經而傳可稽也臨者哭臨之也國有親疏以地為差襄十二年吳子乘卒傳曰臨于周廟禮也凡諸侯之喪異姓臨于外同姓于宗廟同宗于祖廟同族于禰廟是故魯為諸姬臨于周廟為邢凡蔣茅胙祭臨于周公之廟臨亦常典而至是發例者吳始通上國公能體禮傳因詳美之也弔者遣使以弔其生贈者遣使以贈其死先王制禮哀死送終各有常規故葬有定期因其逺近為差用適乎弔贈之節焉喪贈之幣車馬曰賵貨財曰賻衣被曰襚珠玉曰含隱元年天王使宰咺來歸惠公仲子之賵傳曰緩且子氏未薨故名天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至贈死不及尸弔生不及哀豫凶事非禮也是時惠公已葬仲子未薨王使不當事因貶而名之文九年秦人來歸僖公成風之襚傳曰禮也諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好秦雖贈不及尸然非方嶽同盟之國今慕諸夏通敬於魯不譏其緩而以接好為禮因事之宜爾昭六年把伯益姑卒傳曰弔如同盟禮也把有治田之怨魯不廢喪紀故傳特顯弔例因謂之禮明禮之有弔也畿內諸侯為王卿士雖爵列五等而以王臣之故不得外交是以卒不出赴魯不會葬經多不書文三年王子虎卒傳曰來赴弔如同盟禮也虎同翟泉之盟實稱王命其卒也彼臣不敢擅赴周王因以同盟之例來赴于魯天子告臣略不稱爵赴而弔之傳亦謂之禮明王臣與諸侯同也然則劉卷之書卒書葬可類推矣昭十五年傳稱王大子夀卒王穆后崩王臣書卒而王后大子不書蓋不赴爾諸侯敬共王喪弔贈會葬一無可闕隱三年天王崩武氏子來求賻魯不歸賻致令來求又不會葬故不書葬天子之求固非在魯亦為不共矣特書以交譏之內夫人之喪禮三薨則赴於同盟既葬反哭於寢卒哭而祔於姑三禮皆成而後備文以書曰夫人某氏薨葬我小君某文薑敬嬴是其類也其或不赴不祔則死不稱夫人薨葬不言葬我小君其或不反哭則不書葬蓋薨者夫人之死號小君者夫人之别稱曰夫人曰薨曰小君三者相將不可離也赴祔俱廢是謂不成喪則不得用夫人之禮定十五年姒氏卒傳曰不稱夫人不赴且不祔也葬定姒傳曰不稱小君不成喪也是其例矣反哭于寢哀之尤極情之最切既葬而不反哭是謂不念其親殆與不葬無異則亦不必書葬哀十二年孟子卒傳曰死不赴故不稱夫人不反哭故不言葬小君是其例矣婦人之義母以子貴雖妾子為君其母遂為夫人適夫人既薨則尊加於臣子而內外之禮皆如夫人矣襄四年夫人姒氏薨葬我小君定姒按傳匠慶責季文子以小君之禮不成季孫懼而備禮經得備文以書薨葬文四年夫人風氏薨五年王使榮叔歸含且賵葬我小君成風王使召伯來會葬按傳以含賵會葬為禮此非妾為夫人之證與隱三年君氏卒傳曰聲子也不赴於諸侯不反哭於寢不祔於姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏聲子為隱公母宜備夫人之禮然隱公方懷謙讓不從正君之禮故不敢備禮於其母又不敢稱子氏以避正夫人仲子之號經書君氏以别衆妾蓋隱公至義一時之權也夫人與君同體其薨亦必外赴王朝諸侯若來弔贈會葬亦如人君之禮若是者所以示其敵貴故春秋贈死有並施於君及夫人者惠公仲子之賵僖公成風之襚是已天子於諸侯及夫人之喪應使卿大夫與其贈葬文元年叔服會僖公之葬五年榮叔歸成風之含賵召伯會葬是已王朝列國之喪諸侯弔葬各有常規槩不得親出往會蓋諸侯社稷是守封疆為重非朝會征伐不得越竟雖天子之喪亦唯使卿共弔葬之禮而已文八年傳稱穆伯如周弔喪九年經書叔孫得臣如京師葬襄王是其事也列國之喪在禮並不使卿昭三十年傳曰先王之制諸侯之喪士弔大夫送葬此古制也及其衰也禮過乎重文襄因而抑之故昭三年傳曰君薨大夫弔卿共葬事夫人士弔大夫送葬此在文襄猶為不煩諸侯然而已過古制矣文六年公子遂如晉葬襄公卿共葬故名氏見經傳不謂禮昭六年葬秦景公傳曰大夫如秦葬景公禮也此發傳稱禮而三例並顯一以示古制二以示他國書葬皆魯人往會三以示會葬非卿則不書其人左氏之微文以見大例也如此襄三十一年滕子來會葬定十五年邾子來奔喪滕子來會葬弔葬且不使卿况諸侯為之過禮尤甚不言可知成十年傳稱葬晉景公公送葬魯人辱之經是以諱而不書也喪葬之期天子七月諸侯五月傳既已發例矣不及期而葬謂之不懷過期而葬謂之緩慢其月數合死葬之月而通言之經於葬從實而録是非自明文八年八月天王崩九年二月葬襄王是天子七月也成十八年八月公薨于路寢十二月葬我君成公傳曰書順也是諸侯五月也應葬之月猶先卜逺日以示懷親宣八年傳曰卜葬先逺日辟不懷也況不及期是不懷矣不懷之愆顯在可知故傳無所譏唯於過期之緩者復别類以明之莊三年五月葬桓王傳曰緩也桓王自桓十五年三月崩積七年而葬也文元年四月葬我君僖公傳曰葬僖公緩僖公自往年十一月薨中有閠月積七月而葬也二者皆無故緩慢傳發之以示天子諸侯之例隱五年四月葬衛桓公傳曰亂故是以緩閔元年六月葬我君莊公傳曰亂故是以緩衛有州吁之亂十四月而獲葬魯有慶父之亂十一月而獲葬二者雖亦過期而國有事難非慢於禮傳發之以示內外之同其餘或亂或慢可類知矣魯君薨葬多不順制唯成公薨于路寢五月而葬國家安靜世適承嗣是以傳特稱書順以例羣公之葬法於莊見亂故而緩於僖見無故而緩於成見順禮得期傳發三者以包羣公之得失也外葬不書則為魯不會葬內葬不書則為喪禮不成隱十一年傳曰不書葬不成喪也然則閔公亦是不成喪矣吳楚之君爵不過子而僭號稱王其葬也不合典禮魯雖往會經亦不書書葬將舉諡稱王是以避之爾公羊曰天子記崩不記葬必其時也諸侯記卒記葬有天子存不得必其時也穀梁曰天子志葬故也危不得葬也又曰失德不葬弒君不葬滅國不葬夫會葬有制魯史所書蓋記內事奈何舍近而言逺哉諸侯之葬槩以五月為期而大小之國禮則異制爵五而等三公為上等侯伯次等子男下等僖四年許男新臣卒傳曰許穆公卒于師葬之以侯禮也凡諸侯薨于朝會加一等死王事加二等於是有以衮斂許為男爵加一等而葬以侯襄十八年曹伯負芻卒于師定四年把伯成卒于會彼皆伯爵即當加一等而葬以公傳既發例咸可推類而知曹書于師許不書于師史文詳略非義例之所在也內臣之卒唯以卿禮終者得書于經翬溺及柔生見經傳死不書卒蓋不得以卿禮終也卿之書卒又假日以見義隱元年冬十有二月公子益師卒傳曰公不與小斂故不書日春秋不以日月為例而於卿卒用之者事之得失既未足以褒貶人君又非死者之罪無辭可寄其文而人臣輕微死日似可以略故特以之示例焉君之卿佐是為股肱股肱或虧何痛如之疾則親視喪則親與小斂大斂慎終歸厚之道也初終而不與小斂情義薄矣仲尼修經特示新意削日以顯其事用明厚薄以戒將來襄五年冬十有二月辛未季孫行父卒傳稱大夫入斂公在位此公與小斂經書日之證也文十四年秋九月甲申公孫敖卒于齊十五年夏齊人歸公孫敖之喪傳曰書曰齊人歸公孫敖之喪為孟氏且國故也敖縱欲棄命卿位已絶感子赦父且逆其喪敦公族崇仁孝備記歸喪恩實加隆雖不與斂書日可矣莊三十二年秋七月癸巳公子牙卒成十七年冬十有一月壬申公孫嬰齊卒于貍脤昭二十五年冬十月戊辰叔孫婼卒二十九年夏四月庚子叔詣卒此數者或公有疾或公在外或卒不在國然而猶書日者非不欲與小斂實則不能君子不責人以所不能是以不削也大夫卒于竟內例不書地定五年六月丙申季孫意如卒傳稱卒于房而經不書房是矣若卒于外則經須書地于齊于貍脤之類是也卿不書葬何也葬者臣子之事非公家所及是以不得見經外卿不書卒何也襄十九年傳稱鄭公孫蠆卒赴於晉大夫赴不及公史䇿所不録也外卿之葬無書經之例莊二十七年公子友如陳葬原仲傳曰非禮也卿非君命不越竟季友私交會葬具書其事以顯非禮寧為原仲之葬書哉內女之喪唯為諸侯夫人者書卒書葬恩成於敵體是以與諸侯同例襄三十年宋伯姬卒叔弓如宋葬宋共姬是也既為夫人雖或違棄反在父母之室猶以成人恩録其卒文十二年子叔姬卒傳曰不言把絶也書叔姬言非女也成八年把叔姬卒傳曰來歸自把故書九年把伯來逆叔姬之喪以歸傳曰請之也把叔姬為把故也逆叔姬為我也女子未嫁不書其卒嫁而來歸猶得書之把叔姬是矣宣十六年郯伯姬來歸其後不書其卒或者更嫁大夫爾把叔姬之喪終為把逆故繫之把子叔姬已絶喪不復歸故不繫之把此兩叔姬之别也婦人許嫁而笄猶如丈夫之冠雖未適人即待以成人之禮書卒以示非殤但不稱國而已僖九年伯姬卒是矣倘適非諸侯而嫁於列國之大夫宜從外大夫之比生記其來死略其卒蓋以微不足書齊髙叔姬是矣列國夫人之卒非內女不録莊二年齊王姬卒此非內女而特書者王姬下嫁使魯為主是以比於內女之例而書之檀弓云齊告王姬之喪魯莊公為之大功是其事也四年齊侯葬紀伯姬紀國已滅紀季入酅齊侯加禮新附攝治伯姬之喪故特稱齊侯葬之二十九年紀叔姬卒三十年葬紀叔姬紀國久亡叔姬執節守義終不改適賢而録之故仍繫於紀二姬亡國無諡是以但稱伯叔而已襄三十年叔弓如宋葬宋共姬夫人諡從其夫固周制也猶須臣子加之夫人之喪大夫送葬共姬逮火而卒魯人愍之而使卿共葬事經書叔弓如宋過乎禮矣嗚呼周不葬者七王而周衰與魯慢並見矣魯不葬者二公而國亂與禮廢並見矣諸侯之卒或名或否而列國之敏惰著矣大夫之卒或曰或否而君恩之厚薄昭矣有當期之葬有過期之葬有不及期之葬而葬之得失分焉有天子之求賻有王臣之歸賵有逺國之歸襚而贈之美惡明焉夫人或薨或卒或葬或不葬而知當日之所謂適妾焉內女或録或置或詳或略而知當日之所謂尊卑隆殺焉而且天王有時不記崩王臣有時而記卒諸侯有時不記卒外臣有時而記葬公薨有時不記地夫人有時而記地大夫有時不會葬諸侯有時而奔喪聖人因典䇿以立文用微言以著義春秋一書無所苟而已抑亦於崩薨卒葬見之矣刺殺例刺二殺大夫三十七殺不稱大夫二自外殺二兩下相殺二殺子弟六弒君及大夫三盜殺三莊二十二年陳人殺其公子御寇此春秋國討之文也國討者稱國稱人以殺而書死者之名明死者有罪國所共討也國君而殺子弟若死者無罪則兩書以著殺者之惡僖五年晉侯殺其世子申生襄三十年天王殺其弟佞夫傳曰罪在王也此類是已傳言陳殺大子御寇而經書公子用國討之文何也古者討殺大夫各以罪狀宣告諸侯慎重刑戮用懲不義晉殺申生傳稱來告衛殺孔達傳載告辭辭雖不同蓋告其常矣御寇罪不見傳而經書公子公子者羣子之常稱蓋陳人諱殺大子不告其罪狀而以國討公子告也大臣相殺若死者有罪則不書殺者而槩用國討之例文六年晉殺其大夫陽處父傳曰侵官也是己若死者無罪則兩書名氏而用兩下相殺之例宣十五年王札子殺召伯毛伯是己至夫為賊者衆因亂而殺主名不分故亦稱國稱人雖死者名氏可知隨而去之以示無罪若弗去則與國討同例是以不稱其名文七年宋人殺其大夫傳曰不稱名衆也且言非其罪也言衆以釋殺者之不稱名言非罪以釋死者之不稱名此變文以見義也士殺大夫其書曰盜士賤名氏不得見經故不用兩下相殺之例若不書殺者則又同於國討於是乎書盜以惡之襄十年盜殺鄭公子騑公子發公孫輒傳曰書曰盜言無大夫焉若有大夫即兩稱名矣宋人亦非六卿然而不稱盜者彼鄭賊知為尉止司臣之流因書盜以惡其人宋則穆襄之族為亂而主名不知莫識所惡夫是以不言盜爾春秋殺大夫者其事最多傳有例而無凡其國討稱名之文傳每以書曰發例所謂曲而暢之舉不稱名為非罪及諸稱名之有罪狀者推以為例而通經可盡知也成十七年晉殺其大夫郤錡郤犫郤至十八年晉殺其大夫胥童傳曰民不與郤氏胥童道君為亂故皆書曰晉殺其大夫晉厲以私欲殺三郤疑當無罪不名書偃以家怨害胥童疑當兩書名氏然而並有罪狀悉受國討是知死者有罪雖君殺臣若臣相殺皆宜以國討書矣襄二年楚殺其大夫公子申傳曰多受小國之賂以逼子重子辛楚人殺之故書曰楚殺其大夫公子申五年楚殺其大夫公子壬夫傳曰貪也十九年齊殺其大夫髙厚傳曰從君於昏也鄭殺其大夫公子嘉傳曰專也二十年蔡殺其大夫公子燮傳曰言不與民同欲也昭十二年楚殺其大夫成熊傳曰懷寵也諸如此類或死於君或死於同列或死於國人悉用國討書名之文傳每申明之以著聖人書法也成十八年齊殺其大夫國佐傳曰棄命專殺以穀叛故也佐本疾淫亂而殺慶克齊以是討之疑於罪不及死故傳明以三罪指之宣九年陳殺其大夫泄冶傳稱孔子曰民之多辟無自立辟其泄冶之謂乎邦之無道危行言孫而直諫於淫亂之朝是以君子不許此則違例起義故特舉聖言以明之也成十五年宋殺其大夫山傳曰言背其族也蕩山宋之公族還害公室故特去族以著其罪襄二十三年晉人殺欒盈傳曰不言大夫言自外也三十年鄭人殺良霄傳曰不稱大夫言自外入也二臣自外犯君非復大夫故不書大夫以絶其爵此二者又國討之變文也經書其者皆謂其身所有是以臣曰弒其君君曰殺其大夫殺其子弟君與大夫皆國人所有是以稱國稱人亦並言其焉唯兩下相殺特不言其蓋死者非殺者所有王札子殺召毛是矣桓二年宋督弒其君與夷及其大夫孔父孔父言其據君為文謂督弒其君及君之大夫也仇牧荀息同此義也三子與君同難可謂義矣然既無稱官之褒復不去名以示非罪而皆不免於稱名若是者何也孔父內不能治閨門外取民怨身死而禍及君仇牧不警遇賊無忠可褒荀息從君於昏期在復言三子固有取死之道也三子之所以無善文爾宣十一年楚人殺陳夏徵舒自外而殺非殺其臣故但書名氏傳言楚子而經書人人者衆辭討賊之文也襄二十七年衛殺其大夫寧喜此亦討賊但衛人自討其臣故仍書其大夫諸放殺執獲他國之臣皆不言某國大夫人臣卑賤爵號不足特通是以沒其大夫空書名氏昭八年殺陳孔奐是其類矣諸書大夫而爵實卿司馬司空之類則以官言之文八年宋人殺其大夫司馬傳曰司馬握節以死故書以官春秋之例書爵非褒而書官為褒公子卬無罪故不書名又稱官以貴之此夫人殺之而經書人者夫人尊與君等既非兩下之比夫人不得通告鄰國是以於上稱人於下去名明非國討之文也春秋以名氏見經者大都其爵皆卿唯公子為亂見殺不在此例莊九年齊人取子糾殺之昭十四年莒殺其公子意恢糾實齊人來告使魯殺之時史惡齊人譎求管仲非不忍其親是以極言取殺以章其事意恢為亂故用國討之辭福莫大于享國有家禍莫甚于骨肉相殘春秋於公子取國及為亂見殺者亦皆書名不必繫於為卿也昭八年陳侯之弟招殺陳世子偃師傳曰罪在招也招與公子過為亂殺偃師而立公子留及楚人殺于徵師公子留出奔招乃歸罪於過而殺之楚師來討得免死罪以放于越然則是招為從罪也舊史必書過為首惡仲尼特以為罪在招而書之世子猶為人臣故從兩下相殺之例招雖為亂而未嘗推刃於兄經存其弟罪固亞於叔段矣二十年盜殺衛侯之兄縶三十一年傳曰或求名而不得或欲蓋而名章懲不義也齊豹為衛司寇守嗣大夫作而不義其書曰盜盜者士殺大夫之稱齊豹大夫貶從士例所謂求名不得者春秋懲惡勸善之旨乎內殺大夫其書曰刺僖二十八年公子買戍衛不卒戍刺之畏晉殺戍而以不卒戍告楚恐不為逺近所信故顯書其罪于䇿成十六年刺公子偃此為內事直書其刺而已刺者取周官三刺之法示不枉濫春秋為內諱之舊文也推此諸例春秋之義備矣公羊曰宋人殺其大夫何以不名宋三世無大夫三世內娶也司馬何以舉官宋三世無大夫也穀梁曰其以官稱無君之辭也夫既曰其大夫矣何以謂之無大夫春秋之君而不君者衆矣何獨於宋稱官哉國討之例或稱人或但稱國原無二義賤者書盜原有定名穀梁曰稱人以殺殺有罪也稱國以殺殺無罪也公羊曰大夫弒君稱名賤者窮稱人大夫相殺稱人大夫相殺稱人賤者窮稱盜如信稱國為殺無罪則子反覆師里克作逆皆在可赦既以弒君賤者稱人盜殺蔡侯又謂賤乎賤者使此賤乎賤者而殺大夫復當以何者命之哉且殺大夫而稱盜己為極貶而大逆弒君反從末減而稱人乎吾所由擯二傳而力尊左氏者以此類也夫弒戕例弒君二十三內書薨二外書卒三內未成君卒二外殺未成君三閽弒一盜殺一戕一自外殺四宣十八年邾人戕鄫子于鄫傳曰凡自虐其君曰弒自外曰戕弒戕皆謂殺之此內外之異名也臣子之於君也當親而尊之畏而愛之而敢肆志不義加害元首非一朝一夕之故也其由來者漸矣雖有無道臣罪之别義取於積微而起通謂之弒避惡名也戕者卒暴之稱國君宜重門守險用戒不虞而輕近暴客變起倉卒故謂之戕二者因事立文傳發凡言例以明周公典䇿之書法焉春秋弒君多矣戕止一事若人君戰死於敵又應書滅戕獨為在國見殺者立名是以於此示例也宣四年鄭公子歸生弒其君夷傳曰權不足也凡弒君稱君君無道也稱臣臣之罪也此特為弒君發例也天生民而樹之君俾司牧之羣物所以繫命若乃髙亢自肆壅塞隔殊羣下絶望是謂獨夫此而被弒實自取之故但書君名而沒弒者稱國稱人以弒其君言君無道衆所欲共絶也若君非無道而臣下專逆則書弒者之名以為首惡以示來世終為不義而不可赦也歸生之傳為臣發例也文十六年宋人弒其君杵臼傳曰君無道也為君發例也襄二十六年衛寧喜弒其君剽傳曰言罪之在寧氏也受父命而納舊君疑於無罪故復發傳以明之三十一年莒人弒其君密州傳曰言罪之在也例明君臣今乃父子故申言其義以見君父之同左氏之反覆示例也類如此夫君雖不君臣不可以不臣君固無可弒之理稱君之法亦唯兩見其義以懲後之為君者寧赦臣哉杵臼罪惡及民明年林父討宋猶立文公經於是貶卿稱人深加削責是知亂賊之徒固天下萬世所不容誅矣鄭君夷之弒也公子宋實為戎首反譖歸生懼而從之權不足以禦亂遂為首惡昭十三年楚公子比自晉歸于楚弒其君虔于乾溪比非首謀靈王由之以死若舍而弗責則下之徼幸者莫忌故雖脅立猶以加罪哀六年齊陳乞弒其君荼弒君者實朱毛陽生然乞迎立陽生子荼見殺禍由乞始故使主名楚比劫立陳乞流涕歸生憚老皆疑于免罪春秋明書以為弒主義在無可逃爾宣二年晉趙盾弒其君夷臯傳稱靈公不君於例宜稱君也弒非趙盾而經文不改者方示良史之法深責亡不越竟反不討賊之罪仲尼曰越竟乃免是盾應受罪矣昭十九年許世子止弒其君買古者醫不三世猶不服其藥止身為國嗣國豈無醫乃輕果進藥罪同於弒傳曰書曰弒其君君子曰盡心力以事君舍藥物可也是止應加弒矣二者雖原本其心春秋不赦蓋為教之逺防也春秋之法諸侯不受命先君而篡立得與於諸侯之會者則以成君書之被弒被殺書爵與成君等文十八年齊人弒其君商人昭十一年楚子虔誘蔡侯般殺之于申是也若未接於諸侯則謂之未列於會不得書爵在國不曰弒其君在外不曰殺某侯隱四年衛人殺州吁于濮莊九年齊人殺無知昭十三年楚公子棄疾殺公子比桓六年蔡人殺陳他是也篡立以列會為成君此列國之制也至於本國之內䇿名委質一日事之即君臣之分已定此而殺之雖不書爵書弒亦不從兩下相殺之例而與弒君同稱州吁無知皆弒逆之賊故稱人以明其罪楚比亦弒君者然棄疾圖位以詐不得為討賊則書棄疾以罪之此雖弒不成君者猶用稱君稱臣之例而已諸侯之嗣立於先君者未葬稱子既葬稱君其被殺也則依是以稱之僖九年晉里克殺其君之子奚齊傳曰書曰殺其君之子未葬也十年晉里克弒其君卓及其大夫荀息按傳克殺奚齊于次荀息立卓子以葬克殺之于朝荀息死之卓之死實在九年冬經從赴而書於十年春蓋先君既葬雖未踰年亦即稱君稱弒文十四年齊公子商人弒其君舍舍未踰年而經書弒其君必是齊侯已葬經傳雖不記其葬而以卓子推之斷可知爾春秋弒君及大夫者事本先君而後大夫舊史據實以載其事也桓二年宋督弒其君與夷及其大夫孔父傳曰君子以督為有無君之心而後動於惡故先書弒其君此實先殺孔父後弒與夷而經先書君仲尼之變例新意也他國見弒書弒魯君見弒則書薨而不言所薨之地蓋不忍言弒復不忍指其僵尸之所但曰公薨而已隱公閔公是矣未成君者他國見殺書殺在內見殺則書卒以與善終者等莊三十二年子般卒文十八年子卒傳曰書曰子卒諱之也是矣文公已葬而子惡書子書卒則仲尼之新意也隱閔書薨子般書卒傳但直言其事而不發明其義則舊史原有避諱之法仲尼因而不改也董狐書法不隱南史執簡纍進彼志在疾惡此為國諱愆聖賢有兩通之意並存之而可矣且諱惡之義非獨魯史列國亦有然者襄七年鄭伯髠頑卒昭元年楚子麇卒哀十年齊侯陽生卒三者皆弒而以卒赴史䇿因而書之是彼國皆有隱諱之法聖人亦不必盡革也諸稱弒皆臣子加於君父之名故未成君不言弒兩君相殺非下及上故雖已成君亦不言弒非在國見殺故又不言戕非戰陳見殺故又不言滅如是者皆以殺書昭十一年楚子虔誘蔡侯般殺之于申十六年楚子誘戎蠻子殺之此類是矣諸侯相殺不名而楚子虔書名者蔡侯被殺羣士多死蔡人深怨楚子而以名赴舊史因書名以絶之也襄二十九年閽弒吳子餘祭哀四年盜殺蔡侯申盜賤不得有其君故不言弒其君閽下賤非士故不得謂之盜二者雖不發傳推尋義例皆可知爾經之書弒書殺者或舉國或舉人或書地或不書地或書名去族或備書名氏經多參差傳無義例然則事有異同赴有詳略非聖人修經之要也例唯有稱君稱臣之别而已春秋之亂極矣上無北面之尊下無奉身歸命之義禍亂一構大逆隨之春秋作而亂臣賊子懼也春秋之所以作哉孤經例昭二十二年王室亂不言為亂之人而直書亂承叔鞅之言也傳稱叔鞅至自京師言王室之亂是時是非未明故但以亂書他國皆待告而書而此不待告者亂在王室聞之即登史䇿見魯人之重其事也莊十六年齊人殱于遂閔二年鄭棄其師齊玩無備故以自盡為文鄭人遣師弗召衆潰帥奔故罪歸鄭國二者時史即事或從赴告傳是以不顯義例也定五年歸粟于蔡蔡為楚困魯歸之粟傳稱周亟矜無資書有禮也桓六年子同生傳稱以大子之禮舉之以備禮書也書其始生故不稱大子既生之後適妻長子於法當為大子故舉以大子之禮十有二公唯莊為然文哀之母未知適否且其父未君而生之雖適亦不書據公衡之年成公又非穆薑所生縱為適長而不用大子之禮亦不書故經但書子同而已榖梁曰疑故志之文薑歸魯三年而生子何疑之有且豈未修之經而志疑則史為不法已修之經而志疑則聖人必削之矣是豈可以説經哉莊二十二年肆大眚赦有罪也大眚且肆小罪可知易云赦過宥罪書云眚災肆赦蕩滌衆故以新其心國家有時而用之非制所常經是以書穀梁曰為嫌天子之葬也謂文薑罪應誅絶嫌於天子許之葬赦而後得書葬夫諸侯之淫亂不逞者列國皆葬何獨於內而責文薑莊公生不能正其母豈死而忽疑其葬且天子微矣寧能制天下之葬不葬哉穀梁之説未足信矣襄十一年作三軍昭五年舍中軍記軍制之變私家之強也魯本二軍盡屬之公有事則三家更帥季氏欲專其民人乃作三軍三家各有其一季氏盡征之孟氏取子弟之半而餘歸公室叔孫臣其子弟以父兄為公臣及其舍之也仍用二軍而四分公室季氏擇二二子各一皆盡征之但貢于公而已如是則三家愈專公室愈弱矣公羊曰三軍三卿也古者上卿下卿舍中軍復古也穀梁曰諸侯一軍三軍非正也舍中軍貴復正也公羊以二軍為古穀梁以一軍為正不知魯為大國禮宜三軍自春秋以來畏大國之役而用二軍及公室弱而三家強乃屢變軍制以專其權作之舍之無論合制與否要皆假改制之名以利其私也何復古之可稱焉宣十五年初稅畝成元年作丘甲哀十二年用田賦公田之法十取其一借民力而治之故謂之藉宣公履其餘畝復收其十一則為什二矣穀不過藉所以豐財而多取之可乎四井為邑四邑為丘四丘為甸丘出馬一匹牛三頭甸出馬四匹牛十二頭長轂一乘甲士三人步卒七十二人古之制也成公使丘出甲則以甸所賦者取之丘矣丘賦之法因其田産私財通出牛三馬二故傳稱丘亦足矣季孫欲令一丘之民既出家資之賦復出田畝之賦較之舊法倍焉不用孔子之言而卒用之史官是以顯書于䇿此三者皆譏重斂也稅畝之行遂以為常故書曰初丘甲以備齊難暫時用之故不言初而言作甲須作而賦不須作故書曰用稅畝行而民不堪命矣丘甲作而民益不堪命矣田賦用而民尤不堪命矣史䇿所以詳書而仲尼因之不削與以上諸經傳無凡例復無新義知皆舊史所書聖人存之而不革者也以一國之史兼記內外之事兼記二百四十二年內外之事制作沿革禍福赴告固有事出非常文辭特異者史官載䇿不得不備若是者周公之禮經所不能及仲尼之變例所不須用經是以有孤文遺義也故為之論其遺義也如此總論凡例五十周公之舊典一經之通體也書不書稱不稱言不言先書追書故書書曰之類二百八十有五仲尼之新意一事之變例也母弟二凡其義不異故發凡五十其别四十有九經有例而傳無凡者多矣又不止五十也祝他曰周公相王室以尹天下備物典䇿以命伯禽所稱典䇿蓋即䇿書之成法矣韓宣適魯見易象與魯春秋曰周禮盡在魯矣所謂春秋蓋即周公之禮經矣故隱七年傳例曰謂之禮經十一年傳例曰不書于䇿首發二凡特舉此文以明䇿之所書必遵禮經禮經者何祝他所謂典䇿韓宣所謂周禮也左氏為傳雖取典禮之辭以備凡例然而裁約為文不必用其全辭有因一事而兼舉諸例者歸復滅入戰敗侵伐之類是也有就一事而特立一凡者王后母弟女媵臣違卿出並聘自周無出之類是也有舊文實繁例但言經之所有者郊雩嘗蒸不言礿祠地祗是也有舊文本簡因連言經之所無者公侯在喪稱子先言王曰小童是也有經文不具而例遂因以及之者吳子乘卒而傳發異姓同姓之臨是也有經無其事而傳獨舉其例者分至啓閉登臺而望雲物是也乃復有傳不稱凡實則一經之大例若諸侯五年再朝天子七月而葬國卿不會公侯天子不私求財諸如此類亦莫非周公之典丘明釋經為廣記而備言之爾至夫經之有變例則有故矣十二世之史官未必一法七十國之赴告未必同文然則魯史雖善而不能盡善故魚石以惡入而史不書復入子家從亂而史不書歸生若此之流違謬實多孔子悉為依周典而正之乃善惡顯義周典可盡而褒貶微文周典復不可悉據聖人焉得不有自出之義乎侵伐有例而齊衛來戰滅取有例而梁伯自亡齊告以族崔杼不妨書氏董狐載筆趙盾不妨主惡忠臣可官而不可名天王可狩而不可召於是知聖人之修經也有依凡之例有違凡之例有魯史之例有參酌衆國之例有二百餘年之例有一時一事特起之例有人所共見之例有大義危疑聖心獨斷之例左氏所以雜稱二百八十有五之變例杜氏知其為仲尼之新意也遊夏不能贊一辭左氏好惡與聖人同故獨能窺其大義彼公穀子夏弟子紛紛臆説大都耳食之學其能合於聖經者十不得一爾故吾之為辨例也一以左氏為主竊附武庫之末聖天子或取而立之學宮乎駟不及舌左傳事緯前集卷四
