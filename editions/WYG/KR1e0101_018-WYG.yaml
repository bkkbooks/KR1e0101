body:
  text: 左傳事緯前集卷五靈璧知縣馬驌撰左傳圖説帝派圖封建尚矣不自周始也左氏好述祖徳余稽本傳旁參諸家著為受封圖一卷嗚呼虢之不愛何有於虞漢陽諸姬楚則盡之庭堅之祀忽諸東䝉之主奚憑越伯吳亡非關賜出曹凌檜替總紀周衰用述七派以識大凡云爾虞帝之不系於軒轅也羅長源辯之詳矣虞幕能聽協風以成樂物生故史伯與契稷並言之而曰成天下之大功者子孫未嘗不章如是則幕為始封之君虞為有國之號矣不然堯而傳其從孫何得謂之禪授且以五教之敷命自唐虞而亂姓嬻倫寜從二女始哉世系圖舊于十二公之元年列諸侯十九蓋其世系于傳中昭然可見者也顧其公子支庶與卿大夫之世家未之盡詳故兹備錄焉其同姓者附在本國之中異姓者别列本國之後至如王朝之周召非不世家而不著于國者以傳中或隠或顯不能盡識其世及也魯之臧出自孝齊之崔出自丁晉之欒出自靖祁出自獻而不附在本圖者其所自出去東遷已逺也畧其大繁而誌其尤著世本一書可無問矣天官圖彼夫彗孛飛流璚珥􅛆蜺之占既有專家矣而左氏所記梓慎禆竈之流各能察天行而識㓙吉覩星變而驗災祥其術皆有證據苐學者昧於所聞即甘石以下之書猶滋聚訟况其上焉者乎吾特就本傳所及分布于圖中而星官近逺度數廣狹咸可按圖而索當無乖梓慎禆竈之意焉耳日食三十六哀十四年在獲麟後不數隠三年春王二月己巳日有食之桓三年秋七月壬辰朔日有食之既十有七年冬十月朔日有食之莊十有八年春王三月日有食之二十有五年六月辛未朔日有食之鼓用牲于社二十有六年冬十有二月癸亥朔日有食之三十年秋九月庚午朔日有食之鼔用牲于社僖五年秋九月戊申朔日有食之十有二年春王三月庚午日有食之十有五年夏五月日有食之文元年春二月癸亥日有食之十有五年夏六月辛丑朔日有食之鼓用牲于社宣八年秋七月甲子日有食之既十年夏四月丙辰日有食之十有七年夏六月癸卯日有食之成十有六年夏六月丙寅朔日有食之十有七年冬十有二月丁巳朔日有食之襄十有四年春二月乙未朔日有食之十有五年秋八月丁巳日有食之二十年冬十月丙辰朔日有食之二十有一年秋九月庚戌朔日有食之冬十月庚辰朔日有食之二十有三年春王二月癸酉朔日有食之二十有四年秋七月甲子朔日有食之既八月癸巳朔日有食之二十有七年冬十有二月乙亥朔日有食之昭七年夏四月甲辰朔日有食之十有五年夏六月丁巳朔日有食之十有七年夏六月甲戌朔日有食之二十有一年秋七月壬午朔日有食之二十有二年冬十有二月癸酉朔日有食之二十有四年夏五月乙未朔日有食之三十有一年冬十有二月辛亥朔日有食之定五年春王三月辛亥朔日有食之十有二年冬十有一月丙寅朔日有食之十有五年秋八月庚辰朔日有食之哀十有四年夏五月庚申朔日有食之星孛三哀十四年在獲麟後不數文十有四年秋七月有孛星入于北斗昭十有七年冬有星孛于大辰哀十有三年冬十有一月有星孛于東方十有四年冬有星孛星隕隕石各一莊七年夏四月辛卯夜恒星不見夜中星隕如雨僖十有六年春王正月戊申朔隕石于宋五地輿圖稽古黄虞代崇封建禹列九土爰有侯服塗山之㑹執玉帛者萬國迨夏之衰諸侯相兼至桀之世其存者三千餘國而已成湯革命始列五爵周室分封厥土惟三兄弟之國者十五同姓之國者四十虞夏及殷之後謂之三恪太皥炎黄之𦙍唐虞以來之國猶存蓋千有八百國幽厲以還王紀不振彊凌弱衆暴寡浸淫至于春秋二百四十二年之間滅國者五十餘或以不從霸令滅譚遂之類或以密邇夷狄滅江黄邢黎之類或以仇讎滅齊滅紀之類或以土地滅虞虢之類其滅者未滅為國滅則邑之仍以國載向鄫申息之類尚論者不載斟灌斟尋過戈觀扈之類甚多皆春秋時尚論之也其國已亡舊圖猶混入殊謬地失考者不載貳軫之類㑹盟戰次之地可考者載不然則闕蠻夷戎狄雜處中國可考者載不然則闕閩粤滇町畧而不錄觀于兹圖而廢興存亡之故昭然見矣列國年表舊有春秋二十國年表上自隠公下迄獲麟然二十國紀春秋之大者子男附庸表不盡錄兹備列于下方焉歲之甲乙列于上方而日食星變閏餘附之記事之法㑹盟分列而備錄之征伐但紀用兵之國叅經傳以立文終于哀公之孫凡皆讀左氏者所宜詳也古者内諸侯有采外諸侯有國圻外之侯惟嫌紛變必世子而世禄圻内之侯入為王官必選賢能有禄而不必世然則單尹甘劉毛原凡祭周召鞏蘇雖爵食五等而事係王朝固不得以諸侯列也書大傳曰諸侯始受封則有采地其百里諸侯以三十里七十里諸侯以二十里五十里諸侯以十五里若子孫有罪黜其采而地不黜此王者之權也春秋之世王綱墮失諸侯乃相滅矣汾川世嗣既亡四國江上小侯用夷九縣沈黄頓胡之區日隨鞬櫜于强敵春秋所以思霸功也春秋之思霸功豈得已哉晉楚職官表蓋稽古之設官在宓羲以龍神農以火黄帝以雲少昊以鳥自髙陽以來始為民師而命以民事于是有重黎句芒祝融后土蓐收𤣥㝠之官唐虞之際内為百揆四嶽外為州牧侯伯夏商官倍夏官百商二百周禮特詳天子設六卿故有六軍大國三卿次國二卿小國一卿軍數同之居則為卿出則為帥六官之長各帥其屬公孤之秩存而不備言有其人然後充之諸侯設官其詳不可得而譜况東遷之後列國僭竊又皆去其籍而官制益復難考魯無太宰羽父欲求之然太宰之名終不見于傳是魯終未設此也季武子為正卿其實司徒昭四年云楚有太宰又非正卿伯州犂薳啟疆令尹為政亦號曰宰宣十二蒍敖為宰宋之太宰亞于司冦而政出右師華元司城亦能為政子罕晉司徒廢為中軍實為正卿晉以僖侯諱司徒改為中軍而宋之司徒次于司馬楚亦有之其官益微名同實異大要然也宗伯之秩僅見于魯亦非顯秩夏父弗忌魯叔孫豹為司馬謂之次卿昭四年云晉楚宋鄭皆有司馬而貴賤不同宋孔父鄭子國等皆大司馬楚之司馬薳掩子期等次令尹亦卿官而又有左右司馬晉有上軍中軍司馬則皆大夫而非卿也司寇之官楚陳號曰司敗子西曰臣歸死于司敗又論語曰陳司敗晉因舊名魏絳曰歸死于司冦然時有異稱或謂之士或謂之理也士樂為大士叔魚攝理孔子以魯司冦遂攝相事然則官無大小惟其人耳宋司空廢為司城宋以武公諱司空改為司城魯與晉鄭猶仍其故魯無駭為司空其後孟孫氏為之晉則士蒍鄭則子耳大都六官之名于列國時或因或革而尊卑次第已非周官之舊矣至夫晉之將佐己備卿官三軍則六卿六軍則十二卿後四軍則八卿司馬司空列在大夫晉司馬司空非卿鄭卿至七七子賦詩皆卿宋卿至十見于傳者有右師左師司馬司徒司城司冦太宰又華貙為少司馬鱗朱華牼皆為少司空魚府為少宰是宋卿之名有十也時置時廢統無定考楚官多命曰尹詳表縣公亦入主軍師鬬克屈禦冦之流齊有鋭辟司徒之名鞍之戰鄭有當國執政之異諸卷多云秦有不更庶長之稱成十三年不更女父襄十一年庶長鮑辛是也漢書載秦爵二十級商君所立一公士二上造三簪裊四不更五大夫六官大夫七公大夫八公乗九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九内侯二十徹侯按不更庶長春秋已有之商君定為二十耳非盡由商君作也典籍俱没誰復能悉論乎以吾觀周官一書列如日星矣而諸侯未之尊信其故何哉或曰姬公制禮未嘗班行然而内史膳夫傳中具在内史中大夫𨽻春官膳夫上士𨽻天官内史叔興膳夫石速是也與夫魯之宗人都宗人家宗人皆上士𨽻春官傳曰使宗人夏執其禮圉人𨽻夏官傳曰國人犖自牆外與之戲楚之獸人中士𨽻天官傳曰獸人無乃不給于辤大閽國人𨽻天官傳曰鬻拳為大國衞之迹人中士𨽻地官傳曰迹人來吿曰逢澤有介麋焉宋之舞師下士𨽻地官傳曰舞師題以旌夏及諸國太史下士𨽻春官傳稱鄉公孫黑使大史書其名齊大史書崔杼晉大史董狐書趙盾衛史曰我大史也文十八年魯大史克衰十四年齊大史子餘又齊有南史魯有外史掌惡臣楚育左史倚相此名周禮所有也寺人𨽻天官齊有寺人貂晉有寺人抗封人中士𨽻地官鄭潁谷封人考叔祭封人仲足宋蕭封人子衰虞人山虞澤虞俱𨽻地官魯虞人以銑盾史之齊景公招虞人行人大行人中大夫小行人下大夫𨽻秋官晉子員鄭子羽之𩔖之屬亦復歷歷可考是未嘗不班行也余譜秩官惟誌晉楚而諸國之大要已具于此留心稽古之士尚有味于斯文其餘有官無人者未之詳也與侯正王旅之𩔖晉本大國自曲沃武公以支封幷晉王始命以一軍為諸侯莊十六獻公作二軍閔元文公圖霸乃復三軍僖二十七既又増置三行僖二十八三行無佐疑大夫帥末年作五軍更置上下新軍而三行罷僖三十一襄公舍二軍文六景公六軍僭擬天子成三至厲公止有四軍而上下新軍罷成十六悼公又舍新軍始復三軍之舊襄十四嗣是師徒不出傳曰卿無軍行昭三年其軍制蓋不可考矣亦有少宰司徒司敗之屬具載傳中以無人故不錄至夫官之大小尹之尊卑沈寢之為二為一芋莠之何職何守檮杌已没統付之不可知云爾左傳事緯前集卷五
