body:
  text: 左傳事緯卷八靈璧知縣馬驌撰楚靈之亂襄二十六年楚子秦人侵呉及雩婁聞呉有備而還遂侵鄭五月至于城麇鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子爲王子圍寡君之貴介弟也下其手曰此子爲穿封戍方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍怒抽戈逐王子圍弗及楚人以皇頡歸印菫父與皇頡戍城麇楚人囚之以獻於秦鄭人取貨於印氏以請之子大叔爲令正以爲請子産曰不獲受楚之功而取貨于鄭不可謂國秦不其然若曰拜君之勤鄭國微君之惠楚師其猶在敝邑之城下其可弗從遂行秦人不予更幣從子産而後獲之二十九年楚郟敖即位王子圍爲令尹鄭行人子羽曰是謂不宜必代之昌松栢之下其草不殖三十年春王正月楚子使薳罷來聘通嗣君也穆叔問王子之爲政何如對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政固問焉不告穆叔告大夫曰楚令尹將有大事子蕩將與焉助之匿其情矣六月鄭子産如陳涖盟歸復命告大夫曰陳亡國也不可與也聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈大子卑大夫傲政多門以介於大國能無亡乎不過十年矣楚公子圍殺大司馬薳掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏而王之四體也絶民之主去身之偏艾王之體以禍其國無不祥大焉何以得免三十一年衛侯在楚北宮文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀唯民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如此是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之徳曰大國畏其力小國懐其德言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降爲臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今爲法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也昭元年楚公子圍使公子黒肱伯州犂城犫櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘於鄭伍舉爲介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弑之遂殺其二子幕及平夏右尹子干出奔晉宮廐尹子晳出奔鄭殺大宰伯州犂于郟葬王于郟謂之郟敖使赴于鄭伍舉問應爲後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍爲長楚靈王即位薳罷爲令尹薳啟彊爲大宰鄭游吉如楚葬郟敖且聘立君歸謂子産曰具行器矣楚王汰侈而自說其事必合諸侯吾往無日矣子産曰不數年未能也三年十月鄭伯如楚子產相楚子享之賦吉日既享子産乃具田備王以田江南之夢四年春王正月許男如楚楚子止之遂止鄭伯復田江南許男與焉使椒舉如晉求諸侯二君待之椒舉致命曰寡君使舉曰日君有惠賜盟于宋曰晉楚之從交相見也以歳之不易寡人願結驩於二三君使舉請間君若茍無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修德以待其歸若歸於徳吾猶將事之況諸侯乎若適淫虐楚將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以爲固也從古以然是以先王務修徳音以亨神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啟其疆土或無難以䘮其國失其守宇若何虞難齊有仲孫之難而獲桓公至今頼之晉有里㔻之難而獲文公是以爲盟主衛邢無難敵亦䘮之故人之難不可虞也恃此三者而不修政徳亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉椒舉遂請昏晉侯許之楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛偪於齊而親於晉唯是不來其餘君之所及也誰敢不至王曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟夏諸侯如楚魯衛曹邾不㑹曹邾辭以難公辭以時祭衛侯辭以疾鄭伯先待于申六月丙午楚子合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以爲歸今君始得諸侯其愼禮矣霸之濟否在此會也夏啟有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有酆宮之朝穆有塗山之㑹齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男㑹公之禮六君子謂合左師善守先代子産善相小國王使椒舉侍於後以規過䘚事不規王問其故對曰禮吾未見者有六焉又何以規宋大子佐後至王田於武城久而弗見椒舉請辭焉王使往曰屬有宗祧之事於武城寡君將墮幣焉敢謝後見徐子呉出也以爲貳焉故執諸申楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀爲仍之㑹有緡叛之商紂爲黎之蒐東夷叛之周幽爲大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄善亦如之徳逺而後興秋七月楚子以諸侯伐呉宋大子鄭伯先歸宋華費遂鄭大夫從使屈申圍朱方八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以狥於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之以盟諸侯王使速殺之遂以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造於中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縛受其璧焚其櫬王從之遷賴於鄢楚子欲遷許於賴使闘韋龜與公子弃疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也冬呉伐楚入棘櫟麻以報朱方之役楚沈尹射奔命於夏汭箴尹宜咎城鍾離薳啟疆城巢然丹城州來東國水不可以城彭生罷賴之師五年楚子以屈申爲貳於呉乃殺之以屈生爲莫敖使與令尹子蕩如晉逆女過鄭鄭伯勞子蕩于汜勞屈生于莵氏晉侯送女于邢丘子産相鄭伯㑹晉侯于邢丘晉韓宣子如楚送女叔向爲介鄭子皮子大叔勞諸索氏大叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王度之以二國雖汰侈若我何及楚楚子朝其大夫曰晉吾仇敵也茍得志焉無恤其他今其來者上卿上大夫也若吾以韓起爲閽以羊舌肸爲司宮足以辱晉吾亦得志矣可乎大夫莫對薳啟疆曰可茍有其備何故不可恥匹夫不可以無備況恥國乎是以聖王務行禮不求恥人朝聘有珪享頫有璋小有述職大有巡功設机而不倚爵盈而不飲宴有好貨飱有陪鼎入有郊勞出有贈賄禮之至也國家之敗失之道也則禍亂興城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢自鄢以來晉不失備而加之以禮重之以睦是以楚弗能報而求親焉既獲姻親又欲恥之以召冦讎備之若何誰其重此若有其人恥之可也若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至求昏而薦女君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何韓起之下趙成中行呉魏舒范鞅知盈羊舌肸之下祁午張趯籍談女齊梁丙張骼輔躒苗賁皇皆諸侯之選也韓襄爲公族大夫韓須受命而使矣箕襄邢帶叔禽叔椒子羽皆大家也韓賦七邑皆成縣也羊舌四族皆彊家也晉人若䘮韓起楊肸五卿八大夫輔韓須楊石因其十家九縣長轂九百其餘四十縣遺守四千奮其武怒以報其大恥伯華謀之中行伯魏舒帥之其蔑不濟矣君將以親易怨實無禮以速宼而未有其備使羣臣往遺之禽以逞君心何不可之有王曰不榖之過也大夫無辱厚爲韓子禮王欲敖叔向以其所不知而不能亦厚其禮韓起反鄭伯勞諸圉辭不敢見禮也冬十月楚子以諸侯及東夷伐呉以報棘櫟麻之役薳射以繁揚之師㑹于夏汭越大夫常壽過帥師㑹楚子于𤨏聞呉師出薳啟疆帥師從之遽不設備呉人敗諸鵲岸楚子以馹至于羅汭呉子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而爲之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼔則呉知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且呉社稷是卜豈爲一人使臣獲釁軍鼔而敝邑知備以禦不虞其爲吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟於羅汭沈尹赤㑹楚子次於萊山薳射帥繁揚之師先入南懐楚師從之及汝清呉不可入楚子遂觀兵於坻箕之山是行也呉早設備楚無功而還以蹶由歸楚子懼呉使沈尹射待命于巢薳啟疆待命于雩婁禮也六年楚公子弃疾如晉報韓子也過鄭鄭罕虎公孫僑游吉從鄭伯以勞諸柤辭不敢見固請見之見如見王以其乘馬八匹私面見子皮如上卿以馬六匹見子産以馬四匹見子大叔以馬二匹禁芻牧採樵不入田不樵樹不采蓻不抽屋不强匄誓曰有犯命者君子廢小人降舍不爲暴主不慁賓往來如是鄭三卿皆知其將爲王也韓宣子之適楚也楚人弗逆公子弃疾及晉竟晉侯將亦弗逆叔向曰楚辟我衷若何效辟詩曰爾之教矣民胥效矣從我而已焉用效人之辟書曰聖作則無寧以善人爲則而則人之辟乎匹夫爲善民猶則之況國君乎晉侯說乃逆之徐儀楚聘于楚楚子執之逃歸懼其叛也使薳洩伐徐呉人救之令尹子蕩帥師伐呉師于豫章而次于乾谿呉人敗其師於房鍾獲宮廐尹弃疾子蕩歸罪於薳洩而殺之冬叔弓如楚聘且弔敗也七年楚子之爲令尹也爲王旌以田芋尹無宇斷之曰一國兩君其誰堪之及即位爲章華之宮納亡人以實之無宇之閽入焉無宇執之有司弗與曰執人於王宮其罪大矣執而謁諸王王將飲酒無宇辭曰天子經畧諸侯正封古之制也封畧之内何非君土食土之毛誰非君臣故詩曰普天之下莫非王土率土之濱莫非王臣天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人於王宮將焉執之周文王之法曰有亡荒閱所以得天下也吾先君文王作僕區之法曰盗所隱器與盗同罪所以封汝也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪以告諸侯曰紂爲天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二文之法取之盗有所在矣王曰取而臣以往盗有寵未可得也遂赦之楚子成章華之臺願與諸侯落之大宰薳啟疆曰臣能得魯侯薳啟彊來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀奉承以來弗敢失隕而致諸宗祧日我先君共王引領北望日月以冀傳序相授於今四王矣嘉惠未至唯襄公之辱臨我䘮孤與其二三臣悼心失圖社稷之不皇況能懐思君徳今君若歩玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望其先君鬼神實嘉賴之豈唯寡君君若不來使臣請問行期寡君將承質幣而見于蜀以請先君之貺公將往夢襄公祖梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚鄭伯勞于師之梁孟僖子爲介不能相儀及楚不能答郊勞楚子享公于新臺使長鬛者相好以大屈既而悔之薳啟疆聞之見公公語之拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰慎守寶矣敢不賀乎公懼乃反之八年陳哀公元妃鄭姬生悼大子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺悼大子偃師而立公子留夏四月辛亥哀公縊干徴師赴于楚且告有立君公子勝愬之于楚楚人執而殺之公子留奔鄭書曰陳侯之弟招殺陳世子偃師罪在招也楚人執陳行人干徴師殺之罪不在行人也陳公子招歸罪於公子過而殺之九月楚公子弃疾帥師奉孫呉圖陳宋戴惡㑹之冬十一月壬午滅陳輿嬖袁克殺馬毁玉以葬楚人將殺之請寘之既又請私私於幄加絰於顙而逃使穿封戍爲陳公曰城麇之役不謟侍飲酒於王王曰城麇之役女知寡人之及此女其辟寡人乎對曰若知君之及此臣必致死禮以息楚國晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也歳在鶉火是以䘚滅陳將如之今在析木之津猶將復由且陳氏得政于齊而後陳䘚亡自幕至于瞽瞍無違命舜重之以明徳寘徳於遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣九年春叔弓宋華亥鄭游吉衛趙黶㑹楚子于陳夏四月陳災鄭裨竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年歳五及鶉火而後陳䘚亡楚克有之天之道也故曰五十二年十一年景王問於萇𢎞曰今兹諸侯何實吉何實凶對曰蔡凶此蔡侯般弑其君之歳也歳在豕韋弗過此矣楚將有之然壅也歳及大梁蔡復楚凶天之道也楚子在申召蔡靈侯靈侯將徃蔡大夫曰王貪而無信唯蔡於感今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲而享蔡侯於申醉而執之夏四月丁巳殺之刑其士七十人公子弃疾帥師圍蔡韓宣子問于叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手于楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫呉以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緡以䘮其國紂克東夷而隕其身楚小位下而亟暴於二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材而將用之力盡而敝之是以無拯不可沒振楚師在蔡晉荀呉謂韓宣子曰不能救陳又不能救蔡物以無親晉之不能亦可知也已爲盟主而不恤亡國將焉用之秋㑹于厥憖謀救蔡也鄭子皮將行子産曰行不逺不能救蔡也蔡小而不順楚大而不徳天將棄蔡以壅楚盈而罰之蔡必亡矣且䘮君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣晉人使狐父請蔡于楚弗許冬十一月楚子滅蔡用隱大子于岡山申無宇曰不祥五牲不相爲用況用諸侯乎王必悔之楚子城陳蔡不羮使弃疾爲蔡公王問於申無宇曰弃疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而寘子元焉使昭公不立齊桓公城榖而寘管仲焉至于今賴之臣聞五大不在邊五細不在庭親不在外羇不在内今弃疾在外鄭丹在内君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子游齊渠丘實殺無知衛蒲戚實出獻公若由是觀之則害於國末大必折尾大不掉君所知也十二年楚子謂成虎若敖之餘也遂殺之或譖成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懐寵也楚子狩于州來次于潁尾使蕩侯潘子司馬督嚻尹午陵尹喜帥師圍徐以懼呉楚子次于乾谿以爲之援雨雪王皮冠秦復陶翠被豹舄執鞭以出僕析父從右尹子革夕王見之去冠被舍鞭與之語曰昔我先王熊繹與呂伋王孫牟燮父禽父竝事康王四國皆有分我獨無有今吾使人於周求鼎以爲分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山篳路藍縷以處草莽跋渉山川以事天子唯是桃弧棘矢以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以爲鏚柲敢請命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何子革曰摩厲以須王出吾刅將斬矣王出復語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九丘對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心王是以獲沒于祗宮臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金形民之力而無醉飽之心王揖而入饋不食寢不寐數日不能自克以及於難仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱于乾谿十三年楚子之爲令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵於王王之滅蔡也其父死焉王使與於守而行申之㑹越大夫戮焉王奪鬪韋龜中犫又奪成然邑而使爲郊尹蔓成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣䘮職之族啟越大夫常壽過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝呉曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情强與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝呉曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國楚公子比公子黒肱公子棄疾蔓成然蔡朝呉帥陳蔡不羮許葉之師因四族之徒以入楚及郊陳蔡欲爲名故請爲武軍蔡公知之曰欲速且役病矣請藩而已乃藩爲軍蔡公使須務牟與史猈先入因正僕人殺大子祿及公子罷敵公子比爲王公子黒肱爲令尹次于魚陂公子弃疾爲司馬先除王宮使觀從從師于乾谿而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣王曰余殺人子多矣能無及此乎右尹子革曰請待于郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祗取辱焉然丹乃歸于楚王㳂夏將欲入鄢芋尹無宇之子申亥曰吾父再奸王命王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸夏五月癸亥王縊于芋尹申亥氏申亥以其二女殉而葬之觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣乙卯夜棄疾使周走而呼曰王至矣國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱衆怒如水火焉不可爲謀又有呼而走至者曰衆至矣二子皆自殺丙辰棄疾即位名曰熊居葬子干于訾實訾敖殺囚衣之王服而流諸漢乃取而葬之以靖國人使子旗爲令尹楚師還自徐呉人敗諸豫章獲其五帥平王封陳蔡復遷邑致羣賂施舍寬民宥罪舉職召觀從王曰唯爾所欲對曰臣之先佐開卜乃使爲卜尹使枝如子躬聘于鄭且致犫櫟之田事畢弗致鄭人請曰聞諸道路將命寡君以犫櫟敢請命對曰臣未聞命既復王問犫櫟降服而對曰臣過失命未之致也王執其手曰子母勤姑歸不榖有事其告子也他年芋尹申亥以王柩告乃改葬之初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸初共王無冡適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇于五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室之庭使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐鬪韋龜屬成然焉且曰棄禮違命楚其危哉子干歸韓宣子問于叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無徳五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀爲羇終世可謂無民亡無愛徴可謂無徳王虐而不忌楚君子干渉五難以弑舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉苛慝不作盗賊伏隱私欲不違民無怨心先神命之國民信之芋姓有亂必季實立楚之常也獲神一也有民二也令徳三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣民無懐焉國無與焉將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衛姬之子也有寵於僖有鮑叔牙賓須無隰朋以爲輔佐有莒衛以爲外主有國高以爲内主從善如流下善齊肅不藏賄不從欲施舍不倦求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵於獻好學而不貳生十七年有士五人有先大夫子餘子犯以爲腹心有魏犫賈佗以爲股肱有齊宋秦楚以爲外主有欒郤狐先以爲内主亡十九年守志彌篤惠懐棄民民從而與之獻無異親民無異望天方相晉將何以代文此二君者異於子干共有寵子國有奥主無施於民無援於外去晉而不送歸楚而不逆何以冀國楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之禮也隱大子之子廬歸于蔡禮也悼大子之子呉歸于陳禮也冬十月葬蔡靈公禮也十四年夏楚子使然丹簡上國之兵於宗丘且撫其民分貧振窮長孤幼養老疾收介特救災患宥孤寡赦罪戾詰姦慝舉淹滯禮新叙舊祿勲合親任良物官使屈罷簡東國之兵於召陵亦如之好於邊疆息民五年而後用師禮也楚令尹子旗有德於王不知度與養氏比而求無厭王患之九月甲午楚子殺鬪成然而滅養氏之族使鬪辛居鄖以無忘舊勲十五年楚費無極害朝呉之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信呉故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難夏蔡人逐朝呉朝呉出奔鄭王怒曰余唯信呉故寘諸蔡且微呉吾不及此女何故去之無極對曰臣豈不欲呉然而前知其爲人之異也呉在蔡蔡必速飛去呉所以翦其翼也十六年楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也十九年令尹子瑕言蹶由於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣舍前之忿可也乃歸蹶由二十一年三月葬蔡平公蔡大子朱失位位在卑大夫送葬者歸見昭子昭子問蔡故以告昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈今蔡侯始即位而適卑身將從之蔡侯朱出奔楚費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱愬于楚楚子將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隱大子其子與君同惡徳君必甚又使立之不亦可乎且廢置在君蔡無他矣楚靈昬王也而合諸侯恃其暴也然晉實不競自弭兵之役委權于楚至子圍爲令尹因娶聘鄭遂㑹于虢仍讀舊書用先晉㰱楚之重得志於晉子圍爲之也圍之爲政也僣内外懼之及虢之㑹設服離衛置蒲宮賦大明儼然王之威儀矣晉固知其侈汰將必爲君也而莫與亢焉圍益輕晉矣歸國之日弑君自立㑹于申以召諸侯而諸姬景從淮夷竝至於是伐呉滅頼悉用列國之師莫或違也曩者宋之盟欲弭兵也今則兵未嘗弭而反以虞夏商周之𦙍供蠻夷之驅使晉之失計不重辱乎慶封齊亂臣也族誅于呉陳招殺世子者也執放于越蔡般弑君自立者也誘殺于申數年之閒殄滅三逆非不義舉然乘隙利禍非實能問罪也陳招之罪不至滅亡而蔡子般之弑君業已十三年矣一旦用討遂稱霸畧哉朱方既克將戮慶封椒舉曰臣聞無瑕者可以戮人君勿播於諸侯也靈王不聽徇于軍中曰有若齊慶封弑其君者乎慶封曰有若楚公子圍弑其兄之子而代之者乎軍人粲然皆笑夫懐瑕戮人慶封雖死不服也陳蔡而獨服耶滅國爲邑用人爲牲憑惡恃彊不仁孰甚乃民己弗堪而已猶不悟築章華之宮崇於匏居之臺令富都那䜿贊于其中長鬛之士相于其上自謂美觀不知逺邇之騷違也四邑之城形若偶國䖟䗽既多牛尾不掉諫者之來則曰我左執鬼中右執殤宮凡百箴諫吾盡聞之矣直言已塞禍敗隨之方欲興兵北瞰中原求九鼎於周求許田於鄭而羣怨偕作四族竝起莫可如何也郟敖靈所縊而弑也而身還自縊幕及平夏靈所殺也而二子還見殺昔詬天而呼今投車而泣匍匐棘圍藁葬原野猶欲追蹤六王二公之事奚可得乎齊景納燕莒昭三年燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯款出奔齊罪之也六年十一月齊侯如晉請伐北燕也士匄相士鞅逆諸河禮也晉侯許之十二月齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不貳吾君賄左右諂諛作大事不以信未嘗可也七年春王正月暨齊平齊求之也癸巳齊侯次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪公孫晳曰受服而退俟釁而動可也二月戊午盟于濡上燕人歸燕姬賂以瑤罋玉櫝斝耳不克而還十二年春齊高偃納北燕伯款于唐因其衆也襄三十一年莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弑之乃立去疾奔齊齊出也展輿呉出也書曰莒人弑其君買朱鉏言罪之在也昭元年莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾展輿奔呉叔弓帥師疆鄆田因莒亂也於是莒務婁瞀胡及公子滅明以大厖與常儀靡奔齊君子曰莒展之不立棄人也夫人可棄乎詩曰無競維人善矣十四年秋八月莒著丘公䘚郊公不慼國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善於庚輿郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田十九年秋齊高發帥師伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已爲嫠婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啟西門而出七月丙子齊師入紀二十二年春王正月甲子齊北郭啟帥師伐莒莒子將戰苑羊牧之諫曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師於壽餘齊侯伐莒莒子行成司馬竈如莒涖盟莒子如齊涖盟盟于稷門之外莒於是乎大惡其君二十三年莒子庚輿虐而好劒茍鑄劒必試諸人國人患之又將叛齊烏存帥國人以逐之庚輿將出聞烏存執殳而立於道左懼將止死苑羊牧之曰君過之烏存以力聞可矣何必以弑君成名遂來奔齊人納郊公齊景公際平昭霸衰之日多歴年所意存代興而䘚無逺畧者志狃于小圖兵耀于妄動也燕伯小國僻處北域桓公以餘威救之刜令支斬孤竹猶且割地以賜而後諸侯服焉今也伯款失政臣下逐之即其事亦乾侯之先轍也受賂而還義既不昭討而終盟師出不武遲囘數歳師徒再興納于唐猶無納也無論燕人不服天下有以窺景公矣莒嬴姓之微國也二十餘年之内密州弑則去疾奔展輿奔而去疾入去疾䘚則郊公奔庚輿出則郊公入國非鄭衛而突忽剽衎紛出其間其於君臣父子之際無道久矣霸主有討義固首正然景公於急不能納魯昭豈於緩能納莒郊哉郊公冡適越在草莽蒲餘逆謀隰黨受賂因循數年而後舉事無非因亂而動非真能納人主也然景公所處亦極難耳當靈莊殘刻之餘國脉削剝於兹爲甚公之即位雖值晉霸之不振而文公之流風餘澤猶有存焉欲圖代興終難驟得北燕徐莒僅威小弱以此求伯勢必不成況又政在陳氏乎是以其始不能討崔慶其繼不能正欒高田氏得民君臣私憂終亦莫如之何何況乎燕莒之緩圖也晉霸之衰襄公二十三年春把孝公䘚晉悼夫人䘮之平公不徹樂非禮也禮爲鄰國闕二十六年晉韓宣子聘于周王使請事對曰晉士起將歸時事於宰旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊二十九年晉平公把出也故治把六月知悼子合諸侯之大夫以城把孟孝伯㑹之鄭子大叔與伯石往子大叔見大叔文子與之語文子曰甚乎其城把也子大叔曰若之何哉晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離徳詩曰協比其鄰昏姻孔云晉不鄰矣其誰云之晉侯使司馬女叔侯來治把田弗盡歸也晉悼夫人慍曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之把夏餘也而即東夷魯周公之後也而睦於晉以把封魯猶可而何有焉魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書府無虛月如是可矣何必瘠魯以肥把且先君而有知也母寧夫人而焉用老臣把文公來盟書曰子賤之也冬孟孝伯如晉報范叔也三十年二月癸未晉悼夫人食輿人之城把者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子于承匡之嵗也是歳也狄伐魯叔孫莊叔於是乎敗狄于鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬也趙孟問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才遂仕之使助爲政辭以老與之田使爲君復陶以爲絳縣師而廢其輿尉於是魯使者在晉歸以語諸大夫季武子曰晉未可媮也有趙孟以爲大夫有伯瑕以爲佐有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可媮也勉事之而後可三十一年春王正月穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死爲政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使早備魯既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉又與季孫語晉故季孫不從及趙文子䘚晉公室卑政在侈家韓宣子爲政不能圖諸侯魯不堪晉求讒慝𢎞多是以有平丘之㑹己亥孟孝伯䘚昭元年晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘爲祟史莫之知敢問此何神也子産曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于商丘主辰商人是因故辰爲商星遷實沈于大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震大叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參爲晉星由是觀之則實沈參神也昔金天氏有裔子曰昧爲𤣥㝠師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川沈姒蓐黄實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之若君身則亦出入飲食哀樂之事也山川星辰之神又何爲焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃壹之則生疾矣僑又聞之内官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也今君内實有四姬焉其無乃是也乎若由是二者弗可爲也已四姬有省猶可無則必生疾矣叔向曰善哉肸未之聞也此皆然矣叔向出行人揮送之叔向問鄭故焉且問子晳對曰其與幾何無禮而好陵人怙富而卑其上弗能久矣晉侯聞子産之言曰博物君子也重賄之晉侯求醫於秦秦伯使醫和視之曰疾不可爲也是謂近女室疾如蠱非鬼非食惑以䘮志良臣將死天命不祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節遲速本末以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也物亦如之至于煩乃舍也已無以生疾君子之近琴瑟以儀節也非以慆心也天有六氣降生五味發爲五色徴爲五聲淫生六疾六氣曰隂陽風雨晦明也分爲四時序爲五節過則爲菑隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生内熱惑蠱之疾今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵祿任其大節有菑禍興而無改焉必受其咎今君至于淫以生疾將不能圖恤社稷禍孰大焉主不能禦吾是以云也趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲爲蠱穀之飛亦爲蠱在周易女惑男風落山謂之蠱皆同物也趙孟曰良醫也厚其禮而歸之十二月晉既烝趙孟適南陽將㑹孟子餘甲辰朔烝于溫庚戌䘚鄭伯如晉弔及雍乃復二年春晉侯使韓宣子來聘且告爲政而來見禮也觀書於大史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也公享之季武子賦緜之䘚章韓子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之䘚章既享宴于季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公宣子遂如齊納幣見子雅子雅召子旗使見宣子宣子曰非保家之主也不臣見子尾子尾見彊宣子謂之如子旗大夫多笑之唯晏子信之曰夫子君子也君子有信其有以知之矣自齊聘於衛衛侯享之北宮文子賦淇澳宣子賦木𤓰夏四月韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊謂陳無宇非卿執諸中都少姜爲之請曰送從逆班畏大國也猶有所易是以亂作叔弓聘于晉報宣子也晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢爲賓徹命於執事敝邑𢎞矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之祿也敢辱大館叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後已卑讓也詩曰敬慎威儀以近有徳夫子近徳矣晉少姜䘚公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉叔向言陳無宇於晉侯曰彼何罪君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共而執其使君刑已頗何以爲盟主且少姜有辭冬十月陳無宇歸十一月鄭印段如晉弔三年春王正月鄭游吉如晉送少姜之葬梁丙與張趯見之梁丙曰甚矣哉子之爲此來也子大叔曰將得已乎昔文襄之霸也其務不煩諸侯令諸侯三嵗而聘五嵗而朝有事而㑹不協而盟君薨大夫弔卿共葬事夫人士弔大夫送葬足以昭禮命事謀闕而已無加命矣今嬖寵之䘮不敢擇位而數於守適唯懼獲戾豈敢憚煩少姜有寵而死齊必繼室今兹吾又將來賀不唯此行也張趯曰善哉吾得聞此數也然自今子其無事矣譬如火焉火中寒暑乃退此其極也能無退乎晉將失諸侯諸侯求煩不獲二大夫退子大叔告人曰張趯有知其猶在君子之後乎齊侯使晏嬰請繼室于晉曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲不腆先君之適以備内宮焜燿寡人之望則又無祿早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福於大公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之内主豈唯寡君舉羣臣實受其貺其自唐叔以下實寵嘉之既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其爲陳氏矣公棄其民而歸於陳氏齊舊四量豆區釡鍾四升爲豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公大姬已在齊矣叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乘無人䘚列無長庶民罷敝而宮室滋侈道殣相望而女富溢尤民聞公命如逃宼讐欒郤胥原狐續慶伯降在皂𨽻政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠況日不悛其能久乎晏子曰子將若何叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之􅆄之宗十一族唯羊舌氏在而已􅆄又無子公室無度幸而得死豈其獲祀初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁于刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之景公爲是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄己其是之謂乎及晏子如晉公更其宅反則成矣既拜乃毁之而爲里室皆如其舊則使宅人反之且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎䘚復其舊宅公弗許因陳桓子以請乃許之晉韓起如齊逆女公孫蠆爲少姜之有寵也以其子更公女而嫁公子人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而逺其寵寵將來乎秋七月鄭罕虎如晉賀夫人且告曰楚人日徴敝邑以不朝立王之故敝邑之徃則畏執事其謂寡君而固有外心其不往則宋之盟云進退罪也寡君使虎布之宣子使叔向對曰君若辱有寡君在楚何害修宋盟也君茍思盟寡君乃知免於戾矣君若不有寡君雖朝夕辱於敝邑寡君猜焉君實有心何辱命焉君其往也茍有寡君在楚猶在晉也張趯使謂大叔曰自子之歸也小人糞除先人之敝廬曰子其將來今子皮實來小人失望大叔曰吉賤不獲來畏大國尊夫人也且孟曰而將無事吉庶幾焉六年春王正月把文公䘚弔如同盟禮也七年晉人來治杞田季孫將以成與之謝息爲孟孫守不可曰人有言曰雖有挈缾之知守不假器禮也夫子從君而守臣䘮邑雖吾子亦有猜焉季孫曰君之在楚於晉罪也又不聽晉魯罪重矣晉師必至吾無以待之不如與之間晉而取諸把吾與子桃成反誰敢有之是得二成也魯無憂而孟孫益邑子何病焉辭以無山與之萊柞乃遷于桃晉人爲把取成鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣竝走羣望有加而無瘳今夢黄熊入于寢門其何厲鬼也對曰以君之明子爲大政其何厲之有昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或者未之祀也乎韓子祀夏郊晉侯有閒賜子産莒之二方鼎八年春石言于晉魏榆晉侯問於師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動于民則有非言之物而言今宮室崇侈民力彫盡怨讟竝作莫保其性石言不亦宜乎於是晉侯方築虒祁之宮叔向曰子野之言君子哉君子之言信而有徴故怨逺于其身小人之言僣而無徴故怨咎及之詩曰哀哉不能言匪舌是出唯躬是瘁哿矣能言巧言如流俾躬處休其是之謂乎是宮也成諸侯必叛君必有咎夫子知之矣叔弓如晉賀虒祁也游吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相䝉也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀九年周甘人與晉閻嘉爭閻田晉梁丙張趯率隂戎伐潁王使詹桓伯辭於晉曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以蕃屏周亦其廢隊是爲豈如弁髦而因以敝之先王居檮杌于四裔以禦螭魅故允姓之姦居于瓜州伯父惠公歸自秦而誘以來使偪我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圖之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毁冕拔本塞原專弃謀主雖戎狄其何有余一人叔向謂宣子曰文之伯也豈能改物翼戴天子而加之以共自文以來世有衰徳而暴滅宗周以宣示其侈諸侯之貳不亦宜乎且王辭直子其圖之宣子說王有姻䘮使趙成如周弔且致閻田與襚反潁俘王亦使賔滑執甘大夫襄以說於晉晉人禮而歸之晉荀盈如齊逆女還六月䘚于戲陽殯于綘未葬晉侯飲酒樂膳宰屠蒯趨入請佐公使尊許之而遂酌以飲工曰女爲君耳將司聰也辰在子卯謂之疾日君徹宴樂學人舍業爲疾故也君之卿佐是謂股肱股肱或虧何痛如之女弗聞而樂是不聰也又飲外嬖嬖叔曰女爲君目將司明也服以旌禮禮以行事事有其物物有其容今君之容非其物也而女不見是不明也亦自飲也曰味以行氣氣以實志志以定言言以出令臣實司味二御失官而君弗命臣之罪也公說徹酒初公欲廢知氏而立其外嬖爲是悛而止秋八月使荀躒佐下軍以說焉十年春王正月有星出于婺女鄭裨竈言于子産曰七月戊子晉君將死今兹嵗在顓頊之虛姜氏任氏實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢公以登星斯於是乎出吾是以譏之戊子晉平公䘚鄭伯如晉及河晉人辭之游吉遂如晉九月叔孫婼齊國弱宋華定衛北宮喜鄭罕虎許人曹人莒人邾人滕人薛人把人小邾人如晉葬平公也鄭子皮將以幣行子産曰䘮焉用幣用幣必百兩百兩必千人千人至將不行不行必盡用之幾千人而國不亡子皮固請以行既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聽叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則䘮禮未畢其以䘮服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之實難將在行之夫子知之矣我則不足書曰欲敗度縱敗禮我之謂矣夫子知度與禮矣我實縱欲而不能自克也十二年齊侯衛侯鄭伯如晉朝嗣君也公如晉至河乃復取郠之役莒人愬于晉晉有平公之䘮未之治也故辭公公子憖遂如晉晉侯享諸侯子産相鄭伯辭於享請免䘮而後聽命晉人許之禮也晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡君中此爲諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂穆子曰子失辭吾固師諸侯矣壺何爲焉其以中儁也齊君弱吾君歸弗來矣穆子曰吾軍帥彊禦䘚乗競勸今猶古也齊將何事公孫傁趨進曰日旰君勤可以出矣以齊侯出十三年晉成虒祁諸侯朝而歸者皆有貳心爲取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃竝徴㑹告于呉秋晉侯㑹呉子于良水道不可呉子辭乃還七月丙寅治兵于邾南甲車四千乘羊舌鮒攝司馬遂合諸侯于平丘子産子大叔相鄭伯以㑹子産以幄幕九張行子大叔以四十既而悔之每舍損焉及㑹亦如之次于衛地叔鮒求貨於衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦曰諸侯事晉未敢攜貳況衛在君之宇下而敢有異志芻蕘者異於他日敢請之叔向受羮反錦曰晉有羊舌鮒者凟貨無厭亦將及矣爲此役也子若以君命賜之其已客從之未退而禁之晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君茍有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啟行遲速唯君叔向告于齊曰諸侯求盟已在此矣今君弗利寡君以爲請對曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不明不明棄共百事不終所由傾覆也是故眀王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以來未之或失也存亡之道恒由是興晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聽從既聞命矣敬共以往遲速唯君叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也況其率道其何敵之有牛雖瘠僨於豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒把鄫之怒以討魯罪間其二憂何求而弗克魯人懼聽命甲戌同盟于平丘齊服也令諸侯日中造于除癸酉退朝子産命外僕速張於除子大叔止之使待明日及夕子産聞其未張也使速往乃無所張矣及盟子産爭承曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也敢以爲請諸侯靖共好以爲事行理之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以爭至于昏晉人許之既盟子大叔咎之曰諸侯若討其可凟乎子産曰晉政多門貳偷之不暇何暇討國不競亦陵何國之爲公不與盟晉人執季孫意如以幕䝉之使狄人守之司鐸射懐錦奉壺飲冰以蒲伏焉守者御之乃與之錦而入晉人以平子歸子服湫從子産歸未至聞子皮䘚哭且曰吾已無爲爲善矣唯夫子知我仲尼謂子産於是行也足以爲國基矣詩曰樂只君子邦家之基子産君子之求樂者也且曰合諸侯貢藝事禮也公如晉荀呉謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若爲夷棄之使事齊楚其何瘳於晉親親與大賞共罰否所以爲盟主也子其圖之諺曰臣一主二吾豈無大國穆子告韓宣子且曰楚滅陳蔡不能救而爲夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之爲請從君惠於㑹宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸于魯君微武子之賜不至於今雖獲歸骨於晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將爲子除館於西河其若之何且泣平子懼先歸惠伯待禮十四年春意如至自晉尊晉罪已也尊晉罪已禮也晉邢侯與雍子爭鄐田久而無成士景伯如楚叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子于朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也鬻獄邢侯專殺其罪一也已惡而掠美爲昏貪以敗官爲墨殺人不忌爲賊夏書曰昏墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也治國制刑不隱於親三數叔魚之惡不爲末減曰義也夫可謂直矣平丘之㑹數其賄也以寬衛國晉不爲暴歸魯季孫稱其詐也以寬魯國晉不爲虐邢侯之獄言其貪也以正刑書晉不爲頗三言而除三惡加三利殺親益榮猶義也夫十五年冬公如晉平丘之㑹故也十六年春王正月公如晉晉人止公不書諱之也齊侯伐徐二月丙申齊師至於蒲隧徐人行成徐子及郯人莒人㑹齊侯盟于蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄其是之謂乎公至自晉子服昭伯語季平子曰晉之公室其將遂卑矣君幼弱六卿彊而奢傲將因是以習習實爲常能無卑乎平子曰爾幼惡識國秋八月晉昭公䘚冬十月季平子如晉葬昭公平子曰子服囘之言猶信子服氏有子哉三十年夏六月晉頃公䘚秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之䘮子西弔子蟜送葬今吾子無貳何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命先王之制諸侯之䘮士弔大夫送葬唯嘉好聘享三軍之事于是乎使卿晉之䘮事敝邑之閒先君有所助執紼矣若其不閒雖士大夫有所不獲數矣大國之惠亦慶其加而不討其乏明底其情取備而已以爲禮也靈王之䘮我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰春秋之國爲杞動者有二一曰城緣陵一曰城把城緣陵者淮夷病把齊桓公率諸侯城緣陵以遷把也城把者晉平公因把出率諸侯之大夫治把也齊之於把其心則公諸侯樂於同㑹晉之於把以夫人之故煩十一國之君卿鄭與魯衛皆懐疑怨是故齊桓之城緣陵仲山甫之城東方也晉平之城把周平王之戍申也昔平王不撫其民逺戍母家周人怨思揚之水作焉然則天子尚不能動衆以行其私況諸侯乎春秋貴道而不貴惠魯僖爲成風而伐邾不名救患晉平爲悼夫人而治杞不名保小凡春秋之義私而非公者經悉奪之況以一國而動天下沾沾小惠敢勞諸侯哉葢晉至平公霸業漸凌而恤民日以無政嗣是而春作馳底之臺殿設馳逐之車皿蟲爲祟黄熊入寢晉國之政益不可爲也已昭公嗣立在位六年㑹厥憖而合八國之大夫盟平丘而合十二國之諸侯其能有爲也賢于平公矣霸終弗振何居厥憖之役救蔡不及平丘之㑹專欲示威韓子爲政讒慝𢎞多猶弗若趙孟之相平公尚能再合諸侯三合大夫也𫝊曰晉成虒祁諸侯皆有貳心叔向曰諸侯不可不示威焉當斯時也楚比方歸熊䖍遇弑彊夷内亂利在中國晉於此復修盟主之職逺振宋虢之羞君臣所共有事寧獨以虒祁故哉邾莒善愬魯國蒙恥是役也先之以㑹申之以盟諸侯方將望治而竟以執魯大夫終之是晉國之盟㑹以間楚而合以怒魯而離也春秋書曰公不與盟晉人執季孫意如以歸著晉暴傷魯弱也晉曲魯直夫何足諱且初㑹之際公已同列國之君麇集而相見矣㰱血不及何亢之有夫亢魯勢不加損卑魯勢不加益晉之罪先定之矣罪者何同盟辱魯非桓文事也況虒祁徴朝邾南盛兵業先失禮于諸侯齊以投壺懐貳鄭以伯男爭承衛以芻蕘懼淫即微魯釁四方亦叛宜乎晉合諸侯於此焉止而鄟陵之役參盟復見也雖然平公之疾蠱也在周易女惑男風落山謂之蠱平公崇臺榭近女室其爲蠱也二十餘年矣昭公欲以六年振之勢必不能況其才又非幹父之蠱者乎左傳事緯卷八
