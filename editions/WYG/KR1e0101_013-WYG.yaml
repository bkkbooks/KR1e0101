body:
  text: 左傳事緯例畧舊文傳麗於經年時月日以相繫維也易編年爲叙事篇目一百有八將令讀者一覽即解且無遺忘之病杜氏謂左傳有先經後經諸法故徃徃有無經之傳及經詳而傳畧經畧而𫝊詳者既立叙事之法雖𫝊中片語隻字稍渉某事因以附入以無遺古史之文疎遺固陋沓複亦繁有一事或闗兩事及數事者止從所重録之論斷中互相援引庶乎其淹貫也事統於篇年紀易紊故每年必隔一字書之年之首事則䝉本文大書某年餘則分注某年不使𫝊文叠出篇末贅以愚論未敢言文旁集諸家雜采𫝊記無庸附㑹僻說折衷一歸於正大期於發明經傳而止簡端碎評意之所寄偶拈一二以誌賞事之節目亦爲標額濫評一概不收以上正書例讀春秋者異說紛紜漢唐以還不下數百家唯杜氏自號左癖能成一家之言特取其序以壓卷而孔序次之孔氏尊杜氏者也丘明列𫝊舊史所無兹采綴一二遺事用補馬遷之闕左氏立例有發凡有新意前後互明最稱條悉自公穀生異同之見胡氏成帖括之學左例遂置不講兹爲推而論之凡三十有一篇名曰左氏辯例舊有東坡輿圖雜入宋地諸侯年表止列數國宋人發㣲圖説詳略失宜而剞劂錯譌復淆觀覽今立六圖世系二十有一竝著公姓卿族地輿度量廣狹詳誌山川年表備列諸國各標大事其帝派天官職官則愚意所増也名曰左𫝊圖說左氏碎金屑玉披覽彌新學識博通文字工絶曝日之暇隨覽隨鈔積而成帙名曰覽左隨筆杜氏名號歸一圖久失讐挍不無顛倒誤謬兹另爲一式分國别氏指掌瞭然名曰春秋名氏譜六書不明豕亥致紊附以左𫝊字釋用為考訂之助焉以上前書例
