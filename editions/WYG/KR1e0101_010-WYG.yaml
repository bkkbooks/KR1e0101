body:
  text: 左傳事緯卷十靈璧知縣馬驌撰呉闔廬入郢昭十三年呉滅州來令尹子旗請伐呉王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在呉猶在楚也子姑待之十七年呉伐楚陽匄為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗呉師獲其乘舟餘皇使隨人與後至者守之環而塹之及泉盈其隧炭陳以待命呉公子光請於其衆曰䘮先王之乘舟豈惟光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂呉人大敗之取餘皇以歸十九年春楚工尹赤遷陰于下陰令尹子瑕城郟叔孫昭子曰楚不在諸侯矣其僅自完也以持其世而已楚子之在蔡也郹陽封人之女奔之生大子建及即位使伍奢為之師費無極為少師無寵焉欲譖諸王曰建可室矣王為之聘於秦無極與逆勸王取之正月楚夫人嬴氏至自秦楚子爲舟師以伐濮費無極言於楚子曰晉之伯也邇於諸夏而楚辟陋故弗能與争若大城城父而寘大子焉以通北方王收南方是得天下也王説從之故大子建居于城父令尹子瑕聘于秦拜夫人也楚人城州來沈尹戌曰楚人必敗昔呉滅州來子旗請伐之王曰吾未撫吾民今亦如之而城州來以挑呉能無敗乎侍者曰王施舎不倦息民五年可謂撫之矣戍曰吾聞撫民者節用於内而樹德於外民樂其性而無寇讐今宮室無量民人日駭勞罷死轉忘寝與食非撫之也二十年費無極言於楚子曰建與伍奢将以方城之外叛自以為猶宋鄭也齊晉又交輔之将以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣何信於讒王執伍奢使城父司馬奮揚殺大子未至而使遣之三月大子建奔宋王召奮揚奮揚使城父人執己以至王曰言出於余口入於爾耳誰吿建也對曰臣吿之君王命臣曰事建如事余臣不佞不能茍貳奉初以還不忍後命故遣之旣而悔之亦無及已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日無極曰奢之子材若在呉必憂楚國盍以免其父召之彼仁必來不然将為患王使召之曰來吾免而父棠君尚謂其弟員曰爾適呉我将歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也知死不辟勇也父不可棄名不可廢爾其勉之相從為愈伍尚歸奢聞員不來曰楚君大夫其旰食乎楚人皆殺之員如呉言伐楚之利於州于公子光曰是宗為戮而欲反其讐不可從也員曰彼将有他志余姑為之求士而鄙以待之乃見鱄設諸焉而耕於鄙二十三年呉人伐州來楚薳越帥師及諸侯之師奔命救州來呉人禦諸鍾離子瑕卒楚師熸呉公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲已是以來吾聞之曰作事威克其愛雖小必濟胡沈之君㓜而狂陳大夫齧壮而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不壹七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃摇心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅呉子從之戊辰晦戰于雞父呉子以罪人三千先犯胡沈與陳三國争之呉為三軍以繫於後中軍從王光帥右掩餘帥左呉之罪人或奔或止三國亂呉師擊之三國敗獲胡沈之君及陳大夫舎胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也不言戰楚未陳也楚大子建之母在郹召呉人而啓之冬十月甲申呉大子諸樊入郹取楚夫人與其寶器以歸楚司馬薳越追之不及将死衆曰請遂伐呉以徼之薳越曰再敗君師死且有罪亡君夫人不可以莫之死也乃縊於薳澨楚囊瓦為令尹城郢沈尹戌曰子常必亡郢茍不能衞城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無内憂而又無外懼國焉用城今呉是懼而城於郢守己小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待夫正其疆場修其土田險其走集親其民人明其伍候信其鄰國慎其官守守其交禮不僣不貪不懦不耆完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德無亦監乎若敖蚡冐至于武文土不過同慎其四竟猶不城郢今土數圻而郢是城不亦難乎二十四年楚子為舟師以畧呉疆沈尹戌曰此行也楚必亡邑不撫民而勞之呉不動而速之呉踵楚而疆埸無備邑能無亡乎越大夫胥犴勞王於豫章之汭越公子倉歸王乘舟倉及壽夢帥師從王王及圉陽而還呉人踵楚而邊人不備遂滅巢及鍾離而還沈尹戌曰亡郢之始於此在矣王壹動而亡二姓之帥幾如是而不及郢詩曰誰生厲階至今為梗其王之謂乎二十五年楚子使薳射城州屈復茄人焉城丘皇遷訾人焉使熊相禖郭巢季然郭卷子大叔聞之曰楚王将死矣使民不安其土民必憂憂将及王弗能久矣二十六年九月楚平王卒令尹子常欲立子西曰大子壬弱其母非適也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王二十七年呉子欲因楚䘮而伐之使公子掩餘公子燭庸帥師圍潜使延州來季子聘于上國遂聘于晉以觀諸侯楚莠尹然工尹麇帥師救潜左司馬沈尹戌帥都君子與王馬之屬以濟師與呉師遇于窮令尹子常以舟師及沙汭而還左尹郤宛工尹壽帥師至于潜呉師不能退呉公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可弑也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享王王使甲坐於道及其門門階户席皆王親也夾之以鈹羞者獻體改服於門外執羞者坐行而入執鈹者夾承之及體以相授也光偽足疾入于堀室鱄設諸寘劍於魚中以進抽劍刺王鈹交於胷遂弑王闔廬以其子為卿季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待呉公子掩餘奔徐公子燭庸奔鍾吾楚師聞呉亂而還郤宛直而和國人説之鄢将師為右領與費無極比而惡之令尹子常賄而信讒無極譖郤宛焉謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹将必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰寘諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾㡬禍子子惡将為子不利甲在門矣子必無往且此役也呉可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥呉乘我䘮我乘其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢将師而吿之将師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟完及佗與晉陳及其子弟晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室䝉王與令尹以自利也令尹盡信之矣國将如何令尹病之楚郤宛之難國言未已進胙者莫不謗令尹沈尹戌言於子常曰夫左尹與中廄尹莫知其罪而子殺之以興謗讟至于今不己戍也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝呉出蔡侯朱䘮大子建殺連尹奢屏王之耳目使不聰明不然平王之温惠共儉有過成荘無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗㡬及子矣子而不圖将焉用之夫鄢将師矯子之命以滅三族國之良也而不愆位呉新有君疆場日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月己未子常殺費無極與鄢将師盡滅其族以説于國謗言乃止三十年呉子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙使監馬尹大心逆呉公子使居養莠尹然左司馬沈尹戌城之取於城父與胡田以與之将以害呉也子西諫曰呉光新得國而親其民視民如子辛苦同之将用之也若好呉邊疆使柔服焉猶懼其至吾又疆其讐以重怒之無乃不可乎呉周之胄裔也而棄在海濵不與姬通今而始大比于諸華光又甚文将自同於先王不知天将以為虐乎使翦䘮呉國而封大異姓乎其抑亦将卒以祚呉乎其終不遠矣我盍姑億吾鬼神而寧吾族姓以待其歸将焉用自播揚焉王弗聽呉子怒冬十二月呉子執鍾吾子遂伐徐防山以水之己夘滅徐徐子章禹斷其髪攜其夫人以逆呉子呉子唁而送之使其邇臣從之遂奔楚楚沈尹戌帥師救徐弗及遂城夷使徐子處之呉子問于伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余将自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病三十一年秋呉人侵楚伐夷侵潜六楚沈尹戌帥師救潜呉師還楚師遷潜於南岡而還呉師圍弦左司馬戍右司馬稽帥師救弦及豫章呉師還始用子胥之謀也十二月辛亥朔日有食之是夜也趙簡子夢童子臝而轉以歌旦占諸史墨曰吾夢如是今而日食何也對曰六年及此月也呉其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有謫火勝金故弗克定二年桐叛楚呉子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐呉師于豫章呉人見舟于豫章而潜師于巢冬十月呉軍楚師于豫章敗之遂圍巢克之獲楚公子繁三年蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗曰君以㺯馬之故隱君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢将死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚四年春三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言于范獻子曰國家方危諸侯方貳将以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之明日或斾以㑹晉於是乎失諸侯将㑹衛子行敬子言于靈公曰㑹同難嘖有煩言莫之治也其使祝佗從公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行祓社釁鼔祝奉以從於是乎出竟若嘉好之事君行師從卿行旅從臣無事焉公曰行也及臯鼬将長蔡於衛衛侯使祝佗私於萇𢎞曰聞諸道路不知信否若聞蔡将先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下於周為睦分魯公以大路大旂夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族将其類醜以法則周公用即命于周是使之職事于魯以昭周公之明德分之土田陪敦祝宗卜史備物典䇿官司彛器因商奄之民命以伯禽而封於少皥之虚分康叔以大路少帛綪茷􅏧旌大吕殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以㑹王之東蒐聃季授土陶叔授民命以康誥而封於殷虚皆啓以商政疆以周索分唐叔以大路宻湏之鼓闕鞏沽洗懐姓九宗職官五正命以唐誥而封於夏虚啓以夏政疆以戎索三者皆叔也而有令德故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室王於是乎殺管叔而蔡蔡叔以車七乘徒七十人其子蔡仲改行帥德周公舉之以為己卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為大宰康叔為司冦􅆅季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸非尚年也今将尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭㨗齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其德将如之何萇𢎞説吿劉子與范獻子謀之乃長衛侯於盟反自召陵鄭子大叔未至而卒晉趙簡子為之臨甚哀曰黃父之㑹夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非德無罪非義沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈秋楚為沈故圍蔡伍員為呉行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為呉大宰以謀楚楚自昭王即位無嵗不有呉師蔡侯因之以其子乾與其大夫之子為質於呉冬蔡侯呉子唐侯伐楚舎舟于淮汭自豫章與楚夾漢左司馬戌謂子常曰子㳂漢而與之上下我悉方城外以毁其舟還塞大隧直轅㝠阨子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂子常曰呉用木也我用革也不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁呉舟于淮塞城口而入是獨克呉也子必速戰不然不免乃濟漢而陳自小别至于大别三戰子常知不可欲奔史皇曰安求其事難而逃之将何所入子必死之初罪必盡説十一月庚午二師陳于柏舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂呉師大敗之子常奔鄭史皇以其乘廣死呉從楚師及清發将擊之夫槩王曰困獸猶鬭況人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭心矣半濟而後可擊也從之又敗之楚人為食呉人及之奔食而從之敗諸雍澨五戰及郢己夘楚子取其妹季芈畀我以出渉睢鍼尹固與王同舟王使執燧象以奔呉師庚辰呉入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之左司馬戌及息而還敗呉師于雍澨傷初司馬臣闔廬故恥為禽焉謂其臣曰誰能免吾首呉句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之藏其身而以其首免楚子渉睢濟江入于雲中王寝盗攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芈以從由于徐蘇而從鄖公辛之弟懷将弑王曰平王殺吾父我殺其子不亦可乎辛曰君討臣誰敢讐之君命天也若死天命将誰讐詩曰柔亦不茹剛亦不吐不侮矜寡不畏彊禦惟仁者能之違彊陵弱非勇也乘人之約非仁也滅宗廢祀非孝也動無令名非知也必犯是余将殺女鬭辛與其弟巢以王奔隨呉人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪君若顧報周室施及寡人以奨夭衷君之惠也漢陽之田君實有之楚子在公宫之北呉人在其南子期似王逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭呉曰以隨之辟小而宻邇於楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不惟一人若鳩楚竟敢不聽命呉人乃退鑪金初宦於子期氏實與隨人要言王使見辭曰不敢以約為利王割子期之心以與隨人盟初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰呉為封豕長蛇以荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆場之患也逮呉之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館将圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭墻而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出五年夏歸粟于蔡以周亟矜無資申包胥以秦師至秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知呉道使楚人先與呉人戰而自稷㑹之大敗夫槩王于沂呉人獲薳射于柏舉其子帥奔徙以從子西敗呉師于軍祥秋七月子期子蒲滅唐九月夫槩王歸自立也以與王戰而敗奔楚為堂谿氏呉師敗楚師于雍澨秦師又敗呉師呉師居麇子期将焚之子西曰父兄親暴骨焉不能收又焚之不可子期曰國亡矣死者若有知也可以歆舊祀豈憚焚之焚之而又戰呉師敗又戰于公壻之谿呉師大敗呉子乃歸囚闉輿罷闉輿罷請先遂逃歸葉公諸梁之弟后臧從其母於呉不待而歸葉公終不正視楚子入于郢初鬭辛聞呉人之争宫也曰吾聞之不讓則不和不和不可以遠征呉争於楚必有亂有亂則必歸焉能定楚王之奔隨也将渉于成臼藍尹亹渉其帑不與王舟及寧王欲殺之子西曰子常惟思舊怨以敗君何效焉王曰善使復其所吾以志前惡王賞鬭辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懷子西曰請舍懷也王曰大德滅小怨道也申包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸遂逃賞王将嫁季芈季芈辭曰所以為女子遠丈夫也鍾建負我矣以妻鍾建以為樂尹王之在隨也子西為王輿服以保路國于脾洩聞王所在而後從王王使由于城麇復命子西問高厚焉弗知子西曰不能如辭城不知高厚大小何知對曰固辭不能子使余也人各有能有不能王遇盜於雲中余受其戈其所猶在袒而示之背曰此余所能也脾洩之事余亦弗能也六年四月己丑呉大子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚國大惕懼亡子期又以陵師敗于繁揚令尹子西喜曰乃今可為矣於是乎遷郢於鄀而改紀其政以定楚國十四年頓子牂欲事晉背楚而絶陳好二月楚滅頓十五年呉之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡哀公元年春楚子圍蔡報柏舉也里而栽廣丈高倍夫屯晝夜九日如子西之素蔡人男女以辨使疆于江汝之間而還蔡於是乎請遷于呉二年呉洩庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説哭而遷墓冬蔡遷于州來四年春蔡昭侯将如呉諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒以兩矢門之衆莫敢進文之鍇後至曰如墻而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫旴夏楚人既克夷虎乃謀北方左司馬眅申公壽餘葉公諸梁致蔡於負函致方城之外於繒關曰呉将泝江入郢将奔命焉為一昔之期襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晉陰地司馬起豐析與狄戎以臨上雒左師軍于莵和右師軍于倉野使謂陰地之命大夫士蔑曰晉楚有盟好惡同之若将不廢寡君之願也不然将通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎将裂田以與蠻子而城之且将為之卜蠻子聽卜遂執之與其五大夫以畀楚師于三户司馬致邑立宗焉以誘其遺民而盡俘以歸呉楚之爭久矣壽夢之世呉能自彊既而巢隕諸樊閽戕戴呉楚康之際呉其衰乎夷昧立而楚靈方驕入我朱方執齊慶封三年之内三㝷師焉楚暴呉弱宜若不敵乃平王初立呉即乘隙而滅州來呉固非甘心下楚者也王僚之立長岸一戰而師壓楚境雞父再役而七國䘮敗楚常詘而呉常伸豈王僚之能度越前人哉史記稱平王初立施惠百姓存恤國中傳亦稱簡兵息民五年後戰平懦王也志存靖國然而疆場屢警烽燧時聞即欲息民何自而息耶城郟城城父城州來城郢城州屈城丘皇凡以保兹疆域者綢繆恐後雖然亂生于外者可禦亂生于内者難圖平王宻邇讒間䘮厥大子竝誅伍奢而考厥所由則無異衛風之刺新臺賦乘舟也敗性滅倫視靈王而加穢焉幸而令終保無患乎昭王初立呉僚被弑楚人欲因呉亂而取之不知闔廬之𤼵憤為雄遠逾前代而楚昭信讒寵佞猶然平王之子也呉人一舉而滅徐再舉而伐越既而楚瓦貪賄晉不能伐闔廬内因胥嚭之怨外因唐蔡之讐用孫武白喜之師長驅入郢君舎君寝臣居臣室壊宗廟徙陳器伍員掘平王之墓鞭屍三百左足踐腹右手抉目而誚之猶曰報其子不及其身莫釋予怨也此一役也因蔡之請託義興師五戰皆勝昭王出走較之召陵之盟城濮之戰功尤加烈即未常獻㨗成周而攘夷之效高於桓文矣柏舉書子嘉其救患入郢書呉貶其從狄然而分災恤難中國事也晉定公不能救蔡而授權于呉聖人惜焉故郢不書滅所以存楚闔廬削子所以抑呉春秋之法似不止于狄呉也昭王藉秦反國休養數年滅頓滅胡非不耀武而終不敢以一矢加呉慰先君于地下呉之彊從可知矣且晉自㑹向以來不復通呉而季札之聘反日接於上國國有賢者禮治無闕是以簒弑雖作勾呉卒彊端有以哉鄭獻滅許成三年許恃楚而不事鄭鄭子良伐許四年冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉欒書将中軍荀首佐之士爕佐上軍以救許伐鄭取汜祭楚子反救鄭鄭伯與許男訟焉皇戌攝鄭伯之辭子反不能决也曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也不然側不足以知二國之成五年許靈公愬鄭伯于楚六月鄭悼公如楚訟不勝楚人執皇戌及子國故鄭伯歸使公子偃請成于晉秋八月鄭伯及晉趙同盟于埀棘六年春鄭伯如晉拜成子㳺相授玉于東楹之東士負伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久六月鄭悼公卒八年是行也鄭伯将㑹晉師門于許東門大獲焉十四年八月鄭子罕伐許敗焉戊戌鄭伯復伐許庚子入其郛許人平以叔申之封十五年許靈公畏偪于鄭請遷於楚辛丑楚公子申遷許于葉襄十六年許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞将伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師㑹晉荀偃書曰㑹鄭伯為夷故也夏六月次于棫林庚寅伐許次于函氏晉荀偃欒黶帥師伐楚以報宋揚梁之役楚公子格帥師及晉師戰于湛阪楚師敗績晉師遂侵方城之外復伐許而還二十六年許靈公如楚請伐鄭曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭鄭人将禦之子産曰晉楚将平諸侯将和楚王是故昧于一來不如使逞而歸乃易成也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之子展説不禦冦十二月乙酉入南里墮其城渉於樂氏門于師之梁縣門發獲九人焉渉於汜而歸而後𦵏許靈公昭九年二月庚申楚公子棄疾遷許于夷實城父取州來淮北之田以益之伍舉授許男田然丹遷城父人於陳以夷濮西田益之遷方城外人於許十八年楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚䘮地矣君盍遷許許不專於楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚國方城外之蔽也土不可易國不可小許不可俘讐不可啟君其圖之楚子説冬楚子使王子勝遷許於析實白羽十九年夏許悼公瘧五月戊辰飲大子止之藥卒大子奔晉書曰弑其君君子曰盡心力以事君舎藥物可也定公六年春鄭滅許因楚敗也許靈公在位十受鄭兵成之三年鄭襄公一嵗而兩伐之四年鄭悼公使疆其田既又親伐之八年鄭成公門于其門九年復圍之十四年又兩伐之入其郛襄之十六年鄭簡公從諸侯兩伐之許靈往愬遂卒于楚夫訟不獲勝遷不獲避積憤請師身死不恤何其讐鄭之決也昔也穆公從齊卒于陘師今也靈公赴楚卒于鄰國同一客死而昔為死義今為死忿謀之不臧遠愧乃祖矣且許自齊桓既沒反覆無信往往恃楚至靈公而當楚共康之世楚亦未嘗專庇許也是以疆場之上無嵗不有鄭師楚皆不問靈公之卒僅一出師姑以慰死者而已既而許悼即位凡楚盟㑹無役不從許雖親楚楚何嘗為許報哉靈公遷於葉悼公遷於夷又遷於白羽許男斯遷於容城國凡四遷皆出楚命翦荆築室嵗無寧居蕩析播越國本銷亡游速乘之而虜其主滅許者鄭亡許者又焉知非楚也且鄭固諸夏之罪人也居晉楚之交介在彊敵茍安已幸而廹虐許國務求逞志召陵之㑹許斯幸能進而與晉同好鄭獻公乃因晉弱而俘囚之誠何心乎許既将亡又遭家難太子止痛己之不嘗藥以位與虺哭泣歠飦粥嗌不容粒未逾年而卒賢太子死而國奚望哉春秋惡鄭人滅許之暴益傷許之託楚之愚地歸於楚而俘歸於鄭嗚呼大嶽之𦙍絶矣陪臣之叛南蒯昭十二年季平子立而不禮於南蒯南蒯謂子仲吾出季氏而歸其室於公子更其位我以費為公臣子仲許之南蒯語叔仲穆子且吿之故季悼子之卒也叔孫昭子以再命為卿及平子伐莒克之更受三命叔仲子欲構二家謂平子曰三命踰父兄非禮也平子曰然故使昭子昭子曰叔孫氏有家禍殺適立庶故婼也及此若因禍以斃之則聞命矣若不廢君命則固有著矣昭子朝而命吏曰婼将與季氏訟書辭無頗季孫懼而歸罪於叔仲子故叔仲小南蒯公子憖謀季氏憖吿公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊南蒯之将叛也其鄉人或知之過之而歎且言曰恤恤乎湫乎攸乎深思而淺謀邇身而遠志家臣而君圖有人矣哉南蒯枚筮之遇坤之比曰黃裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外彊内温忠也和以率負信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和為忠率事以信為共供養三德為善非此三者弗當且夫易不可以占險将何事也且可飾乎中美能黃上美為元下美則裳參成可筮猶有闕也筮雖吉未也将適費飲鄉人酒鄉人或歌之曰我有圃生之把乎從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎平子欲使昭子逐叔仲小小聞之不敢朝昭子命吏謂小待政於朝曰吾不為怨府十三年春叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之饑者食之為之令主而共其乏困費來如歸南氏亡矣民将叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏将焉入矣平子從之費人叛南氏十四年南蒯之将叛也盟費人司徒老祁慮癸偽廢疾使請於南蒯曰臣願受盟而疾興若以君靈不死請待間而盟許之二子因民之欲叛也請朝衆而盟遂刼南蒯曰羣臣不忘其君畏子以及今三年聽命矣子若弗圖費人不忍其君将不能畏子矣子何所不逞欲請送子請期五日遂奔齊侍飲酒於景公公曰叛夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉司馬老祁慮癸來歸費齊侯使鮑文子致之陽虎定五年六月季平子行東野還未至丙申卒于房陽虎将以璵璠斂仲梁懐弗與曰改歩改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既𦵏桓子行東野及費子洩為費宰逆勞於郊桓子敬之勞仲梁懐仲梁懐弗敬子洩怒謂陽虎子行之乎乙亥陽虎囚季桓子及公父文伯而逐仲梁懐冬十月丁亥殺公何藐己丑盟桓子于稷門之内庚寅大詛逐公父歜及秦遄皆奔齊六年二月公侵鄭取匡為晉討鄭之伐胥靡也往不假道於衛及還陽虎使季孟自南門入出自東門舎於豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君将以文之舒鼎成之昭兆定之鞶鑑茍可以納之擇用一焉公子與二三臣之子諸侯茍憂之将以為之質此羣臣之所聞也今将以小忿蒙舊德無乃不可乎太姒之子惟周公康叔為相睦也而效小人以棄之不亦誣乎天将多陽虎之罪以斃之君姑待之若何乃止夏季桓子如晉獻鄭俘也陽虎强使孟㦤子往報夫人之幣晉人兼享之孟孫立于房外謂范獻子曰陽虎若不能居魯而息肩于晉所不以為中軍司馬者有如先君獻子曰寡君有官将使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故强為之請以取入焉陽虎又盟公及三桓於周社盟國人於亳社詛于五父之衢七年齊人歸鄆陽關陽虎居之以為政八年季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十月順祀先公而祈焉辛夘禘于僖公壬辰将享季氏于蒲圃而殺之戒都車曰癸巳至成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿将如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徵死死無益於主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壮者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎刼公與武叔以伐孟氏公斂處父帥成人自上東門入與陽氏戰于南門之内弗勝又戰于棘下陽氏敗陽虎説甲如公宫取寳玉大弓以出舍于五父之衢寝而為食其徒曰追其将至虎曰魯人聞余出喜于徵死何暇追余從者曰嘻速駕公斂陽在公斂陽請追之孟孫弗許陽欲殺桓子孟孫懼而歸之子言辨舍爵於季氏之廟而出陽虎入于讙陽關以叛九年夏陽虎歸寳玉大弓書曰得器用也凡獲器用曰得得用焉曰獲六月伐陽關陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯将許之鮑文子諌曰臣嘗為𨽻於施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天菑若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵於季氏而将殺季孫以不利魯國而求容焉親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎将東之陽虎願東乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之載葱靈寝於其中而逃追而得之囚於齊又以葱靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎侯犯定十年初叔孫成子欲立武叔公若藐固諌曰不可成子立之而卒公南使賊射之不能殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰吾以劒過朝公若必曰誰之劒也吾稱子以吿必觀之吾偽固而授之末則可殺也使如之公若曰爾欲呉王我乎遂殺公若侯犯以郈叛武叔㦤子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非惟叔孫氏之憂社稷之患也将若之何對曰臣之業在揚水卒章之四言矣叔孫稽首駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事於齊以臨民不然将叛侯犯從之齊使至駟赤與郈人為之宣言於郈中曰侯犯将以郈易于齊齊人将遷郈民衆兇懼駟赤謂侯犯曰衆言異矣子不如易于齊與其死也猶是郈也而得紓焉何必此齊人欲以此偪魯必倍與子地且盍多舍甲于子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易于齊齊有司觀郈将至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤将射之侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿每出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯謂駟赤曰子止而與之數駟赤止而納魯人侯犯奔齊齊人乃致郈武叔聘于齊齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之對曰非寡君之望也所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜公孫宿定十二年仲由為季氏宰将墮三都於是叔孫氏墮郈季氏将墮費公山不狃叔孫輒帥費人以襲魯公與三子入於季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費将墮成公斂處父謂孟孫墮成齊人必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我将不墮冬十二月公圍成弗克哀十四年初孟孺子洩将圉馬于成成宰公孫宿不受曰孟孫為成之病不圉馬焉孺子怒襲成從者不得入乃反成有司使孺子鞭之秋八月辛丑孟㦤子卒成人奔䘮弗内袒免哭于衢聽共弗許懼不歸十五年春成叛于齊武伯伐成不克遂城輸子服景伯如齊子贛為介見公孫成曰人皆臣人而有背人之心況齊人雖為子役其有不貳乎子周公之孫也多饗大利猶思不義利不可得而䘮宗國将焉用之成曰善哉吾不早聞命陳成子館客曰寡君使恒告曰寡人願事君如事衞君景伯揖子贛而進之對曰寡君之願也昔晉人伐衞齊為衞故伐晉冠氏䘮車五百因與衞地自濟以西禚媚杏以南書社五百呉人加敝邑以亂齊因其病取讙與闡寡君是以寒心若得視衞君之事君也則固所願也成子病之乃歸成公孫宿以其甲兵入于嬴經曰公子憖出奔齊叔弓帥師圍費記南蒯之叛也曰盗竊寳玉大弓得寳玉大弓記陽虎之叛也曰叔孫州仇仲孫何忌帥師圍郈記侯犯之叛也左氏之補經曰成叛記公孫宿之叛也夫蒯虎叛季氏犯叛叔氏宿叛孟氏大夫僭也而陪臣叛之宜若為義然傳不云乎家臣欲張公室罪莫大焉此南蒯諸人之名春秋所由削之也夫季氏專政僭竊公家至于平子越禮尤甚子仲謀去之而未克南氏先叛無論家臣君圖湫攸先兆而謀之不終披邑資敵是豈春秋之義乎南蒯出奔季氏益用尾大孟仲從而助之昭公謀去未成而越在外野季氏既逐其君又廢其後俾先君不能正終嗣君弗克正始禮樂征伐自大夫出僭度已甚死而無討春秋痛之陽虎執國命季孫被執虎又辱之於晉䧟之於齊且盟且詛旦暮得而甘心焉是時齊景叛晉伐我搆難未平而虎且專政自恣從祀先公作難蒲圃琴如甲起説然不懼叛白之璋繡質之弓青純之龜任其攘竊而魯之亂極矣孔子相魯以為欲靖内亂必先平齊夾谷一㑹而鄆讙龜陰之田來歸聖人之所以折衝於樽俎也侯犯宰郈公山不狃宰費皆倚城自固不可不討無何而侯犯先叛師兩圍之犯雖平而不狃在憂未歇也仲尼曰三家之抗魯也以三都之故陪臣之抗三家也亦以三都之故大都耦國不如墮之墮郈克費周公可復奈何女樂入孔子行而成不果墮矣夫孔子生魯五十餘年魯之君臣咸知其聖然前此不用而必待定之十年始用之者非季孫之真能用孔子也始廹于陽虎之徒故急召以救亂亂已靖矣冀或附已而孔子乃使之墮私邑出藏甲三家能不畏乎公斂陽曰成孟氏之保障也無成是無孟氏也季氏必曰無費是無季氏也叔孫氏必曰無郈是無叔孫氏也魯既不能一日用孔子孔子豈能一日留哉孔子去矣公誰與謀自是公室益卑三桓益侈公孫宿據成以叛亦莫能病孟氏也況叔季之專又甚於孟氏者乎昭公有孔子而不能用定公用孔子而不能終陪臣交叛不能病三家而反以病魯削弱之患雖聖人亦末如之何也諸侯叛晉定六年秋八月宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰唯寡人説子之言子必往陳寅曰子立後而行吾室亦不亡唯君亦以我為知難而行也見溷而行趙簡子逆而飲之酒於緜上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志於宋范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁七年秋齊侯鄭伯盟于鹹徵㑹于衞衞侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟于𤨏齊國夏伐我陽虎御季桓子公斂處父御孟㦤子将宵軍齊師齊師聞之墮伏而待之處父曰虎不圖禍而必死苫夷曰虎䧟二子於難不待有司余必殺女虎懼乃還不敗八年春王正月公侵齊門于陽州士皆坐列曰顔高之弓六鈞皆取而傳觀之陽州人出顔高奪人弱弓籍丘子鉏擊之與一人俱斃偃且射子鉏中頰殪顔息射人中眉退曰我無勇吾志其目也師退冉猛偽傷足而先其兄㑹乃呼曰猛也殿趙鞅言於晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也将歸樂祁士鞅曰三年止之無故而歸之宋必叛晉獻子私謂子梁曰寡君懼不得事宋君是以止子子姑使溷代子子梁以吿陳寅陳寅曰宋将叛晉是棄溷也不如待之樂祁歸卒于大行士鞅曰宋必叛不如止其尸以求成焉乃止諸州公侵齊攻廪丘之郛主人焚衝或濡馬褐以救之遂毁之主人出師奔陽虎偽不見冉猛者曰猛在此必敗猛逐之顧而無繼偽顛虎曰盡客氣也苫越生子将待事而名之陽州之役獲焉名之曰陽州夏齊國夏髙張伐我西鄙晉士鞅趙鞅荀寅救我公㑹晉師于瓦范獻子執羔趙簡子中行文子皆執雁魯於是始尚羔晉師将盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者渉佗成何曰我能盟之衛人請執牛耳成何曰衛吾温原也焉得視諸侯将㰱渉佗捘衛侯之手及捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子與大夫之子為質大夫曰茍有益也公子則往羣臣之子敢不負羈絏以從将行王孫賈曰茍衛國有難工商未嘗不為患使皆行而後可公以吿大夫乃皆将行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅㑹成桓公侵鄭圍蟲牢報伊闕也遂侵衛九月師侵衛晉故也九年春宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢如晉盟且逆子梁之尸子明謂桐門右師出曰吾猶衰絰而子擊鐘何也右師曰䘮不在此故也既而告人曰已衰絰而生子余何故舎鐘子明聞之怒言於公曰右師将不利戴氏不肯適晉将作亂也不然無疾乃逐桐門右師秋齊侯伐晉夷儀敝無存之父将室之辭以與其弟曰此役也不死反必娶于高國先登求自門出死於霤下東郭書讓登犂彌從之曰子讓而左我讓而右使登者絶而後下書左彌先下書與王猛息猛曰我先登書斂甲曰曩者之難今又難焉猛笑曰吾從子如驂之靳晉車千乘在中牟衛侯将如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛禇師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師敗之齊侯致禚媚杏於衛齊侯賞犂彌犂彌辭曰有先登者臣從之晳幘而衣貍製公使視東郭書曰乃夫子也吾貺子公賞東郭書辭曰彼賔旅也乃賞犂彌齊師之在夷儀也齊侯謂夷儀人曰得敝無存者以五家免乃得其尸公三襚之與之犀軒與直蓋而先歸之坐引者以師哭之親推之三十年春及齊平晉趙鞅圍衛報夷儀也初衛侯伐邯鄲午於寒氏城其西北而守之宵熸及晉圍衛午以徒七十人門于衛西門殺人於門中曰請報寒氏之役渉佗曰夫子則勇矣然我往必不敢啟門亦以徒七十人旦門焉歩左右皆至而立如植日中不啟門乃退反役晉人討衛之叛故曰由渉佗成何於是執渉佗以求成於衛衛人不許晉人遂殺渉佗成何奔燕君子曰此之謂棄禮必不均詩曰人而無禮胡不遄死渉佗亦遄矣哉十一年冬及鄭平始叛晉也十二年夏衛公孟彄伐曹克郊還􅉸羅殿未出不退於列其御曰殿而在列其為無勇乎羅曰與其素厲寧為無勇十三年春齊侯衛侯次于埀葭實郹氏使師伐晉将濟河諸大夫皆曰不可邴意兹曰可鋭師伐河内傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河内齊侯皆斂諸大夫之軒唯邴意兹乘軒齊侯欲與衛侯乘與之宴而駕乘廣載甲焉使告曰晉師至矣齊侯曰比君之駕也寡人請攝乃介而與之乘驅之或告曰無晉師乃止十五年鄭罕達敗宋師于老丘齊侯衛侯次于蘧挐謀救宋也哀公七年春宋師侵鄭鄭叛故也晉師侵衛衛不服也九年鄭武子䞉之嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師每日遷舎壘合鄭師哭子姚救之大敗二月甲戌宋取鄭師于雍丘使有能者無死以郟張與鄭羅歸宋公伐鄭晉趙鞅卜救鄭遇水適火占諸史趙史墨史龜史龜曰是謂沈陽可以興兵利以伐姜不利子商伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可㳺也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇秦之需曰宋方吉不可與也㣲子啟帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止十年夏趙鞅帥師伐齊大夫請卜之趙孟曰吾卜於此起兵事不再令卜不襲吉行也於是乎取犂及轅毁髙唐之郭侵及頼而還胡康侯傷晉霸之衰也以為示威平丘而齊叛辭請召陵而蔡叛盟于沙鹹而鄭叛次于五氏而衛叛涖于鄭㑹于夾谷㰱于黃而魯叛如是則諸侯皆叛晉勢孤矣考厥所由豈無故而然哉善乎廬陵李氏之論之也曰讀隱桓之春秋而知王澤之竭也讀昭定之春秋而知伯烈之壊也晉伯復盛於悼公浸衰於平昭而遂廢於頃定夫晉以奕世九君之業豈無積累之功著在中夏至頃定一壊而不可復收嗚呼廢興存亡未有無故而然者也嘗原晉事之顛末而察其所由失矣或曰晉之㣲也大變在夷狄有楚弗攘有呉弗抑二彊竝立伯權遂弱自召陵擁十八國之衆不能振旅至于戎蠻之執晉俛焉北面而事楚以京師之禮自呉滅巢滅徐伐陳伐齊晉不能誰何迄乎黃池之㑹呉哆然操方伯之令而下以列國命晉春秋由是絶筆焉則晉之失伯實夷狄之張也曰中國茍合夷狄豈能間乎其端在諸侯之先貳當時以齊景衛靈宋景之君其國皆彊戮力周旋何畏於呉楚今也齊景公有抑晉代興之志宋衛魯鄭之君無非攘臂以從齊者也蓋晉執行人叔孫婼與邾大夫坐而失魯執宋仲㡬樂祈而失宋渉佗成何詬衛而失衛荀寅辭蔡而失蔡假羽毛於鄭而失鄭是以齊得以盡取諸侯鄭則與齊盟于鹹㑹于安甫矣衛則與齊盟于沙次于五氏矣魯則與齊㑹于牽宋則與齊㑹于洮矣終則齊侯衛侯且伐晉矣則晉之失霸乃諸侯之離也曰晉國茍治諸侯安得背乎其原在大夫之先叛使六卿諸臣如先大夫之肅皆盡忠以輔公何憂乎齊衛今也彊家多門各求封殖而削弱之禍獨歸宗國自趙鞅取衛貢五百家勤晉陽之甲自韓不信執宋命卿不顧踐土之盟或取季孫之賄而昭公弗納或求蔡侯之貨而伐楚之師徒出或索十牢而呉人藉為口實孟子曰上下交征利而國危矣晉伯之衰又誰咎歟晉范氏中行氏之亡昭二十九年冬晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉國将守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也若之何以為法蔡史墨曰范氏中行氏其亡乎中行寅為下卿而干上令擅作刑器以為國法是法姦也又加范氏焉易之亡也其及趙氏趙孟與焉然不得已若德可以免定三年秋九月鮮虞人敗晉師于平中獲晉觀虎恃其勇也五年晉士鞅圍鮮虞報觀虎之役也十三年晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舎諸晉陽午許諾歸吿其父兄父兄皆曰不可衛是以為邯鄲而寘諸晉陽絶衛之道也不如侵齊而謀之乃如之而歸之于晉陽趙孟怒召午而囚諸晉陽使其從者説劒而入渉賔不可乃使吿邯鄲人曰吾私有討於午也二三子唯所欲立遂殺午趙稷渉賔以邯鄲叛夏六月上軍司焉籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲将作亂董安于聞之吿趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也安于曰與其害於民寧我獨死請以我説趙孟不可秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之范臯夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀将逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子将伐公齊高彊曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君将誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌韓魏以趙氏為請十二月辛未趙鞅入于絳盟于公宫十四年梁嬰父惡董安于謂知文子曰不殺安于使終為政於趙氏趙氏必得晉國盍以其先發難也討于趙氏文子使告於趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也晉國有命始禍者死二子既伏其罪矣敢以吿趙孟患之安于曰我死而晉國寧趙氏定将焉用生人誰不死吾死莫矣乃縊而死趙孟尸諸市而告於知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從趙孟盟而後趙氏定祀安于於廟晉人圍朝歌公㑹齊侯衛侯于脾上梁之間謀救范中行氏析成鮒小王桃甲率狄師以襲晉戰于絳中不克而還士鮒奔周小王桃甲入于朝歌秋齊侯宋公㑹于洮范氏故也冬十二月晉人敗范中行氏之師于潞獲籍秦髙彊又敗鄭師及范氏之師于百泉哀元年夏四月齊侯衛侯救邯鄲圍五鹿齊侯衛侯㑹于乾侯救范氏也師及齊師衛孔圍鮮虞人伐晉取棘蒲冬十一月晉趙鞅伐朝歌二年秋八月齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳罕駟自後隨而從之彼見吾貌必有懼心於是乎㑹之必大敗之從之卜戰龜焦樂丁曰詩曰爰始爰謀爰契我龜謀協以故兆詢可也簡子誓曰范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車樸馬無入于兆下卿之罰也甲戌将戰郵無恤御簡子衛大子為右登鐵上望見鄭師衆大子懼自投于車下子良授大子綏而乘之曰婦人也簡子廵列曰畢萬匹夫也七戰皆獲有馬百乘死于牖下羣子勉之死不在寇繁羽御趙羅宋勇為右羅無勇麇之吏詰之御對曰痁作而伏衛大子禱曰曽孫蒯聵敢昭吿皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人擊簡子中肩斃于車中獲其蠭旗大子救之以戈鄭師北獲温大夫趙羅大子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣傅傁曰雖克鄭猶有知在憂未艾也初周人與范氏田公孫尨税焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下獻曰請報主德追鄭師姚般公孫林殿而射前列多死趙孟曰國無小既戰簡子曰吾伏弢嘔血鼓音不衰今日我上也大子曰吾救主于車退敵於下我右之上也郵良曰我兩靷将絶吾能止之我御之上也駕而乘材兩靷皆絶三年劉氏范氏世為婚姻萇𢎞事劉文公故周與范氏趙鞅以為討六月癸夘周人殺萇𢎞冬十月晉趙鞅圍朝歌師于其南荀寅伐其郛使其徒自北門入已犯師而出癸丑奔邯鄲十一月趙鞅殺士臯夷惡范氏也四年秋七月齊陳乞弦施衛寗跪救范氏庚午圍五鹿九月趙鞅圍邯鄲冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨十二月弦施逆之遂墮臨國夏伐晉取邢任欒鄗逆畤陰人盂壺口㑹鮮虞納荀寅于柏人五年春晉圍柏人荀寅士吉射奔齊初范氏之臣王生惡張栁朔言諸昭子使為柏人昭子曰夫非而讐乎對曰私讐不及公好不廢過惡不去善義之經也臣敢違之及范氏出張栁朔謂其子爾從主勉之我将止死王生授我矣吾不可以僭之遂死於柏人夏趙鞅伐衛范氏之故也遂圍中牟六年春晉伐鮮虞治范氏之亂也定公十三年秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛晉趙鞅歸于晉詳哉其言之也晉霸衰凌諸侯離叛嗣是而大夫亦叛要之諸侯之叛鮮不自大夫始憶昔士鞅取貨納魯弗克荀寅求賂侵楚無功諸卿貪昧漸已成習范中行之黷貨固不在趙鞅求貢之後也是時中國之大如魯衛宋鄭罔不折而入于齊君孤立于上而臣交争于下分權樹黨勢不相容鞅也而殺邯鄲午寅也吉射也為午而伐鞅躒也不信也曼多也為鞅而伐范中行氏鞅據晉陽寅吉射據朝歌專殺專伐其罪均也晉國有令始禍者死而鞅則先之且晉陽保障夙稱彊偪朝歌僅足自保未必深為國患也乃荀士不反鞅獨善歸者趙氏之黨盛矣三家朋比為耦孤主懾而弗敢問也於是乎以擅兵逐卿之罪舉而蔽之二氏鞅且借甲晉陽反以除惡君側之義傲然自命故得叛而歸歸而盟晉人曽無異辭焉自是晉之執政者且寥寥矣平昭之世慮晉卿之多頃定之世又慮晉卿之少趙鞅專國搆怨罔休今年伐朝歌明年伐邯鄲況復戰于鐵以讐鄭討萇𢎞以偪周討餘黨以侵鮮虞凡皆為范中行之故而無關於晉國之事也愛憎自鞅出君無與知以視荀士之亂政又加變矣傳曰竊鈎者誅竊國者為諸侯趙孟之免幸爾夫亦何德之有齊悼之立哀五年齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為大子也言於公曰君之齒長矣未有大子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子髙昭子立荼寘羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎六年齊陳乞偽事高國者每朝必驂乘焉所從必言諸大夫曰彼皆偃蹇将棄子之命皆曰髙國得君必偪我盍去諸固将謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入于公宫昭子聞之與惠子乘如公戰于莊敗國人追之國夏奔莒遂及髙張晏圉弦施來奔八月齊邴意兹來奔陳僖子使召公子陽生陽生駕而見南郭且于曰嘗獻馬於季孫不入於上乘故又獻此請與子乘之出萊門而告之故闞止知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至于齊國人知之僖子使子士之母養之與饋者皆入冬十月丁夘立之将盟鮑子醉而往其臣差車鮑點曰此誰之命也陳子曰受命于鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如頼去鬻姒殺王甲拘江説囚王豹于句竇之丘公使朱毛告於陳子曰㣲子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下𦵏諸殳冒淳八年或譖胡姬於齊侯曰安孺子之黨也六月齊侯殺胡姬鮑牧又謂羣公子曰使女有馬千乘乎公子愬之公謂鮑子或譖子子姑居於潞以察之若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乘及潞麇之以入遂殺之寵孽之為害也世子不立國本動摇矣昔桓公五子争立四世不康當時亂政者雍巫啟方寺貂也三人即近在君側未必專政執國得擅生殺之柄至景公而政由田氏公在位日久田氏得民日深縱令早建世子彼且私行愛憎間羣子以作難況加私昵焉是速之變也公承靈莊之後戎姬子牙覆轍匪遠公在位五十八年弗克早圖國儲未正而嬖子是寵積欲立荼而不能言諸大夫請命則曰姑且謀樂何憂無君夫陽生長也荼少而賤社稷之計戒易樹子國髙受其亂命滋禍所由長也子荼之寵不過奚卓國髙之貞未逮荀息而陳乞鮑牧又非里丕之所可方則荼也殆矣先君折齒於孺子乞也舉囊於中霤蔑孤無君豈専為社稷哉二卿出孺子廢避位屏居可無相尤乃悼公輒以為言僖子泣謝朱毛贊謀原陳氏之初志但欲廢君未必弑君而聖人必以首惡歸之杜氏謂楚比刼立鄭家憚老皆疑於免罪而禍所由始遂明書之以為弑主春秋之書防㣲杜漸所以深惡亂賊而絶其免罪之端也今孺子逾年為君矣而陳乞復外求君諸大夫遂再拜稽首而君之義符義隆不能並生昭業昭文豈容並立其立則君也廢則讐也陳乞讐之陽生而讐之矣陳乞啟之朱毛而弑之矣經大書曰齊陳乞弑其君荼春秋作而亂賊懼亶其然乎宋景滅曹哀七年宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸請待公孫彊許之且而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白雁獻之且言田弋之説説之因訪政事大説之有寵使為司城以聽政夢者之子乃行彊言覇説於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鍾邘八年春宋公伐曹将還褚師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之曹於春秋最為㣲弱大都從大國以圖存也自昭共以來十有餘君凡霸主之征討㑹盟無役不往蕞爾之邦順天者存亦可謂善保小國矣至伯陽即位納樂大心起釁於宋衛靈公好軍旅間嵗伐之宋乘其敝而㝷兵無已於是圍而入焉執伯陽以歸傳曰曹人背晉而奸宋宋人伐之晉人不救以迄于亡故春秋恥之然以時考之晉霸絶矣自救不暇又焉庇曹曹人不修厥政而辯言是聽田弋是崇孫彊一用宗祀忽諸彼叔振鐸之夢豈不欲引曹之祀哉乃負羈不用而乘軒三百欣時功髙而其子奔亡德之不建君子知曹祚之不長也有自來矣左傳事緯卷十
