body:
  text: 左傳事緯卷六靈璧知縣馬驌撰齊靈滅萊襄二年齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還君子是以知齊靈公之為靈也齊侯使諸姜宗婦来送塟召莱子萊子不㑹故晏弱城東陽以偪之六年十一月齊侯滅萊萊恃謀也於鄭子國之来聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傅於堞及把桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻莱宗器于襄宫晏弱圍棠十一月丙辰而滅之遷莱于郳髙厚崔杼定其田春秋書例凡滅同姓者書名而齊襄之滅紀齊靈之滅莱皆不書名豈聖人作經特嚴于諸姬至異姓相滅遂不足論與自恵公與魯伐莱同事不謀嗣是以來蓄憾未已葢欲廣我疆域不至瀦寫其宫室經畫其土地不止也及乎靈公謀莱鷙矣釁挑於送塟而禍深於圍棠惜哉小國不造宻邇彊鄰環城逾嵗而莫之救也無霸也夫晉悼公奮志有為文襄是繼而雞澤以後凡厥㑹盟齊惟使世子光從之靈皆不預至伐莱之役獨親行焉彼固雄長一方其輕晉久矣既輕晉寧恤莱哉數年之後究竟叛晉嗚呼有自来矣鄭僖之弑襄五年夏鄭子國來聘通嗣君也七年鄭僖公之為大子也於成之十六年與子罕適晉不禮焉又與子豐適楚亦不禮焉及其元年朝于晉子豐欲愬諸晉而廢之子罕止之及將㑹于鄬子駟相又不禮焉侍者諫不聼又諌殺之及鄵子駟使賊夜弑僖公而以瘧疾赴於諸侯簡公生五年奉而立之八年鄭羣公子以僖公之死也謀子駟子駟先之夏四月庚辰辟殺子狐子熙子侯子丁孫擊孫惡出奔衛弑而書卒吾以春秋之義獨不許焉夫諡法小心畏忌曰僖而多行無禮以自及也寧有是乎子駟為政多殺公子豈惡之者衆不幸而公卒于外好事者因以誣之與立乎定哀以傳文襄所聞異辭矣聖人傳疑而寧書卒左氏傳疑而遂書弑此聖經之所以不可及哉王室昏齊定王宣六年夏定王使子服求后于齊冬召桓公逆王后于齊靈王襄十二年靈王求后于齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后于諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昏王使隂里結之十四年王使劉定公賜齊侯命曰昔伯舅太公右我先王股肱周室師保萬民世胙大師以表東海王室之不壊繄伯舅是賴今余命女環兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命十五年官師從單靖公逆王后于齊卿不行非禮也齊自僖襄以後世昏于魯而恵靈以來世昏於王盖昏姻之􅃂諸侯莫比詩曰豈其娶妻必齊之姜明齊姜之貴而且美也迨乎景公而繼室以媚晉出涕以女吳専事大國此殆以昏姻託重於人矣何足取哉季孫宿専政成十八年己丑公薨于路寝言道也丁未塟我君成公書順也襄元年冬衛子叔晉知武子来聘禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也二年夏齊姜薨初穆姜使擇美檟以自為櫬與頌琴季文子取以塟君子曰非禮也禮無所逆婦飬姑者也虧姑以成婦逆莫大焉詩曰其惟哲人告之話言順徳之行季孫於是為不哲矣且姜氏君之妣也詩曰為酒為醴烝畀祖妣以洽百禮降福孔偕穆叔聘于宋通嗣君也三年公如晉始朝也夏盟于長樗孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表宻邇仇讎寡君將君是望敢不稽首四年穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜秋定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為己樹六檟於蒲圃東門之外匠慶請木季孫曰畧匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎五年季文子卒大夫入歛公在位宰庀家器為塟備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎七年南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費秋季武子如衛報子叔之聘且辭緩報非貳也九年公送晉侯晉侯以公宴于河上問公年季武子對曰㑹于沙隨之嵗寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉禮也十一年春季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乗季氏使其乗之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍十五年春宋向戌来聘且尋盟見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間二十年冬季武子如宋報向戌之聘也禇師段逆之以受享賦常棣之七章以卒宋人重賄之歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也二十九年公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見䟽也公問公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭强之而後受公欲無入榮成伯賦式㣲乃歸五月公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非徳賞也且無使季氏塟我范獻子来聘拜城把也公享之展莊叔執幣射者三耦公臣不足取於家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦季孫行父以成季之孫二世相魯死之日人稱其忠而君子猶有譏焉曰仲遂殺適而不能禁僑如長亂而不能弭逐東門以償已怨戰齊頃以釋私恥惡得為賢然而成公之世公欲從楚行父執其不可其謀國未嘗不正也沙隨往㑹先戒宫守其防患未嘗不宻也身死而家無餘財春秋姑節取焉曰是尚能守臣節以克忠公家者也襄之嗣立甫四嵗耳齊姜公之適母也定姒公之生母也相繼不禄塟禮有缺是時行父尚為正卿耄昏鮮終君子惡之而素行可錄左氏未肯以一𤯝沒焉及乎武子公室卑矣利君之㓜政柄下移城費邑而都大於國作三軍而兵歸於家取卞之役㡬成乾侯之先轍庶其之納身為盗賊之淵藪政逮大夫實始于此漸靡日甚其何所底止乎昔周公之封於曲阜也地方七百里故書曰三郊三遂則魯舊有三軍矣至僖公克復舊宇猶曰公車千乗公徒三萬皆大國之軍賦也宣成以來軍政隳壊諸卿之私乗反多於公家之車數至武子而欲専一軍之權毁私以補公其實欲統軍政也嗣是以降征討之柄悉歸私室而公臣至不能三耦昭公五年又舍中軍季氏遂盡征之君亦何能與聞哉其始也窺襄公之㓜弱而分其勢其卒也乗昭公之童心而總其權怙惡無君盖至季孫宿而極矣仲尼作史深痛公室之不振也故入鄆必書城成必書意如嗣政益成鴟張之形稠父不度遂應鸜跦之䜟謂非孫宿之肇其端乎傳曰季武子死曾點倚其門而歌非無因也宋子罕之賢襄六年宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱于朝平公見之曰司武而梏于朝難以勝矣遂逐之夏宋華弱来奔司城子罕曰同惡異罰非刑也専戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰㡬日而不我從子罕善之如初九年春宋災樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗廵丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閲討右官官庀其司向戌討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯儆宫二師令四鄉正敬享祝宗用馬于四墉祀盤庚于西門之外晉侯問於士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食于心或食於咮以出内火是故咮為鶉火心為大火陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火是以日知其有天道也公曰可必乎對曰在道國亂無象不可知也十五年宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寳也故敢獻之子罕曰我以不貪為寳爾以玉為寳若以與我皆䘮寳也不若人有其寳稽首而告曰小人懐璧不可以越鄉納此以請死也子罕寘諸其里使玉人為之攻之富而後使復其所十七年春宋莊朝伐陳獲司徒卬卑宋也宋皇國父為大宰為平公築臺妨于農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執扑以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也二十九年鄭子展卒子皮即位於是鄭饑而未及麥民病子皮以子展之命餼國人粟户一鍾是以得鄭國之民故罕氏常掌國政以為上卿宋司城子罕聞之曰鄰於善民之望也宋亦饑請於平公出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸宋無饑人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎民之歸也施而不徳樂氏加焉其以宋升降乎宋之設官以右師為尊司城秩居六卿之五而子罕為政豈非以其賢乎管子之位不叅於髙國而齊桓用之以霸樂喜之官不加于華向而宋國賴之以安書曰不惟其官惟其人春秋之君其諸猶有得先王之遺意者與鄭西宫純門之變襄十年初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭子駟抑尉止曰爾車非禮也遂弗使獻初子駟為田洫司氏堵氏侯氏子師氏皆䘮田焉故五族羣聚不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西宫之朝殺子駟子國子耳刼鄭伯以如北宫子孔知之故不死書曰盗言無大夫焉子西聞盗不儆而出尸而追盗盗入於北宫乃歸授甲臣妾多逃器用多䘮子産聞盗為門者庀羣司閉府庫慎閉藏完守備成列而後出兵車十七乗尸而攻盗於北宫子蟜帥國人助之殺尉止子師僕盗衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋子孔當國為載書以位序聽政辟大夫諸司門子不順將誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯専欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎専欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定十五年鄭尉氏司氏之亂其餘盗在宋鄭人以子西伯有子産之故納賂于宋以馬四十乗與師茷師慧三月公孫黑為質焉司城子罕以堵女父尉翩司齊與之良司臣而逸之託諸季武子武子寘諸卞鄭人醢之三人也師慧過宋朝將私焉其相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乗之相易淫樂之矇必無人焉故也子罕聞之固請而歸之十二月鄭人奪堵狗之妻而歸諸范氏十八年鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圖之其若之何子庚嘆曰君王其謂午懐安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭次于魚陵右師城上􅁄遂涉頴次于旃然蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁右回梅山侵鄭東北至于蟲牢而反子庚門于純門信于城下而還涉于魚齒之下甚雨及之楚師多凍役徒㡬盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功叔向曰在其君之徳也十九年鄭子孔之為政也専國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西率國人伐之殺子孔而分其室書曰鄭殺其大夫専也子然子孔宋子之子也士子孔圭媯之子也圭媯之班亞宋子而相親也士子孔亦相親也僖之四年子然䘚簡之元年士子孔卒司徒孔實相子革子良之室三室如一故及於難子革子良出奔楚子革為右尹鄭人使子展當國子西聼政立子産為卿自古覆亡之禍未有無故而然者也子孔之罪固云然矣然而三子亦皆有焉方楚囊之討鄭也子駟子國子耳欲從楚子孔子蟜子展欲待晉夫勞中國以長戎狄子駟三人之尤也未㡬而諸侯雲集力不克支朝晉暮楚二竟煩騷蕞爾鄭國而堪啓兹四五年之弗寧乎乃曰吾盟固云唯彊是從使國人計困於從戎霸主役罷於奔命是豈為國之長慮哉師競兆災猶弗知儆大敵在側而方記小忿以相爭舊怨偕作三卿忽諸謂非三子之稔惡以自及耶駟國之子幸克戡難自非然者内外交亂在國必喪在家必亡子孔滅宗之禍恐先嘗也善哉子産之謀也務焚書以安衆内變先弭既而納賂誅盗無俾遺種君子曰鄭猶有政刑焉使諸侯悉能如是尚奚有弑君而擁髙位竊邑而奔與國者乎子孔嗣位専違輿情為載書而諸司不順執國權而同列交猜雖處髙位危於累丸矣純門之師適値其變豈其内懼于西宫隱盗之罪遂至為先縠召秋之舉歟諸大夫從而和之皆曰大夫也是黨尉止以作難而又起楚午以危國者也後世之讀春秋者或曰信矣或曰無矣事雖不可知要知執國法以定辟彼亦不能辭也夫三子即不皆黜車奪田之愆而不可謂有安國消患之謀子孔即不皆與西宫純門之謀而不可謂無剛愎怙寵之失騑與發輙之殺以盗也嘉之殺以國也春秋盖交譏之楚滅庸舒文十年厥貉之㑹麇子逃歸十一年春楚子伐麇成大心敗麇師于防渚潘崇復伐麇至于錫穴十二年楚令尹大孫伯卒成嘉為令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢十四年楚莊王立子孔潘崇將襲羣舒使公子燮與子儀守而伐舒蓼二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出將如商宻廬戢􅀺及叔麋誘之遂殺鬭克及公子燮初鬭克囚于秦秦有殽之敗而使歸求成成而不得志公子燮求令尹而不得故二子作亂十六年楚大饑戎伐其西南至于阜山師于大林又伐其東南至于陽丘以侵訾枝庸人帥羣蠻以叛楚麇人率百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪髙蒍賈曰不可我能往冦亦能往不如伐庸夫麇與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食次于句澨使廬戢􅀺侵庸及庸方城庸人逐之囚子揚窻三宿而逸曰庸帥衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯禆儵魚人實逐之庸人曰楚不足與戰矣遂不設備楚子乗驛㑹師于臨品分為二隊子越自石溪子貝自􅌇以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸宣八年楚為衆舒叛故伐舒蓼滅之楚子彊之及滑汭盟吳越而還成十七年舒庸人以楚師之敗也道吳人圍巢伐駕圍釐虺遂恃吳而不設備楚公子槖師襲舒庸滅之襄二十四年吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹夀與師祁犁讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不貳吾又何求若猶叛我無辭有庸乃還二十五年舒鳩人卒叛楚令尹子木伐之及離城吳人救之子木遽以右師先子彊息桓子捷子駢子盂帥左師以退吳人居其閒七日子彊曰久將墊隘隘乃禽也不如速戰請以其私卒誘之簡師陳以待我我克則進奔則亦視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍簡師㑹之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩楚子以滅舒鳩賞子木辭曰先大夫蒍子之功也以與蒍掩中國之患莫大于不恤小弱而輕棄逺國敵勢孔張蠶食日甚霸主所由失其權也庸與羣舒接楚之壤皆能鳩聚與國以藩屛諸夏舒在楚東庸在楚西文公之世咸與楚搆舒方動則宗巢輔之庸方動則麇濮與羣蠻輔之北顧不遑肘腋復起穆莊之際亦荆楚多事之㑹哉夫舒為偃姓臯陶之苗裔也種類繁多散處江淮詩曰荆舒是懲則舒舊黨楚矣庸西方之逺國也武王伐紂誓及庸濮則庸舊屬周矣庸與中國之絶盖起于平王東遷之餘舒勢之分盖始於徐人取舒之後中國絶則勢孤故伺隙而後動庸乗楚饑申息不啟而中國晏然弗聞焉是則輕棄逺國之患也勢分則謀攜故輕舉以取敗羣舒叛楚同歸滅亡而中國晏然弗聞焉是則不恤小弱之患也乃厥貉甫㑹子平就執蒍賈决䇿轉敗為功秦巴通而西國協謀吳越盟而東夷效順楚子由是徜徉而驅諸夏尚誰能議其後耶迨及共康舒勢益㣲即當鄢陵新敗舟師無功之時楚猶能一再舉而殲庸鳩焉自是舒且無遺種矣嗚呼中國不能恤舒而使借庇于吳吳人庇舒而實亡舒亦焉用彼盟主哉衛孫寗廢立成七年衞定公惡孫林父冬孫林父出奔晉衛侯如晉晉反戚焉十四年春衛侯如晉晉侯强見孫林父焉定公不可夏衛侯既歸晉侯使郤犫送孫林父而見之衞侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈於亡乎君其􅃘之安民而宥宗卿不亦可乎衞侯見而復之衞侯有疾使孔成子寗惠子立敬姒之子衎以為大子冬十月衛定公卒夫人姜氏既哭而息見大子之不哀也不内酌飲歎曰是夫也將不唯衛國之敗其必始於未亡人嗚呼天禍衞國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼孫文子自是不敢舍其重器於衞盡寘諸戚而甚善晉大夫襄七年衛孫文子来聘且拜武子之言而尋孫桓子之盟公登亦登叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衞君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇謂從者也衡而委蛇必折十四年衞獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使大師歌巧言之卒章大師辭師曹請為之初公有嬖妾使師曺誨之琴師曺鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近闗出公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之四月己未子展奔齊公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒于阿澤鄄人執之初尹公佗學射於庾公差庾公差學射於公孫丁二子追公公孫丁御公子魚曰射為背師不射為戮射為禮乎射兩軥而還尹公佗曰子為師我則逺矣乃反之公孫丁授公轡而射之貫臂子鮮從公及竟公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪公使厚成叔弔于衞曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔以同盟之故使瘠敢私於執事曰有君不弔有臣不敏君不赦宥臣亦不帥職增淫發洩其若之何衛人使大叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼弃之以為君憂君不忘先臣之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺厚孫歸復命語臧武仲曰衞君其必歸乎有大叔儀以守有母弟鱄以出或撫其内或營其外能無歸乎齊人以郲寄衞侯及其復也以郲糧歸右宰榖從而逃歸衛人將殺之辭曰余不説初矣余狐裘而羔䄂乃赦之衛人立公孫剽孫林父寗殖相之以聽命于諸侯衛侯在郲臧紇如齊唁衞侯衞侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道臧孫説謂其人曰衞君必入夫二子者或輓之或推之欲無入得乎師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子盖之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之貳使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有貳宗士有朋友庶人工商皂𨽻牧圉皆有親䁥以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父子兄弟以補察其政史為書瞽為詩工誦箴諫大夫規誨士𫝊言庶人謗商旅于市百工獻藝故夏書曰遒人以木鐸狥于路官師相規工執藝事以諫正月孟春於是乎有之諫失常也天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣晉侯問衛故於中行獻子對曰不如因而定之衞有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎冬㑹於戚謀定衛也十七年衛孫蒯田於曹隧飲馬于重丘毁其瓶重丘人閉門而訽之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹取重丘曹人愬于晉十八年夏晉人執衛行人石買於長子執孫蒯於純畱為曹故也十九年衛石共子卒悼子不哀孔成子曰是謂蹷其本必不有其宗二十年衞寗惠子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寗殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不来食矣悼子許諾惠子遂卒二十五年晉侯使魏舒宛沒逆衛侯將使衛與之夷儀崔子止其帑以求五鹿衛獻公入于夷儀衛獻公自夷儀使與甯喜言甯喜許之大叔文子聞之曰嗚乎詩所謂我躬不説皇恤我後者甯子可謂不恤其後矣將可乎哉殆必不可君子之行思其終也思其復也書曰慎始而敬終終以不困詩曰夙夜匪懈以事一人今甯子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉二十六年衛獻公使子鮮為復辭敬姒强命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與甯喜言甯喜曰必子鮮在不然必敗故公使子鮮子鮮不獲命於敬姒以公命與甯喜言曰茍反政由甯氏祭則寡人甯喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近闗出告右宰榖右宰榖曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以貳榖曰我請使焉而觀之遂見公于夷儀反曰君淹恤在外十二年矣而無憂色亦無寛言猶夫人也若不已死無日矣悼子曰子鮮在右宰榖曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以已孫文子在戚孫嘉聘於齊孫襄居守二月庚寅甯喜右宰榖伐孫氏不克伯國傷甯子出舍於郊伯國死孫氏夜哭國人召甯子甯子復攻孫氏克之辛夘殺子叔及大子角書曰甯喜弑其君剽言罪之在甯氏也孫林父以戚如晉書曰入于戚以叛罪孫氏也臣之祿君實有之義則進否則奉身而退専祿以周旋戮也甲午衛侯入書曰復歸國納之也大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已公至使讓大叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衞國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能貳通内外之言以事君臣之罪二也有二罪敢忘其死乃行從近闗出公使止之衛人侵戚東鄙孫氏愬于晉晉戍茅氏殖綽伐茅氏殺晉戍三百人孫蒯追之弗敢擊文子曰厲之不如遂從衛師敗之圉雍鉏獲殖綽復愬于晉晉人為孫氏故召諸侯將以討衞也夏中行穆子来聘召公也六月公㑹晉趙武宋向戌鄭良霄曹人于澶淵以討衞疆戚田取衞西鄙懿氏六十以與孫氏趙武不書尊公也向戌不書後也鄭先宋不失所也於是衛侯㑹之晉人執甯喜北宫遺使女齊以先歸衞侯如晉晉人執而囚之於士弱氏秋七月齊侯鄭伯為衞侯故如晉晉侯兼享之晉侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不貳也國子使晏平仲私於叔向曰晉君宣其明德於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告晉侯晉侯言衛侯之罪使叔向告二君國子賦轡之柔矣子展賦將仲子兮晉侯乃許歸衞侯叔向曰鄭七穆罕氏其後亡者也子展儉而壹鄭伯歸自晉使子西如晉聘辭曰寡君来煩執事懼不免於戾使夏謝不敏君子曰善事大國衛人歸衛姫于晉乃釋衛侯君子是以知平公之失政也二十七年衛甯喜専公患之公孫免餘請殺之公曰㣲甯子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻甯氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻甯氏殺甯喜及右宰榖尸諸朝石惡將㑹宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟於河託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰愬乎吾不可以立於人之朝矣終身不仕公喪之如税服終身公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也臣弗敢聞且甯子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰大叔儀不貳能贊大事君其命之乃使文子為卿二十八年衛人討甯氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀禮也昭七年秋八月衛襄公卒晉大夫言於范獻子曰衞事晉為睦晉不禮焉庇其賊人而取其地故諸侯貳詩曰鶺鴒在原兄弟急難又曰死喪之威兄弟孔懐兄弟之不睦於是乎不弔况逺人誰敢歸之今又不禮於衞之嗣衛必叛我是絶諸侯也獻子以告韓宣子宣子説使獻子如衛弔且反戚田衛齊惡告喪于周且請命王使成簡公如衞弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢􅁯髙圉亞圉孫氏以衛武之裔為國正卿良父執政積有年嵗其子林父繼之世掌國權驕恣無上定公惡其専也林父於是懐私邑以出奔既又挟大國以求復長惡藐君盖自定公之世而已極矣乃甯殖以武子之孫賢者之後而専國不臣比於林父父子弑逆宗祀忽諸是可不為大哀耶夫衛獻無道居喪不慼林父聞之而寘其重器于私邑懐貳心以事君奚復能乆射鴻小失用搆釁端巧言偶歌􅂺謀廢立且公之出也兵由孫氏殺公子而敗公徒原野交鋒有若敵國試問之殖殖固未與共也雖名在諸侯之䇿孫甯同誅若論首惡端歸林父甯氏於此其在林父之術中乎然而有悔心矣既偕立剽身難悔禍瀕死戒子務期掩惡曰若能納君則吾子也否則鬼不来食矣其辭懇切甯喜聼焉子承父命背剽迎衎再犯大逆志盖先慝止知父言之可從不顧弑君之乖義然猶曰殤之賊獻之勲也彼林父何人耶奉殤不終讐獻不忘據邑叛國終無悛志臣而不臣至此其蔑以加哉乃獻公之於甯喜也惡其専偪􅂺不能􅃘晉殺里克鄭殺傅瑕方之扵此若出一轍而孫氏獨洋洋滿志坐享懿氏之六十奏樂擊鐘無所顧慮澶淵之㑹獻公竟無一言以祈剪滅焉子鱄致怨而託木門石惡懼禍而適鄰國母弟之賢忠功之𦙍曽不能安享其位縱奸宄而黜忠良其誰服焉雖然孫氏之不死總由晉庇之也昔林父執政事晉惟堅而結晉之大夫尤厚鞌之戰則從郤克矣咎如之伐則從荀庚矣且其初出奔也以戚屬晉歸衛以後晉厲為㑹則盟于戚晉悼謀鄭則㑹于戚城虎牢則㑹于戚通吴則㑹于戚以孫氏之食采忽為諸侯之孔道無非炫燿寵靈以震動國君既而逐獻立殤晉為之㑹獻入出奔晉為之主庇賊受地為逋逃主凡晉之君卿大夫皆孫氏黨也獻公何能問乎晉平公既不能納獻又聽林父而執衛侯是再舛也何以為霸哉殖喜無君其惡一也殖附晉則親之喜背晉則執之孫寗無君其惡一也林父附晉則親之喜背晉則執之征討不明惟行私意晉之於人國也罪其不附已者而已矣世與邾莒之怨附邾事僖二十一年任宿須句顓􅁷風姓也實司大皥與有濟之祀以服事諸夏邾人滅須句須句子来奔因成風也成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皥濟而修祀紓禍也二十二年春伐邾取須句反其君焉禮也邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄氷又曰敬之敬之天惟顯思命不易哉先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎弗聽八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門三十三年公伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾文公七年春公伐邾間晉難也三月甲戌取須句寘文公子焉非禮也十三年邾文公卜遷于繹史曰利於民而不利於君邾子曰茍利于民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命十四年邾文公之卒也公使弔焉不敬邾人来討伐我南鄙故惠伯伐邾宣公四年春公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮十年師伐邾取繹冬子家如齊伐邾故也十八年秋邾人戕鄫子于鄫凡自虐其君曰弑自外曰戕成八年聲伯如莒逆也十八年八月邾宣公来朝即位而来見也襄元年九月邾子来朝禮也四年冬公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之宻邇於仇讐而願固事君無失官命鄫無賦扵司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之冬十月邾人莒人伐鄫臧紇救鄫侵邾敗于狐駘國人逆喪者皆髽魯於是乎始髽國人誦之曰臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾五年春公至自晉穆叔覿鄫大子于晉以成屬鄫書曰叔孫豹鄫大子巫如晉言比諸魯大夫也穆叔以屬鄫為不利使鄫大夫聽命于㑹六年莒人滅鄫鄫恃賂也冬穆叔如邾聘且修平晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命八年莒人伐我東鄙以疆鄫田十年莒人間諸侯之有事也故伐我東鄙十二年春莒人伐我東鄙圍台季武子救台遂入鄆取其鐘以為公盤十五年秋邾人伐我南鄙使告于晉晉將為㑹以討邾莒晉侯有疾乃止冬晉悼公卒遂不克㑹鄭公孫夏如晉奔喪子蟜送塟十六年春塟晉悼公平公即位羊舌􅆄為傅張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服修官烝于曲沃警守而下㑹于溴梁命歸侵田以我故執邾宣公莒犁比公且曰通齊楚之使十七年冬邾人伐我南鄙為齊故也十九年春諸侯還自沂上盟于督揚曰大毋侵小執邾悼公以其伐我故遂次于泗上疆我田取邾田自漷水歸之於我二十年春及莒平孟莊子㑹莒人盟于向督揚之盟故也邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之二十一年春公如晉拜師及取邾田也邾庶其以漆閭丘来奔季武丁以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司冦將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而来外盜使紇去之將何以能庶其竊邑於邾以来子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皁牧輿馬其小者衣裳劍帶是賞盜也賞而去之其或難焉紇也聞之在上位者灑濯其心壹以待人軌度其信可明徴也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功將謂由已壹也信由已壹而後功可念也庶其非卿也以地来雖賤必書重地也二十八年邾悼公来朝時事也昭元年季武子伐莒取鄆莒人告於㑹楚告於晉曰㝷盟未退而魯伐莒凟齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其踁曰貨以藩身子何愛焉叔孫曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之為人之有牆以蔽惡也牆之隙壊誰之咎也衞而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圗國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也若子之羣吏處不辟汚出不逃難其何患之有患之所生汚而不治難而不守所由来也能是二者又何患焉不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪又賞其賢諸侯其誰不欣焉望楚而歸之視逺如邇疆場之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可壹于是乎虞有三苗夏有觀扈商有姺邳周有徐奄自無令王諸侯逐進狎主齊盟其又可壹乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辯焉吴濮有釁楚之執事豈其顧盟莒之疆事楚勿與知諸侯無煩不亦可乎莒魯争鄆為日久矣茍無大害於其社稷可無亢也去煩宥善莫不競勸子其圖之固請諸楚楚人許之乃免叔孫叔孫歸曽夭御季孫以勞之旦及日中不出曽夭謂曽阜曰旦及日中吾知罪矣魯以相􅃘為國也􅃘其外不􅃘其内焉用之阜曰數月於外一旦於是庸何傷賈而欲贏而惡囂乎阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之四年九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而来故曰取凡克邑不用師徒曰取五年夏莒牟夷以牟婁及防兹来奔牟夷非卿而書尊地也莒人愬于晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公秋七月公至自晉莒人来討不設備戊辰叔弓敗諸蚡泉莒未陳也六年夏季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也茍免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為驩也對曰寡君猶未敢况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨十年秋七月平子伐莒取郠獻俘始用人于亳社臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義魯無義詩曰德音孔昭視民不佻佻之謂甚矣而壹用之將誰福哉十一年孟僖子㑹邾莊公盟于祲祥修好禮也泉丘人有女夢以其帷幕孟氏之廟遂奔僖子其僚從之盟于清丘之社曰有子無相棄也僖子使助薳氏之簉反自祲祥宿于薳氏生懿子及南宫敬叔於泉丘人其僚無子使字敬叔十八年六月鄅人藉稲邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舍其女十九年鄅夫人宋向戌之女也故向寧請師二月宋公伐邾圍蟲三月取之乃盡歸鄅俘邾人郳人徐人㑹宋公乙亥同盟于蟲二十一年夏晉士鞅来聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢二十三年邾人城翼還將自離姑公孫鉏曰魯將御我欲自武城還循山而南徐鉏丘弱茅地曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師獲鉏弱地邾人愬于晉晉人来討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也晉人使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之叔孫聞之去衆與兵而朝士彌牟謂韓宣子曰子弗良圖而以叔孫與其讐叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館士伯聽其辭而愬諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以芻蕘之難從者之病將館子於都叔孫旦而立期焉乃館諸箕舍子服昭伯於他邑范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其牆屋去之如始至公為叔孫故如晉及河有疾而復二十四年晉士彌牟逆叔孫于箕叔孫使梁其踁待於門内曰余左顧而欬乃殺之右顧而笑乃止叔孫見士伯士伯曰寡君似為盟主之故是以乆子不腆敝邑之禮將致諸從者使彌牟逆吾子叔孫受禮而歸二月婼至自晉尊晉也三十一年冬邾黑肱以濫来奔賤而書名重地故也君子曰名之不可不慎也如是夫有所有名而不如其已以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回不為義疚或求名而不得㦯欲盖而名章懲不義也齊豹為衛司冦守嗣大夫作而不義其書為盗邾庶其莒牟夷邾黒肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以徼大利而無名貪冒之民將寘力焉是以春秋書齊豹曰盗三叛人名以懲不義數惡無禮其善志也故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之春秋之際小國名見者邾莒為彊隱公元年公及邾盟于蔑七年而伐邾二年莒人入向無駭入極八年而盟莒魯於邾也先盟而後戰於莒也先戰而後盟二國之勢俱非下魯干戈日煩要盟不信此魯與邾莒之爭世相㝷也北杏之㑹邾獲進爵猶是邾儀父也在位永久暮年從霸其能受命也愈於莒子矣僖之元年偃敗邾師酈獲莒拏夫邾既同盟莒亦比年結好一旦而交與我搆何哉邾匿姜氏莒匿慶父二國黨惡其敗其獲春秋之所大也自是以後世讐不息取須句戰升陘則邾讐魯矣伐莒取向則莒讐魯矣兩國伐鄫戰於狐駘則邾莒交讎魯矣邾固無道五十年間一用鄫子一戕鄫子邾鄫世怨也乗釁必動莒何為哉將助邾以撓魯也鄫不滅於邾而滅於莒晉不討莒而討魯悼公霸令何其謬也莒益得志比嵗興師魯滋不堪控于大國晉平新立而㑹溴梁二君俱執魯之志其亦稍快愉哉然是㑹也命歸侵田也自春秋以来魯之取於邾亦多矣僖公一舉而訾婁入魯文公一舉而須句入魯宣公一舉而繹又入魯今魯在所損乎在所益乎若割地以賂邾邾復何求乃平公初立伐我南鄙邾復不逞宜其督揚之再辱也莒既守盟邾亦来朝數年之内二國與魯式相好也然自是以降魯之政逮於大夫矣政在公則其爭在上政在私則其爭在下鄆近於費季氏所急而莒魯之怨復起盗竊漆閭季氏受之而邾魯之怨復起於是既利其土復蓄其賊莒之牟夷邾之庶其畀我都邑黒肱踵接而至魯盡納之魯有一季孫邾莒之逋逃藪也邾莒何堪哉虢之㑹莒人愬而叔孫豹被執平丘之㑹莒人再愬而季孫意如被執武城之役邾人愬而叔孫婼又被執幸有兩叔孫再不辱命意如逃歸大貽國恥䜛慝𢎞多晉之霸討亦豈能終乎春秋小國之君好兵怙彊邾莒實甚然邾猶修禮間復来朝莒則犁比著丘以来直侈然與魯為敵矣君既黷武國亦多難故二百餘年之間其君七見而弑於内者二奔於外者三其大夫五見而殺於内者一奔於外者二庚輿而下微不復見是又其弗敢望邾者也楚五令尹代政襄十四年楚子嚢還自伐吴卒將死遺言謂子庚必城郢君子謂子囊忠君薨不忘増其名將死不忘衛社稷可不謂忠乎忠民之望也詩曰行歸于周萬民所望忠也十五年楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子槖師為右司馬公子成為左司馬屈到為莫敖公子追舒為箴尹屈蕩為連尹飬由基為宫廐尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心詩云嗟我懐人寘彼周行能官人也王及公侯伯子男甸采衞大夫各居其列所謂周行也二十一年夏楚子庚卒楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而牀焉重繭衣裘鮮食而寝楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹二十二年楚觀起有􅃂於令尹子南未益禄而有馬數十乗楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之洩命重刑臣亦不為王遂殺子南於朝轘觀起於四竟子南之臣謂棄疾請徙子尸於朝曰君臣有禮唯二三子三日棄疾請尸王許之既塟其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾弗􅃘也遂縊而死復使薳子馮為令尹公子齮為司馬屈建為莫敖有􅃂於薳子者八人皆無禄而多馬他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有􅃂於子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也知我者如夫子則可不然請止辭八人者而後王安之二十五年楚薳子馮卒屈建為令尹屈蕩為莫敖楚蒍掩為司馬子木使庀賦數甲兵甲午蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃量入修賦賦車籍馬賦車兵徒卒甲楯之數既成以授子木禮也二十六年初楚伍參與蔡大師子朝友其子伍舉與聲子相善也伍舉娶於王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭遂將奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戌將平晉楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如把梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫與其失善寕其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寕失不經懼失善也商頌有之曰不僣不濫不敢怠皇命于下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死于四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人寘諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譛雍子君與大夫不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老㓜反孤疾二人役歸一人簡兵蒐乗秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳於晉教吳叛楚敎之乗車射御驅侵使其子狐庸為吳行人焉吴於是伐巢取駕克􅁄入州来楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苗以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師熸子反死之鄭叛吴興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶㡬赦余亦弗圗也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒嗚逆之二十七年崔氏之亂申鮮虞来奔僕賃於野以喪莊公冬楚人召之遂如楚為右尹楚康王在位十有五年而令尹五代其政子囊共王之所用也當先王之世伐陳侵宋克有成勞及康王嗣位伐吴之役介胄未釋忽焉云逝社稷是圖志弗良終故君子許其忠焉子庚嗣政號為得人未㡬而卒薳子遜位及子南罹罪復用子馮而子木終繼之焉囊與庚南皆莊王子也薳馮屈建皆公族也中惟追舒暱寵見殺餘四子者克堪卿任夫楚既多材公族尤顯其法則親踈叅用賞罰互行執政者一干國憲􅂺加重典未若魯之三桓晉之六卿世怙其寵政柄於是下移也純門不競子庚息師舒鳩不叛薳子受盟寧惟是狃安習便無意於國者乎伏處觀時動期有濟是文成以来之良籌也有子午子馮秉政於前有子木繼美于後而又来然丹於鄭國復椒舉於晉都濟濟充庭咸稱國士雍雍在列俱有長才列國有賢楚實錄之豈謂楚材晉用哉夫康王楚之弱主也惟能官人故諸臣咸得其用究能與中國弭兵南北合一兩霸并雄舉穆荘諸王以来數世所難圗者一朝而得之雖時勢不同若是乎賢者之有益於國也齊靈莊叛晉襄十四年范宣子假羽毛於齊而弗歸齊人始貳十五年夏齊侯圍成貳於晉故也於是乎城成郛十六年晉侯與諸侯宴于温使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸於是叔孫豹晉荀偃宋向戌衛寗殖鄭公孫蠆小邾之大夫盟曰同討不庭秋齊侯圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶㡬乎比執事之閒恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻雁之卒章宣子曰匄在此敢使魯無鳩乎十七年齊人以其未得志于我故秋齊侯伐我北鄙圍桃髙厚圍臧紇于防師自陽闗逆臧孫至于旅松郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以抉其傷而死十八年秋齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首隊於前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事於東方則可以逞獻子許諾晉侯伐齊將濟河獻子以朱絲係玉二㲄而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曽臣彪將率諸侯以討焉其官臣偃實先後之茍捷有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬十月㑹于魯濟尋溴梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聽諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乗自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能乆矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乗車者左實右偽以斾先輿曵柴而從之齊侯見之畏其衆也乃脱歸丙寅晦齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁十一月丁卯朔入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬於隘以塞道晉州綽及之射殖綽中肩兩矢夹脰曰止將為三軍獲不止將取其𠂻顧曰為私誓州綽曰有如日乃弛弓而自後縛之其右具丙亦舍兵而縛郭最皆衿甲面縳坐于中軍之鼓下晉人欲逐歸者魯衛請攻險己卯荀偃士匄以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之荻范鞅門于雍門其御追書以戈殺犬于門中孟莊子斬其橁以為公琴己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭范鞅門于揚門州綽門于東閭左驂廹還于東門中以枚數闔齊侯駕將走郵棠大子與郭榮扣馬曰師速而疾畧也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劍斷鞅乃止甲辰東侵及濰南及沂十九年晉侯先歸公享晉六卿于蒲圃賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服賄荀偃束錦加璧乗馬先吴夀夢之鼎荀偃癉疽生痬於頭濟河及著雍病目出大夫先歸者皆反士匄請見弗内請後曰鄭甥可二月甲寅卒而視不可含宣子盥而撫之之曰事吴敢不如事主猶視欒懐子曰其為未卒事於齊故也乎乃復撫之曰主茍終所不嗣事于齊者有如河乃瞑受含宣子出曰吾淺之為丈夫也晉欒魴帥師從衛孫文子伐齊季武子如晉拜師晉侯享之范宣子為政賦黍苖季武子興再拜稽首曰小國之仰大國也如百榖之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月季武子以所得於齊之兵作林鐘而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令徳諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彛器銘其功烈以示子孫昭明徳而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也晉士匄侵齊及榖聞喪而還禮也城西郛懼齊也齊及晉平盟于大隧故穆叔㑹范宣子于柯穆叔見叔向賦載馳之四章叔向曰􅆄敢不承命穆叔歸曰齊猶未也不可以不懼乃城武城二十年夏盟于澶淵齊成故也齊子初聘于齊禮也二十一年㑹于商任錮欒氏也齊侯衛侯不敬叔向曰二君者必不免㑹朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也知起中行喜州綽邢蒯出奔齊皆欒氏之黨也樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃亦子之勇也齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴莊公為勇爵殖綽郭最欲與焉州綽曰東閭之役臣左驂廹還於門中識其枚數其可以與於此乎公曰子為晉君也對曰臣為𨽻新然二子者譬於禽獸臣食其肉而寝處其皮矣二十二年冬㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼二十三年秋齊侯伐衛先驅榖榮御王孫揮召揚為右申驅成秩御莒恒申鮮虞之傅摯為右曹開御戎晏父戎為右貳廣上之登御邢公盧蒲癸為右啓牢成御襄罷師狼蘧疏為右胠商子車御侯朝桓跳為右大殿商子㳺御夏之御冦崔如為右燭庸之越駟乗自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不徳而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聼陳文子見崔武子曰將如君何武子曰吾言於君君勿聽也以為盟主而利其難羣臣若急君於何有子姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也况以惡乎齊侯遂伐晉取朝歌為二隊入孟門登大行張武軍於熒庭戍郫邵封少水以報平隂之役乃還趙勝帥東陽之師以追之獲晏氂八月叔孫豹帥師救晉次于雍榆禮也齊侯還自晉不入遂襲莒門于且于傷股而退明日將復戰期于夀舒把殖華還載甲夜入且于之隧宿於莒郊明日先遇莒子於蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼔之從而伐之獲把梁莒人行成齊侯歸遇把梁之妻于郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室二十四年齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期齊社蒐軍實使客觀之陳文子曰齊將有冦吾聞之兵不戢必取其族秋齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒侵介根㑹于夷儀將以伐齊水不克冬楚子伐鄭以救齊門于東門次于􅁄澤諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉子大叔戒之曰大國之人不可與也對曰無有衆寡其上一也大叔曰不然部婁無松栢二子在幄坐射犬于外既食而後食之使御廣車而行已皆乗乗車將及楚師而後從之乗皆踞轉而鼔琴近不告而馳之皆取胄於櫜而胄入壘皆下搏人以投收禽挟囚弗待而出皆超乗抽弓而射既免復踞轉而鼔琴曰公孫同乗兄弟也胡再不謀對曰曩者志入而已今則怯也皆笑曰公孫之亟也楚子自􅁄澤還使薳啓疆帥師送陳無宇二十五年晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公説使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三君之大夫百官之正長師旅及處守者皆有賂晉侯許之使叔向告于諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣秋七月己巳同盟于重丘齊成故也昭九年孟僖子如齊殷聘禮也晉平公圍齊之役春秋義戰之善者也何善乎爾齊自頃公袁婁受盟以来恪從霸令及靈公嗣位一當晉景之世則從伐鄭者一次當晉厲之世則從伐秦者一從伐鄭者三次當晉悼之世則從伐鄭者四凡有所動皆晉命也沙隨柯陵雞澤齊侯未嘗不親至也于戚于戲于柤于亳北于蕭魚世子光未嘗不同盟也虚朾邢丘諸㑹國卿大夫未嘗不馳驅也齊晉匹敵惟期同欲故雖雞澤以来公不親至晉悼亦未肯深責焉伐鄭之役子光先至序先􅅬薛夫五爵之制周有常典自霸者作而或以小國序大國之上則以子男而先伯者有矣至於世子而長國君則自悼公之㑹始焉越禮而躋不問周班晉之於齊何其恭哉兩國世好未嘗興戎乃俄而搆釁魯國不恤同盟四年之間而六伐其鄙四圍其邑盖是時晉悼卒矣中國無霸齊環棄好怙險自逞諸侯莫不共疾於是乎徴㑹致討列國景從未若郤子之修憾於一笑也沈璧誓河大義昭著不啻鳴鼓鐘而揭鞀鐸故春秋之侵伐圍入未嘗書同獨于此書同焉者明其為天下之公惡也四鄙蹂躪國㡬滅亡皆齊侯之自敗耳晉何尤哉士匄再出聞喪而還晉之於齊始終有禮矣莊公即位澶淵受盟嗣立之初棄怨修德豈其感於晉之不伐喪乎然亡脣棄輔雖欲不平其何得耶好勇尚力乗危察釁齊之光固不下于齊之環也商任沙隨漸窺晉隙納叛敗盟興兵復怨遡其初志寧真心與晉同盟哉帥師而伐盟主實春秋之所罕聞也盖自為世子時屢與大國之盟能習諸侯之事故敢肆志而輕霸主料敵制勝自以為恢恢天下雄爾衞郊不寧莒人告變諸侯方貳晉亦何克驟困齊也哉用兵弗戢禍成自焚賊臣市主拊楹罹難氣餒於崔子而力屈於婦人所謂螗蜋捕蟬而黄雀又伺其後其視扣馬進諫抽劍斷鞅時何其前智而後愚耶莊之為莊猶然靈之為靈爾晉欒氏之亡襄二十一年欒桓子娶於范宣子生懐子范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賔通㡬亡室矣懐子患之祁懼其討也愬諸宣子曰盈將為亂以范氏為死桓主而専政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而専之吾父死而益富死吾父而専於國有死而已吾蔑從之矣其謀如是懼害於主吾不敢不言范鞅為之徵懐子好施士多歸之宣子畏其多士也信之懐子為下卿宣子使城著而遂逐之秋欒盈出奔楚宣子殺箕遺黄淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔熊囚伯華叔向籍偃人謂叔向曰子離於罪其為不知乎叔向曰與其死亡若何詩曰優哉㳺哉聊以卒嵗知也樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫室老聞之曰樂王鮒言於君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讐内舉不失親其獨遺我乎詩曰有覺徳行四國順之夫子覺者也晉侯問叔向之罪於樂王鮒對曰不弃其親其有焉於是祁奚老矣聞之乗馹而見宣子曰詩曰惠我無疆子孫保之書曰聖有謩勳明徵定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今壹不免其身以弃社稷不亦惑乎鯀殛而禹興伊尹放大甲而相之卒無怨色管蔡為戮周公右王若之何其以虎也弃社稷子為善誰敢不勉多殺何為宣子説與之乗以言諸公而免之不見叔向而歸叔向亦不告免焉而朝初叔向之母妬叔虎之母美而不使其子皆諫其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人閒之不亦難乎余何愛焉使往視寢生叔虎美而有勇力欒懐子嬖之故羊舌氏之族及於難欒盈過於周周西鄙掠之辭於行人曰天子陪臣盈得罪於王之守臣將逃罪罪重於郊甸無所伏竄敢布其死昔陪臣書能輸力於王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死於尉氏不敢還矣敢布四體唯大君命焉王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候出諸轘轅二十二年秋欒盈自楚適齊晏平仲言於齊侯曰商任之㑹受命於晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣二十三年晉將嫁女于吴齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何貳之有盈出徧拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之趙氏以原屏之難怨欒氏韓趙方睦中行氏以伐秦之役怨欒氏而固與范氏和親知悼子少而聽於中行氏程鄭嬖於公唯魏氏及七輿大夫與之樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣公有姻䘮王鮒使宣子墨縗冒經二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乗將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乗持帶遂超乗右撫劍左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃初斐豹𨽻也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隠而待之督戎踰入豹自後擊而殺之范氏之徒在臺後欒氏乗公門宣子謂鞅曰矢及君屋死之鞅用劍以帥卒欒氏退攝車從之遇欒樂曰樂免之死將訟女於天樂射之不中又注則乗槐本而覆或以㦸鉤之㫁肘而死欒魴傷欒盈奔曲沃晉人圍之晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋書曰晉人殺欒盈不言大夫言自外也二十四年春穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世禄非不朽也魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之大上有立德其次有立功其次有立言雖久不廢此之謂不朽若夫保姓受氏以守宗祊世不絶祀無國無之祿之大者不可謂不朽士鞅之論欒氏也謂武子之徳報在黶欒黶之汰報在盈及盈之身而書之所施已沒黶之怨實章誠如是也書及孫盈兩世好施而中惟一黶弗克負荷竟無逭於家之亡族之滅天之報施若是其甚為善者不滋懼乎吾謂欒氏之亡端自書取之也夫欒書黨莊姬以譛原屏比楚茷以害三郤而又親謀弑君身犯大逆有一於此皆敗家亡身之道也幸免大戮猶保其子天之於人也盖遲乆而後示其罰焉黶既侈汰盈復聚慝小惠得人故箕黄甘為助亂長惡不悛天始怒而弗赦矣國君不堪而陽畢進本根之謀同列多猜而州賔搆淫蠱之隙且韓范趙荀之宗羣起而共疾之即有胥午助之於外魏舒主之於内讐怨宏多其何能濟乃晉君無道而兩合天下之諸侯以錮一亡臣是驅之為惡也因齊晝入謀亂不成殺世胄而快權臣之心平公之為謀何其謬哉夫盈非有犯上行私之罪而徒以范氏之釁諸大夫誹激而成其惡及出而奔楚又非君子違不適讐之義故鞅得因君之怒以疾之動勤諸侯而逞私憾欒氏聞之豈甘心乎發憤興禍其敗塗地實范氏之深謀而平公與欒盈俱不之悟也昔巫臣之去楚也子反請以重幣錮之楚子曰彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉乃晉之君臣計不出此而商任沙隨之閒紛紛多事是赫赫大國之君卿曽不若一荆蠻之主也嗚呼廢胥氏者郤也而郤復殺於欒譛郤氏者欒也而欒復逐於范謀人者必敗又安在其非天道也哉陳二慶之亂附蔡景之弑襄二十年蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚陳慶虎慶寅畏公子黄之偪愬諸楚曰與蔡司馬同謀楚人以為討公子黄出奔楚初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死書曰蔡殺其大夫公子燮言不與民同欲也陳侯之弟黄出奔楚言非其罪也公子黄將出奔呼於國曰慶氏無道求専陳國暴蔑其君而去其親五年不滅是無天也二十三年陳侯如楚公子黄愬二慶於楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黄君子謂慶氏不義不可肆也故書曰惟命不于常二十四年陳人復討慶氏之黨鍼宜咎出奔楚二十八年蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎日其過此也君使子展迋勞於東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父僑聞之如是者恒有子禍三十年蔡景侯為大子般娶于楚通焉大子弑景侯陳蔡小國也﨑嶇兩大之間晉彊則從晉楚勝則服楚此其謀國之常也蔡尤近楚故自翟泉以来不與諸夏之㑹盟而陳亦今日楚而明日晉爾鄬之㑹二慶反覆陳侯逃歸既而復有與蔡同謀之愬夫子燮從晉固非民欲而慶氏構讒亦非堅於從楚者也是以子黄䝉難如楚卒能發二慶之奸而正其罪然蔡子履為子燮之弟既同謀適晉復何以敢奔楚又焉知非讒慝哉中國不競至使小國之君臣奔走而不能免其禍讀春秋者至此能不為之喟然左傳事緯卷六
