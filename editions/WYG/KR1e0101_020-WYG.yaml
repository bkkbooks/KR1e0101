body:
  text: 左傳事緯前集卷七靈璧知縣馬驌撰春秋名氏譜傳曰天子建徳因生以賜姓胙之土而命之氏諸侯以字爲諡因以爲族官有世功則有官族邑亦如之此姓氏所由别也姓以繫百世使不分氏以别子孫所自出天子分封故賜姓而命氏國語曰帝嘉禹徳賜姓曰姒氏曰有夏胙四岳國賜姓曰姜氏曰有呂此賜姓命氏之事也其後把鄫齊許之國易氏而不易姓知姓之所繫逺矣諸侯無土可分故不命氏而命族蓋卿宜建家因賜之族或字或諡或官或邑皆可因而命之久則族亦爲氏但不敢賜姓爾若夫王臣不封或亦賜族尹氏武氏是也諸侯之卿徳薄不足建家或亦無族翬溺挾柔是也𫝊言黄帝之子二十五人不盡得姓諸侯之臣豈盡得族哉至如士㑹之帑處秦者爲劉氏伍員之子在齊爲王孫氏如此之類非盡君賜奕世繁衍流爲萬姓是又當别論矣王周一姬姓諸王平王葬不見經桓王莊王僖王莊僖崩葬不見經惠王葬不見經襄王亦曰王世子王大子鄭頃王崩葬不見經匡王定王葬不見經簡王靈王葬不見經景王王猛亦曰王子猛悼王敬王亦曰王子匄東王王族王子狐王子克亦曰子儀王子頽王子黨王札子亦曰王子札王子捷王孫滿王孫蘇弟佞夫王子瑕廖王孫没王子還姑發弱鬷延定稠大子壽王子朝亦曰西王王子處王子趙車王叔氏王叔文公亦曰王子虎王叔桓公王叔陳生内史氏内史過内史叔興内史叔服武氏武氏武氏子榮氏榮伯榮叔石氏石速石張石尚伯氏伯服伯與伯輿儋氏儋季亦曰王儋季儋括儋翩詹氏詹父詹桓伯賓氏賓滑賓起亦曰賓孟富氏富辰富辛瑕氏瑕禽瑕辛隂氏隂里隂忌隂不佞鄩氏鄩肸鄩羅南宮氏南宮極南宮嚚庾氏庾皮過諸臣宰咺南季宰渠伯糾仍叔之子家父辛有王人子突邊伯蔿國亦曰子國子禽祝跪游孫伯頽叔桃子簡師父左鄢父倉葛聃啓子服史狡甘大夫襄萇𢎞宮嬖綽老陽子泠州鳩摯荒司徒醜寰内諸侯二周召毛原單凡祭劉成甘皆姬姓温已姓餘未詳周公桓公亦曰周公黒肩周公忌父宰孔亦曰宰周公周公閱亦曰宰周公周公楚亦曰周公召武公亦曰召伯廖昭公亦曰昭伯召伯桓公亦曰召伯戴公亦曰召伯召襄莊公亦曰召伯奐簡公亦曰召伯盈召伯毛毛伯衛亦曰毛伯毛伯得亦曰毛得毛伯毛伯過原莊公原伯貫襄公原伯絞跪尋原伯魯亦曰原伯魯之子原壽過單單伯襄公亦曰單子頃公亦曰單子靖公單公子愆期亦曰成愆單蔑獻公成公穆公亦曰單子單旗武公平公凡凡伯祭祭伯祭公祭叔尹尹氏武公亦曰尹子尹言多文公亦曰尹圉固尹固尹氏尹氏尹辛劉康公亦曰王季子定公亦曰劉夏劉毅獻公亦曰劉子摯劉子文公亦曰伯蚠狄劉蚠卷劉子劉劉劉佗桓公劉州鳩温温子亦曰蘇子蘇子樊樊皮亦曰樊仲皮樊頃子成肅公亦曰成子簡公桓公甘昭公亦曰王子帶大叔帶太叔帶叔甘歜悼公亦曰甘過成公簡公景公平公亦曰鰌桓公鞏鞏成簡公夷夷詭諸魯三姬姓諸公惠公隱公桓公莊公亦曰子同閔公僖公亦曰魯申文公宣公成公襄公昭公亦曰公子稠稠父定公亦曰公子宋宋父哀公悼公公族公子豫公子翬亦曰羽父公子達公子偃公子結公子魚亦曰奚斯公子買亦曰子樷惡亦曰子視子般公衡亦曰衡父公子偃公子鉏子野公子憗亦曰子仲公爲亦曰公子務人公叔務人公賁公果公衍公孫朝公孫有山亦曰公孫有陘氏公孫宿亦曰公孫成公子荆衆氏衆父亦曰公子益師衆仲展氏夷伯無駭展喜展禽展莊叔展瑕展玉父臧氏臧僖伯亦曰公子彄臧哀伯亦曰臧孫逹臧文仲亦曰臧孫辰臧宣叔亦曰臧孫許臧武仲亦曰臧紇臧鑄臧賈臧堅臧爲臧昭伯臧會臧賓如臧石施氏施父施孝叔仲孫氏共仲亦曰公子慶父仲慶父孟穆伯亦曰公孫敖文伯亦曰穀惠叔亦曰難孟獻子亦曰仲孫蔑孟莊子亦曰孟孺子速仲孫速孺子秩孟孝伯亦曰仲孫羯孟公綽孟僖子亦曰仲孫玃孟懿子亦曰仲孫何忌仲孫忌孟武伯亦曰孟孺子洩彘孟之側亦曰子反懿伯子服惠伯亦曰孟椒服子服椒子湫子服昭伯亦曰子服囘子服景伯亦曰子服何南宫敬叔亦曰說叔孫氏僖叔亦曰公子牙叔牙叔孫戴伯亦曰公孫兹莊叔亦曰叔孫得臣叔孫宣伯亦曰叔孫僑如虺叔孫穆子亦曰叔孫豹穆叔孟丙仲壬豎牛叔孫昭子亦曰叔孫婼叔孫成子亦曰叔孫不敢叔孫武叔亦曰叔孫州仇公若藐亦曰公若叔孫文子亦曰叔孫舒叔孫輙叔仲惠伯亦曰彭生叔仲昭伯亦曰叔仲昭子叔仲帶叔仲穆子亦曰叔仲小叔仲志季孫氏成季亦曰公子友季友季文子亦曰季孫行父季武子亦曰季孫宿季悼子亦曰紇公彌亦曰公鉏公鉏極季公亥亦曰季公若季公鳥申季平子亦曰季孫意如季桓子亦曰季孫斯公甫公父文伯亦曰公父歜公甫公之季魴侯季寤亦曰子言公思展公何藐季康子亦曰肥東門氏東門襄仲亦曰公子遂門仲仲遂東遂公孫歸父亦曰子家門東氏仲嬰齊子家懿伯亦曰子家羈子叔氏公弟叔肸子叔聲伯亦曰公孫嬰齊子叔齊子亦曰叔老敬子亦曰叔弓叔輙亦曰伯張叔鞅叔詣叔還叔青申氏申繻申豐申須申夜姑申句須梁氏梁子梁其踁秦氏秦子秦菫父㔻兹秦周秦遄御氏御孫御叔富父氏富父終甥富父槐南氏南遺南蒯顔氏顔莊叔顔鳴顔高顔息顔羽亦曰子羽曾氏曾夭曽阜郈氏郈昭伯亦曰郈孫郈魴冉氏冉豎冉猛冉曾冉求亦曰冉有有子林氏林雍林楚林不狃苫氏苫夷亦曰苫越陽州陽氏陽虎陽越侯氏侯叔夏侯犯諸臣費伯亦曰費庈父挾柔溺曹劌顓孫圉人犖鍼季亦曰鍼巫氏卜齮卜楚丘夏父弗忌緜房甥公冉務人大史克禽鄭匡句須匠慶郰人紇亦曰郰叔紇狄虒彌閔子馬亦曰閔馬父豐㸃梓慎榮成伯亦曰榮駕鵝公冶公巫召伯仲鄫鼓父黨叔萊書