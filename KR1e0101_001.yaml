body:
  text: 左傳事緯卷一靈璧知縣馬驌撰鄭叔段之亂隱元年初鄭武公娶于申曰武薑生莊公及共叔段莊公寤生驚薑氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於己公子呂曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收二以為己邑至于廩延子封曰可矣厚將得衆公曰不義不昵厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢五月辛丑大叔出奔共書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也遂置薑氏于城潁而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之公曰爾有母遺繄我獨無潁考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融薑出而賦大隧之外其樂也泄泄遂為母子如初君子曰潁考叔純孝也愛其母施及莊公詩曰孝子不匱永錫爾類其是之謂乎鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廩延鄭人以王師虢師伐衛南鄙請師于邾邾子使私於公子豫豫請往公弗許遂行及邾人鄭人盟于翼不書非公命也二年鄭人伐衛討公孫滑之亂也余觀鄭伯城潁置薑人道絶矣弟之不才母氏奚尤黃泉之誓不幾千古罪人哉夫寤生薑氏所惡也叔段薑氏所愛也薑之所愛莊滋不能容矣與之制則曰巖邑懼其恃險而難制也與之京則使居之庶乎處大都以驕其志吾以蔽罪焉嘗讀詩至鄭風叔于田之篇曰叔善射忌又良御忌段不過一馳馬試劎之公子耳非如晉曲沃之能病翼楚蔡公之能害靈王也且以莊段同母之子以武薑論之處鄭國而為鄭君母於薑足矣亦復何求而啓弟弒兄事之未集厥謀先漏處京而京人叛奔鄢而鄢不保使能母子深圖當不輕舉取禍如是也鄭伯處心積慮以成其殺欲加之罪何患無辭於以正告天下則曰段將襲我也薑將啓段也在段之糊口四方尚幸不殺之福在莊之按兵未動先邀愛弟之名嗚呼春秋之際周道其衰矣或父子相夷兄弟相滅又寧止一鄭伯也哉衛州吁之亂隱三年衛莊公娶于齊東宮得臣之妹曰莊薑美而無子衛人所為賦碩人也又娶于陳曰厲媯生孝伯早死其娣戴媯生桓公莊薑以為己子公子州吁嬖人之子也有寵而好兵公弗禁莊薑惡之石碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長遠間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁遊禁之不可桓公立乃老四年春衛州吁弒桓公而立宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還公問於衆仲曰衛州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師會之公弗許固請而行故書曰翬帥師疾之也諸侯之師敗鄭徒兵取其禾而還州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請涖於衛九月衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎衛人逆公子晉于邢冬十二月宣公即位書曰衛人立晉衆也五年夏葬衛桓公衛亂是以緩四月鄭人侵衛牧以報東門之役衛人以燕師伐鄭鄭祭足原繁泄駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人六月鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師衛之亂也郕人侵衛故衛師入郕桓三年夏齊侯衛侯胥命于蒲不盟也衛自莊公以迄惠懿蓋數世未寧也而至于滅亡豈康叔之烈至此中衰與莊公外退賢者內惑嬖庶緑衣賦于上而夫人憂碩人作于下而國人怨桓公雖立亂之來也其何日之有桓立十有三年而入春秋隱四年春書曰衛州吁弒其君完衛無君矣而兩書伐鄭人嗟行役之勞家賦擊鼓之篇則州吁為之也於是乎平陳與宋踴躍興師東門之役四國偕作篡逆之子輒能連師動衆汰然稱雄豈大惡未昭抑厥罪未稔耶余考當日圍鄭之師僅五日耳未至曠日勞民而怨誹交作其故何哉蓋弒立之主衆莫為用況乎竊國八月而師徒兩警使其在位日久當不止楚虔之好武喜事宋殤公之十年十一戰也怨讟之聲內外交起燕燕飛而戴媯悲終風霾而莊薑怨民曰曷喪母嘆無歸吁也雖生死之久矣幸有純臣而先君之讎可復斯民之賊可除讀春秋至此曰猶有天道焉獨是弒立之事何國蔑有臣非石子國無陳桓夫亦重可哀已鄭莊入許隱十一年夏公會鄭伯于郲謀伐許也鄭伯將伐許五月甲辰授兵于大宮公孫閼與潁考叔爭車潁考叔挾輈以走子都拔棘以逐之及大逵弗及子都怒秋七月公會齊侯鄭伯伐許庚辰傅于許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顚瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登壬午遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞于許君而假手于我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使糊其口於四方其況能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子若寡人得沒于地天其以禮悔禍于許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊昏媾其能降以相從也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而況能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之吾先君新邑於此王室而既卑矣周之子孫日失其序夫許大嶽之胤也天而既厭周德矣吾其能與許爭乎君子謂鄭莊公於是乎有禮禮經國家定社稷序民人利後嗣者也許無刑而伐之服而舍之度德而處之量力而行之相時而動無纍後人可謂知禮矣鄭伯使卒出豭行出犬雞以詛射潁考叔者君子謂鄭莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪邪而詛之將何益矣桓十五年許叔入于許公會齊侯于艾謀定許也甚哉左氏之輕豫也入春秋初鄭莊強暴實曰首惡而傳中稱之不置抑過矣入許之役宗國是從齊僖小伯亦聽鄭志炎帝之祀幾絶文叔之封失守許亦人國胡為而蒙不共之名越在偏鄙也哉鄭許壤地相接在所必爭莊公利其土地會郲蓄謀大宮授兵其計已成謂直取之則任滅國之名置之復無自利之實故外為甘言以欺二國而內則攘之不然胡以處之東偏又使獲制之也齊魯遠處東海即滅許而縣之亦未能踰曹涉衛而有茲土則入許誠以利鄭也隂收其利而又以為名莊公之詐至矣度德量力固如是歟既己分許求利後人孰知身沒而忽突交亂叔得因亂復國太嶽之胤猶未宜絶鄭固無如之何也隱公之弒惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我生桓公而惠公薨是以隱公立而奉之元年春王周正月不書即位攝也三月公及邾儀父盟于蔑邾子克也未王命故不書爵曰儀父貴之也公攝位而欲求好於邾故為蔑之盟秋七月天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至贈死不及尸弔生不及哀豫凶事非禮也冬十月庚申改葬惠公公弗臨故不書惠公之薨也有宋師太子少葬故有闕是以改葬衛侯來會葬不見公亦不書衆父卒公不與小斂故不書日二年司空無駭入極費庈父勝之三年夏君氏卒聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏五年春公將如棠觀魚者臧僖伯諫曰凡物不足以講大事其財不足以備器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春搜夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登于俎皮革齒牙骨角毛羽不登于器則公不射古之制也若夫山林川澤之實器用之資皂𨽻之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從書曰公矢魚于棠非禮也且言遠地也九月考仲子之宮將萬焉公問羽數于衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也冬十二月辛巳臧僖伯卒公曰叔父有憾於寡人寡人弗敢忘葬之加一等八年鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏十一年羽父請殺桓公將以求大宰公曰為其少故也吾將授之矣使營菟裘吾將老焉羽父懼反譖公于桓公而請殺之公之為公子也與鄭人戰于狐壤止焉鄭人囚諸尹氏賂尹氏而禱于其主鍾巫遂與尹氏歸而立其主十一月公祭鍾巫齊于社圃館于寪氏壬辰羽父使賊弒公于寪氏立桓公而討寪氏有死者不書葬不成喪也桓公元年春公即位修好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也夏四月丁未公及鄭伯盟于越結祊成也盟曰渝盟無享國冬鄭伯拜盟十七年及邾儀父盟于趡尋蔑之盟也伐邾宋志也禮諸侯再娶不稱夫人惠以孟子為元妃以聲子為繼室有子而長國之幸也謬信手文之誣再娶夫人已開禍亂之端矣隱長桓幼其為尊卑也微諸大夫扳隱而立之正也惠欲與桓非正也隱立十有一年用師宋郊連兵許國直與齊僖鄭莊并駕中原國人咸知惠公有子亦將以其終為君也將以讓桓則直授之夫以十三嵗之莊公與三嵗之襄公皆不以弱而不立桓也即幼又復十一年矣而濡忍不決用生讒慝逮鍾巫禍成蕭墻生變菟裘之營吁嗟已晚亦獨何哉羽父專命行師素無臣禮而始以殺桓求媚終以弒隱逞志有弒一君之名而有弒二君之心亂臣賊子莫此為甚桓公黨惡滅倫竊居君位而如齊不反天道好還可不畏與獨是隱公長而且賢南面數載不聞敗德非鬼之祭竟來篡逆探先君之邪志啓姦雄之戎心君弒而賊不討春秋于此有遺憾焉宋殤之弒隱元年惠公之季年敗宋師于黃公立而求成焉九月及宋人盟于宿始通也三年宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居于鄭八月庚辰宋穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫商頌曰殷受命咸宜百祿是荷其是之謂乎冬齊鄭盟于石門尋盧之盟也庚戌鄭伯之車僨于濟四年公與宋公為會將尋宿之盟未及期衛人來告亂夏公及宋公遇于清五年宋人取邾田邾人告於鄭曰請君釋憾于宋敝邑為道鄭人以王師會之伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問於使者曰師何及對曰未及國公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也宋人伐鄭圍長葛以報入郛之役也六年春鄭人來渝平更成也夏盟于艾始平於齊也秋宋人取長葛七年齊侯使夷仲年來聘結艾之盟也秋宋及鄭平七月庚申盟于宿公伐邾為宋討也八年春齊侯將平宋衛有會期宋公以幣請于衛請先相見衛侯許之故遇于犬丘齊人卒平宋衛于鄭秋會于溫盟于瓦屋以釋東門之役禮也冬齊侯使來告成三國公使衆仲對曰君釋三國之圖以鳩其民君之惠也寡君聞命矣敢不承受君之明德九年宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬公會齊侯于防謀伐宋也十年春王正月公會齊侯鄭伯于中丘癸丑盟于鄧為師期夏五月羽父先會齊侯鄭伯伐宋六月戊申公會齊侯鄭伯于老桃壬戌公敗宋師于菅庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我君子謂鄭莊公於是乎可謂正矣以王命討不庭不貪其土以勞王爵正之體也蔡人衛人郕人不會王命秋七月庚寅鄭師入郊猶在郊宋人衛人入鄭蔡人從之伐戴八月壬戌鄭伯圍戴癸亥克之取三師焉宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗九月戊寅鄭伯入宋冬齊人鄭人入郕討違王命也十一年冬十月鄭伯以虢師伐宋壬戌大敗宋師以報其入鄭也宋不告命故不書凡諸侯有命告則書不然則否師出臧否亦如之雖及滅國滅不告敗勝不告克不書于䇿桓元年宋華父督見孔父之妻于路目逆而送之曰美而艷二年春宋督攻孔氏殺孔父而取其妻公怒督懼遂弒殤公君子以督為有無君之心而後動於惡故先書弒其君會于稷以成宋亂為賂故立華氏也宋殤公立十年十一戰民不堪命孔父嘉為司馬督為大宰故因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召莊公于鄭而立之以親鄭以郜大鼎賂公齊陳鄭皆有賂故遂相宋公夏四月取郜大鼎于宋戊申納于大廟非禮也臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲遊纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器于大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎於雒邑義士猶或非之而况將昭違亂之賂器于大廟其若之何公不聽周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德春秋以前魯宋有黃之師齊鄭有盧之盟魯鄭有狐壤之戰隱公初立首盟邾宋齊鄭尋盟其交益固四年之中鄭有共叔之亂宋有子馮之逼衛有州吁之弒鄭滑在衛宋馮在鄭寤生搆難州吁興戎東諸侯之黨樹天下始多事矣于時齊鄭為一黨魯與宋衛陳蔡為一黨五國連兵兩伐鄭國宋主其兵衛倡其謀我與陳蔡悉從事於二國者也乃州吁既誅鄭怨未平邾人告病宋釁復起一嵗之內鄭宋兩報隱胡不信因行人之失辭輒棄誓盟宋使絶而齊鄭之交來焉獨是一邾也既盟蔑而復伐之一宋也既遇清而又敗之十一年之中五年黨宋六年黨鄭蓋以守信不固而鄭始得間之也狡爾寤生易祊歸郜以固我交自是入許敗周無憂東顧矣鄭之與宋仇讐已深瓦屋甫平而假命討違總以償其私憾宋何不幸疆場日煩督懷無君巧鼓民怒曰十年十一戰十一戰者何隱四年圍鄭東門一也取其禾二也五年取邾田三也邾宋入其郛四也圍長葛五也九年鄭以王命伐宋六也十年敗于菅七也入鄭八也伐戴九也鄭伯入宋十也十一年大敗宋師十一也姦雄之徒既愚民以自利又行賂以免禍此春秋所深病也為宋穆公者曰先君舍其子而立寡人寡人亦立之嗚呼使與夷也賢奈何亟戰而無度使與夷也不賢先君舍之已立之未聞道矣是故讓國非云易也苟有伯夷大伯之德與識則中子立而孤竹存季厯嗣而周室昌苟無其德與識雖子郢之賢尚啓蒯輒之爭季子之貞猶開僚光之亂宋國日戰雖曰州吁惑之吾謂必自穆公始之也況穆公知以國與殤而不知所以處殤委馮于暴鄭以逼處此屬有鄰國搆于其間此則曰除害也彼則曰惡馮也數戰民疑亂由中作獨一孔父正色立朝而流言復興殤公至此一獨夫耳姦臣賊子因亂生心弒殤公而召子馮以求援于諸國經曰以成宋亂傳曰為賂立華自是督且世執政矣上無天子之誅下無方伯之討東諸侯咸受賂以相之督之流亦何憚而不弒君也哉陳他之亂隱六年五月庚申鄭伯侵陳大獲往嵗鄭伯請成于陳陳侯不許五父諫曰親仁善鄰國之寶也君其許鄭陳侯曰宋衛實難鄭何能為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將能乎商書曰惡之易也如火之燎于原不可鄉邇其猶可撲滅周任有言曰為國家者見惡如農夫之務去草焉芟夷薀崇之絶其本根勿使能殖則善者信矣七年陳及鄭平十二月陳五父如鄭涖盟壬申及鄭伯盟歃如忘泄伯曰五父必不免不賴盟矣鄭良佐如陳涖盟辛巳及陳侯盟亦知陳之將亂也桓公五年春正月甲戌己丑陳侯鮑卒再赴也於是陳亂文公子他殺大子免而代之公疾病而亂作國人分散故再赴明年經書蔡人殺陳他稱殺稱名杜武庫以為未會諸侯然是秋從王伐鄭陳他與焉不得謂之未會諸侯胡文定曰蔡知他之為賊陳不以他為君五父之罪內外著聞春秋斷以大義不得稱爵也吾觀其親仁善鄰之諫亦似有識之流而身蹈篡逆之罪語云寸有所長豈不信哉然而即位踰年天子不討國人不怒夫亦可以泰然為君矣而淫獵是尚死同匹夫亂賊之名昭于二國非不幸也周鄭繻葛之戰隱三年鄭武公莊公為平王鄉士王二于虢鄭伯怨王王曰無之故周鄭交質王子狐為質于鄭鄭公子忽為質于周王崩周人將畀虢公政四月鄭祭足帥師取溫之麥秋又取成周之禾周鄭交惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之苟有明信澗溪沼沚之毛蘋蘩薀藻之菜筐莒錡釜之器潢汙行潦之水可薦於鬼神可羞於王公而況君子結二國之信行之以禮又焉用質風有采蘩采蘋雅有行葦泂酌昭忠信也六年鄭伯如周始朝桓王也王不禮焉周桓公言於王曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇況不禮焉鄭不來矣八年夏虢公忌父始作卿士于周八月丙戌鄭伯以齊人朝王禮也十一年王取塢劉蒍邘之田于鄭而與鄭人蘇忿生之田溫原絺樊隰郕攢茅向盟州陘隤懷君子是以知桓王之失鄭也恕而行之德之則也禮之經也已弗能有而以與人人之不至不亦宜乎桓五年王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人衛人為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不枝固將先奔既而于王卒可以集事從之曼伯為右拒祭仲足為左拒原繁高渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰于繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍祝聃請從之公曰君子不欲多上人況敢陵天子乎苟自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右七年夏盟向求成于鄭既而背之秋鄭人齊人衛人伐盟向王遷盟向之民于郟嗚呼君尊臣卑古今之大防也使君而不君臣而不臣天下之綱紀紊矣其何一尊之有余稽周自文武成康號為全盛并建支庶以屏王室自是以降周道寖衰昭王南征不復穆王征犬戎荒服不至懿王之世詩人作刺至于厲王乃流于彘亂自京師始而共和行政焉宣王中興北征玁狁南平徐淮然而南國喪師周亦不競幽王無道西戎內侵卒有驪山之禍平王東遷內賴周召之輔外借侯伯之功故鄭桓死而新鄭建晉文勞而彤弓錫秦襄戰而周土封蓋周雖多故亦唯是蠻夷戎狄尚賴伯叔甥舅以鎮定之不聞有兄弟之國敢以一矢加王如鄭莊者也夫鄭出自厲王宣王之母弟也始封咸林密邇西京既而寄帑虢鄶在成周又畿內焉以情則周之懿親也以國則周之左右藩輔也況雒邑彈丸之區無山川之險阻西迫秦翟南接荆楚儻有外侮猶賴爾鄭以朝夕夾輔王家不謂世職司徒方假王靈以雄視甸服而敢修小怨莊公之罪浮于戎狄矣左氏謂虢公作鄉士鄭猶朝王其後易田奪政鄭始不朝王以三國來伐鄭伯禦之其夜遣問勞僅思自救信斯言也莊守臣節桓失懷綏繻葛一敗直自取耳不知君臣之間有討無戰天子有爵夫誰敢爭鄭伯何人而挾王質子兩掠京畿天子震怒敢抗王師魚麗拒戰有若敵國天威不行伊誰咎與夫陳蔡及衛皆鄭之怨讎也名曰從王實以修其私憾然而王親將軍三君不出師無法紀民鮮鬭心是王師之敗又三國之咎也以吾考之王詩桓王失信諸侯背叛搆怨連禍王師敗傷君子不樂其生為詩曰有爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪有詩如是是桓王亦非能伐人者然而君臣無獄況於用兵苟能謝罪入朝臣道不虧天怒可解胡為乎旝鼓抗命矢集王肩而文過飾罪吾誰欺乎春秋隱桓之際諸侯之強忍不仁者無如鄭莊公而善為巧辭以文其説試觀易田曰假襲紀曰朝逐其弟而愧糊口離其母而賦大隧滅許而分其國則曰我無利此土射王而中其肩猶曰不敢陵天子其於君臣母子兄弟鄰國之間莫不內肆姦貪而外為恭順設有聖天子出必以鄭莊公為首誅焉楚武始強桓二年蔡侯鄭伯會于鄧始懼楚也六年楚武王侵隨使薳章求成焉軍於瑕以待之隨人使少師董成鬭伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬭伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大藩滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗旨酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神之主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐八年隨少師有寵楚鬭伯比曰可矣讎有釁不可失也夏楚子合諸侯于沈鹿黃隨不會使薳章讓黃楚子伐隨軍于漢淮之間季梁請下之弗許而後戰所以怒我而怠寇也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也弗從戰于速杞隨師敗績隨侯逸鬭丹獲其戎車與其戎右少師秋隨及楚平楚子將不許鬭伯比曰天去其疾矣隨未可克也乃盟而還九年巴子使韓服告于楚請與鄧為好楚子使道朔將巴客以聘于鄧鄧南鄙鄾人攻而奪之幣殺道朔及巴行人楚子使薳章讓於鄧鄧人弗受夏楚使鬭廉帥師及巴師圍鄾鄧養甥聃甥帥師救鄾三逐巴師不克鬭廉衡陳其師於巴師之中以戰而北鄧人逐之背巴師而夾攻之鄧師大敗鄾人宵潰十一年楚屈瑕將盟二軫鄖人軍於蒲騷將與隨絞州蓼伐楚師莫敖患之鬭廉曰鄖人軍其郊必不誡且日虞四邑之至也君次于郊郢以禦四邑我以鋭師宵加于鄖鄖有虞心而恃其城莫有鬭志若敗鄖師四邑必離莫敖曰盍請濟師於王對曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷卒盟而還十二年楚伐絞軍其南門莫敖屈瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之從之絞人獲三十人明日絞人爭出驅楚役徒於山中楚人坐其北門而覆諸山下大敗之為城下之盟而還伐絞之役楚師分涉于彭羅人欲伐之使伯嘉諜之三巡數之十三年春楚屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗舉趾高心不固矣遂見楚子曰必濟師楚子辭焉入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令德見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也楚子使賴人追之不及莫敖使徇于師曰諫者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎兩軍之大敗之莫敖縊于荒谷羣帥囚于冶父以聽刑楚子曰孤之罪也皆免之莊公四年春王三月楚武王荆尸授師孑焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼歎曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無虧王薨於行國之福也王遂行卒於樠木之下令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成莫敖以王命入盟隨侯且請為會於漢汭而還濟漢而後發喪十八年初楚武王克權使鬭緡尹之以叛圍而殺之遷權於那處使閻敖尹之及文王即位與巴人伐申而驚其師巴人叛楚而伐那處取之遂門于楚門敖遊涌而逸楚子殺之其族為亂冬巴人因之以伐楚十九年春楚子禦之大敗於津還鬻拳弗納遂伐黃敗黃師于踖陵還及湫有疾夏六月庚申卒鬻拳葬諸夕室亦自殺也而葬於絰皇初鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯使其後掌之君子曰鬻拳可謂愛君矣諫以自納于刑刑猶不忘納君於善僖二十年隨以漢東諸侯叛楚冬鬭穀於菟帥師伐隨取成而還君子曰隨之見伐不量力也量力而動其過鮮矣善敗由己而由人乎哉詩曰豈不夙夜謂行多露鄧之會傳曰始懼楚也曷言乎始懼也中國患楚自此始周夷王之世熊渠僣王然而尋去其號是猶知畏天子也及平王末蚡冒于是乎啓濮是猶未蠶食諸夏也武王之立當王室益衰諸侯多故曲沃庶也而逼晉鄭伯臣也而抗王魯衛陳宋臣弒其君中國多難自顧不遑自是荆蠻之主侈然不復避中國矣蔡鄭及鄧密邇長蛇鄧尤逼處甘為地主三國震動協謀春秋傷之曰此楚二百年來猾夏之始事故謹而書之也考武之伐隨也曰我有敝甲欲以觀中國之政請王室尊吾號隨侯為之請於王王室不聽既而曰吾先鬻熊文王之師也蠻夷皆率服而王不加號乃自立為王然則會鄧之日楚尚未王而諸姬恐懼假令不死方城之外非中國有也其為患寧止隨黃絞羅之區耶夫隨以漢東小侯愓于季梁之言楚終不能得志至成王子文出師僅亦取成春秋之國小而能自強者信莫如隨矣今三國不能自立而止為會以求安自是鄧滅蔡虜鄭伐不聞其相救焉君子曰政之不修會無益也吾觀楚自武王卒于伐隨之役而文王卒于伐黃之師天方授楚厯世好兵至死罔懈穆莊之業已基于此而東諸侯之支楚曾無自強如隨者中國之不競又何足怪也哉秦納芮取梁桓三年芮伯萬之母芮薑惡芮伯之多寵人也故逐之出居于魏四年秋秦師侵芮敗焉小之也冬王師秦師圍魏執芮伯以歸十年秋秦人納芮伯萬于芮僖十八年梁伯益其國而不能實也命曰新里秦取之十九年春遂城而居之梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某冦將至乃溝公宮曰秦將襲我民懼而潰秦遂取梁秦以文公之四十四年入春秋凡八傳而至穆公春秋略其文傳中止記納芮一事亦不言何公按執芮伯當在寧公之世納芮當在出子之世而取梁則在穆公之世間嘗考之竹書周桓王五年芮人乘京十一年芮伯萬出奔魏十二年王師秦師圍魏取芮伯萬而東之十三年戎人逆芮伯萬于郊文異於此史遷記秦事最詳有寧公滅亳取蕩氏武公伐彭戲伐邽冀戎滅小虢諸事而無納芮之文蓋古史缺焉不備諸家各據所見而志之或略或詳不可同論而厚誣也傳所稱穆公霸西戎賢矣以所聞襄公定天子以來非小弱也故附論焉王子克之亂桓十八年周公欲弒莊王而立王子克辛伯告王遂與王殺周公黑肩王子克奔燕初子儀有寵於桓王桓王屬諸周公辛伯諫曰並后匹嫡兩政耦國亂之本也周公弗從故及周室之亂非諸侯故也大抵起于並后匹嫡而亂人乘以為利者也在昔攜王姦位王室播遷周幾不祀乃又不鑒子儀謀弒起于桓王之寵子頽僣立始于王姚之嬖叔帶作亂生于惠后之姦爰及子朝東西二王龍戰五載亂靡有定誰生厲階則景王之寵為之也辛伯之言不其然與黑肩知有桓王之寵而未明嫡庶之義事敗殺身誠無足道若辛伯之先識禍端終戡大亂大臣之匡定王室方于公旦亦無愧焉文薑之亂桓三年會于嬴成昏于齊也秋公子翬如齊逆女修先君之好故曰公子齊侯送薑氏非禮也凡公女嫁于敵國姊妹則上鄉送之以禮於先君公子則下鄉送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之冬齊仲年來聘致夫人也六年九月丁卯子同生以大子生之禮舉之接以大牢卜士負之士妻食之公與文薑宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同十八年春公將有行遂與薑氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公會齊侯于濼遂及文薑如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乘公公薨于車魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生莊公元年春不稱即位文薑出故也三月夫人孫于齊不稱薑氏絶不為親禮也秋築王姬之館于外為外禮也二年冬夫人薑氏會齊侯于禚書姦也三年春溺會齊師伐衛疾之也七年春文薑會齊侯于防齊志也八年春治兵于廟禮也夏師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德德乃降姑務修德以待時乎秋師還君子以是善魯莊公觀于齊魯之亂而知天道不爽如是其昭然也桓公不死于本國而死于齊天蓋巧于假手以為隱公復讐而因以終稔齊侯之惡以斃其身吉凶影響可不畏與春秋于齊魯為昏之事詳書于經説者曰成昏逆送咸不以正始合失禮焉得善終固無足論若夫齊僖小霸雄長東方而于國儲無世子之教愛女無公宮之訓文薑一嫁兩國行穢春秋病襄兼以病僖也考之隱桓之世中國之壤地甲兵無如齊者瓦屋之會則參盟矣伐宋之役則連諸侯矣參盟者主盟之漸連諸侯者摟諸侯以伐諸侯之漸桓文之事實權輿焉乃計不出此亂國是親魯桓篡逆且與之昏且親送之東方之事蓋可知矣然而仲年既聘之後齊使中絶戰鬭數加二國名雖昏姻勢漸仇讎襄公嗣立戰奚侵疆亦未嘗與魯深結好也俄而夫婦如齊誰使然與讀桓公之春秋至王室三聘列國六朝弒逆之賊南靣無恙而朝聘屢接似非天道孰知正以驕淫其志與一婦人招搖人國謂若我何留連三月樂死忘歸而醜章狐綏禍中搚幹天實厭逆奪其魂魄非一日矣莊公不能為親復讐反聽其命田獵則從征伐則偕為文薑者豈弟翺翔宣淫如志而莊公不恥故齊風南山刺襄公而繼之以敝笱以刺魯桓載驅刺襄公而繼之以猗嗟以刺魯莊魯有一薑氏而兩世蒙恥亂賊篡國禍流子孫可畏也哉齊襄滅紀隱元年八月紀人伐夷夷不告故不書二年莒子娶于向向薑不安莒而歸夏莒人入向以薑氏還九月紀裂繻來逆女卿為君逆也冬紀子帛莒子盟于密魯故也八年公及莒人盟于浮來以成紀好也桓五年夏齊侯鄭伯朝于紀欲以襲之紀人知之六年夏會于成紀來咨謀齊難也冬紀侯來朝請王命以求成于齊公告不能八年祭公來遂逆王后于紀禮也九年春紀季薑歸于京師凡諸侯之女行唯王后書十七年春盟于黃平齊紀且謀衛故也夏及齊師戰于奚疆事也於是齊人侵魯疆疆吏來告公曰疆埸之事愼守其一而備其不虞姑盡所備焉事至而戰又何謁焉莊三年秋紀季以酅入于齊紀於是乎始判冬公次于滑將會鄭伯謀紀故也鄭伯辭以難凡師一宿為舍再宿為信過信為次四年紀侯不能下齊以與紀季夏紀侯大去其國違齊難也滅紀斷非復讎也二國唇齒自僖公即欲襲之齊之利紀己非一日天下無霸小國不寧奔走幹旋唯圖免禍妃則魯女女為王后婚媾重于一時紀是以少延無何而桓王崩紀失恃矣天誘其衷齊僖隕命乃襄公初立魯方為平輒復戰奚盟何足信無何而桓公薨紀益失恃矣季知必亡以酅求成曰請後五廟以存姑姊妹明年而紀侯大去紀亡矣其後二十餘年經書叔姬卒紀以小國遭時不造介弟慕微子之義庶妃矢共薑之操紀之國亡而不亡也襄之九世祖譛殺于紀復讎之義殺其君而不有其土今也酅入而季在國去而君存齊之讎復而不復也衛惠竊立桓十六年初衛宣公蒸于夷薑生急子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子夷薑縊宣薑與公子朔搆急子公使諸齊使盜待諸莘將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子泄右公子職立公子黔牟惠公奔齊莊五年冬伐衛納惠公也六年春王人救衛夏衛侯入放公子黔牟于周放寧跪于秦殺左公子泄右公子職乃即位君子以二公子之立黔牟為不度矣夫能固位者必度于本末而後立衷焉不知其本不謀知本之不枝弗強詩云本枝百世冬齊人來歸衛寶文薑請之也甚哉衛之不幸也州吁方誅宣公又以淫亂繼之上蒸夷薑下取急婦淫風化于國中卒有數世之禍迄今讀衛風至匏葉新臺諸篇不堪言矣獨是于鳥獸亂行之時而急壽能以死相讓二子乘舟今古同閔乃知節義之人當時窮而益著方類何足拘焉宣公既殁黔牟為急母弟以次當立二子不以此時拒朔使其在位四年而忽逐之何故公羊氏曰朔得罪于天子越在岱隂齊屬負兹舍不即罪然則惠立之日籧篨雖隕牝雞方鳴二公子雖欲圖尚無其間今也開釁王室正罪有辭抗義援立因隙為功逆朔之罪天下共聞一大快舉也奈何五國受寶助亂王師不競竟使佩韘之童子賊守正之大臣豈其天未厭亂抑將有以大滅衛乎二子不幸無功而左氏乃譏其不度抑過矣鄭厲篡國隱七年鄭公子忽在王所故陳侯請妻之鄭伯許之乃成昏八年四月甲辰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入于鄭陳針子送女先配而後祖針子曰是下為夫婦誣其祖矣非禮也何以能育九年北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也公子突曰使勇而無剛者嘗寇而速去之君為三覆以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝聃逐之衷戎師前後擊之盡殪戎師大奔十一月甲寅鄭人大敗戎師桓六年北戎伐齊齊侯使乞師于鄭鄭大子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻于齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其有功也怒故有郎之師公之未昏於齊也齊侯欲以文薑妻鄭大子忽大子忽辭人問其故大子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯十年冬齊衛鄭來戰于郎我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師于齊齊人以衛師助之故不稱侵伐先書齊衛王爵也十一年春齊衛鄭宋盟于惡曹鄭昭公之敗北戎也齊人將妻之昭公辭祭仲曰必取之君多內寵子無大援將不立三公子皆君也弗從夏鄭莊公卒初祭封人仲足有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衛己亥厲公立十二年公欲平宋鄭秋公及宋公盟于句瀆之丘宋成未可知也故又會于虛冬又會于龜宋公辭平故與鄭伯盟于武父遂帥師而伐宋戰焉宋無信也君子曰茍信不繼盟無益也詩云君子屢盟亂是用長無信也十三年宋多責賂于鄭鄭不堪命故以紀魯及齊與宋衛燕戰不書所戰後也鄭人來請修好十四年春會于曹曹人致餼禮也夏鄭子人來尋盟且修曹之會冬宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宮之椽歸為盧門之椽十五年祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也夏厲公出奔蔡六月乙亥昭公入秋鄭伯因櫟人殺檀伯而遂居櫟冬會于袲謀伐鄭將納厲公也弗克而還十六年春正月會于曹謀伐鄭也夏伐鄭秋七月公至自伐鄭以飲至之禮也十七年初鄭伯將以高渠彌為卿昭公惡之固諫不聽昭公立懼其殺己也辛卯弒昭公而立公子亹君子謂昭公知所惡矣公子逹曰高伯其為戮乎復惡己甚矣十八年秋齊侯師于首止子亹會之高渠彌相七月戊戌齊人殺子亹而轘高渠彌祭仲逆鄭子于陳而立之是行也祭仲知之故稱疾不往人曰祭仲以知免仲曰信也莊十四年鄭厲公自櫟侵鄭及大陵獲傅瑕傅瑕曰茍舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公初內蛇與外蛇鬭於鄭南門中內蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣焰以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖厲公入遂殺傅瑕使謂原繁曰傅瑕二周有常刑既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先人典司宗祏社稷有主而外其心其何二如之苟主社稷國內之民其誰不為臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非二乎莊公之子猶有八人若皆以官爵行賂勸二而可以濟事君其若之何臣聞命矣乃縊而死十六年鄭伯自櫟入緩告于楚秋楚伐鄭及櫟為不禮故也鄭伯治與於雍糾之亂者九月殺公子閼刖強鉏公父定叔出奔衛三年而復之曰不可使共叔無後於鄭使以十月入曰良月也就盈數焉君子謂強鉏不能衛其足詩傳曰公子五爭齊楚交伐鄭國大亂其臣謀欲諫而救之賦籜兮序曰出其東門閔亂也公子五爭兵革不息男女相棄民人思保其室家焉五爭者子突兩立忽及亹儀各一是也夫鄭莊不仁好搆人之骨肉而亂其國於宋尤甚宋莊在鄭則欲納之華督弒殤立莊則為會于稷以成之然則子馮處鄭日久習見其詐特得國之初尚屈于鄭是以在位八年其行事不見于經一旦鄭莊身殁嫡庶交爭宋莊于是效其故智首開難端推刃尋讎天道之好還詎不信哉曩者會稷之役魯鄭齊陳實同其事今也宋莊納厲求賂成釁魯不能和輒比鄭以讎宋是以賂合者仍以賂離然而宋戰方新昭公入國會袲會曹魯宋同之春秋之諸侯何常之有吾考鄭忽以莊公世嫡即無大援分固當立不幸遭國多難詩人刺其辭昏失助為賦有女同車不知文薑內淫行比婁豬齊襄不君國刺雄狐方殺魯桓豈遂庇鄭忽之辭昏若有先幾事之成敗何足論焉獨是祭仲反覆不臣肆行廢立有亂國之實而不有弒君之名權詐相濟沒齒無恙可謂狡矣齊襄之弒莊八年齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂連稱有從妹在公宮無寵使間公曰捷吾以女為夫人冬十二月齊侯遊于姑棼遂田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬭死于門中石之紛如死于階下遂入殺孟陽于床曰非君也不類見公之足于戶下遂弒之而立無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔初公孫無知虐于雍廩九年春雍廩殺無知公及齊大夫盟于蔇齊無君也夏公伐齊納子糾桓公自莒先入秋師及齊師戰于乾時我師敗績公喪戎路傳乘而歸秦子梁子以公旗辟于下道是以皆止鮑叔帥師來言曰子糾親也請君討之管召讐也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治於高傒使相可也公從之十年春齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能遠謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之夏六月齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出蒙臯比而先犯之公從之大敗宋師于乘丘齊師乃還齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至冬齊師滅談談無禮也談子奔莒同盟故也十一年冬齊侯來逆共姬十三年冬盟于柯始及齊平也魯桓之死齊殺彭生及齊襄之弒彭生見焉此正莊公復讐時也昔者公年尚幼齊襄方強薑氏內制難以為謀是猶可原之曰公非忘讐力不能耳今者戶下難發襄身被殱公以此時仗義問罪别立賢君復讐之義天下著聞先君之怨至此雪矣惜乎莊非其人無知之立晏然弗知計阻小白唯糾是助佐其不當立者以攻其當立者乾時一敗僅獲傳乘鮑子來伐糾亦不保穀梁氏譏之曰以千乘之魯不能存一子糾以公為病矣齊桓圖霸亟欲得魯而北杏之會陳蔡景從魯人獨後者中懷納糾之隙猶豫未前桓獨捐棄前怨為柯之盟信義是尚彼曹沫手劒要盟請田亦何為也哉或曰二國世仇桓公雖霸豈忍遽從不知先公之死莊公忘之久矣況乎齊襄已殺桓復奚讐莊公果于取襄之女而獨疑于從桓之會其于利害之際勤矣其于復讐之義則未也曲沃并晉隱五年曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨曲沃叛王秋王命虢公伐曲沃而立哀侯于翼六年翼九宗五正頃父之子嘉父逆晉侯于隨納諸鄂晉人謂之鄂侯桓二年初晉穆侯之夫人薑氏以條之役生大子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命大子曰仇弟曰成師始兆亂矣兄其替乎惠之二十四年晉始亂故封桓叔于曲沃靖侯之孫欒賔傳之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有二宗士有𨽻子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能久乎惠之三十年晉潘父弒昭侯而納桓叔不克晉人立孝侯惠之四十五年曲沃莊伯伐翼弒孝侯翼人立其弟鄂侯鄂侯生哀侯哀侯侵陘庭之田陘庭南鄙啓曲沃伐翼三年春曲沃武公伐翼次于陘庭韓萬御戎梁𢎞為右逐翼侯于汾隰驂絓而止夜獲之及欒共叔七年冬曲沃伯誘晉小子侯殺之八年春滅翼冬王命虢仲立晉哀侯之弟緡于晉九年秋虢仲芮伯梁伯荀侯賈伯伐曲沃莊十六年王使虢公命曲沃伯以一軍為晉侯十八年春虢公晉侯朝王王饗醴命之宥皆賜玉五瑴馬三匹非禮也王命諸侯名位不同禮亦異數不以禮假人二十三年晉桓莊之族逼獻公患之士蒍曰去富子則羣公子可謀也己公曰爾試其事士蒍與羣公子謀譛富子而去之二十四年晉士蒍又與羣公子謀使殺遊氏之二子士蒍告晉侯曰可矣不過二年君必無患二十五年晉士蒍使羣公子盡殺遊氏之族乃城聚而處之冬晉侯圍聚盡殺羣公子二十六年春晉士蒍為大司空夏士蒍城絳以深其宮曲沃之無道也六弒其君矣昭侯文侯子也桓叔文侯弟也曲沃之封邑大于國潘父作難于內而昭侯被弒既而昭侯之子孝侯桓叔弒之孝侯之子鄂侯莊伯弒之鄂侯之子哀侯緡侯與哀侯之子小子侯武公滅之遂以并晉其弒其君也猶掇之爾周室播遷王綱廢墮不能正其罪而反助之天子凌夷于上姦回亦何懼之有未幾而並叛王矣三世濟惡侈然驕恣方改夏朔豈假周命緡侯立而旋亡天王受其賂器齊桓初伯威未及遠周之衰也何可問也夫唐叔以成王介弟剪桐受封以來及文侯甫九世耳犬戎之亂猶能以王室懿親身戡國難我周之東遷實式賴之其遺烈猶未遠也奈何骨肉肇亂禍成耦國椒聊揚水民樂為謀抑亦盛衰之有定數豈命名之果足以招尤耶宋閔之弒莊公十一年夏宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績得雋曰克覆而敗之曰取某師京師敗曰王師敗績于某秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也悖焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之辭也臧孫達曰是宜為君有恤民之心乘丘之役公以金僕姑射南宮長萬公右歂孫生摶之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之十二年秋宋萬弒閔公于蒙澤遇仇牧于門批而殺之遇大宰督于東宮之西又殺之立子遊羣公子奔蕭公子御説奔亳南宮牛猛獲帥師圍亳冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宮牛于師殺子遊于宋立桓公猛獲奔衛南宮萬奔陳以乘車輦其母一日而至宋人請猛獲于衛衛人欲勿與石祁子曰不可天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之亦請南宮萬于陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之宋公之失刑也其見弒宜矣長萬獲乎莊公數月然後歸之典刑未正而反升為大夫無怪乎萬之驟行其弒也釁起于戲謔之言己伏弒逆之祻乃猶不悟而君臣相博婦人雜居魯侯之美曾何足妬漸端積于有日絶脰激於一言仇牧手劒祗遭碎首異哉亂賊之戕其君也易於宋督矣萬即多力非若鄋瞞之佚宕中國不可傷也弒逆之徒何國無法陳宣不道反為淵藪受賂于宋國而取謀於婦人賊臣雖討陳曾何功較之衛國為失謀矣若御説之對災知警討亂不阿比于春秋之諸侯無乃賢乎王子頽之亂莊十六年初晉武公伐夷執夷詭諸蒍國請而免之既而弗報故子國作亂謂晉人曰與我伐夷而取其地遂以晉師伐夷殺夷詭諸周公忌父出奔虢惠王立而復之十九年初王姚嬖于莊王生子頽子頽有寵蒍國為之師及惠王即位取蒍國之圃以為囿邊伯之宮近于王宮王取之王奪子禽祝跪與詹父田而收膳夫之秩故蒍國邊伯石速詹父子禽祝跪作亂因蘇氏秋五大夫奉子頽以伐王不克出奔溫蘇子奉子頽以奔衛衛師燕師伐周冬立子頽二十年春鄭伯和王室不克執燕仲父夏鄭伯遂以王歸王處于櫟秋王及鄭伯入于塢遂入成周取其寶器而還冬王子頽享五大夫樂及遍舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司寇行戮君為之不舉而況敢樂禍乎姦王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也二十一年春胥命于弭夏同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王于闕西辟樂備王與之武公之略自虎牢以東原伯曰鄭伯效尤其亦將有咎五月鄭厲公卒王巡虢守虢公為王宮于玤王與之酒泉鄭伯之享王也王以后之鞶鑑豫之虢公請器王豫之爵鄭伯由是始惡於王冬王歸自虢二十七年王使召伯廖賜齊侯命且請伐衛以其立子頽也二十八年春齊侯伐衛戰敗衛師數之以王命取賂而還僖公十年春狄滅溫蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衛惠王初立取囿取宮奪田咸不以正故五大夫因子頽之寵以作亂所謂多行不義必自及也然則非禮之舉天子尚不能行之臣下況其他乎子頽樂禍鄭伯知其不終輒復效尤何明于知人而暗于處己也彼惠王偏私行賞遂沒鄭功內難甫平又寵叔帶惠王之世周室亦多事矣暗主殆不可與言哉左傳事緯卷一
